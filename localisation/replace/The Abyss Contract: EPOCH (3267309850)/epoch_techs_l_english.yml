l_english:

 tech_epoch_01_abyss_gateway:0 "§PБезоднянські§! Ворота"
 tech_epoch_01_abyss_gateway_desc:0 "Перший технологічний стрибок у вивченні справжньої природи §PБезодні§!."
 tech_epoch_02_abyss_research:0 "Остаточне дослідження §PБезодні§!"
 tech_epoch_02_abyss_research_desc:0 "Ми знаємо, що §PБезодня§! існує — тепер лишається лише вивчити її. §RОсь тут і знадобиться Об'єкт§!."
 tech_epoch_03_abyss_harvesting:0 "§cПозавимірний темпоральний видобуток§!"
 tech_epoch_03_abyss_harvesting_desc:0 "Ми можемо потрапити в §PБезодню§! — тепер настав час скористатися перевагою першої держави в §PБезодні§!, щоб викрасти її ресурси."
 tech_epoch_04_advanced_lmu:0 "Передове розуміння §LЖивого Металу§!"
 tech_epoch_04_advanced_lmu_desc:0 "Щоб рухатись далі, нам потрібно дізнатись більше про доволі унікальну взаємодію §PБезодні§! з §LЖивим Металом§!."
 tech_epoch_05_living_metal_kinetics:0 "Кінетика §LЖивого Металу§!"
 tech_epoch_05_living_metal_kinetics_desc:0 "Тепер, коли ми зрозуміли загадкову природу §LЖивого Металу§! та його взаємодію з енергіями §PБезодні§!, ми можемо використовувати §LЖивий Метал§! у кінетичній зброї."
 tech_epoch_06_titanoscale_kinetics:0 "Титаномасштабна кінетика §LЖивого Металу§!"
 tech_epoch_06_titanoscale_kinetics_desc:0 "Оскільки в нас є кораблі, здатні використовувати більшу зброю, нам потрібно масштабувати нашу зброю з §LЖивого Металу§! до масштабів §MX-§! та §LT-§!, щоб забезпечити належний захист і оновлення."

##-=-=-=-=-=-=-=-=-=##
##  Середній рівень EPOCH  ##
##-=-=-=-=-=-=-=-=-=##

 tech_epoch_11_thorough_abyss_understanding:0 "§rРетельне дослідження Безодні§! "
 tech_epoch_11_thorough_abyss_understanding_desc:0 "Ми знаємо, що є більше, ніж просто §PУгода§! Безодні, і більше в самій §PБезодні§! — тож ми дізнаємось усе можливе про цей легендарний позавимірний простір."
 tech_epoch_12_void_nexus:0 "§VВузол Витворення Порожнечі§! "
 tech_epoch_12_void_nexus_desc:0 "§rВузол Витворення Порожнечі§! — це найсучасніша мегаспоруда, присвячена дослідженням і виробництву ресурсів. У §rВузлі§! мешкають наші найкращі науковці й наше нове §rГіперінтелектуальне Ядро§!. §LПізніше це можна зменшити, щоб вмістити в корабель§!."
 tech_epoch_13_advanced_abyss_harvesting:0 "§VПередовий видобуток Безодні§! "
 tech_epoch_13_advanced_abyss_harvesting_desc:0 "Через §PБезодню§! ми можемо отримати доступ до раніше суто теоретичних матеріалів. На відміну від звичайної Темної Енергії, §vОбернена Сутність Порожнечі§! значно нестабільніша в нашому §cВимірі Класу-3§! порівняно з рідним виміром. §PОСП, скорочено, вкрай нестабільна й забезпечує значну вихідну потужність зброї.§! "
 tech_epoch_14_necessary_upgrades:0 "Необхідні вдосконалення"
 tech_epoch_14_necessary_upgrades_desc:0 "Якщо ми хочемо піти далі, необхідно вдосконалити наших Збирачів. §lЦі вдосконалення дозволять нам піти далі. Дехто говорить про реактор §! §rЕпсилон§! §PБезодні§!, §lі в цьому може бути сенс§!."

##-=-=-=-=-=-=-=-=-=##
##  Пізній рівень EPOCH ##
##-=-=-=-=-=-=-=-=-=##

 tech_epoch_21_epsilon_reactor:0 "Дослідження §rРеактора Епсилон§!"
 tech_epoch_21_epsilon_reactor_desc:0 "Тепер ми знаємо, що ці легендарні §rТехнології Епсилон§! можливі. Настав час почати використовувати ці технології й розвивати наші можливості."
 tech_epoch_22a_epsilon_jumpdrive:0 "Субвимірний варп §rМікроворіт Епсилон§!"
 tech_epoch_22a_epsilon_jumpdrive_desc:0 "§rМікроворота§! — раніше немислимий компонент, що ефективно встановлює цільову точку призначення й переміщує наш корабель у четвертий вимір — час — водночас дозволяючи неймовірні відстані."
 tech_epoch_22b_epsilon_lance_thruster:0 "Зсув Тканини — §rРозломний спис Епсилон§!"
 tech_epoch_22b_epsilon_lance_thruster_desc:0 "§rДвигун-спис§! був теоретичною концепцією, що спиралась на теоретичні фізичні ідеї «нульового руху». Після відкриття §rРеактора Епсилон§! це стало можливим — і нам варто це зробити, якщо ми хочемо не відставати від ворогів."
 tech_epoch_22c_epsilon_radar:0 "Теорія §rХвильової антени Епсилон§!"
 tech_epoch_22c_epsilon_radar_desc:0 "§rХвильова антена§! — масив антен на кораблі, що використовує §vОбернену Сутність Порожнечі§! для виявлення хвильово-часткових флуктуацій у тканині простору-часу, які позначають рух кораблів."
 tech_epoch_22d_epsilon_ship_intelligence:0 "§rГіперінтелект SIGNALIS Епсилон§! "
 tech_epoch_22d_epsilon_ship_intelligence_desc:0 "Нарешті, і цілком передбачувано, ядро §rГіперінтелекту SIGNALIS§! було зменшене, щоб вміститись усередині корабля. Тепер наші кораблі мають першокласні захисні можливості."
 tech_epoch_22e_epsilon_armor:0 "Захист корпусу §rЗниження зворотного зв'язку Епсилон§!"
 tech_epoch_22e_epsilon_armor_desc:0 "Ці додаткові плити броні мають захисний бюджет, порівнянний із деякою нацією під назвою §PСполучені§! §WШтати§! §BАмерики§!."
 tech_epoch_22f_epsilon_shield:0 "Екранування корпусу §rГіперхвильовий перехоплювач Епсилон§!"
 tech_epoch_22f_epsilon_shield_desc:0 "Ці щити використовують Обернену Сутність Порожнечі, щоб стабілізуватись проти вхідних снарядів, надсилаючи їх у нижчі виміри, перш ніж анулювати їхнє існування. Однак їх можна перевантажити масовим обстрілом снарядами."
 tech_epoch_22g_epsilon_tankmaster:0 "Зміцнення корпусу §rТанкмайстер Епсилон§!"
 tech_epoch_22g_epsilon_tankmaster_desc:0 "Ці елементи зміцнення корпусу використовують Обернену Сутність Порожнечі, щоб стабілізувати й регенерувати корпус, надаючи екіпажу — і кораблю — значно більше запасу міцності, ніж, найімовірніше, потрібно."
 tech_epoch_23_hyperadvanced_research:0 "§rГіперпередові дослідження§! "
 tech_epoch_23_hyperadvanced_research_desc:0 "§GМульти§!-§BДисциплінарні§! §KДослідження§! \n ---- \n Наш жалюгідний стан справ наразі навіть не встигає за нашими постійно зростаючими витратами на дослідження. Щоб рухатись далі, нам §Hнеобхідно§! вдосконалити наші дослідницькі об'єкти."

##-=-=-=-=-=-=-=##
##  Ще пізніший EPOCH ##
##-=-=-=-=-=-=-=##

 tech_epoch_31_epsilon_weaponization:0 "Програма §SОзброєння Епсилон§!"
 tech_epoch_31_epsilon_weaponization_desc:0 "Розпочнеться Програма Озброєння §PEpoch§!, яка дозволить нам озброїти Обернену Сутність Порожнечі. \n ---- \n §RЦя технологія небезпечна й може призвести до потенційних подальших наслідків!§! "
 tech_epoch_32_epsilon_teraweapons:0 "§SТеразброя Epoch§! "
 tech_epoch_32_epsilon_teraweapons_desc:0 "Теразброя йде першою — найенерговитратніша, найпотужніша. Створена, щоб знищувати цілі, але не створена для економічної ефективності."
 tech_epoch_33_epsilon_gigaweapons:0 "§SГігазброя Epoch§! "
 tech_epoch_33_epsilon_gigaweapons_desc:0 "§BФізична§!-§SІнженерна§! \n ---- \n Гігазброя йде другою — руйнівна, зброя проти капітальних кораблів, наче ствол, спрямований у черепну порожнину всесвіту."
 tech_epoch_34_blitzkrieg_weapons:0 "§SЗброя Блискавичної війни Epoch§! "
 tech_epoch_34_blitzkrieg_weapons_desc:0 "§BФізична§!-§SІнженерна§! \n ---- \n Третьою йде зброя Блискавичної війни. Малі, середні й великі §rВипарювачі§! та §rФаланги§!, розроблені для наших кораблів як зброя загального призначення."
 tech_epoch_35_iron_curtain:0 "§SОбладнання Залізної завіси Epoch§! "
 tech_epoch_35_iron_curtain_desc:0 "§BФізична§!-§SІнженерна§! \n ---- \n Четвертою йде Залізна завіса. Ракети §rШукач§!, §rДрони§! й §rCIWS§! захищають наші кораблі до самого кінця."
 tech_epoch_36_jaegerkriegs_components:0 "§SКомпоненти Jaegerkriegs Epoch§! "
 tech_epoch_36_jaegerkriegs_components_desc:0 "П'ятими йдуть компоненти §rJaegerkriegs§!, щоб допомагати й зміцнювати наші кораблі та надавати допоміжну функціональність нашим воєнним машинам."
 tech_epoch_37_void_escort:0 "§SEpoch§! §rЕСКОРТНІ§! §SкорабліПорожнечі§!"
 tech_epoch_37_void_escort_desc:0 "Тепер, коли ми знаємо, яка зброя в нашому розпорядженні, ми можемо почати будівництво кораблів Порожнечі. Хоч і базові, вони мають дати нам перевагу. \n ---- \n §RХтось уже випередив нас у цій технології.§! \n ---- \n §YПРИМІТКА — ВАМ ПОТРІБНО СПРОЄКТУВАТИ КОРАБЕЛЬ. ВІН §PНЕ§! ПРОЄКТУЄТЬСЯ АВТОМАТИЧНО.§! "
 tech_epoch_38_void_battlecruiser:0 "§SEpoch§! §rКРЕЙСЕРИ§! §SкорабляПорожнечі§!"
 tech_epoch_38_void_battlecruiser_desc:0 "Наступний за розміром, §rКрейсери кораблів Порожнечі§! помірно потужніші за своїх §rЕскортних§! відповідників, діючи як задньо- та середньолінійна підтримка. \n ---- \n§RХтось уже випередив нас у цій технології.§! \n ---- \n§YПРИМІТКА — ВАМ ПОТРІБНО СПРОЄКТУВАТИ КОРАБЕЛЬ. ВІН §PНЕ§! ПРОЄКТУЄТЬСЯ АВТОМАТИЧНО.§! "
 tech_epoch_39_void_titan:0 "§SEpoch§! §rТИТАН§! §SкорабляПорожнечі§! "
 tech_epoch_39_void_titan_desc:0 "Останній за розміром, §rТитани Порожнечі§! — наші командувачі й флагмани, що надають нам провідний мотив, коли ми йдемо в бій. Кожен §rТитан§! вартий §vщонайбільше дванадцяти крейсерів і двадцяти чотирьох ескортів.§! \n ---- \n§RХтось уже випередив нас у цій технології.§! \n ---- \n§YПРИМІТКА — ВАМ ПОТРІБНО СПРОЄКТУВАТИ КОРАБЕЛЬ. ВІН §PНЕ§! ПРОЄКТУЄТЬСЯ АВТОМАТИЧНО.§! "

##-=-=-=-=-=-=-=-=-=-=##
##  Останній рівень EPOCH   ##
##-=-=-=-=-=-=-=-=-=-=##


 tech_epoch_41_null_buildings:0 "§PНуль-Стабілізована Архітектура§!"
 tech_epoch_41_null_buildings_desc:0 "Ці споруди, стабілізовані через нуль-порожнинне з'єднання, допоможуть закріпити наше місце в Галактиці та наші операції в Безодні."
 tech_epoch_42_gammasphere:0 "§SГамасфера§! "
 tech_epoch_42_gammasphere_desc:0 "Ця краса-машина, §PГамасфера§!, наш найкращий друг у справі споруд, одразу після §BПорожнявосфер§!. \n ---- \n§YСупроводжується указом про перетворення планети на Гамасферу Безодні.§! "
 tech_epoch_43_void_hunter:0 "§SEpoch§! §rМисливець Порожнечі§! §Sкорабель Порожнечі§! "
 tech_epoch_43_void_hunter_desc:0 "Спеціалізоване бойове судно постти-танового рівня, присвячене розбиванню корпусів. Підтримує наші облогові флоти, діючи радше як лінкор. Займає §Y8 слотів Бойового крейсера Порожнечі§! або §Y16 слотів Бойового ескорту Порожнечі§!. \n ---- \n§RХтось уже випередив нас у цій технології.§! \n ---- \n§YПРИМІТКА — ВАМ ПОТРІБНО СПРОЄКТУВАТИ КОРАБЕЛЬ. ВІН §PНЕ§! ПРОЄКТУЄТЬСЯ АВТОМАТИЧНО.§! "
 tech_epoch_crisis_01_void_relay:0 "Зовнішнє реле Порожнечі"
 tech_epoch_crisis_01_void_relay_desc:0 "Вдосконалення старого Масового деконструктора Порожнечі для одночасної обробки вхідних і вихідних потоків, §YЗовнішнє реле Порожнечі§! — це мегаспоруда, присвячена пробиванню прямо в Порожнечу. Наразі ми не знаємо, куди ведуть ці ворота, §Bале кудись вони точно ведуть§!."
 tech_epoch_44_fleet_megayard:0 "§YМегаверф флоту§! "
 tech_epoch_44_fleet_megayard_desc:0 "Ця мегаспоруда — хребет наших флотів і флотилій. Додаючи 250 до ліміту флоту й 50 до ліміту командування флотом, з 35 верфями, ця мегаспоруда прагне максимально використати свої ресурси."
 tech_epoch_51_epsilon_buildings:0 "§rСпоруди кілостримування§! "
 tech_epoch_51_epsilon_buildings_desc:0 "Пряме оновлення своїх відповідників з Безодні — Директорія Епсилон і Терощит Епсилон дають більше вигоди за вкладення, а Об'єкт кілостримування Епсилон виробляє значну кількість ОСП і СП коштом великого споживання Енергії."
 tech_epoch_53_epsilon_bombard:0 "Протокол бомбардування §PЧЕРВОНЕ СОНЦЕ§!"
 tech_epoch_53_epsilon_bombard_desc:0 "Обстрілюючи великими ракетами §rШукач§! й бомбами, а також використовуючи дронів §rLockheed§! для знищення цілей, наші кораблі продовжать нашу спадщину. §rОгортає планети Саваном§!."
