##-=-=-=-=-=-=-=-=-=-=-=-=##
##  Кінетика Живого Металу ##
##-=-=-=-=-=-=-=-=-=-=-=-=##
 LIVING_METAL_AUTOCANNON:0 "Автогармата §LЖивий Метал§!"
 LIVING_METAL_AUTOCANNON_DESC:0 "§TЖивий Метал§! вистрілюється на неймовірній швидкості, забезпечуючи значну деконструкцію будь-якої броні на шляху. Незначно проти щитів."
 EPOCH_LM_AUTOCANNON:0 "Автогармата §LЖивий Метал§!"
 EPOCH_LM_AUTOCANNON_DESC:0 "Автогармата з §TЖивого Металу§!, розроблена для стирання корпусу й броні."
 LIVING_METAL_BATTERY:0 "Батарея §LЖивий Метал§!"
 LIVING_METAL_BATTERY_DESC:0 "§TЖивий Метал§! вистрілюється на майже релятивістських швидкостях, обіцяючи повне знищення корпусу й броні — але неефективно проти щитів."
 EPOCH_LM_BATTERY:0 "Батарея §LЖивий Метал§!"
 EPOCH_LM_BATTERY_DESC:0 "Широкоствольна гвинтівка §TЖивий Метал§!, масштабована до корабельної зброї."
 LIVING_METAL_ARTILLERY:0 "Артилерія §LЖивий Метал§!"
 LIVING_METAL_ARTILLERY_DESC:0 "Артилерія §LЖивий Метал§! — це зброя, що вистрілює великі кінетичні вбивчі снаряди на приголомшливій швидкості. Стирає корпус і броню."
 EPOCH_LM_ARTILLERY:0 "Артилерія §LЖивий Метал§!"
 EPOCH_LM_ARTILLERY_DESC:0 "Більша версія §TЖивий Метал§! §_Батареї§!, що стріляє схоже масштабованими боєприпасами."
 LIVING_METAL_RAILCANNON:0 "Рейкова гармата §LЖивий Метал§!"
 LIVING_METAL_RAILCANNON_DESC:0 "А... гаразд, це вже не смішно. Абсурдно завелика Артилерійська установка §TЖивий Метал§!, що стирає корпус і броню ще сильніше, ніж артилерія."
 EPOCH_LM_RAILCANNON:0 "Рейкова гармата §LЖивий Метал§!"
 EPOCH_LM_RAILCANNON_DESC:0 "§MРейкова гармата§! стирає броню й корпус, наче гарячий ніж масло."
 LIVING_METAL_HYPERGUN:0 "Гіперрушниця §LЖивий Метал§!"
 LIVING_METAL_HYPERGUN_DESC:0 "Комічно велика Артилерійська установка §TЖивий Метал§!. ...Що, вам потрібно детально розповісти про її здатність стирати корпус і броню? Знову?"
 EPOCH_LM_HYPERGUN:0 "Гіперрушниця §LЖивий Метал§!"
 EPOCH_LM_HYPERGUN_DESC:0 "Попрощайтеся зі своїми набридливими проблемами за допомогою §MГіперрушниці§!!"
##-=-=-=-=-=-=-=-=-=-=-=-=##
##  Зброя рівня Epoch   ##
##-=-=-=-=-=-=-=-=-=-=-=-=##
 EPOCH_LANCE:0 "§rСпис Осуду Епсилон§! "
 EPOCH_LANCE_DESC:0 "§rСпис Осуду§! стирає наших ворогів прямо перед нами, надсилаючи будь-який мотлох-левіафан, який у них є, у §PБезодню§!."
 EPOCH_HYPERGUN:0 "§rСпіральна гіперрушниця Епсилон§! "
 EPOCH_HYPERGUN_DESC:0 "§rГіперрушниця§! випускає снаряд §TЖивого Металу§! в напрямку цілі, намагаючись влучити."
 EPOCH_EPSILON_T_LANCE:0 "§rСпис Осуду Епсилон§! "
 EPOCH_EPSILON_T_LANCE_DESC:0 "§rСпис Осуду§! стирає наших ворогів прямо перед нами, надсилаючи будь-який мотлох-левіафан, який у них є, у §PБезодню§!."
 EPOCH_EPSILON_T_HYPERGUN:0 "§rСпіральна гіперрушниця Епсилон§! "
 EPOCH_EPSILON_T_HYPERGUN_DESC:0 "§rГіперрушниця§! випускає снаряд §TЖивого Металу§! в напрямку цілі, намагаючись влучити."
 EPOCH_EPSILON_X_HULLCUTTER:0 "§rКорпусоріз Епсилон§! "
 EPOCH_EPSILON_X_HULLCUTTER_DESC:0 "§rКорпусоріз§! — спеціалізований §rВипарювач§!, призначений для встановлення в дуже великі слоти. Як і випливає з назви, §rКорпусорізи§! легко розрізають ворожі корпуси."
 EPOCH_HULLCUTTER:0 "§rКорпусоріз Епсилон§! "
 EPOCH_HULLCUTTER_DESC:0 "§rКорпусоріз§! — спеціалізований §rВипарювач§!, призначений для встановлення в дуже великі слоти. Як і випливає з назви, §rКорпусорізи§! легко розрізають ворожі корпуси."
 EPOCH_RAILCANNON:0 "§rРелятивістська рейкова гармата Епсилон§! "
 EPOCH_RAILCANNON_DESC:0 "§rРелятивістська рейкова гармата§!, вірна своїй назві, вистрілює шматки §TЖивого Металу§! в напрямку цілі."
 EPOCH_EPSILON_X_RAILCANNON:0 "§rРелятивістська рейкова гармата Епсилон§! "
 EPOCH_EPSILON_X_RAILCANNON:0 "§rРелятивістська рейкова гармата§!, вірна своїй назві, вистрілює шматки §TЖивого Металу§! в напрямку цілі."
 EPOCH_EVAPORATOR:0 "§rВипарювач Епсилон§! "
 EPOCH_EVAPORATOR_DESC:0 "§rВипарювач§! творить чудеса проти щитів, але не так проти броні. Стандартна шкода по корпусу."
 EPOCH_PHALANX:0 "§rФаланга Епсилон§! "
 EPOCH_PHALANX_DESC:0 "§rФаланга§! творить чудеса проти броні, але не так проти щитів. Стандартна шкода по корпусу."
 EPOCH_EVAPORATOR_S:0 "Малий §rВипарювач Епсилон§! "
 EPOCH_EVAPORATOR_S_DESC:0 "§rВипарювач§! творить чудеса проти щитів, але не так проти броні. Стандартна шкода по корпусу."
 EPOCH_EVAPORATOR_M:0 "Середній §rВипарювач Епсилон§! "
 EPOCH_EVAPORATOR_M_DESC:0 "§rВипарювач§! творить чудеса проти щитів, але не так проти броні. Стандартна шкода по корпусу."
 EPOCH_EVAPORATOR_L:0 "Великий §rВипарювач Епсилон§! "
 EPOCH_EVAPORATOR_L_DESC:0 "§rВипарювач§! творить чудеса проти щитів, але не так проти броні. Стандартна шкода по корпусу."
 EPOCH_PHALANX_S:0 "Мала §rФаланга Епсилон§! "
 EPOCH_PHALANX_S_DESC:0 "§rФаланга§! творить чудеса проти броні, але не так проти щитів. Стандартна шкода по корпусу."
 EPOCH_PHALANX_M:0 "Середня §rФаланга Епсилон§! "
