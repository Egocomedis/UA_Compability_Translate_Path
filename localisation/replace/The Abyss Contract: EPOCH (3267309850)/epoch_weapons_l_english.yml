 EPOCH_CIWS:0 "Батарея точкової оборони §rCIWS Епсилон§!"
 EPOCH_CIWS_DESC:0 "§rCIWS§! — комбінована енергетично-кінетична зброя, найкраща проти ракет і штурмових суден."
 EPOCH_CIWS_PD:0 "Батарея точкової оборони §rCIWS Епсилон§!"
 EPOCH_CIWS_PD_DESC:0 "§rCIWS§! — комбінована енергетично-кінетична зброя, найкраща проти ракет і штурмових суден."
 EPOCH_SEEKER_MISSILE:0 "Ракета §rШукач Епсилон§!"
 EPOCH_SEEKER_MISSILE_DESC:0 "Ракета §rШукач§! стирає корпус, використовуючи мініатюризований Перехоплювач і Редуктор зворотного зв'язку для щита й броні."
 EPOCH_SEEKER:0 "Ракета §rШукач Епсилон§!"
 EPOCH_SEEKER_DESC:0 "Ракета §rШукач§! стирає корпус, використовуючи мініатюризований Перехоплювач і Редуктор зворотного зв'язку для щита й броні."
 EPOCH_LOCKHEED_DRONE:0 "Дрон §rLockheed Епсилон§!"
 EPOCH_LOCKHEED_DRONE_DESC:0 "Цей §rДрон§! — автономний деконструкційний апарат, що використовує велику кількість Оберненої Сутності Порожнечі для власного живлення. Використовує наномасштабний Перехоплювач і Редуктор зворотного зв'язку для щита й броні."
 EPOCH_DRONE:0 "Дрон §rLockheed Епсилон§!"
 EPOCH_DRONE_DESC:0 "Цей §rДрон§! — автономний деконструкційний апарат, що використовує велику кількість Оберненої Сутності Порожнечі для власного живлення. Використовує наномасштабний Перехоплювач і Редуктор зворотного зв'язку для щита й броні."
 EPOCH_HUNTER_SHIPWRECKER:0 "Спис §rКорабельник Епсилон§!"
 EPOCH_SHIPWRECKER:0 "Спис §rКорабельник Епсилон§!"
 EPOCH_HUNTER_SHIPWRECKER_DESC:0 "Корабельник — специфічна для §rМисливця§! §STеразброя§!, присвячена розбиванню корпусів. Розриває ворожі кораблі, наче гарячий ніж масло — або пронос після Тако Белл."
 EPOCH_SHIPWRECKER_DESC:0 "Корабельник — специфічна для §rМисливця§! §STеразброя§!, присвячена розбиванню корпусів. Розриває ворожі кораблі, наче гарячий ніж масло — або пронос після Тако Белл крізь каналізаційну трубу."
 bombardment_redsun:0 "Протокол §rЧервоне Сонце§!"
 bombardment_redsun_desc:0 "Обстрілюючи великими ракетами §rШукач§! й бомбами, а також використовуючи дронів §rLockheed§! для знищення цілей, наші кораблі продовжать нашу спадщину. §rОгортає планети Саваном§!. \n - §RНестерпна§! шкода по арміях \n - §RНестерпна§! шкода по планеті \n - §RНестерпна§! шкода по поселенцях \n - §RНестерпна§! шкода по спорудах \n - §rОгортатиме планети Саваном§!."
 EPOCH_EPSILON_PLANETKILLER:0 "Гіперспис §rВсезнищення Епсилон§!"
 EPOCH_PK:0 "Гіперспис §rВсезнищення Епсилон§!"
 EPOCH_EPSILON_PLANETKILLER_DESC:0 "Ця зброя — переобладнаний §rСпис Осуду§!, що використовується для огортання планет Саваном. Завдає жалюгідної шкоди корпусу й використовується лише для знищення планет. §rЄдина причина, чому вона огортає планети Саваном — це те, що всесвіт за замовчуванням відносить будь-які атмосферні помилки до Савану.§! "
 EPOCH_PK_DESC:0 "Ця зброя — переобладнаний §rСпис Осуду§!, що використовується для огортання планет Саваном. Завдає жалюгідної шкоди корпусу й використовується лише для знищення планет. §rЄдина причина, чому вона огортає планети Саваном — це те, що всесвіт за замовчуванням відносить будь-які атмосферні помилки до Савану.§! "
 FLEETORDER_DESTROY_PLANET_WITH_EPOCH_EPSILON_PLANETKILLER:0 "Підготовка до огортання Саваном $PLANET|Y$"
 MESSAGE_DESC_FOR_EPOCH_EPSILON_PLANETKILLER:0 "було огорнуто Саваном силами"
 EPOCH_EPSILON_PLANETKILLER_ACTION:0 "Огорнути світ Саваном"
