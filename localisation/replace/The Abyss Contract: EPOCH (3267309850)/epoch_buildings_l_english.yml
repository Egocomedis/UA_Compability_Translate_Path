## МЕГАСПОРУДИ ##
####################

 epoch_gateway_abyss:0 "Ворота §PБезодні§!"
 epoch_gateway_abyss_DESC:0 "Перший крок до передових §PДосліджень Безодні§! та легендарних §MТехнологій Епсилон§!."
 epoch_gateway_abyss_MEGASTRUCTURE_DETAILS:0 "Перший крок до передових §PДосліджень Безодні§! та легендарних §MТехнологій Епсилон§!."
 epoch_void_genesis_nexus:0 "§rВузол Витворення Порожнечі§! "
 epoch_void_genesis_nexus_DESC:0 "§rVGN-1§! містить наше найважливіше на сьогодні технологічне оновлення — ядро ШІ §BSIGNALIS ГІПЕРІНТЕЛЕКТ§!. §RЙого потенційно можна зменшити до корабельного масштабу, але для цього треба копнути глибше.§!"
 epoch_void_genesis_nexus_MEGASTRUCTURE_DETAILS:0 "§rVGN-1§! — це §Pколосальна§! мегаспоруда, що виробляє неймовірні обсяги §CДосліджень§! та §PЯдер Часу§!. §YМає будуватись навколо Місяця.§!"
 epoch_void_deconstructor:0 "§BМасовий деконструктор Порожнечі§! "
 epoch_void_deconstructor_DESC:0 "§BМасовий деконструктор Порожнечі§! — гігантська мегаспоруда, що виробляє, ймовірно, незаконні обсяги §dОберненої Сутності Порожнечі§!. Життєво важлива для наших §PопераційБезодні§!. \n---\n §YЄдине, що заважає їй стати Зовнішнім реле Порожнечі — Піко-Системне Поле Стримування, споруда посередині§!."
 epoch_void_deconstructor_MEGASTRUCTURE_DETAILS:0 "§BМасовий деконструктор Порожнечі§! — гігантська мегаспоруда, що виробляє, ймовірно, незаконні обсяги §dОберненої Сутності Порожнечі§!. Життєво важлива для наших §PопераційБезодні§!. \n---\n §YЄдине, що заважає їй стати Зовнішнім реле Порожнечі — Піко-Системне Поле Стримування, споруда посередині§!."
 epoch_gigafacility:0 "§rНуо-Стабілізована Гігаустановка§!"
 epoch_gigafacility_DESC:0 "Ця §rГігаустановка§! виробляє приголомшливу кількість мінералів, сплавів, енергії та ядер часу, дозволяючи розширювати наші горизонти та інфраструктуру Безодні."
 epoch_gigafacility_MEGASTRUCTURE_DETAILS:0 "Ця §rГігаустановка§! виробляє приголомшливу кількість мінералів, сплавів, енергії та ядер часу, дозволяючи розширювати наші горизонти та інфраструктуру Безодні."
 epoch_fleet_megayard:0 "Мегаверф флоту"
 epoch_fleet_megayard_DESC:0 "Ця мегаспоруда — хребет наших флотів і флотилій. Додаючи 250 до ліміту флоту й 50 до ліміту командування флотом, з 35 верфями, ця мегаспоруда прагне максимально використати свої ресурси."
 epoch_fleet_megayard_MEGASTRUCTURE_DETAILS:0 "Ця мегаспоруда — хребет наших флотів і флотилій. Додаючи 250 до ліміту флоту й 50 до ліміту командування флотом, з 35 верфями, ця мегаспоруда прагне максимально використати свої ресурси."
 epoch_cannot_have_another_megayard:0 "Не можна мати ще одну Мегаверф."
 epoch_kilocontainment_field:0 "Об'єкт Кілостримування Епсилон"
 epoch_kilocontainment_field_DESC:0 "Ця §rГігаустановка§! виробляє приголомшливу кількість Оберненої Сутності Порожнечі та звичайної Сутності Порожнечі, з відповідно приголомшливим споживанням енергії."
 epoch_kilocontainment_field_MEGASTRUCTURE_DETAILS:0 "Ця §rГігаустановка§! виробляє приголомшливу кількість Оберненої Сутності Порожнечі та звичайної Сутності Порожнечі, з відповідно приголомшливим споживанням енергії."

