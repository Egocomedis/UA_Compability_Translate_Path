l_english:

 epoch_abyss_research_building:0 "Дослідницький об'єкт §PБезодні§!"
 epoch_abyss_research_building_desc:0 "Об'єкт, присвячений дослідженню §PБезодні§! та її дивних властивостей."
 epoch_abyss_harvesting_building:0 "Видобувний об'єкт §PБезодні§!"
 epoch_abyss_harvesting_building_desc:0 "Об'єкт, присвячений видобутку та видобуванню енергій і ресурсів §PБезодні§!."
 epoch_deluge_void_harvester:0 "Планетарний збирач Порожнечі §rПотоп§!"
 epoch_deluge_void_harvester_desc:0 "Мініатюризований §BМасовий деконструктор Порожнечі§! для планетарного використання, призначений для розриву вимірів заради видобутку §PБезодні§!."
 epoch_planetside_epsilon_reactor:0 "Планетарний реактор §rЕпсилон§!"
 epoch_planetside_epsilon_reactor_desc:0 "Корабельний реактор, переобладнаний у планетарний об'єкт масового виробництва енергії. Має видавати значно більше, ніж вам потрібно."
 epoch_epsilon_research:0 "Гіпердослідницький об'єкт §rЕпоха§!"
 epoch_epsilon_research_desc:0 "Щедре оновлення нашого попередника — §PДослідницького об'єкта Безодні§!. Виробляє приголомшливу кількість досліджень."
 epoch_abyss_directory:0 "Директорія §PБезодні§!"
 epoch_abyss_directory_desc:0 "Наш полігон і столиця операцій для роботи над Безоднею."
 epoch_abyss_shield:0 "Масив планетарного щита §PНульового Виміру§!"
 epoch_abyss_shield_desc:0 "Цей масив забезпечує щит для наших домівок, наших прихистків, нашого народу, використовуючи §vОбернену Сутність Порожнечі§!, отриману нашими видобувними операціями."
 epoch_abyss_housing:0 "Житловий масив §PЗовнішньої Порожнечі§!"
 epoch_abyss_housing_desc:0 "Цей масив забезпечує житло для нашого народу та солдатів, вибудовуючи структури на патафізичному відображенні §PБезодні§!."
 epoch_deluge_array:0 "Масив Порожнечі §rПотоп§!"
 epoch_deluge_array_desc:0 "Цей масив надає посади та ресурси нашому народу й державі. \n ------- \n§RНеобхідний для масштабного виробництва флотів!§! "
 epoch_abyss_void_researcher:0 "Пронизливий дослідницький масив §rЗовнішньої Порожнечі§!"
 epoch_abyss_void_researcher_desc:0 "Пряме оновлення §rГіпердослідницького об'єкта Епоха§! — цей масив є величезним об'єктом, присвяченим §Hутриманню відкритим патафізичного відображення §rПорожнечі§! й наданню доступу до нього нашим науковцям§!. \n ------- \n§RНеобхідний для масштабних дослідницьких можливостей!§!"
 epoch_void_macrocomplex:0 "Масив макровиробництва §rЗовнішньої Порожнечі§!"
 epoch_void_macrocomplex_desc:0 "Цей масив забезпечує ресурси для всієї нашої держави, у масштабах, раніше немислимих. \n ------- \n§YДає 3 тис. загальних ресурсів.§! §RНеобхідний для великих держав!§!"
 sm_epoch_void_shipyard:0 "Гіперпросторовий складальний блок"
 sm_epoch_void_shipyard_desc:0 "Цей блок дозволяє будувати спеціальні кораблі §rБойового судна§! за допомогою спеціальних алгоритмів реконструкції. \n ------- \n§YЗ цього модуля можна будувати лише Бойові судна§!."
 sm_epoch_void_shipyard_desc_modifier:0 "Дозволяє будувати звідси §rБойові судна§!."
 epoch_epsilon_directory:0 "Директорія стазису §rЕпсилон§!"
 epoch_epsilon_directory_desc:0 "Вдосконалений варіант Директорії Безодні — ESD зміцнює наші позиції в операціях."
 epoch_epsilon_terashield:0 "Терощитова установка §rЕпсилон§!"
 epoch_epsilon_terashield_desc:0 "Вдосконалений варіант PSA Безодні — ETE допомагає захищати наші світи й активи від орбітального бомбардування."
 epoch_repro_center:0 "Центр масового відтворення §rЕпсилон§!"
 epoch_repro_center_desc:0 "Ця споруда використовує два крила — одне зі звукоізоляцією, приватністю та афродизіаком для підвищення зростання населення дещо старомодним способом, а друге дозволяє нашим виробничим об'єктам працювати ефективніше."
 epoch_seat_of_lords:0 "Престол Лордів §rЕпсилон§!"
 epoch_seat_of_lords_desc:0 "Престол Лордів закріплює наші позиції на планетах, дозволяючи виробляти більше Арбітрів і Наглядачів."
 epoch_orc:0 "Центр органічної реквізиції §rЕпсилон§!"
 epoch_orc_desc:0 "О.Р.Ц. виробляє значну кількість їжі та споживчих товарів для органічних держав. Для машинних держав це просто ще одне джерело грошей."
 epoch_megalog:0 "Центр мегалогістики §rЕпсилон§!"
 epoch_megalog_desc:0 "Центр мегалогістики дозволяє нашим будівельникам працювати значно швидше, виробляючи більше дюрасталевих сплавів для наших мегаспоруд."

