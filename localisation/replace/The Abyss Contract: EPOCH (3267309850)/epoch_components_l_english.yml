 EPOCH_COWARD_OVERRIDE_DESC:0 "Модуль подолання боягузтва допомагає пілотам кораблів ефективніше вступати в бій, скасовуючи те, що вважалося б «безпечними» маневрами, хоч і з підвищеним ризиком загибелі всього екіпажу."
 EPOCH_COWARDICE_OVERRIDE_DESC:0 "Модуль подолання боягузтва допомагає пілотам кораблів ефективніше вступати в бій, скасовуючи те, що вважалося б «безпечними» маневрами, хоч і з підвищеним ризиком загибелі всього екіпажу."
