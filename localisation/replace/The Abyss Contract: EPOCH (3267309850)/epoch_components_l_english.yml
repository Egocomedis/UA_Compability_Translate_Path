 EPOCH_PAYDAY_CLOAKER_DESC:0 "§rМаскувач Payday§! розсіює наші військові кораблі по малих просторових кишенях. \n -------- \n §HЛІМІТ ОДИН НА КОРАБЕЛЬ§!."
 EPOCH_CLOAKER_DESC:0 "§rМаскувач Payday§! розсіює наші військові кораблі по малих просторових кишенях. \n -------- \n §HЛІМІТ ОДИН НА КОРАБЕЛЬ§!."
 EPOCH_FORMULA_ONE_AFTERBURNER_DESC:0 "§rФорсаж Формула-1§! дозволяє нашим військовим кораблям виконувати шалені маневри й розвивати швидкості, що межують із руйнуванням корабля."
 EPOCH_AFTERBURNER_DESC:0 "§rФорсаж Формула-1§! дозволяє нашим військовим кораблям виконувати шалені маневри й розвивати швидкості, що межують із руйнуванням корабля."
 EPOCH_WAVE_DASHER_DESC:0 "§rХвильовий ривок§! зміцнює наші щити й дозволяє їм регенерувати, пробиваючись у шестивимірну фізику, дозволяючи не лише відновлювати пошкодження щита, а й здобувати більший опір до того, що було б смертельним ударом."
 EPOCH_DASHER_DESC:0 "§rХвильовий ривок§! зміцнює наші щити й дозволяє їм регенерувати, пробиваючись у шестивимірну фізику, дозволяючи не лише відновлювати пошкодження щита, а й здобувати більший опір до того, що було б смертельним ударом."
 EPOCH_TETRADIM_STAB_DESC:0 "§rТетравимірний стабілізатор§! пробивається в шестивимірну фізику, щоб не лише відновлювати пошкодження корпусу й броні, а й зміцнювати броню, даючи нам більше простору для помилки."
 EPOCH_STABILIZER_DESC:0 "§rТетравимірний стабілізатор§! пробивається в шестивимірну фізику, щоб не лише відновлювати пошкодження корпусу й броні, а й зміцнювати броню, даючи нам більше простору для помилки."
 EPOCH_ULTRAKILL_DIRECTORY_DESC:0 "§rДиректорія потужності ULTRAKILL§! дозволяє нашим військовим кораблям накопичувати на 55% більше вогневої потужності. \n -------- \n §HЧЕРЕЗ ПИТАННЯ БАЛАНСУ — ЛІМІТ ОДИН НА КОРАБЕЛЬ§!."
 EPOCH_ULTRAKILL_DESC:0 "§rДиректорія потужності ULTRAKILL§! дозволяє нашим військовим кораблям накопичувати на 55% більше вогневої потужності. \n -------- \n §HЧЕРЕЗ ПИТАННЯ БАЛАНСУ — ЛІМІТ ОДИН НА КОРАБЕЛЬ§!."
 EPOCH_FORCE_MULTIPLIER_DESC:0 "§rМультиплікатор сили§! використовує §rреактор§! на повну, ще більше стабілізуючи його й виробляючи більший момент і енергію."
 EPOCH_MULTIPLIER_DESC:0 "§rМультиплікатор сили§! використовує §rреактор§! на повну, ще більше стабілізуючи його й виробляючи більший момент і енергію."
