 epoch_crisis.9.title:0 "Все скінчено, лишились тільки сльози"
 epoch_crisis.9.desc:0 "Нації, держави, системи святкують — загроза з Безодні Челленджер знищена. Були втрачені життя, знищені кораблі, зникли планети, стерто зоряні бази, але зусилля стримати потенційно міжгалактичну загрозу не були марними. §EСистема Безодня Челленджер тепер у ваших руках — що робити далі, вирішувати вам§!. Звіти справді складено, вони завершились наприкінці минулого місяця. \n\n§EВідчувається помітний зсув у просторі-часі, коли присутність Мешканців Порожнечі майже миттєво зникає.§!"
 epoch_crisis.9.a:0 "Зникли так само швидко, як з'явились. Прикро."
