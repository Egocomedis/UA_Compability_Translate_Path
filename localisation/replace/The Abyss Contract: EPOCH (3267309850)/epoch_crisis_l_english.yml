 OUTER_VOID_RELAY_GALACTIC_DESC:0 "Це реле з'єднується з відповідником у §BБезодні Челленджер§!."
 epoch_crisis_void_relay:0 "Зовнішнє реле Порожнечі"
 epoch_crisis_void_relay_DESC:0 "Це реле пробиває прохід у §BБезодню Челленджер§!, видобуваючи величезні обсяги Оберненої Сутності Порожнечі та її звичайного відповідника."
 epoch_crisis_void_relay_MEGASTRUCTURE_DETAILS:0 "Це реле пробиває прохід у §BБезодню Челленджер§!, видобуваючи величезні обсяги Оберненої Сутності Порожнечі та її звичайного відповідника."
 must_not_have_ovr_already:0 "Не повинно бути вже наявного Зовнішнього реле Порожнечі."
 BYPASS_DESC_INACTIVE_OUTER_VOID_RELAY_BYP:0 "Це реле наразі не з'єднане. Його з'єднання порушено якимись зовнішніми перешкодами."
 BYPASS_DESC_ACTIVE_OUTER_VOID_RELAY_BYP:0 "Це реле з'єднане й заблоковане на §BБезодню Челленджер§!."

 epoch_crisis.1.title:0 "Заклик відлунь"
 epoch_crisis.1.desc:0 "Через шість місяців після активації Зовнішнього реле Порожнечі ми отримуємо повідомлення про незрозумілі звуки поблизу реле — відлуння криків, бойові кличі, навіть звуки будівництва кораблів. Багато хто не знає, що робити."
 epoch_crisis.1.fuckitweball:0 "Продовжуємо."
 epoch_crisis.1.b_desc:0 "У нас немає іншого вибору, крім як продовжувати. §YМи зайшли так далеко, чому зупинятись тепер?§! \n§RКриза просунулась.§! \nЗапускає ситуацію §YЗаклик відлунь§!.\n"

 situation_void_crisis:0 "Заклик відлунь"
 situation_void_crisis_desc:0 "Ми отримуємо невідомі повідомлення й сигнали з-за нашого Зовнішнього реле Порожнечі від невідомого відправника. Область, з якої надходять ці повідомлення, під кодовою назвою §BБезодня Челленджер§!, погано картографована. \n\n§YЗалежно від нашого підходу, завершення може зайняти від 50 до 100 місяців§!. \n§RЯКЩО ВИ НЕ ГОТОВІ, ОБЕРІТЬ УХИЛЕННЯ§!."
 situation_void_crisis_type:0 "§BПрогрес Кризи Порожнечі§!"
 situation_void_crisis_monthly_change_tooltip:0 "Поточний стан кризи. Що вище число, то більша загроза."
 situation_void_crisis_avoidance:0 "Ухилення"
 situation_void_crisis_caution:0 "Обережність"
 situation_void_crisis_fervence:0 "Запал"
 modifier_void_crisis.a:0 "Збільшено на 1 через підхід «Обережність»"
 modifier_void_crisis.b:0 "Збільшено на 2 через підхід «Запал»"
 situation_void_crisis_complete:0 "§RСила Глибини вторгнеться§!."
 epoch_avoidance:0 "Ми геть не готові. Нам потрібно відступити."
 epoch_caution:0 "Будьмо обережні."
 epoch_fervence:0 "Зустрінемо їх зі схрещеними мечами!"

 epoch_crisis.3.title:0 "Розсіяний вогонь"
 epoch_crisis.3.desc:0 "Один із наших флотів був уражений невідомим снарядом і знищений. Тахіонні сенсори показують, що снаряд надійшов із §YЗовнішнього реле Порожнечі§!. Тепер у нас є всі підстави вважати, що хто б чи що б не було з іншого боку, §Rвони не люблять гостей§!."
 epoch_crisis.3.a:0 "Тривожно."
 epoch_crisis.3.a_desc:0 "§RФлот у системі знищено§!. \n§BПрогрес кризи: 20%§!. \n§YРозблоковано нову технологію — Агрегатор Порожнечі§!."
 epoch_crisis.4.title:0 "Стрибок потужності"
 epoch_crisis.4.desc:0 "Ми виявили стрибок потужності від §YЗовнішнього реле Порожнечі§!. Звіти повідомляють про смертельну кількість енергії, скинутої через систему, але нічого не сталося — §Rякби ми тримали там флот, його б напевно стерло з існування§!. \n§YРозблоковано нову технологію — Агрегатор Порожнечі§!."
 epoch_crisis.4.a:0 "Ой лишенько..."
 epoch_crisis.4.a_desc:0 "§BПрогрес кризи: 20%§!."

 tech_epoch_crisis_02_void_aggregator:0 "Агрегатор Порожнечі"
 tech_epoch_crisis_02_void_aggregator_desc:0 "Через загрозу з боку тих, хто по той бік Зовнішнього реле Порожнечі, нам потрібне місце, куди відводити потужність. Тому необхідно збудувати §BАгрегатор Порожнечі§! — розширену версію, §YПсевдо-Фазований Агрегатор Порожнечі§!."
 epoch_crisis_void_aggregator:0 "Псевдо-Фазований Агрегатор Порожнечі"
 epoch_crisis_void_aggregator_DESC:0 "Ця мегаспоруда — точніше, гігаспоруда — призначена для перенаправлення стрибків потужності від §YЗовнішнього реле Порожнечі§!, щоб пом'якшити будь-яку відому загрозу."
 epoch_crisis_void_aggregator_MEGASTRUCTURE_DETAILS:0 "Ця мегаспоруда — точніше, гігаспоруда — призначена для перенаправлення стрибків потужності від §YЗовнішнього реле Порожнечі§!, щоб пом'якшити будь-яку відому загрозу."
 must_not_have_void_aggregator_already:0 "Не повинно бути вже наявного Агрегатора Порожнечі."
 must_have_ovr_in_system:0 "Повинно будуватися разом із Зовнішнім реле Порожнечі в тій самій системі."

 epoch_crisis.5.title:0 "Ще один, потужніший стрибок"
 epoch_crisis.5.desc:0 "Ми щойно отримали звістку про ще один потужний стрибок від §YЗовнішнього реле Порожнечі§! — цей стрибок був достатньо потужним, щоб вивести з ладу цілі зоряні бази. Судячи з показників енергії, це був якийсь промінь, що безладно пройшов крізь реле в нашу систему."
 epoch_crisis.5.a:0 "Сподіваймося, наші системи витримають..."
 epoch_crisis.5.a_desc:0 "§RЗоряну базу знищено, і через стрибок втрачено 30 000 енергокредитів.§! \n§BПрогрес кризи: 40%§!."
 epoch_crisis.5.b:0 "Агрегатор захистить нас."
 epoch_crisis.5.b_desc:0 "§BАгрегатор перенаправив стрибок,§! §Rале ми втратили 15 000 енергокредитів.§! \n§BПрогрес кризи: 40%§!."

 tech_epoch_void_crisis_weapons:0 "Зброя Кризи Порожнечі"
 tech_epoch_void_crisis_weapons_desc:0 "агов, дивись, я в стелларісі- А-А-А-А!!!"

 epoch_crisis.6.title:0 "Вхідна передача"
 epoch_crisis.6.transmission:0 "§EПеред вами оживає екран, що глючить, ваші радники дивляться на вас скептично. Схоже, вони цього очікували.§! \n§YЛунає хрипкий, спотворений перешкодами голос.§!\n§Y''Отже, ми нарешті зустрілись, істоти з-поза меж. Перейду одразу до суті. Вплив вашої держави шкодить нашій системі, нашим кораблям, нашим світам, і ми цього не потерпимо. Або припиніть операції, або ми покладемо край вашому існуванню — і галактиці, з якої ви прийшли, також.''§!\n§EВаші радники дивляться на вас, дехто явно наляканий.§!"
 epoch_crisis.6.whatingodsname:0 "Що... щойно сталося?"
 epoch_crisis.6.fuckoff:0 "§GСхоже, саме так. Готуйте кораблі.§! "
 epoch_crisis.6.notbeforewedo:0 "§RНе раніше, ніж це зробимо ми.§! "

 epoch_crisis.7.title:0 "Помічено розвідувальний флот!"
 epoch_crisis.7.desc:0 "Ми зафіксували рух флоту в системі із §YЗовнішнім реле Порожнечі§! — і вони одразу заблокували на всіх наших активах. Треба діяти швидко, поки ми не втратили систему!"
 epoch_crisis.7.a:0 "Усім підрозділам, вперед."
 epoch_crisis.7.a_desc:0 "§RПрогрес кризи: 80%.§! \n§RУ системі з'являється розвідувальний флот.§! "
 NAME_Void_Scouts:0 "Розвідники Порожнечі"

 epoch_crisis.8.title:0 "Кінець часу"
 epoch_crisis.8.desc:0 "§EТиша, напруга. У приміщення вривається ваш головний командувач, схвильований, хоч і наляканий.§! \n§Y«Ми нарешті запеленгували початкову систему й намагаємось зафіксувати ціль. Наші флоти готові? Реле підтверджено відкрите, ми МУСИМО закінчити справу — назад дороги вже немає.»§! \n§EІнші ваші радники виглядають наляканими, хоча більшість намагається зберігати незворушний вигляд. Напруга в кімнаті майже відчутна на дотик.§! \n§Y«Що скажеш, друже? Покінчимо з виставою й провчимо тих старих потойбічних? Ми не можемо повернути назад.»§! \n§EУсі з нетерпінням дивляться на вас.§! "
 epoch_crisis.8.a:0 "§Y«Зробіть це.»§! "
 epoch_crisis.8.a_desc:0 "§CКоли вітер стихає, а вогонь пашить жаром, стерв'ятники чекають, щоб побачити, що зогниє...§! \n---\n§RСистема Безодні Челленджер з'явилась. \nКРИЗА РОЗПОЧАЛАСЬ§! "

