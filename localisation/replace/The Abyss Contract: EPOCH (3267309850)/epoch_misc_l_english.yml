 civic_epoch_void_council_desc:0 "§PРада Порожнечі§! — це рада, призначена для наших операцій у Порожнечі, а отже, і в Безодні."
 civic_tooltip_epoch_imperial:0 "Тип влади має бути §YІмперським§!, §YДиктатурою§! або §YОлігархічним§!."
 void_council_effects:0 "§GПідвищує виробництво §rОберненої Сутності Порожнечі§! та §YФлотський ліміт§!.§! \n§CДає доступ до перших кількох технологій Безодні.§! "
 void_council_neg_effects:0 "§RПідвищує утримання §rОберненою Сутністю Порожнечі§! ВСІХ кораблів. \nБлокує будівництво мегаспоруди §YВорота Безодні§!. Вона вам не знадобиться.§!"
 civic_epoch_void_dependence:0 "§PЗалежність від Порожнечі§! "
 civic_epoch_void_dependence_desc:0 "Ми покладаємось на Порожнечу та її існування, щоб підтримувати себе — підвищуючи видобуток коштом підвищеного утримання. Втім, навіть із цим ми все одно отримуємо більше вигоди за вкладені кошти."
 civic_tooltip_epoch_is_v_council:0 "Потрібна громадянська доктрина §PРада Порожнечі§!."
 void_dependence_effects:0 "§GПідвищує виробництво §rОберненої Сутності Порожнечі§! та §RЯдер Часу§! на посаду, а також швидкість будівництва мегаспоруд§!."
 void_dependence_neg_effects:0 "§RПідвищує утримання §HЕнергії§!, §EТемної Матерії§! та §LЖивого Металу§! на посаду§!."
 civic_epoch_fabric_shattering:0 "§PРуйнування Тканини§! "
 civic_epoch_fabric_shattering_desc:0 "Ми побачили, наскільки неефективна Тканина Реальності. Наскільки вона крихка. §PМи розберемо створене, розіб'ємо зорі, розділимо всесвіт на суб-кваркові частини, і лише тоді буде досягнуто досконалості§!."
 omnicidal_abyss_entity_effects:0 "§GПідвищена швидкострільність, ухилення, точність кораблів і знижене утримання.§! "
 omnicidal_abyss_entity_neg_effects:0 "§RВИ — ВСЕЗНИЩУВАЧ. Ви ненавидите всіх, і всі ненавидять вас.§! "
 opinion_omnicidal_abyss_entity:0 "Всезнищувальна держава Безодні"
 civic_epoch_hateful_a:0 "Ви не можете мати жодного рівня §YПацифіста§! чи §YКсенофіла§!."
 civic_epoch_hateful_b:0 "Ви маєте бути або Фанатичним §YМілітаристом§!, або Фанатичним §YКсенофобом§!."
 civic_epoch_fabric_protection:0 "§PЗахист Тканини§! "
 civic_epoch_fabric_protection_desc:0 "Так, у Тканині є неефективності, але це не означає, що все треба деконструювати. Тож наш обов'язок — наш борг — захищати Тканину Реальності."
 civic_epoch_likeable_a:0 "Ви не можете бути §Yненависницькою§! державою."
 civic_epoch_likeable_b:0 "Ви маєте бути якоюсь формою §YМілітаристської§! держави."
 civic_epoch_likeable_c:0 "Ви маєте бути якоюсь формою §YКсенофільської§! держави."
 void_protector_effects:0 "§GПідвищена шкода проти §BМешканців Порожнечі§!, §SЦетани§!, §PНепередбачуваності§!, §SРою§!, §EПозавимірників§!, §vСірого слизу§!, §HПробуджених Занепалих Імперій§!, §rПробуджених Мародерів§!, а також підвищена швидкострільність, більше посланців, підвищена дипломатична вага й прийняття.§! "
 void_protector_neg_effects:0 "§RПідвищене утримання кораблів, а §rБойові судна Порожнечі§! будуються на §Y125%§! довше.§! "
 opinion_void_protector:0 "Захисник Порожнечі"
 civic_epoch_abyss_military:0 "§PВійська Безодні§! "
 civic_epoch_abyss_military_desc:0 "Наші солдати готові захищати наші активи й, відповідно, Безодню та Саван. Кораблі й армії нашої держави працюють понаднормово, щоб підтримувати ефективність і стабільність наших земель."
 civic_epoch_abyss_guardian:0 "§PВартовий Безодні§! "
 civic_epoch_abyss_guardian_desc:0 "Наші найсильніші тамплієри захищають Саван власними тілами й духом, обороняючи наші землі й активи з завзяттям."
 civic_epoch_militarist:0 "Ви маєте бути якоюсь формою §YМілітаристської§! держави."
 abyss_military_effects:0 "§GПідвищена швидкість руху кораблів на союзній території, шкода проти Кризи, атака-захист армій.§! "
 abyss_military_neg_effects:0 "§RПідвищений час висадки, вартість і утримання військових і сухопутних кораблів.§! "
 civic_epoch_spiritualist:0 "Ви маєте бути якоюсь формою §YСпіритуалістської§! держави."
 abyss_guardian_effects:0 "§GВиробляє більше зро, на додачу до легко підвищеної швидкострільності й атаки-захисту армій.§! "
 abyss_guardian_neg_effects:0 "§RУсе, що має вартість і утримання в ОСП, коштує помітно більше.§! "

 civic_epoch_void_matrix:0 "§PМатриця Порожнечі§!"
 civic_epoch_void_matrix_desc:0 "Наші процесори налаштовані на §BБезодню Челленджер§!, надаючи нам переважний доступ до технологій безодні. Ми вважаємо за доцільне сформувати себе відповідно."
 void_council_effects_mach:0 "§GПідвищує виробництво §rОберненої Сутності Порожнечі§! та §YФлотський ліміт§!.§! \n§CДає доступ до перших кількох технологій Безодні.§! "
 void_council_neg_effects_mach:0 "§RПідвищує утримання §rОберненою Сутністю Порожнечі§! ВСІХ кораблів. \nБлокує будівництво мегаспоруди §YВорота Безодні§!. Вона вам не знадобиться.§!"
 civic_epoch_void_craftswork:0 "§PРемесло Порожнечі§!"
 civic_epoch_void_craftswork_desc:0 "Оскільки ми сильніше прагнемо влади Порожнечі, нам потрібно більше ресурсів для виробництва цих екзотичних матеріалів. Зважаючи на те, наскільки передові ці ресурси, наші процесори потребують більшого утримання."
 civic_epoch_fabric_ripping:0 "§PРозривання Тканини§!"
 civic_epoch_fabric_ripping_desc:0 "Галактика повна недосконалостей, повна руйнування. Необхідна швидка деконструкція всіх умовно «стабільних» елементів, і лише тоді ми досягнемо досконалості."
 civic_epoch_fabric_custodian:0 "§PОпікун Тканини§!"
 civic_epoch_fabric_custodian_desc:0 "Ніщо не є справді досконалим, але це не означає, що потрібне повне знищення всього. Ми боротимемось, щоб захищати інші машини й навіть біологічних, аби всі й усе лишалось сильним разом."
 civic_epoch_abyss_overwatch:0 "§PСпостереження Безодні§!"
 civic_epoch_abyss_overwatch_desc:0 "Наші процесори оновлено для нагляду за нашими солдатами й операціями в Безодні, і через унікальні виклики наші процесори працюють понаднормово, щоб стати ефективнішими й бойовоготовнішими."
 civic_epoch_abyss_hyperion_codex:0 "§PКодекс Гіперіона Безодні§!"
 civic_epoch_abyss_hyperion_codex_desc:0 "Наші процесори оновлено для нагляду за нашими солдатами й операціями в Безодні, і через унікальні виклики наші процесори працюють понаднормово, щоб ефективніше захищати наші світи й землі."
 abyss_guardian_effects_mach:0 "§GАрмії та кораблі атакують і захищаються сильніше.§! "

