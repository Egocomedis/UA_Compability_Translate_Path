 epoch_sr_ive:0 "Обернена Сутність Порожнечі"
 epoch_sr_ive_desc:0 "Сутність Небуття, привнесена в реальність. §dПозавимірна§! енергія, принесена з §PБезодні§! в наш вимір. \n---\n§YМає унікальну реакцію матерія-антиматерія із Сутністю Порожнечі§!."
 epoch_sr_voidessence:0 "Сутність Порожнечі"
 epoch_sr_voidessence_desc:0 "Сутність Буття. Унікальна енергія §BБезодні Челленджер§!, видобута з §PБезодні§! в наш вимір. \n---\n§YМає унікальну реакцію матерія-антиматерія з Оберненою Сутністю Порожнечі§!."

 decision_create_directory:0 "Створити §PДиректорію Безодні§! "
 decision_create_directory_desc:0 "Щоб піти далі, ми маємо збудувати §PДиректорію Безодні§!, аби закріпити наше становище в дослідженнях Безодні."
 decision_create_gammasphere:0 "Створити §SГамасферу Безодні§! "
 decision_create_gammasphere_desc:0 "Ми маємо піти ще далі. Нам потрібно піти ще далі. §RМи маємо створити Гамасферу.§! \n ------- \n§RУВАГА! ВИДАЛЯЄ ВСІ СПОРУДИ ТА РАЙОНИ.§! §YАвтоматично будує Директорію Безодні.§! "
 decision_create_epsilon_directory:0 "Створити §rДиректорію Епсилон§! "
 decision_create_epsilon_directory_desc:0 "Щоб піти далі, ми маємо збудувати §rДиректорію Епсилон§!, аби створити опорний пункт для наших дій у Безодні."

