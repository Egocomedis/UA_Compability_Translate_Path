 EPOCH_UNDERSTAND_THE_CONTRACT:0 "§PРозуміння Угоди§!."
 EPOCH_UNDERSTAND_THE_CONTRACT_DESC:0 "Настав час спуститись за межі раніше можливого й зрозуміти нашу «Угоду». Із загадкової природи §PБезодні§! ми можемо розпочати сходження до статусу справжньої §PДержави Безодні§! — якщо оберемо цей шлях. \n \n §RЯКЩО ВИ ПОЧАЛИ, ШЛЯХУ НАЗАД НЕМАЄ.§! "
 EPOCH_UNDERSTAND_IVE:0 "§rРозуміння Оберненої Сутності Порожнечі§!."
 EPOCH_UNDERSTAND_IVE_DESC:0 "Перш ніж рухатись далі, ми §Yмусимо§! з'ясувати, що таке ця §rОбернена Сутність Порожнечі§! — і, крім того, чому вона взагалі існує."
 epoch_event.1.name:0 "§PУгода§! — що це таке?"
 epoch_event.1.desc:0 "Ми достатньо просунулись у технологіях §LЖивого Металу§!, щоб почати розуміти, що таке ця «угода». Якщо ми оберемо цей шлях, варіант доступний."
 epoch_event.1.a:0 "Спробуймо."
 epoch_event.1.a.tooltip:0 "У нас немає іншого вибору. \n §RЦЕ РОЗБЛОКУЄ СПЕЦІАЛЬНІ ТЕХНОЛОГІЇ БЕЗОДНІ.§! Будьте обережні. \n ------ \n §YРозблоковує спецпроєкт:§! §PРозуміння Угоди§!. \n §YРозблоковує технологію:§! §rРетельне дослідження Безодні§!."
 epoch_event.2.name:0 "Наша мета зрозуміла"
 epoch_event.2.desc:0 "Тепер ми знаємо, що таке ця §PУгода§!. Наша мета зрозуміла — стати правителем §PБезодні§! й використати її технології проти наших супротивників. Наші чудові солдати й науковці готові до майбутнього виклику стати §PДержавою Безодні§!."
 epoch_event.2.a:0 "Розпочати сходження."
 epoch_event.2.a.tooltip:0 "Настав час. Ми готові. §rМИ ЗНАЄМО, ЩО ЧЕКАЄ ПОПЕРЕДУ.§! \n ----- \n §YДоступний варіант дослідження:§! §rВузол Витворення Порожнечі§!."
 epoch_void_crisis_chain_title:0 "Глибини кличуть і кричать"
 epoch_void_crisis_chain_desc:0 "хм"
 void_threat_level:0 "Об'єктивний рівень загрози кризи"
 void_ships_destroyed:0 "§RКораблі, захоплені Мешканцями Порожнечі§!"
 void_planets_erased:0 "§RПланети, стерті Мешканцями Порожнечі§!"
 void_crisis_ships_destroyed:0 "§GЗахоплено кораблів Мешканців Порожнечі§!"
 void_crisis_planets_erased:0 "§GОчищено планет Мешканців Порожнечі§!"
 epoch_event.5.name:0 "Розуміння Оберненої Сутності Порожнечі"
 epoch_event.5.desc:0 "Із відділу досліджень линуть чутки про якусь «Обернену Сутність Порожнечі» та технології «Епсилон». §YДехто висловлює сумніви, але інші вважають, що це єдиний шлях уперед.§! "
 epoch_event.5.a:0 "Хоч би що це було..."
 epoch_event.5.a.tooltip:0 "...ми ось-ось глибоко пробиваємось у цю штуку з порожнечею. \n ----- \n §YРозблоковує рівень Епсилон.§! "
 epoch_event.9999.title:0 "Ви граєте в мультиплеєрі."
 epoch_event.9999.desc:0 "§RЦей мод НЕ СУМІСНИЙ із мультиплеєром! Багато чого потребує однокористувацького режиму для роботи, оскільки це не розроблялось для одночасного використання кількома гравцями! §!\n§YМи наполегливо рекомендуємо _ВИДАЛИТИ ЗБЕРЕЖЕННЯ_ і грати в одиночному режимі. Це сповіщення повторюватиметься.§!"

