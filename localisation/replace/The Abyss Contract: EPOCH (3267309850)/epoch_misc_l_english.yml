 epoch_lorebook_chain_title:0 "The Abyss Contract — EPOCH | §BКнига лору§!"
 epoch_lorebook_chain_desc:0 "обійми"
 EPOCH_LOREBOOK_TOP:0 "Книга лору EPOCH — 00.Початок"
 EPOCH_LOREBOOK_01:0 "01.Лор"
 EPOCH_LOREBOOK_02:0 "02.Безодня"
 EPOCH_LOREBOOK_03:0 "03.Угода"
 EPOCH_LOREBOOK_04a:0 "04a.Рівень Епсилон"
 EPOCH_LOREBOOK_04ai:0 "04ai.Компоненти кораблів"
 EPOCH_LOREBOOK_04aii:0 "04aii.Озброєння"
 EPOCH_LOREBOOK_04aiii:0 "04aiii.Активи"
 EPOCH_LOREBOOK_05:0 "05.Криза збуджених Мешканців Порожнечі"
 EPOCH_LOREBOOK_06:0 "06.Гамасфера"
 EPOCH_LOREBOOK_07:0 "07.Нуосфера"
 EPOCH_LOREBOOK_08:0 "08.Мегаспоруди"
 EPOCH_LOREBOOK_09:0 "09.§BСумісність з ACOT+AOT§!"
 EPOCH_LOREBOOK_TOP_DESC:0 "Ласкаво просимо до §PTAC§!-§rEPOCH§!. Це Книга лору, присвячена допомозі гравцю в розумінні та наданню передісторії для багатьох видів зброї, кризи, споруд і мегаспоруд, а також — якщо застосовно — гарантій сумісності з §BAncient Cache of Technologies§! та §BAcquisition of Technologies§!. \n \n§RОскільки це саб-мод/розширення для The Abyss Contract, TAC ОБОВ'ЯЗКОВИЙ.§! Він у будь-якому разі має бути вказаний як залежність. \n \n§rБракує локалізації? Бракує текстур? Зв'яжіться з автором!§! \n \n§YНатисніть кнопку «Дослідження», щоб закрити ці меню.§! §RЯкщо ви не впевнені, що робите, це наполегливо не рекомендується — після закриття сторінки знову відкрити не можна.§! "
 EPOCH_LOREBOOK_01_DESC:0 "До Великого вибуху існував лише нуль-простір. Хоча він певною мірою досі існує — як простір між матерією — він уже не такий всеосяжний, як колись. Однак існували й виміри, що були нульовими — а деякі виміри були пошкоджені безповоротно, часто розчиняючись чи розпадаючись — проте §Yодин вимір вистояв, породивши Безодню.§! "
 EPOCH_LOREBOOK_02_DESC:0 "Безодня — це вимір, відокремлений від будь-якого фізичного сприйняття — завжди присутній, але ніколи не виявний, аж дотепер. Пошкоджений, постійний вимір поза межами звичайного простору, де ніщо не є собою, якщо не заякорене в тетравимірній патафізиці, і все не має сенсу. \n \n§RНезримі сили поза розумінням спостерігають. Придивіться уважно — і, можливо, ви щось помітите...§! "
 EPOCH_LOREBOOK_03_DESC:0 "Угода була домовленістю між колишнім §RПравителем Безодні Челленджер, Маакаєм Суавари§! та Зроні. Рештки структур із живого металу існують як храми та модульні дослідницькі пости — однак, рідкісні й розкидані далеко одна від одної, ці структури мігрують до столиць та придатних для життя планет. Деталі Угоди відтоді загубились у часі, а більшість даних ніколи не було записано — чи то через високий ризик безпеки, чи з невідомої причини — проте, попри всю цю завуальованість, дещо все ж відомо. \n\nЩо ми справді знаємо про Угоду — вона дозволяє будувати спеціальні §PБойові судна Безодні§! через §PЗоряно-гравітаційні верфі§!, а також спеціальні §pмегаспоруди реконструкції планет§!, що дозволяють повне перетворення планет на гігантські металеві планети — або придатні для життя, або світи масового виробництва ресурсів, відомі як §YСвіти-Кузні§!."
 EPOCH_LOREBOOK_04a_DESC:0 "Технології §_Епсилон§! використовують новий ресурс, видобутий із §BБезодні Челленджер§! і порожнечі поза нею. Знайомтесь — §rОбернена Сутність Порожнечі§!, скорочено ОСП. Цей ресурс легко порівняти з §RРунічними технологіями§! або іншими потужними технологіями. Дає вам значну перевагу над іншими державами, хоч і варто бути обережним — §Rхай якими незначними, ваші дії мають наслідки.§! \n \nОСП часто описують як фіолетовий екзотичний газ, що суперечить усім відомим фізичним і хімічним законам, без відомої атомної структури, натякаючи, що він активно й відкрито кидає виклик квантовим прогнозам і законам."
 EPOCH_LOREBOOK_04ai_DESC:0 "Корабельні компоненти §_Епсилон§!; \n\n-§vРеактор§! | Найбазовіший компонент корабля. Дає 375 000 тераватів потужності обраному кораблю, зберігаючи в собі наномасштабний Деконструктор Порожнечі. §YМоже бути переобладнаний для планетарного використання§!. \n\n-§vМікроворота-стрибковий двигун§! | FTL-компонент. Дає просторий дальність стрибка й час відновлення, буквально §Yжбурляючи ворота§! з непомітно високою швидкістю — виникли теорії, що ворота просто фазуються крізь виміри, подорожуючи в четвертий математичний вимір (§BЧас§!) і проєктуючи себе в цільову локацію. \n\n-§vДвигун-спис§! | Компонент двигуна. Дає високу швидкість і помірне ухилення, викидаючи невелику кількість матерії за велику кількість енергії, наче чорна діра. Дозволяє ті самі «кораблі-ножиці», про які ви завжди мріяли... нічого не засуджуємо. \n\n-§vХвильова антена§! | Компонент радара. Дає високу здатність до сканування й передбачення в сусідніх системах, вловлюючи збуджені хвильові частинки від кораблів, що проходять поруч. \n\n-§vГіперінтелект Signalis§! | Компонент «мозку». Тримає кораблі на великій відстані, обчислюючи найвищу виживаність і найменшу жертву бойових можливостей. \n\n-§vПлити зниження зворотного зв'язку§! | Броня. Захищає корпус, стабілізуючи структуру в тетравимірному просторі, хоч і на базовому рівні. §YБроня та корпус регенерують.§! \n\n-§vГіперхвильове екранування-перехоплювач§! | Щит. Захищає броню, використовуючи автономні §rдрони Lockheed§! для перехоплення й знищення вхідних снарядів. §YЩит і корпус регенерують.§! \n\n-§vЗміцнення корпусу Танкмайстер§! | Корпус. Нещодавно розроблені, ці елементи захищають корпус, інтенсивніше стабілізуючи його в тетравимірному просторі. §YКорпус регенерує.§! \n\n---§vКОМПОНЕНТИ JAEGERKRIEGS§!--- \n\n-§vМаскувач Payday§! | Маскувальний компонент. Зміщує кораблі з фізичного простору в патафізичний міжвимірний простір, спричиняючи ефект Шредінгера — вони одночасно і існують, і не існують. \n\n-§vФорсаж Формула-1§! | Компонент форсажу. Підвищує фокусування Двигуна-списа коштом більшого споживання енергії. \n\n-§vХвильовий ривок§! | Зміцнювач щита. Хвильовий ривок підвищує зміцнення й регенерацію щита, ще глибше вкорінюючи щит у тетравимірному просторі, дозволяючи постійно відновлюватись і зберігати себе, щоб запобігати й відновлювати пошкодження. \n\n-§vТетравимірний стабілізатор§! | Зміцнювач броні. Стабілізує й закріплює броню в тетравимірному просторі, робить те саме, що й Хвильовий ривок. \n\n-§vДиректорія потужності ULTRAKILL§! | Підсилювач шкоди зброї. Дозволяє ефективніше виробництво шкоди. \n\n-§vМультиплікатор сили§! | Підсилювач. Дає більше вироблення потужності для Реактора, усуваючи неефективності там, де вони є. \n\n-§vМодуль подолання боягузтва§! | Модуль подолання боягузтва допомагає пілотам кораблів ефективніше вступати в бій, скасовуючи те, що вважалося б «безпечними» маневрами, хоч і з підвищеним ризиком загибелі всього екіпажу."
 EPOCH_LOREBOOK_04aii_DESC:0 "Озброєння кораблів §_Епсилон§!;\n§vВарто зауважити — енергетична зброя найкраща проти щитів, кінетична — проти броні, якщо не вказано інше.§!\n§vОсь доступні класи зброї — Теразброя (T), Гігазброя (X), Блискавична війна (S, M, L) та Залізна завіса (PD, H, G).§! \n\n-§vСпис Осуду§! | Найсильніша §STеразброя§!, і безумовно найсильніший компонент §_Епсилон§!. Ми не знаємо, як саме вона працює, окрім того, що жбурляє §Yвелику§! кількість Оберненої Сутності Порожнечі у ворога — і це якимось чином діє. §GНайкраще проти щитів§!. \n\n-§vСпіральна гіперрушниця§! | Друга §STеразброя§!, і другий найсильніший §_компонент§! — Гіперрушниця жбурляє великий снаряд із §LЖивого Металу§!, насичений ОСП, у ворога. §GНайкраще проти броні§!. \n\n-§vГіперспис Всезнищення§! | §RЗброя-планетовбивця§!. Ця зброя — переобладнаний §rСпис Осуду§!, що використовується для огортання планет Саваном. Завдає жалюгідної шкоди корпусу й використовується лише для знищення планет. §rЄдина причина, чому вона огортає планети Саваном — це те, що всесвіт за замовчуванням відносить будь-які атмосферні помилки до Савану.§! \n\n-§vКорабельник§! | §RОбмежено§! кораблями класу §rМисливець Порожнечі§!. Ця §STеразброя§! ще шаленіша за Спис Осуду, коштом більшої вартості. §GРуйнівник корпусу (300% проти корпусу!)§!. \n\n-§vКорпусоріз§! | Перша §SГігазброя§! — Корпусоріз використовує переобладнаний §YЛазер шахтарського дрона§!, але натомість використовує ОСП. §GНайкраще проти корпусу й щитів§!. \n\n-§vРелятивістська рейкова гармата§! | Друга §SГігазброя§! — Рейкова гармата використовує наелектризований снаряд із §LЖивого Металу§!, випущений на високій швидкості завдяки використанню ОСП у спосіб, який розуміє лише розробник. §GДобре проти броні й корпусу§!. \n\n-§vВипарювач§! | Перша зброя §SБлискавичної війни§! — Випарювач — це, по суті, удар блискавки з глибин унизу. Використовуючи Мікроворота для витягування й фокусування ОСП у стволи, Випарювач завдає високої шкоди й може закорочувати електричні компоненти. §GНайкраще проти щитів§!. \n\n-§vФаланга§! | Друга зброя §SБлискавичної війни§! — Фаланга — це передовий компонент точкової оборони, переобладнаний в автогармату, що використовує Мікроворота та внутрішній Двигун-спис для запуску гіпершвидкісних снарядів. §GНайкраще проти броні§!. \n\n-§vCIWS§! | Перший компонент §SЗалізної завіси§! — §YСистема близького перехоплення§! — комбінована енергетично-кінетична зброя, переобладнана амальгама зі списаного проєкту Фаланга-Випарювач. §GНайкраще проти ракет і дронів§!. \n\n-§vДрон Lockheed§! | Другий компонент §SЗалізної завіси§! — ці майже автономні дрони, по суті, мікромасштабні корвети, що використовують власні бортові §rВипарювачі§!, §rреактор§!, §rброню зворотного зв'язку§!, §rекранування-перехоплювач§! та §rДвигун-спис§!. §HУніверсал§!. \n\n-§vРакета-шукач§! | Останній компонент §SЗалізної завіси§!, і остання зброя §_Епсилон§! — Ракета-шукач — це керовані вибухові боєприпаси з бортовим §rДвигуном-списом§!. Тримає контейнер ОСП у готовому до пуску надкритичному, майже боєголовковому стані. §HУніверсал§!."
 EPOCH_LOREBOOK_04aiii_DESC:0 "Активи §_Епсилон§!;\n\n§v-----КОРАБЛІ-----§!\n\n-§rБойовий ескорт Порожнечі§! | §rЕскорт§! — найменший корабель у групі, хоч і б'є боляче. З §Y6§! слотами §CL§! та §Y2§! слотами §RPD§!, цей корабель — передова одиниця будь-якого функціонального флоту Епсилон. \n\n-§rБойовий крейсер Порожнечі§! | Оскільки назвати його «крейсером бойового судна Порожнечі» було б надлишковим... §rКрейсер бойового судна§! — середній корабель у групі, з двома секціями на честь свого імені, а також слотом §rX§! і кількома слотами §BG§!. Цей корабель — середньолінійна одиниця будь-якого функціонального флоту Епсилон. \n\n-§rБойовий титан Порожнечі§! | Левіафан, §rБойовий титан§! — король і задньолінійний командний актив кораблів Епсилон. Хоч і без аури, цей левіафан здатен завдати катастрофічного удару. \n\n-§rМисливець Порожнечі§! | Лінкор групи, §rМисливець§! слугує власним флотом, але часто підтримує §rБойових титанів§! у командних або облогово-проривних флотах. Спеціалізується на розбиванні корпусів, навіть без аури, і здатен розвивати абсурдну швидкість."
 EPOCH_LOREBOOK_05_DESC:0 "Мешканці Порожнечі — сплячі попередники за межами Зовнішньої Порожнечі, глибоко внизу. Мешкаючи в незримій системі §BБезодня Челленджер§!, ці народи потайні й тримаються осторонь, уникаючи будь-якого можливого контакту. Вони використовують технології й споруди §BПорожнечі§!, подібні до доступних гравцю технологій §rЕпсилон§!, хоча зброя модифікована для роботи з Порожнечею та її загадковими властивостями, переважно використовуючи §BСутність Порожнечі§!. Їхні кораблі використовують ті самі Бойові судна Порожнечі, хоч і з модифікованими секціями."
 EPOCH_LOREBOOK_06_DESC:0 "§PГамасфера§! походить із §PНуль-Стабілізованої Архітектури§! й порівнянна з §BПорожнявосферою§! ACOT за функціональністю та зовнішнім виглядом. З п'ятьма спеціальними районами, кожен з яких спеціалізується на своїй функції, ці конструкції часто необхідні для масштабних держав.\n \n---§PЖитловий масив Гамасфери§! | Житловий масив дає, за базовим значенням, §v25 житлових слотів і зручностей на одиницю§!, а також §vбагато єдності щомісяця§!.\n \n---§PСпостережний вузол Гамасфери§! | Спостережний масив дає солдатів і, на кожні десять Вузлових масивів, посаду §PНаглядача§! або §PДрона-спостерігача§!, а також §vзбільшення ліміту флоту та ліміту командування флотом разом зі зниженням шкоди орбітального бомбардування на §G15 відсотків§!.§!\n \n---§PМасив макровиробництва Гамасфери§! | Масив макровиробництва дає придатну площу для масового виробництва ресурсів у масштабі стратегічних і необхідних ресурсів, §vпереважно сплавів, їжі, споживчих товарів, зро, екзотичного газу, порошинок і кристалів.§!\n \n---§PМасив пробивачів Порожнечі Гамасфери§! | Масив пробивачів Порожнечі дає придатну виробничу площу для масового будівництва Оберненої Сутності Порожнечі, дозволяючи міцнішу економіку й більше місця для зберігання ОСП. §vДає 10 посад Збирача I рівня, 15 посад Збирача II рівня та 5 посад Науковця II рівня.§!\n \n---§PБольцманівський масив Гамасфери§! | Больцманівський масив дає масштабну дослідницьку секцію нашій Гамасфері, дозволяючи швидші й масштабніші дослідницькі проєкти, §vдає 15 посад Науковця II рівня та 1500 базових очок науки в усіх категоріях.§! \n \n§RПРИМІТКА — ВИДАЛЯЄ РАЙОНИ ТА СПОРУДИ.§! "
 EPOCH_LOREBOOK_07_DESC:0 "§RЦю ідею скасовано!§! \n §YЧому?§! \n- Уже надто схоже на Гамасферу. \n- Нездійсненно. \n- Виснажливо."
 EPOCH_LOREBOOK_08_DESC:0 "§YСписок доступних мегаспоруд і характеристик§! \n-§PВорота Безодні§! | Виробляють помірну кількість Ядер Часу, Живого Металу. §YМаксимум 1 на державу.§! \n-§rВузол Витворення Порожнечі§! | Виробляє багато науки. §YМаксимум 1 на державу.§! \n-§BМасовий деконструктор Порожнечі§! | Виробляє §Y500§! (базове значення) §rОберненої Сутності Порожнечі§!, а також §Y150§! Темної Матерії, Живого Металу та Ядер Часу. §YМожна розмістити кілька, одна на планету.§! \n-§PГамасфера Безодні§! | Насправді не зовсім «мегаспоруда», а радше кілоспоруда. Придатна для життя. §YНедоступна для непридатних для життя планет чи кільцесвітів.§! §RЯкщо використовуєте з Giga-модами, будьте обережні — перевірки на конфлікт із гіга-мегаспорудами немає.§! \n-§YЗовнішнє реле Порожнечі§! | Мегаспоруда §RПочатківця кризи§! | Виробляє помірну кількість ОСП і звичайні речі MVD, а також новий ресурс — §CСутність Порожнечі§! — та інше. \n-§YМегаверф флоту§! | Ця мегаспоруда — хребет наших флотів і флотилій. Додаючи 250 до ліміту флоту й 50 до ліміту командування флотом, з 35 верфями, ця мегаспоруда прагне максимально використати свої ресурси. \n-§YПсевдо-Фазований Агрегатор Порожнечі§! | Мегаспоруда §RСереднього рівня кризи§! | Виробляє Енергію, Темну Матерію та Сутність Порожнечі. §YПеренаправляє стрибки потужності від Реле Порожнечі — діючи як захист від стрибків напруги§!."
 EPOCH_LOREBOOK_09_DESC:0 "§YЦей мод має вбудовану сумісність із двома модами.§! \n- - -Особливості- - - \n-§EДельта§!, §BАльфа§!, §CФі§!, §RРунічні§! та §HСигма§!-рівневі §BМасові деконструктори Порожнечі§!, включно з ексклюзивним MVD §_рівня Епсилон§!, що виробляє §BТемну Матерію§! на додачу до наявного виробництва ОСП і величезної кількості ресурсів! \n-Варіанти ін'єктованого реактора для реактора Епсилон! \n\n§YЧому не більше?§! \n...Що ще можна додати? Секції кораблів? Це захаращення й забагато роботи. Так, ACOT великий, але Епсилон...\nВін вже перевершує Альфу. Це не мало б сенсу. Плюс, міркування лору."

