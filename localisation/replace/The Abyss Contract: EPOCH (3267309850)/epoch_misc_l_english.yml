 tech_epoch_45_outpost:0 "Аванпост Порожнечі"
 tech_epoch_45_outpost_desc:0 "Наші платформи наразі жалюгідно слабкі. З Аванпостом ми нарешті можемо розпочати нашу справжню спадщину й встановити належну оборону.\n----------\n§RВАМ ПОТРІБНО СТВОРИТИ ПРОЄКТ§! "
