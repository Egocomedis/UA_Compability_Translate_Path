 tech_epoch_perfected_ship_designs:0 "Досконалі проєкти кораблів"
 tech_epoch_perfected_ship_designs_desc:0 "Оскільки наші проєкти кораблів для Епсилон раніше вважались «досконалими», ми не шукали подальших покращень. Аж доки не відкрили Досконалу Сутність Порожнечі. І тепер, з новими знаннями, наші вчені пропонують найкращі ідеї та вдосконалення для нових проєктів кораблів."
