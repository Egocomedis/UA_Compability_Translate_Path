 distar.13010.desc.open: "Ми відкрили браму до скупчення L, але виявили, що на іншому боці на нас щось чекало. Стару рану в підпросторі розірвало, і ще до повної стабілізації L-брами крізь неї щось прорвалося.\n\nУ системі [root.home_planet.GetName] з'явилась велетенська істота, поспіхом названа §Y$nanite_space_dragon_baby$§!.\n\nВона, здається, не виявляє ворожості — схоже, щось шукає.\n\nЩо вона тут намагається знайти?"


 alice_communication.100.title:0 " Єва"
 alice_communication.100.desc1:0 "...Мгм (Єва виглядає ще сонною)"
 alice_communication.100.desc2:0 "Так... хочеться... спати..."
 alice_communication.100.desc3:0 "...Що таке."
 alice_communication.100.desc4:0 "...Пан, обійми."
 alice_communication.100.desc5:0 "(Здається, Єва заснула у тебе на руках)"
 alice_communication.100.desc6:0 "Мгм... (Ти відчуваєш, що Єва весь час дивиться на тебе, але коли ти дивишся у відповідь, вона відводить погляд)."
 alice_communication.100.desc7:0 "...Пан, подобається."
 alice_communication.100.sleep:0 "Провести час із Євою"
