 alice_start_event.1.name:0 "Просторова турбулентність"
 alice_start_event.1.desc:0 "Летячи на кораблі, ви потрапили в просторову турбулентність і опинилися в цілком незнайомому місці — схожому на ліс."
 alice_start_event.1.a:0 "Почати досліджувати це місце"
 alice_start_event.1.b:0 "§RПропустити весь вступний сюжет§!"
 alice_start_event.1.c:0 "Одразу отримати всіх персонажів (окрім Сірої)"
 alice_start_event.1.d:0 "Одразу отримати всіх персонажів (включно із Сірою)"

 alice_start_event.2.name:0 "Стародавній замок у лісі"
 alice_start_event.2.desc:0 "Ви кілька днів досліджували ліс, але так нічого й не знайшли. Саме коли ви вже впадали у відчай, перед вами з'явився стародавній замок — у місячному світлі він виглядав водночас прекрасним і моторошним, наче замок вампіра з легенд."
 alice_start_event.2.a:0 "Ви увійшли до замку"

 alice_start_event.3.name:0 "Дослідження замку"
 alice_start_event.3.desc:0 "Увійшовши до замку, ви обережно почали його досліджувати. У порожньому замку чути лише ваші кроки й биття серця. Ви знайшли довгий обідній стіл із вишуканим посудом — очевидно, тут хтось живе."
 alice_start_event.3.a:0 "Продовжити дослідження"

 alice_start_event.4.name:0 "Дівчина-вампірка"
 alice_start_event.4.desc:0 "Ви знайшли бібліотеку замку й увійшли до неї. Бібліотека виявилася окремим простором: зовні вона здавалася невеликою, але всередині не було видно кінця-краю, а книжок — незліченна кількість. Досліджуючи бібліотеку, ви побачили дівчину, що спала на троні. Вона виглядала дуже мініатюрною, з абсолютно білим волоссям, вбрана в готичний одяг — прекрасна й загадкова водночас. Зачаровані нею, ви несвідомо підійшли ближче."
 alice_start_event.4.a:0 "Яка прекрасна дівчина"

 alice_start_event.5.name:0 "Раптова зміна"
 alice_start_event.5.desc:0 "Ви повільно наближалися до дівчини, і за метр від неї вона раптово прокинулась — ви побачили її очі. Різнокольорові — сині й червоні, без жодних емоцій, наче відштовхуючи будь-кого. За мить навколо неї з'явилося кілька магічних кіл, і вас підняло магією в повітря, повністю знерухомивши."
 alice_start_event.5.a:0 "Невже я тут і загину?"

 alice_start_event.6.name:0 "Загроза минула?"
 alice_start_event.6.desc:0 "Знерухомивши вас, вона не робила подальших дій, а спокійно спостерігала за вами якийсь час, і, переконавшись, що ви не становите загрози, розвіяла магію, давши вам перепочити. Холодним голосом вона мовила: «Кажи, навіщо ти сюди прийшов.»"
 alice_start_event6.a:0 "Ви пояснили їй причину свого прибуття й попросили відправити вас назад"

 alice_start_event.7.name:0 "Угода"
 alice_start_event.7.desc:0 "Вислухавши вас, дівчина не відповіла одразу — натомість узяла ще теплий чай зі столу й задумливо розгорнула книгу, наче забувши про вашу присутність. Через довгий час вона відповіла: «Я можу відправити тебе назад, але ти маєш укласти зі мною угоду й стати моїм родичем і водночас дворецьким.»"
 alice_start_event7.a:0 "У вас немає вибору, і ви погоджуєтесь"

 alice_start_event.8.name:0 "Повернення"
 alice_start_event.8.desc:0 "Ви уклали угоду з дівчиною. Вона обійняла вас — ви відчули, як тремтить її тендітне тіло, — і своїми іклами проколола вашу шию ззаду; серед хвилі насолоди ритуал перетворення на родича завершився. Ви відчули, як щось у вас змінилось. Дівчина облизала губи, наче смакуючи смак вашої крові, і під вашими ногами з'явилося магічне коло. У запамороченні ви повернулися на батьківщину."
 alice_start_event8.a:0 "Нарешті вдома"

 alice_start_event.9.name:0 "Нове життя?"
 alice_start_event.9.desc:0 "Повернувшись на батьківщину, ви не побачили жодного сліду дівчини. Саме коли ви вирішили, що угода на цьому й закінчилась, дівчина разом зі своїм замком раптово знову з'явилися перед вами. «Я створила зв'язок між моїм світом і твоєю батьківщиною — тепер ти можеш вільно подорожувати між двома світами», — куточок її вуст ледь помітно піднявся. «Мене звати Аліса Клотія. Тепер добре працюй на мене, мій дворецький.»"
 alice_start_event9.a:0 "Почалося нове життя"
 alice_start_event9.a.desc:0 "§R(Тепер ви можете спілкуватися з Алісою через панель зв'язку)§!"

