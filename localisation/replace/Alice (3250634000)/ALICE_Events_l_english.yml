 alice_communication.102.title:0 "Провести час із Євою"
 alice_communication.102.desc:0 "Ти спиш разом із Євою — вона обіймає тебе й, здається, спить дуже спокійно."
 alice_communication.102.a:0 "Підтвердити"
 alice_communication.103.title:0 "Провести час із Євою"
 alice_communication.103.desc:0 "Ти взяв Єву в парк розваг — хоч вона й лишається незворушною, ти відчуваєш, що в неї гарний настрій."
 alice_communication.104.title:0 "Провести час із Євою"
 alice_communication.104.desc:0 "Ти взяв Єву з собою, щоб цілий день читати разом з Алісою. Побачивши, що Єва весь час сидить у тебе на руках, Аліса виглядала трохи незадоволеною, але не наважилась влаштувати сцену."

 alice_communication.201.title:0 "Аліса"
 alice_communication.201.desc:0 "Ти, здається, сумуєш через її смерть."
 alice_communication.201.a:0 "Ми втратили доброго друга"
 alice_communication.202.title:0 "Аліса"
 alice_communication.202.desc:0 "Хіба народження, старість, хвороба й смерть — не природна річ? Зрештою ти теж станеш порошинкою у всесвіті, як і я (Аліса дивиться на тебе спокійним поглядом, у якому ти читаєш ледь помітну самотність)."
 alice_communication.202.a:0 "І все ж мені важко з цим змиритись..."
 alice_communication.203.title:0 "Аліса"
 alice_communication.203.desc:0 "Я можу допомогти їй знову дати паросток, але це потребує часу."
 alice_communication.203.a:0 "§RАліса-сама справді найкраща!§!"
 alice_communication.204.title:0 "Аліса"
 alice_communication.204.desc:0 "(Аліса вливає магію в зів'ялий бутон, що лишився після смерті Азарін — ти бачиш, як бутон поступово оживає) Посади його назад у екосистему, яку вона залишила по собі — приблизно за десять років він знову виросте."
 alice_communication.204.a:0 "Завершити зв'язок"
 alice_communication.205.title:0 "Відродження"
 alice_communication.205.desc:0 "Сонячного дня ти прийшов до екосистеми, залишеної Азарін. Бутон Азарін чудово розвивається — здається, скоро розквітне. Оточений аурою Азарін, ти відчув приємну сонливість і приліг під тінистим деревом, щоб трохи відпочити. Не знаєш, скільки часу минуло, коли відчув, що хтось наближається, і розплющив очі — перед тобою стояла зеленоволоса дівчина."
 alice_communication.205.a:0 "Азарін?!"
 alice_communication.206.title:0 "Азарін"
 alice_communication.206.desc:0 "Привіт, старий друже. Ми знову зустрілись. (Ти підійшов і міцно обійняв Азарін — вона трохи здивувалась, але теж ніжно обійняла тебе у відповідь)"
 alice_communication.206.a:0 "Добре, що ти повернулась"


 alice_communication.302.title:0 "Новий гість?"
 alice_communication.302.desc:0 "Через кілька днів після укладення угоди з Алісою ти дрімав на дивані. Тихий стук у двері вирвав тебе з сну — тобі стало цікаво, хто б міг завітати до такого закинутого місця. Ти відчинив двері — перед тобою стояла дівчина з тарілкою тістечок у руках."
 alice_communication.302.a:0 "Продовжити"
 alice_communication.302.b:0 "§RПропустити весь сюжет§!"
 alice_communication.303.title:0 "Непорозуміння дівчини"
 alice_communication.303.desc:0 "Ти ще не встиг повністю відчинити двері, як дівчина квапливо підбігла: «Сестро Алісо, я принесла тістечка, які сама спекла!» Побачивши тебе, вона миттю змінила поведінку на протилежну. «Стривай, ти… хто ти такий? Звідки в домі сестри взявся чоловік? Не… невже сестра відмовляється від Роло?» Не встигнувши відреагувати, ти побачив, як дівчина раптово зникла з-перед тебе — і одразу з'явилась позаду. «Сестро Алісо, ти де?» Дівчина виглядала дуже стривоженою.\nАліса швидко з'явилась перед вами. «Роло, трохи гучно.» Аліса ліниво позіхнула. «Що сталось?» Дівчина на ім'я Роло виглядала так, наче от-от заплаче. «Сестро, що це за чоловік, чому він у твоєму домі — тебе що, зваблено чи погрожує тобі цей чоловік? Ти більше не хочеш Роло?» Роло обійняла Алісу за руку й розплакалась."
 alice_communication.303.a:0 "…Ти стоїш поруч, не знаючи, як реагувати"
 alice_communication.304.title:0 "Пояснення Аліси"
 alice_communication.304.desc:0 "Потік слів Роло на мить збив з пантелику навіть Алісу — минуло чимало часу, перш ніж вона обережно відсторонила Роло. «Він — мій новий дворецький, відповідає за різні дрібні справи. Чому ти взагалі подумала, що я від тебе відмовлюсь.» Аліса виглядала трохи безпорадною. «Спра… справді? Ти справді не відмовишся від Роло?» Роло перестала плакати. «Домовились!» — і знову розсміялась крізь сльози."
 alice_communication.304.a:0 "Продовжити"
 alice_communication.305.title:0 "Невдоволення дівчини"
 alice_communication.305.desc:0 "Роло витерла сльози й знову подивилась на тебе. «Ти ж… не зробив нічого недоречного щодо сестри Аліси?» Не встигнувши дочекатись твоєї відповіді, вона сама собі відповіла: «Втім, такий слабак, як ти, навряд чи здатен щось зробити сестрі Алісі. Правда ж, людино.» Дивлячись на її дитячу поведінку, тобі стало смішно, і ти не звернув на неї уваги.\nПобачивши, що ти її ігноруєш, вона трохи розсердилась. Тобі захотілося подражнити її, і ти легенько погладив її по голові. Вона явно не очікувала такого — на мить завмерла, а потім усе її обличчя почервоніло. «Ти… що ти робиш, збоченцю-лолікон!» Вона поспіхом відступила на кілька кроків, а тоді, наче щось згадавши, звернулась до Аліси: «Сестро Алісо, я боюся, що цей збоченець може завдати тобі шкоди — дозволь мені залишитись тут, щоб запобігти його непристойним намірам.»"
 alice_communication.305.a:0 "Продовжити"
 alice_communication.306.title:0 "Клопітна дівчина"
 alice_communication.306.desc:0 "Ця заява явно мала прихований мотив, і Аліса це чудово розуміла. Втім, поміркувавши, вона все ж погодилась, а потім, посилаючись на втому, пішла до спальні, залишивши вас двох наодинці. Ти відчув деяку незручність і вирішив непомітно піти — Роло, зашарівшись, пильно на тебе дивилась. Коли ти вже відійшов подалі, вона додала: «Чекай, я доведу сестрі Алісі, що я краща за тебе.»"
 alice_communication.306.a:0 "Справді клопітна дитина"
 alice_communication.306.a.desc:0 "§MТепер можна зв'язатися з Роло через панель зв'язку§!"
