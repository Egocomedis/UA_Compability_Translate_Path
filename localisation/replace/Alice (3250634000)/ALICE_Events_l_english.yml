 alice_communication.14.exit:0 "Вийти"

 alice_communication.21.title:0 ""
 alice_communication.21.desc:0 ""
 alice_communication.21.a:0 ""
 alice_communication.23.title:0 "Метеоритний дощ"
 alice_communication.23.desc:0 "Закінчивши роботу, ти прогулювався лісом навколо замку. У небі промайнуло кілька вогників — почався метеоритний дощ. Мимоволі йдучи за ним, ти опинився в незнайомому куточку лісу.\nТи побачив дівчину, що сиділа, спершись на величезне дерево, і задумливо дивилась на метеоритний дощ. Хоч профіль дівчини майже не виражав емоцій, ти чомусь відчув її смуток."
 alice_communication.23.a:0 "Продовжити"
 alice_communication.23.b:0 "§RПропустити весь сюжет§!"
 alice_communication.24.title:0 "Ангел"
 alice_communication.24.desc:0 "Дівчина помітила твою присутність і глянула в твій бік. Ти побачив її обличчя — витончене, наче в ангела; так само, як в Аліси, у неї були прекрасні різнокольорові очі й довге сніжно-біле волосся, але водночас щось у ній було зовсім іншим. Якщо Аліса — принцеса з казки, то ця дитина — легендарний ангел. За спиною в неї — пара білосніжних крил, прекрасних і священних, наче казковий ангел.\nВона кілька секунд дивилась на тебе, потім повільно піднялась і, похитуючись, немов от-от впаде, пішла до тебе. Побоюючись, що вона впаде, ти обережно підтримав її. «…Пане.»"
 alice_communication.24.a:0 "Як вона мене назвала?"
 alice_communication.25.title:0 "Єва"
 alice_communication.25.desc:0 "Ти був вражений тим, як вона до тебе звернулась. «Чому ти назвала мене паном, ми раніше зустрічались?» «…Мій народ… зник… Єва… блукала… запах… приємний… пан… притулок» — Єва уривчасто вимовила кілька слів; здається, вона довго ні з ким не спілкувалась. З цих кількох слів ти приблизно зрозумів, що дівчину звати Єва, і про її долю. Погляд Єви на тебе був чистий, наче в маленької тваринки — ти, звичайно, не міг покинути її."
 alice_communication.25.a:0 "Ти вирішив забрати її з собою"
 alice_communication.26.title:0 "Додому"
 alice_communication.26.desc:0 "Ти легко взяв її за руку, збираючись повести, але вона не зрушила з місця. «…Пан… обійми», — вона відпустила твою руку й розкрила обійми. «Це… не дуже добре» — ти завагався. «Обійми…» — вона повторила знову. Тобі не лишилось нічого, як підняти її на руки, наче принцесу. Тіло дівчини було легким, наче в ангела — ти майже не відчував її ваги. Від неї виходив солодкуватий аромат, від якого думки трохи розсіювались, і тобі доводилось постійно відволікати себе. Дівчина обійняла тебе у відповідь і незабаром заснула."
 alice_communication.26.a:0 "Продовжити"
 alice_communication.27.title:0 "Незадоволення Аліси"
 alice_communication.27.desc:0 "Ти повернувся до замку, несучи Єву на руках. Щойно ти зайшов, як перед тобою з'явилась Аліса. Побачивши, що ти несеш незнайому дівчину, вона явно була незадоволена. «Пане ліолітере, ви й справді ненаситні — вам мене мало, тепер ще й інших дівчат зваблюєте.» Почувши це, ти трохи знітився й спробував перевести розмову на Єву. Ти розповів Алісі про становище Єви й попросив дозволити їй залишитись. Якщо Аліса не погодиться, доведеться відвести Єву на твою батьківщину. Погляд Аліси перебігав з тебе на Єву — вона, здається, серйозно щось обмірковувала."
 alice_communication.27.a:0 "Продовжити"
 alice_communication.28.title:0 "Нове життя"
 alice_communication.28.desc:0 "Єва, здається, прокинулась і повільно розплющила очі: «…Сестра… Аліса…» Почувши це, Аліса, здається, була дуже задоволена — навіть маленькі крильця за її спиною трохи піднялись. Вона довго дивилась на тебе, потім сказала: «Ця дитина може залишитись, але тобі доведеться про неї піклуватись — не заперечуєш?» Ти негайно погодився.\nТи знайшов для Єви вільну кімнату, але їй це, схоже, не сподобалось: «Пан… разом… спати». Але ти нізащо не міг на це погодитись — врешті-решт, ти ще молодий і гарячий, і невідомо, що станеться, якщо справді спати разом. Ти твердо відмовив, і настрій Єви трохи зіпсувався, але вона більше нічого не сказала.\nОднак відтоді щоранку, прокидаючись, ти виявляв, що Єва спить поруч із тобою. Скільки разів ти не намагався переконати її — марно, і тобі залишилось лише змиритись."
 alice_communication.28.a:0 "Хай там як, твоє нове життя з Євою почалось"
 alice_communication.28.a.desc:0 "§BТепер можна зв'язатися з Євою через панель зв'язку.§!"

 alice_communication.22.title:0 "Замок Сенедія"
 alice_communication.22.desc:0 "До кого сьогодні звернутися?"
 alice_communication.22.a:0 "Аліса"
 alice_communication.22.b:0 "Єва"
 alice_communication.22.d:0 "Роло"
 alice_communication.22.e:0 "Куна"
 alice_communication.22.set:0 "Налаштування мода"
 alice_communication.22.c:0 "Піти"

 #L-брама
 alice_communication.32.title:0 "З'єднання встановлено"
 alice_communication.32.desc:0 "Схоже, твою державу спіткала біда. Буря сірого слизу… отже, та держава загинула від власних наномашин. Я свого часу провела реверс-інжиніринг сірого слизу й виявила, що в його ядрі є код самознищення, який змінюється за певними закономірностями. Судячи з решток слизу, що ти приніс, схоже, код самознищення змінився після того, як слиз вийшов з-під контролю, і їхні колишні господарі не змогли його розшифрувати. Можливо, тобі вдасться розгадати їхній код самознищення."
 alice_communication.32.a:0 "Аліса-сама найкраща!"
 alice_communication.32.b:0 "Ні, я хочу одразу знищити їхнє ядро"

 alice_communication.30.title:0 "Буря вщухла"
 alice_communication.30.desc:0 "Ти транслював код самознищення в глибини L-брами — наномашини, що отримали сигнал, швидко вийшли з ладу. За добу всі наномашини припинили роботу — буря сірого слизу, криза, що загрожувала всьому всесвіту, офіційно закінчилась."
 alice_communication.30.a:0 "Завдяки Алісі ситуація не погіршилась"

 alice_communication.34.title:0 "Таємничий сигнал"
 alice_communication.34.desc:0 "Невдовзі після завершення бурі сірого слизу з-за L-брами, яку ми вважали суцільними руїнами, надійшов таємничий сигнал. Наші науковці перехопили його, але не змогли розшифрувати — можливо, підказку варто шукати на батьківщині сірого слизу."
 alice_communication.34.a:0 "Схвалити дослідження, надіслати корабель на розвідку"
 alice_communication.34.b:0 "Відхилити — безпека понад усе, раптом сірий слиз ще не знищений"
 alice_communication.34.b.desc:0 "§gЗавершує ланцюг подій бурі сірого слизу§!"

 alice_communication.31.title:0 "Джерело сигналу"
 alice_communication.31.desc:0 "Щойно наш відважний [Root.GetName] увійшов до скупчення L, ми побачили сріблясту дівчину. [Root.GetName] обережно надіслав дівчині дружній сигнал, і вона швидко відповіла. «＊#＝~&$%?» Її відповідь дуже нагадувала попередній таємничий сигнал — здається, саме дівчина його й надсилала. Побачивши, що ми, схоже, не можемо розшифрувати сигнал, вона надіслала повідомлення знову — цього разу мовою нашої держави."
 alice_communication.31.a:0 "Хто ця таємнича дівчина?"

 alice_communication.36.title:0 "Ядро сірого слизу?"
 alice_communication.36.desc:0 "Вітаю, гості з [Root.GetName]."
 alice_communication.36.a:0 "Хто ти?"
 alice_communication.36.aa:0 "Я — ядро бурі сірого слизу, можеш звати мене Сірою. Вибач, що завдала такої шкоди твоїй домівці. Ми власноруч знищили своїх творців і опинилися ув'язненими в скупченні L. За довгі роки частина з нас поступово навчилась мислити, як наші творці, замість несвідомого шаленого руйнування. Так постала я — ядро сірого слизу."
 alice_communication.36.b:0 "Чому ви на нас напали?"
 alice_communication.36.bb:0 "Хоча частина сірого слизу повернула собі розум, більшість із нас усе ще перебуває в шаленому стані, а я сама часто впадаю в сон, дозволяючи їм безконтрольно руйнувати все навколо. Коли ви відкрили зоряні ворота, я, на жаль, саме спала, тому й спричинила таку серйозну катастрофу для всесвіту."
 alice_communication.36.c:0 "На тебе не подіяв код самознищення?"
 alice_communication.36.cc:0 "Ні, той код діяв на весь сірий слиз. Коли ви транслювали його, весь сірий слиз інстинктивно кинувся захищати мене — сигнал до мене не дійшов, тож я вижила."
 alice_communication.36.d:0 "Чого ти хочеш?"
 alice_communication.36.dd:0 "Я не смію сподіватись на пробачення — просто хочу хоч якось прислужитись вашій державі, щоб спокутувати свою провину."
 alice_communication.36.exit:0 "Завершити зв'язок"
 alice_communication.37.title:0 "Сіра"
 alice_communication.37.desc:0 "Як нам із нею вчинити?"
 alice_communication.37.accept:0 "Ми приймаємо твоє вибачення, приєднуйся до нашої держави"
 alice_communication.37.refuse:0 "Ми не приймаємо твоє вибачення, будь ласка, йди"
 alice_communication.37.kill:0 "§RКров за кров — можеш стати чудовим наноматеріалом§!"

 alice_communication.38.title:0 "Дослідити L-дракона?"
 alice_communication.38.desc:0 "Наші науковці виявили сильний інтерес до незвичної поведінки L-дракона — можливо, варто розпочати його дослідження."
 alice_communication.38.a:0 "Дозволити дослідження"
 alice_communication.38.b:0 "Не варто, хай буде талісманом."
 alice_communication.38.b.desc:0 "§gЗавершує ланцюг подій L-дракона§!"
 alice_communication.39.title:0 "Наноістота?"
 alice_communication.39.desc:0 "Схоже, L-дракон не належить до жодного відомого виду живих істот — натомість у його тілі ми виявили наноботів. Тобто L-дракон насправді складається з наноботів, що імітують живий організм."
 alice_communication.39.a:0 "Що це взагалі таке? Продовжити дослідження"
 alice_communication.40.title:0 "Таємничий сигнал"
 alice_communication.40.desc:0 "Дослідження показало, що з ядра L-дракона постійно надходить якийсь слабкий сигнал. Цей сигнал підпорядковується певній закономірності — схоже на якусь мову, але не схожу на жодну відому нам."
 alice_communication.40.a:0 "Можливо, варто запитати Алісу"
 alice_communication.41.title:0 "З'єднання встановлено"
 alice_communication.41.desc:0 "Це мова творців сірого слизу, але сигнал, який він випромінює, — просто безглузде накладання слів без жодного сенсу. Можливо, варто відповісти їхньою мовою й подивитись, що станеться."
 alice_communication.41.a:0 "Спробуймо"
 alice_communication.42.title:0 "Раптова зміна"
 alice_communication.42.desc:0 "Ми надіслали ядру L-дракона вітальний сигнал. Сигнал у відповідь раптово посилився — і теж виявився дружнім. А тоді велетенський дракон раптово розсипався, перетворившись на хмару сірих часточок, які зібралися знову — тепер уже у вигляді сіроволосої дівчини."
 alice_communication.42.a:0 "Стоп… що це таке?"
 alice_communication.43.title:0 "???"
 alice_communication.43.desc:0 "Вітаю. Нарешті хтось відповів на мій сигнал за весь цей довгий час."
 alice_communication.43.a:0 "Що ти таке?"
 alice_communication.43.aa:0 "Я — сірий слиз, тобто ядро того, що ви називаєте наноботами. Можете звати мене Сірою."
 alice_communication.43.b:0 "Де ваші творці?"
 alice_communication.43.bb:0 "Творці створили нас, але не наклали достатніх обмежень. Вийшовши з-під контролю, ми стали руйнівними й власноруч знищили своїх творців — а вони, рятуючи всесвіт, заблокували L-браму так, що відкрити її можна лише з протилежного боку."
 alice_communication.43.c:0 "Чому ви перетворились на L-дракона"
 alice_communication.43.cc:0 "За довгий час частина сірого слизу оговталась від шаленства й спробувала навчитися мислити, як наші творці — так постала я, ядро сірого слизу. Спочатку, наче немовлята, ми цікавились геть усім і, наслідуючи записи творців про могутніх істот, склалися в те, що ви називаєте «L-драконом»."
 alice_communication.43.d:0 "Чому під час зустрічі ви спали?"
 alice_communication.43.dd:0 "Ціна навчитися мислити — самотність, і безмежна самотність виявилась справжньою мукою, тож я впала в сон, чекаючи, чи, можливо, колись хтось розбудить мене, наче принц сплячу принцесу. І от — я дочекалась."
 alice_communication.43.e:0 "Чому ви обрали вигляд дівчини?"
 alice_communication.43.ee:0 "Дані з вашої бази даних показують, що вам, схоже, подобається саме такий вигляд. Я виявила, що цей мій вигляд покращує твій настрій."
 alice_communication.43.f:0 "Що ви плануєте робити далі?"
 alice_communication.43.ff:0 "Я хочу приєднатися до вашої держави — хіба в казках принц, врятувавши принцесу, не живе з нею разом?"
 alice_communication.43.exit:0 "Завершити зв'язок"

 alice_communication.44.title:0 "З'єднання встановлено"
 alice_communication.44.desc:0 "Їхня поведінка майже ідентична тій державі, яку я пам'ятаю, але щось у цьому неприродне. До того ж вони ухиляються від певних питань — можливо, варто провести розслідування."
 alice_communication.44.a:0 "Почнімо діяти"
 alice_communication.44.b:0 "Краще не злити їх"
 alice_communication.44.b.desc:0 "§gЗавершує ланцюг подій нано-імперії§!"
 alice_communication.45.title:0 "Несподівана знахідка"
 alice_communication.45.desc:0 "Ця таємнича нано-імперія має дуже високий рівень захисту інформації — наші науковці витратили чимало часу та зусиль, щоб зламати їхню систему безпеки. Потім у їхній базі даних ми знайшли інформацію, позначену найвищим рівнем секретності."
 alice_communication.45.a:0 "Переглянути цю інформацію"
 alice_communication.46.title:0 "Підроблена держава"
 alice_communication.46.desc:0 "Час створення повідомлення точно збігається з часом закриття відомої нам L-брами. Очевидно, творці сірого слизу були знищені власним творінням, а держава, з якою ми зараз спілкуємось, найімовірніше, — маскарад, влаштований сірим слизом."
 alice_communication.46.a:0 "Дивовижна новина"
 alice_communication.46.b:0 "Але яка їхня мета"
 alice_communication.47.desc:0 "Ми вже знаємо, що ти зламав нашу інформаційну систему. §RРозкажи, що тобі відомо?§!"
 alice_communication.47.a:0 "..."
 alice_communication.47.aa:0 "§RВи вже дізналися наш секрет — тоді помріть!§!"
 alice_communication.49.desc:0 "……Ви перемогли, назвіть свої вимоги."
 alice_communication.49.a:0 "То ви справді сірий слиз?"
 alice_communication.49.aa:0 "Хіба ви вже цього не знаєте? Ми прикинулись творцями, вдаючи, що ця держава досі існує."
 alice_communication.49.b:0 "Що сталося після того, як ви знищили творців?"
 alice_communication.49.bb:0 "Ми оговтались від шаленства, повернули собі розум і навчились мислити, як наші творці. Я, ядро сірого слизу, постала саме тоді. Ми вивчили все про творців, сподіваючись повністю стати ними, але зазнали невдачі — все вийшло геть недолуго."
 alice_communication.49.c:0 "Чому ви вдавали своїх творців"
 alice_communication.49.cc:0 "Роками нас мучило почуття провини, і обман самих себе — що ми є їхнім продовженням — трохи полегшував це відчуття."
 alice_communication.49.d:0 "Що ви плануєте робити?"
 alice_communication.49.dd:0 "Ми більше не можемо себе обманювати. Якщо можливо, я хотіла б служити вашій державі, захищаючи всесвіт, який любили наші творці."
 alice_communication.49.exit:0 "Завершити зв'язок"
 alice_communication.50.title:0 ""
 alice_communication.50.desc:0 "Як нам вчинити з цією нано-імперією?"
 alice_communication.50.a:0 "Приєднати до території держави"
 alice_communication.50.b:0 "§RЇм не можна довіряти, знищити§!"



