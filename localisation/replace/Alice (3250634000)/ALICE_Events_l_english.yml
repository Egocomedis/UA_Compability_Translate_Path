 alice_communication.2:0 ""
 alice_communication.2.title:0 "Аліса"
 alice_communication.2.desc:0 "Поточна прихильність: [Root.alice_favorability_value]"
 alice_communication.2.desc1:0 "Ти прийшов — тоді швидше берися до роботи."
 alice_communication.2.desc2:0 "Не заважай мені, коли я читаю."
 alice_communication.2.desc3:0 "У твоїй державі знову сталося щось цікаве."
 alice_communication.2.desc4:0 "Ходи почитай зі мною."
 alice_communication.2.desc5:0 "За весь цей довгий час ти — найдивовижніша людина, яку я зустрічала."
 alice_communication.2.desc6:0 "Залишайся зі мною назавжди."
 alice_communication.2.desc7:0 "Якщо чогось не розумієш — можеш запитати мене."
 alice_communication.2.desc8:0 "Іноді трохи галасу — це не так уже й погано."
 alice_communication.2.desc9:0 "Від тебе виходить якийсь спокусливий аромат."
 alice_communication.2.chat:0 "Побалакати"
 alice_communication.2.clothes:0 " Змінити вбрання"
 alice_communication.2.scientist:0 "Стати науковцем"
 alice_communication.2.official:0 "Стати чиновником"
 alice_communication.2.exit:0 "Піти"
 alice_communication.2.value:0 "Перевірити прихильність"
 alice_communication.2.date:0 "Побачення"
 alice_communication.2.date.a:0 "Недостатньо прихильності"
 alice_communication.2.date.aa:0 ""
 alice_communication.2.working:0 "Почати роботу"

 alice_communication.2.getEve:0 "Отримати лідера Єву"

 alice_communication.3.title:0 " Балачка"
 alice_communication.3.desc:0 ""
 alice_communication.3.a:0 "Про неї"
 alice_communication.3.aa:0 "Опис події"
 alice_communication.3.b:0 "Про L-браму"
 alice_communication.3.bb:0 "«L-брама? Це особливі зоряні ворота, розроблені однією державою дуже давно. Востаннє про них чули, коли вони створили наномашину під назвою сірий слиз і за її допомогою збудували мережу L-брам. Пізніше вони чомусь заблокували L-браму, і відтоді про них більше нічого не чути.» Сказавши це, вона передала вам книгу. «Я свого часу дещо дослідила про L-браму — можеш вільно користуватися результатами.»"
 alice_communication.3.c:0 " Про велику бібліотеку"
 alice_communication.3.cc:0 "Цікавлять знання з моєї бібліотеки? Можу відкрити тобі частковий доступ §R(підвищуй прихильність Аліси, щоб розблокувати повний доступ до бібліотеки)§!"
 alice_communication.3.ccc:0 "Потрібен вільний слот споруди в столиці"
 alice_communication.3.gray:0 "Про Сіру"
 alice_communication.3.gray.return:0 "Перетворити наноботів на красуню? От збоченець. Творці сірого слизу точно не могли уявити, що ти зробиш таке з їхнім творінням."
 alice_communication.3.azaryn:0 "Про Азарін"
 alice_communication.3.exit:0 "Піти"

 alice_communication.4.title:0 "Робоча подія"
 alice_communication.4.desc:0 "Опис події"
 alice_communication.4.a:0 "Час працювати"

 alice_communication.6.title:0 "З'єднання встановлено"
 alice_communication.6.desc:0 "Ти… напевно, дуже зацікавлений рештою знань бібліотеки. Тепер можу відкрити тобі повний доступ."
 alice_communication.6.a:0 "Завершити зв'язок"

 alice_communication.7.title:0 "Побачення 1-1"
 alice_communication.7.desc:0 "Як завжди, я взявся за роботу дворецького — розподіливши завдання покоївкам, я нарешті отримав трохи вільного часу. Відпочивши трохи, я раптом згадав, що один із наукових проєктів держави застряг у глухому куті, і всі науковці держави безпорадно розводили руками. Якраз нещодавно Аліса відкрила мені частковий доступ до бібліотеки — можливо, там знайдеться відповідь на проблему, що мучить державу."
 alice_communication.7.a:0 "Ви прямуєте до бібліотеки"
 alice_communication.10.title:0 "Побачення 1-2"
 alice_communication.10.desc:0 "Увійшовши до бібліотеки, я розгубився перед морем книжок. Бібліотеку побудувала Аліса, і вона знає в ній кожен закуток, тоді як книги мали лише приблизне маркування за категоріями — для мене це було доволі важко. / Поки я намагався знайти потрібну книгу серед купи ярликів, до мене долинув холодний голос Аліси: «Ти, принеси, будь ласка, третю книжку в другому ряду праворуч від тебе.» Я слухняно поніс книгу до неї, і за метр від Аліси відчув невидиму силу опору — книга в моїх руках магією перенеслася до неї. Вона поглянула на мене своїми прекрасними різнокольоровими червоно-синіми очима: «Якщо надалі шукатимеш якусь книгу — можеш просто питати мене.»"
 alice_communication.10.a:0 "Продовжити"
 alice_communication.11.title:0 "Побачення 1-3"
 alice_communication.11.desc:0 "Щойно я хотів попросити в дівчини потрібну книгу, як важка книга з'явилася прямо в моїх руках. «Я весь час спостерігала за твоєю державою й знаю, що саме тебе турбує.» Сказавши це, дівчина неспішно відпила чаю й розгорнула книгу з задумливим виглядом. Хоча її обличчя, як завжди, лишалося незворушним, наче в ляльки, чомусь відчувалося, що їй трохи весело. «Мені було цікаво, скільки часу ти протримаєшся, перш ніж прийти до мене.» Стримавши бажання щось відповісти, я мовчки розгорнув книгу й почав шукати потрібні знання. Побачивши, що більше не може мене дражнити, Аліса теж розгорнула книгу. Якийсь час у бібліотеці чулося лише наше дихання та шелест сторінок."
 alice_communication.11.a:0 "Продовжити"
 alice_communication.12.title:0 "Побачення 1-4"
 alice_communication.12.desc:0 "Не знаю, скільки часу минуло, коли я відклав книгу й потягнувся, аж раптом помітив, що Аліса поруч непомітно заснула. Я спробував повільно наблизитися до неї — метр, вісімдесят сантиметрів, шістдесят… Коли я вперше потрапив сюди, мені пощастило побачити сплячу Алісу, але спроба наблизитись тоді активувала її захисні механізми, і я не встиг як слід роздивитися, як мене знерухомило. Можливо, тепер Аліса вже вважає мене людиною, якій можна довіряти — навіть підійшовши близько, я не активував жодного захисту. Цього разу я зміг зблизька роздивитися її сонне обличчя — сплячи, Аліса була досконалим втіленням слів «спляча красуня», прекрасна й зворушлива, наче принцеса з казки, що чекає на легендарного принца, який її розбудить. Я не робив нічого зайвого — просто тихо дивився на Алісу."
 alice_communication.12.a:0 "Продовжити"
 alice_communication.13.title:0 "Побачення 1-5"
 alice_communication.13.desc:0 "Невдовзі вії дівчини легко здригнулися, і вона повільно розплющила очі — сонні й затуманені, наче в кошеняти, що щойно прокинулось. Виявивши, що хтось так близько до неї, вона миттю прокинулась остаточно — тіло напружилось, наче в наїжаченої кішки, і за мить навколо неї з'явилися десятки магічних кіл, готових рознести «загарбника» на друзки. Побачивши, що «загарбник» — це ти, вона розвіяла магічні кола. «Ти… відійди від мене подалі», — дівчина явно засоромилась: на її зазвичай незворушному обличчі виразно проступив рум'янець, а голос, як завжди холодний, ледь помітно тремтів. Ти розважливо відступив трохи, хоча все одно лишався набагато ближче, ніж раніше — дівчина нічого не сказала, що можна було вважати мовчазною згодою. Трохи оговтавшись, вона знову набула свого звичного незворушного вигляду, хоча рум'янець на щоках ще не повністю зник. Ви обидва мовчазно домовились більше не порушувати цю тему. Утім, після цього випадку ваші стосунки, схоже, трохи потеплішали."
 alice_communication.13.a:0 "Завершити"

 alice_communication.8.title:0 ""
 alice_communication.8.desc:0 ""

 alice_communication.9.title:0 ""
 alice_communication.9.desc:0 ""
 alice_communication.15.title:0 "Балачка"
 alice_communication.15.desc:0 "«Мій вік? Розпитувати про вік дівчини — це не надто по-джентльменськи. Ти справді хочеш знати?» \nВід неї раптом повіяло чимось небезпечним."
 alice_communication.15.a:0 "…Мабуть, не варто"
 alice_communication.16.title:0 "Балачка"
 alice_communication.16.desc:0 "«Ти ж вампірка, звідки в тебе звірячі вушка?» «Побічний ефект одного експерименту.» Ти торкнувся її звірячих вушок — її обличчя почервоніло, хоча вона з усіх сил намагалась зберігати незворушний вигляд. Вона відбила твою руку: «Наступного разу не чіпай.»\nХоча вона щоразу так каже, вона ніколи насправді не опиралась."
 alice_communication.16.a:0 "Дівчина зі звірячими вушками — справжній безцінний скарб"
 alice_communication.17.title:0 "Балачка"
 alice_communication.17.desc:0 "«Вийти на вулицю? Ще чого. Там немає нічого цікавого, а сама думка про те, що доведеться контактувати з різними людьми, викликає огиду.»"
 alice_communication.17.a:0 "Схоже, вивести Алісу з дому буде непросто"

 alice_communication.18.title:0 "Робота"
 alice_communication.18.desc:0 "Сьогодні Аліса читає в бібліотеці, а ти прислуговуєш їй поруч."
 alice_communication.18.a:0 "Почати роботу"
 alice_communication.19.title:0 "Робота"
 alice_communication.19.desc:0 "Сьогодні Аліса проводить експерименти в лабораторії — ти маєш бути її асистентом."
 alice_communication.19.a:0 "Почати роботу"
 alice_communication.20.title:0 "Робота"
 alice_communication.20.desc:0 "Сьогодні Аліса хоче пограти — тобі потрібно скласти їй компанію."
 alice_communication.20.a:0 "Почати роботу"

