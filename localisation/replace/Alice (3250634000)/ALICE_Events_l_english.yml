 alice_communication.300.desc:0 ""
 alice_communication.300.a:0 ""

 alice_communication.301.title:0 "Роло"
 alice_communication.301.desc1:0 "Пхе, великий збоченцю, що тобі від мене сьогодні треба."
 alice_communication.301.desc2:0 "Якщо в тебе якісь труднощі — якщо щиро попросиш, я не проти допомогти тобі."
 alice_communication.301.desc3:0 "Хочу стати такою ж дорослою, як пані Аліса… (тихо). Ой, ти коли прийшов? "
 alice_communication.301.desc4:0 "Хоч ти й збоченець, але, мабуть, не поганий."
 alice_communication.301.desc5:0 "Я сама спекла тістечка, просто трохи лишилось зайвих — не думай зайвого."
 alice_communication.301.desc6:0 "Ти… останнім часом ти, здається, трохи зайнятий — майже не заходиш до мене. Я… я зовсім не сумувала, просто якось незвично…"
 alice_communication.301.desc7:0 "Хо… хоч я весь час звала тебе збоченцем, я знаю, що ти не поганий, навпаки — весь час мені допомагаєш. (тихо) Я… мені, здається, ти трохи подобаєшся, зовсім трохи, не думай зайвого. Хоча така, як я, тобі, мабуть, не дуже до вподоби."
 alice_communication.301.clothes:0 "Змінити вбрання"
 alice_communication.301.check:0 "Перевірити прихильність"
 alice_communication.301.check_return:0 "Поточна прихильність: [Root.rolo_favorability_value]"
 alice_communication.301.exit:0 "Піти"

 alice_communication.310.title:0 ""
 alice_communication.310.desc:0 "Ти хоч трохи й збоченець, але виявився доволі надійним. Дя... дякую тобі."
 alice_communication.310.a:0 "Врешті-решт, вона просто ще дитина — з нею легко порозумітись"
 alice_communication.310.effect:0 "§MТепер ексклюзивна посада Роло в раді підвищена з дворецької-стажерки до повноцінної дворецької, з посиленими ефектами§!"



 alice_communication.400.title:0 "Прогулянка замком"
 alice_communication.400.desc:0 "Уклавши угоду з Алісою, ти офіційно став її дворецьким. Прогулюючись замком, ти вирішив нарешті роздивитись його повністю — раніше, будучи непроханим гостем, ти не встиг цього зробити. Тепер, ставши частиною цього дому, ти почав знайомитися з домівкою Аліси. Ідучи, ти раптом відчув на собі чийсь погляд."
 alice_communication.400.a:0 "Це Аліса?"
 alice_communication.400.b:0 "§RПропустити весь сюжет§!"
 alice_communication.401.title:0 "Дивна дівчина"
 alice_communication.401.desc:0 "Ти озирнувся в бік, звідки відчув погляд, — але там нікого не було. Ти навіть засумнівався, чи не перевтомився настільки, що почав бачити галюцинації. Але коли, продовжуючи йти, ти знову опинився на тому самому місці, то зрозумів, що хтось із тебе жартує. Хоча ти роками був заклопотаний державними справами й не мав особливих бойових навичок, певні псіонічні здібності в тебе все ж були. Ти активував їх — і побачив біловолосу дівчину, що ширяла в повітрі, з цікавістю дивлячись на тебе."
 alice_communication.401.a:0 "Дивна дівчина"
 alice_communication.402.title:0 "Дівчина з іншого світу"
 alice_communication.402.desc:0 "Ви дивились одне на одного якийсь час, поки дівчина не зрозуміла, що її помітили. «Ку, дивна людина, знайшла Куну.» Тобі стало і смішно, і незручно водночас. «Я не дивна людина, я новий дворецький Аліси. А ти хто?» Дівчина, що назвалась Куною, підійшла ближче, дивлячись на тебе дивним поглядом. «Куна — молодша сестра пані Аліси.» Ти простягнув Куні праву руку: «Привіт, Куно, тепер нам жити разом.» Куна трохи повагалась, а потім теж простягнула руку й легко торкнулась твоєї — ти відчув, що її рука холодна. «Пане дворецький, дивний спосіб вітатись, Куна… запам'ятала.»"
 alice_communication.402.a:0 "Продовжити"
 alice_communication.403.title:0 "Новий клопіт?"
 alice_communication.403.desc:0 "Коли ти й Куна офіційно познайомились, нарешті з'явилась і Аліса. «Забула тобі сказати — у мене ще є молодша сестра, яка тут живе, її поведінка може здатись трохи дивною.» Побачивши, що ви тиснете одне одному руки, Аліса зробила дивний вираз обличчя. «То ви вже познайомились? А я хвилювалась, що між вами виникне конфлікт.» Куна з дуже серйозним виглядом сказала Алісі: «Пан дворецький, дуже дивний, але, не неприємний.» Побачивши це, Аліса заспокоєно пішла. Куна ж не пішла — вона щільно трималась поруч із тобою. «Куна… дуже самотня, пан дворецький, цікавий.» Дивлячись на дівчину, що трималась поруч, ти передчував, що це знову буде клопітна дівчина."
 alice_communication.403.a:0 "Сподіваюся, ми добре порозуміємось"
 alice_communication.403.a.desc:0 "§PТепер можна зв'язатися з Куною через панель зв'язку§!"

 alice_communication.404.title:0 "Куна"
 alice_communication.404.desc1:0 "Куна… дуже самотня."
 alice_communication.404.desc2:0 "Пан дворецький… прийшов."
 alice_communication.404.desc3:0 "Погуляй… із Куною."
 alice_communication.404.desc4:0 "Пан дворецький… дуже цікавий."
 alice_communication.404.desc5:0 "Пан дворецький… подобається."
 alice_communication.404.desc6:0 "Хочу… завжди бути з паном дворецьким."

