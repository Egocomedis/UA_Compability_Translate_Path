 alice_communication.505.title:0 "Зміна"
 alice_communication.505.desc:0 "Нам вдалося дослідити властивості сірого слизу — досліди показали, що він добре поєднується з магією Аліси й може ефективно посилити здібності сірого слизу. Кілька дослідів підтвердили відсутність негативних наслідків, і Аліса обережно влила магію в тіло Сірої. У міру того, як магія вливалась, тіло Сірої почало випромінювати сліпуче сяйво — у певний момент воно охопило весь замок, і ми не могли зрозуміти, що саме сталося."
 alice_communication.505.a:0 "Вдалося?"

 alice_communication.506.title:0 "Сіра"
 alice_communication.506.desc:0 "Губернатор держави й ваша секретарка, Сіра, підтверджує завершення оновлення."
 alice_communication.506.a:0 "Ти в порядку?"
 alice_communication.506.a.return:0 "Звісно, у порядку. Навпаки, тепер мої обчислювальні можливості наче потроїлись порівняно з попередніми. Дякую тобі — тепер я можу краще бути поруч із тобою."

 alice_communication.507.title:0 ""
 alice_communication.507.desc:0 "Приєднавшись до твоєї держави, Сіра взяла на себе роль секретарки, керуючи більшістю державних справ — це значно полегшило твій тягар, хоча важливі рішення все одно лишались за тобою.\n\nОдного дня, зайнятий допомогою Алісі в експериментах, ти не встиг звернути увагу на повідомлення від Сірої. Вона занепокоїлась і, нікого не попередивши, самовільно проникла до замку Аліси. Досліджуючи замок, вона якраз наткнулась на Куну, що нудьгуючи бродила будинком, — Куна легко знерухомила Сіру, а потім підійшла ближче, з цікавістю розглядаючи її. «Ку, незнайома, велика сестра. Ворог?». Сірій довелось докласти чимало зусиль, щоб розвіяти ворожість Куни, хоча та все одно дивилась на неї насторожено."
 alice_communication.507.a:0 "Продовжити"
 alice_communication.507.b:0 "§RПропустити сюжет§!"
 alice_communication.508.title:0 ""
 alice_communication.508.desc:0 "Закінчивши експеримент з Алісою, ти щойно вийшов із залу, коли побачив Сіру, що сиділа на дивані з дивним виразом обличчя, дивлячись на тебе, а Куна вже підбігла ближче. Спочатку тобі здалось це дивним, але, побачивши кілька непрочитаних повідомлень на своєму комунікаторі, ти зрозумів причину появи Сірої тут. Ти вибачився перед нею. Але Сіра все ще дивилась на тебе дивним поглядом: «Ти завжди отак 'працюєш' із ними? Виявляється, тобі подобаються такі маленькі дівчатка.» Ти виразно відчув невдоволення Сірої, але не знав, як відповісти, ніяковіючи."
 alice_communication.508.a:0 "Продовжити"
 alice_communication.509.title:0 ""
 alice_communication.509.desc:0 "Саме тоді вийшла Аліса — відчувши трохи ніякову атмосферу, вона приблизно здогадалась, що сталося, і сказала з легкою іронією: «Мій дворецький, здається, знову бешкетує там, де я не бачу, ще й привів це сюди, до мого дому.» Аліса особливо наголосила на слові «мого», наче заявляючи права. Сіра явно не могла всидіти на місці й підвелась, щоб посперечатись з Алісою. Але Аліса, здається, щось помітила й із зацікавленням подивилась на Сіру. «То це те, що він приніс із L-брами? Справді дивовижна форма життя.» Обернувшись до тебе, вона додала: «Мабуть, можна відновити мій попередній дослідницький проєкт про сірий слиз.» А потім додала: «Не хвилюйся, це не завдасть шкоди твоїй манюній зазнобі — знадобиться лише невеличкий зразок її тканини. Якщо все пройде вдало, це ефективно посилить її здібності.» Сіра ж звернула увагу лише на слово «зазноба» — і почервоніла, наче яблуко. Аж до самого повернення додому вона так і не оговталась. Врешті-решт вона ледь чутним голосом промовила: «Ми… напевно, ще не в таких стосунках. Утім, якщо ти хочеш, я теж могла б…» — не договоривши, вона втекла."
 alice_communication.509.a:0 "Як мило"
 alice_communication.509.a.desc:0 "§gТепер можна розпочати проєкт дослідження сірого слизу через панель зв'язку Сірої§!"

 alice_communication.1002.title:0 "Налагодження"
 alice_communication.1002.desc:0 ""
 alice_communication.1002.a:0 "Отримати всіх персонажів (без Сірої)"
 alice_communication.1002.b:0 "Отримати Сіру"
 alice_communication.1002.c:0 "Оновити Сіру"
 alice_communication.1002.d:0 "Увімкнути портрети Сірої з цього мода §R(після ввімкнення не можна скасувати)§!"
 alice_communication.1002.exit:0 "Піти"
