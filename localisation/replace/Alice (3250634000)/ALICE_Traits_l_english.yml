l_english:
 leader_trait_Alice:0 "Відьма кривавого місяця"
 leader_trait_Alice_desc:0 "Вампірка без особливих слабкостей. Безсмертна й незмінна, з лялькового краси зовнішністю та обличчям юної дівчини."
 leader_trait_Eve_sleep:0 "Спляча красуня"
 leader_trait_Eve_sleep_desc:0 "Більшість часу проводить уві сні, а прокинувшись, лишається млявою й сонною."
 leader_trait_Eve_dual:0 "Роздвоєння особистості"
 leader_trait_Eve_dual_desc:0 "Має дві особистості — Єву та Хлою. В особистості Хлої стає різкішою й холоднішою(?)."
 leader_trait_Rolo:0 "Занепалий ангел: Роло"
 leader_trait_Rolo_desc:0 "Володіє здатністю до миттєвої телепортації. Майстерно виготовляє прикраси з магічними властивостями, збираючи для них матеріали за кожної вільної хвилини. Мріє стати секретаркою Аліси."
 leader_trait_Cuna:0 "Біла тінь"
 leader_trait_Cuna_desc:0 "Тіло без фізичної форми, прозора й невловима постать, здатна зникати та ширяти в повітрі. Має сильний зв'язок з духовним світом і може керувати мерцями. Майстерно спантеличує ворогів ілюзіями. (Має частину ефектів ванільних «Військ полеглих» та «Робочих ос спорового ярма».)"

 leader_trait_Gray_offical:0 "Наномеханічна сутність"
 leader_trait_Gray_offical_desc:0 "Сіра — щільна сутність, що складається з незліченної кількості передових наномашин. §gВолодіє вражаючою здатністю до самовідтворення: щомісяця виробляє певну кількість £nanites£нанітів, щороку створює флотилію наносутностей, а після загибелі здатна швидко відновитися.§!"
 leader_trait_Gray_commander:0 "Наномеханічна сутність"
 leader_trait_Gray_commander_desc:0 "Сіра — щільна сутність, що складається з незліченної кількості передових наномашин. §gВолодіє вражаючою здатністю до самовідтворення: щомісяця виробляє певну кількість £nanites£нанітів, щороку створює флотилію наносутностей, а після загибелі здатна швидко відновитися.§!"

 leader_trait_legendary_terraformation_nucleus:0 "Ядро тераформування"
 leader_trait_legendary_terraformation_nucleus_desc:0 "Бутон на спині космічної творчині Азарін. Вона тримає його в таємниці.\n§YЗа допомогою Аліси Азарін може вільно тераформувати планети, більше не турбуючись про тривалість власного життя.§!"

 leader_trait_favorability_low:0 "Прихильність: низька"
 leader_trait_favorability_middle:0 "Прихильність: середня"
 leader_trait_favorability_high:0 "Прихильність: висока"
 leader_trait_favorability_highest:0 "Прихильність: найвища"

 leader_trait_alice_cognitive_node:0 "Резонанс знань Аліси"
 leader_trait_alice_cognitive_node_desc:0 "Знання та мудрість Аліси проникають через мережу ради до пізнавальних вузлів."
 leader_trait_alice_growth_node:0 "Гармонія розвитку Роло"
 leader_trait_alice_growth_node_desc:0 "Адміністративний талант Роло зливається з вузлами зростання, значно підвищуючи ефективність розвитку держави."
 leader_trait_alice_legion_node:0 "Тінь війни Куни"
 leader_trait_alice_legion_node_desc:0 "Бойові інстинкти Куни резонують із легіонними вузлами, суттєво підсилюючи бойову міць флоту."
 leader_trait_alice_regulatory_node:0 "Умиротворені сни Єви"
 leader_trait_alice_regulatory_node_desc:0 "Сонна свідомість Єви протікає крізь регуляційні вузли, приносячи єдність і дипломатичний спокій."
