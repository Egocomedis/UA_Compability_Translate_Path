l_english:
 alice_final_code:0 "§RОстанній код§!"
 alice_final_code_desc:0 "Ми спробуємо розшифрувати код самознищення ядра сірого слизу — можливо, це одразу покладе край кризі, що загрожує всьому всесвіту."

 research_dragon1:0 "Спробувати дослідити L-дракона"
 research_dragon1_desc:0 "Ми дослідимо його поверхню й візьмемо для аналізу невеликий зразок тканини."

 research_dragon2:0 "Продовжити дослідження L-дракона"
 research_dragon2_desc:0 "Ми просканували внутрішню структуру L-дракона"

 research_dragon3:0 "Відповісти на сигнал L-дракона"
 research_dragon3_desc:0 "За допомогою Аліси ми з'ясували, що сигнал, який він випромінює, — мова творців сірого слизу. Ми спробуємо відповісти на цей сигнал."

 hack_nano_empire:0 "Зламати нано-імперію"
 hack_nano_empire_desc:0 "Ця таємнича нано-імперія уникає деяких питань — очевидно, вони щось приховують. Можливо, ми зможемо зламати їхню інформаційну систему й знайти їхні секрети §R(це розлютить їх)§!."

 tame_gray_dragon:0 "Приручити L-дракона"
 tame_gray_dragon_desc:0 "L-дракон у системі [alice_player_country.home_planet.system.GetName] здається доволі покірним — принаймні наразі.\n\nЯкщо він розумний, ми могли б укласти з ним союз собі на користь."
