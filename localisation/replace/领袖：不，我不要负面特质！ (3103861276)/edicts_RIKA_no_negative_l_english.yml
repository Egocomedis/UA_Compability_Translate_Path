#edicts
 edict_RIKA_no_negative01_edicts:0 "Оголосити війну негативним рисам!"
 edict_RIKA_no_negative01_edicts_desc:0 "Але чому, запитають деякі, саме негативне? Чому обрати це нашою метою? Так само можуть запитати, навіщо підійматися на найвищу гору? Навіщо, багато років тому, летіти в космос? Я скажу: ми обираємо боротьбу з негативним! Ми обираємо боротьбу з негативним не тому, що це легко, а тому, що це важко!"
 edict_RIKA_no_negative02_edicts:0 "Безкоштовна медицина для всіх"
 edict_RIKA_no_negative02_edicts_desc:0 "Гадаю, у нас найкраща система лікування у всесвіті — і фізичного, і духовного."
