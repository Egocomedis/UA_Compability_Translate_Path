###############################
 edict_GF_doll_leader_portrait_correction: "Виправлення портрета лідера-андроїда"
 edict_GF_doll_leader_portrait_correction_desc: "Агов, Paradox, портрет чомусь взяв і змінився без причини — знову гроші з нас тягнете?"
 edict_GF_doll_leader_portrait_correction_effect: "Виправляє некоректний портрет лідера-андроїда.\n\n§HУвага:§!§Y портрети андроїдів-лідерів, найнятих у старих збереженнях,§! §Rне можна§! виправити цим указом."

 GFEXT_start.2.name: "§HВажливе нагадування§!"
 GFEXT_start.2.desc: "Вміст колишнього §YКросовер-збірника історій Girls Frontline: розширення «Кризова коаліція»§! повністю перенесено до §YКросовер-збірника історій Girls Frontline (канонічна лінія: Об'єднаний уряд)§!. На поточному етапі це розширення §Hне додає§! жодного вмісту.\n\nОднак це не означає, що розширення буде покинуте.\n\nНадалі оновлення розширення зосередяться на функціональності та різноманітті — наприклад, необов'язкових, але ресурсомістких фічах, що підсилюють занурення, або на доведенні цифр до абсурду; частина з них, можливо, вийде окремими додатковими підмодами.\n\nСлідкуйте за оновленнями."
 GFEXT_start.2.a: "Зрозуміло."

 GFEXT_start.3.name: "§HВажливе нагадування§!"
 GFEXT_start.3.desc: "§YКросовер-збірник історій Girls Frontline: розширення «Кризова коаліція»§!:\n\nНе виявлено мод §YКросовер-збірник історій Girls Frontline (канонічна лінія: Об'єднаний уряд)§! — цей мод є обов'язковою залежністю. Переконайтеся, що він встановлений і увімкнений, після чого перезапустіть гру."
 GFEXT_start.3.a: "Зрозуміло."

#  GFEXT_doll_leader.9980.name:0 "Портрет лідера-андроїда"
#  GFEXT_doll_leader.9980.desc:0 "Виявлено, що ви щойно встановили §YКросовер-збірник історій Girls Frontline: розширення «Кризова коаліція»§!, і перед цим ви вже наймали §Yандроїда-лідера§!. Через особливості реалізації прив'язки портрета андроїда-лідера до його імені ви можете виправити портрет §Yраніше§! найнятих андроїдів-лідерів, але це змінить їхній портрет і ім'я.\n\nВи також можете не виправляти портрети §Yраніше§! найнятих андроїдів-лідерів — подальші виправлення портретів на них не вплинуть."
#  GFEXT_doll_leader.9980.OK.tooltip:0 "У наведених нижче лідерів зміняться §Yім'я§! та §Yпортрет§!: §H"
#  GFEXT_doll_leader.9980.OK.tooltip_color_end:0 "§!\n§HУвага:§! посланці-андроїди в списку не вказані, але це так само їх стосується"

 GFEXT_collapsed_sol_category:0 "Брама пекла"
 GFEXT_collapsed_sol_category_human_desc:0 "Колись знайомий дім, що нині перетворився на пекло."
 GFEXT_collapsed_sol_category_desc:0 "Поверхня цієї планети — справжнє втілення пекельного пейзажу: пустельна, мертва і смертоносна."
 GFEXT_anomaly.100.name:0 "Брама пекла"
 GFEXT_anomaly.100.desc:0 "Поверхню [From.GetName] вкриває нескінченна маса колапсованої речовини — хаотичної матерії, що утворилась, коли звичайну речовину жорстоко подрібнили технологією маніпуляції ядерними силами, немислимою для нас. Уся планета просякнута смертоносною радіацією, яку випромінює ця речовина, — для будь-якої форми життя це справжнісіньке пекло.\n\nСудячи зі слідів, що лишилися на поверхні, [From.GetName] колись була батьківщиною розвиненої індустріальної цивілізації — доки війна з масовим застосуванням зброї на основі цієї технології не знищила все дотла."
 GFEXT_anomaly.100.desc.sf:0 "Поверхню [From.GetName] вкриває нескінченна маса колапсованої речовини, і вся планета просякнута смертоносною радіацією, яку та випромінює, — для будь-якої форми життя це справжнісіньке пекло.\n\nСудячи зі слідів на поверхні, ці недалекі людці таки розв'язали війну колосальних масштабів — і врешті знищили самі себе."
 GFEXT_anomaly.100.desc.paradeus:0 "Поверхню [From.GetName] вкриває нескінченна маса колапсованої речовини, і вся планета просякнута смертоносною радіацією, яку та випромінює, — для будь-якої форми життя це справжнісіньке пекло.\n\nСудячи зі слідів на поверхні, на [From.GetName] колись існувала розвинена індустріальна цивілізація, та війна колосальних масштабів із застосуванням колапс-зброї зрештою призвела цю цивілізацію до загибелі."
 GFEXT_anomaly.100.a:0 "Ех, людство."
 GFEXT_anomaly.100.a.sf:0 "Жалюгідно."
 GFEXT_anomaly.100.a.paradeus:0 "Ми не повторимо цієї помилки."
 GFEXT_anomaly.100.tooltip:0 "Принаймні дивна біосфера з істот із надзвичайно високим вмістом кремнію на цій планеті становить неабияку наукову цінність."

 GFEXT_tech_reverse_collapse_gateway:0 "Зворотньо-колапсний підпросторовий тунель"
 GFEXT_tech_reverse_collapse_gateway_desc:0 "Використовує принцип зворотного колапсу для перебудови підпросторового тунелю зоряних воріт, створюючи власний, ексклюзивний спосіб міжзоряного сполучення."
 GFEXT_tech_reverse_collapse_gateway_feature_title:0 "§HРозблоковано особливість:§! модернізація зоряних воріт"
 GFEXT_tech_reverse_collapse_gateway_feature_desc:0 "Дозволяє переобладнати збудовані §Yзоряні ворота§! на пересування підпростором за принципом §Yзворотного колапсу§!: будь-яка держава, що не володіє технологією §Y$GF_tech_collapse_jump_drive$§!, §Rне зможе пройти§! крізь модернізовані ворота."

 GFEXT_misc.11.name: "«Марш протесту»"
 GFEXT_misc.11.start: "Останнім часом на [this.GetName] різні групи регулярно влаштовують масові марші протесту проти чоловіків-працівників на заводах зі складання андроїдів. Протестувальники стверджують, що ці чоловіки «розпускають руки» з андроїдами жіночої зовнішності та поводяться непристойно.\n\n"
 GFEXT_misc.11.doll_rights_higher_than_limited: "Ретельне розслідування показало, що значна частина цих людей виявляє надмірні сексуальні фантазії щодо андроїдів, а переважна більшість є затятими противниками розширення прав андроїдів; дехто навіть має судимості за незаконне утримання андроїдів."
 GFEXT_misc.11.doll_rights_lower_than_limited: "Ретельне розслідування показало, що лише небагато з цих людей володіють андроїдами жіночої зовнішності, проте майже всі без винятку виявляють надмірні сексуальні фантазії щодо андроїдів; більшість категорично проти надання андроїдам ширших громадянських прав, а дехто навіть таємно утримував безхазяйних бездомних андроїдів."
 GFEXT_misc.11.a.full_rights: "Це неприпустиме порушення державної політики."
 GFEXT_misc.11.a.no_full_rights: "Оце так ви ставитеся до настільки важливої робочої сили?"
 GFEXT_misc.11.a.tooltip: "Цих йолопів, у яких думки лише про одне, буде заарештовано."
 GFEXT_clowns_arrested: "Бешкетників заарештовано"

