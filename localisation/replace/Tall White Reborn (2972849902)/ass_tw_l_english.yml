ass_tw_01_shipset_desc: "Витончений і неземний набір кораблів, натхненний легендарними прибульцями «Високі білі» з уфологічних переказів. Ці кораблі мають гладкі видовжені форми, світні акценти та бездоганне біло-срібне покриття, що навіює відчуття таємничості та передової позаземної елегантності. Ідеально підходить для піднесених імперій, які цінують точність, спокій і майже божественну технологічну грацію."

