l_english:
###Lithoid Planets
#Decision
 decision_pd_aw_lithoid_planet: "Створити літотрофну екосистему"
 decision_pd_aw_lithoid_planet_desc: "Цей світ чекає, щоб його вирізьбили в кристал і камінь. Немічна біологічна екосистема стоїть на нашому шляху."
 decision_pd_aw_lithoid_planet_effects_short: "На цьому світі буде викарбувано літотрофну екосистему, що дозволить нам тонко налаштовувати кристалічні частоти відповідно до наших потреб."
 decision_pd_aw_lithoid_planet_tooltip: "Після завершення ми зможемо обрати частоту літотрофних кристалів цієї планети."
 decision_pd_aw_lithoid_planet_cleanup: "Відновити біологічну екосистему"
 decision_pd_aw_lithoid_planet_cleanup_desc: "Ми повинні відновити біологічну екосистему цієї планети до її колишньої слави."
 decision_pd_aw_lithoid_planet_cleanup_effects_short: "Штучно створену літотрофну екосистему буде видалено, повернувши планеті біологічну природу."
 decision_pd_aw_lithoid_planet_cleanup_tooltip: "Усі літотрофні модифікатори буде видалено, і планету повернуто до біологічної екосистеми."
 decision_pd_aw_lithoid_change_frequency: "Змінити літотрофну частоту"
 decision_pd_aw_lithoid_change_frequency_desc: "Ми змінимо частоту кристалів літотрофної екосистеми відповідно до наших потреб."
 decision_pd_aw_lithoid_change_frequency_effects_short: "Ми можемо змінити частоту кристалів цієї планети."
 decision_pd_aw_lithoid_change_frequency_tooltip: "Поточний літотрофний модифікатор буде видалено, що дозволить змінити його на іншу частоту."

#Modifiers
 pd_aw_lithoid_planet_cyan: "Літотрофний світ"
 pd_aw_lithoid_planet_cyan_desc: "Частота: 500 нм\nРезонансні вібрації сприяють доброзичливості та каталізують прискорений темп росту для літоїдів."
 pd_aw_lithoid_planet_red: "Літотрофний світ"
 pd_aw_lithoid_planet_red_desc: "Частота: 650 нм\nПотужний кристалічний резонанс бездоганно синергує з мінеральними покладами, роблячи їх доступнішими для видобутку."
 pd_aw_lithoid_planet_yellow: "Літотрофний світ"
 pd_aw_lithoid_planet_yellow_desc: "Частота: 580 нм\nДинамічні гармоніки цього кристалічного резонансу бездоганно інтегруються з нашими енергомережами, розкриваючи їхню повну потужність."

#Acension Perk
 ap_pd_lithoid_worlds: "Літотрофні світи"
 ap_pd_lithoid_worlds_desc: "Ми перетворимо наші світи на непохитні літотрофні раї, викувавши основу вічної стабільності."
 allow_lithoid_worlds: "§HUnlocks Decision:§! $decision_pd_aw_lithoid_planet$"
 describe_lithoid_worlds: "§YЛітотрофні світи§! — особливий клас планет з екосистемами на основі літотрофів, що дозволяє налаштовувати частоту великих кристалічних структур, покращуючи $i_unity$, $i_minerals$ або $i_energy$.\n$MOD_LITHOID_POP_HAPPINESS$: §G25%§!\n$mod_LITHOID_logistic_growth_mult$: §G25%§!\n$MOD_BIOLOGICAL_POP_HAPPINESS$: §R-50%§!\n$MOD_BIO_LOGISTIC_GROWTH_MULT$: §R-50%§!"

#Notification Message
 MESSAGE_PD_AW_LITHOID_DESC:1 "$PLANET|Y$ тепер §YЛітотрофний світ§!"
 MESSAGE_PD_AW_LITHOID_MESSAGE_TYPE_TITLE: "Літотрофний біом завершено"
 MESSAGE_PD_AW_LITHOID_CLEANUP_DESC:1 "Біологічний біом на $PLANET|Y$ відновлено."
 MESSAGE_PD_AW_LITHOID_CLEANUP_MESSAGE_TYPE_TITLE: "Літотрофний біом видалено"

#Choose Event
 pdawlithoidplanets.100.name: "Кристалічна частота"
 pdawlithoidplanets.100.desc: "На яку резонансну частоту нам налаштувати літотрофний біом на §Y[This.GetName]§!?"
 pdawlithoidplanets.100.cyan: "Блакитний"
 pdawlithoidplanets.100.cyan.tooltip: "Ця резонансна частота діє як об'єднувальна сила, сприяючи єдності серед нашого літоїдного населення та вирощуючи гармонійний сплеск приросту населення."
 pdawlithoidplanets.100.red: "Червоний"
 pdawlithoidplanets.100.red.tooltip: "Цей резонанс бездоганно синергує з мінеральними покладами, роблячи їх доступнішими й готовими до видобутку."
 pdawlithoidplanets.100.yellow: "Жовтий"
 pdawlithoidplanets.100.yellow.tooltip: "Ця резонансна частота бездоганно інтегрується з нашими енергомережами, розкриваючи сплеск їхньої повної потужності."

