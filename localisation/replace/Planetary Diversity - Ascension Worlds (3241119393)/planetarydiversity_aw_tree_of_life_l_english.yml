l_english:

#Origin
 origin_pd_aw_tree_of_life: "Мегафлора Дерево Життя"
 origin_pd_aw_tree_of_life_desc: "Цей вулик еволюціонував у симбіотичних стосунках з величезним мегафлорним деревом, чиє коріння поширилося в кожен куточок планети та змінило екосистему, щоб пасувати і йому, і дронам. Вулику було б важко вижити без підтримки дерева."
 origin_tooltip_pd_aw_tree_of_life_start_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- Планетарна особливість: ['concept_tree_of_life']$TABBED_NEW_LINE$- Модифікатори планети: ['concept_pd_aw_tree_of_life_modifier']$NEW_LINE$- Колонізовані планети:$TABBED_NEW_LINE$- Планетарна особливість: ['concept_pd_aw_tree_of_life_sapling']$NEW_LINE$- Колонії без §YПаростка Дерева Життя§!:$TABBED_NEW_LINE$- Рішення планети: ['concept_transplant_pd_aw_tree_of_life']$NEW_LINE$- $AVAILABLE_HOLDINGS$ ['concept_pd_aw_tree_of_life_holding', £building£ $holding_tree_of_life_sapling$] на колоніях-підданих"
 origin_tooltip_pd_aw_tree_of_life_start_negative_effects: "- Не можна тераформувати планети"

