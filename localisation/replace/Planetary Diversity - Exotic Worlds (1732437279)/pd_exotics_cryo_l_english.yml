 l_english:

 # Species class
 CRYO: "Кріофіл"
 CRYO_desc: "Клас раси не впливає на вашу Імперію, але раси класу «Кріофіл» можуть вважати інших кріофілів менш чужими, ніж представників інших класів рас."

 # Homeworld column header
 climate_cryogenic: "Кріогенний"
 # Planet tooltip climate label (matches `climate = "cryogenic"` on the planet class)
 cryogenic: "§B(Кріогенний клімат)§!"

 # Planet classes
 pc_pd_methane: "Метановий світ"
 pc_pd_methane_desc: "Крижаний кам'янистий світ із щільною азотно-метановою атмосферою. Моря рідкого метану та етану вкривають більшу частину поверхні, а безперервний вуглеводневий серпанок забарвлює небо в оранжевий. Тубільне життя ґрунтується на вуглеводневій біохімії."
 pc_pd_ammonia: "Аміачний світ"
 pc_pd_ammonia_desc: "Холодний кам'янистий світ із щільною азотно-аміачною атмосферою. Океани рідкого аміаку вкривають більшу частину поверхні, а на полюсах зберігається аміачно-водяний лід. Тубільне життя ґрунтується на аміачній біохімії."
 pc_pd_nitrogen: "Азотний світ"
 pc_pd_nitrogen_desc: "Замерзлий кам'янистий світ із розрідженою азотною атмосферою. Моря рідкого азоту скупчуються в низовинах, а азотні гейзери вивергаються з тріщин у крижаній корі. Тубільне життя ґрунтується на азотній біохімії."

 # Planet-class static modifier (applied at game start to flag ammonia worlds)
 pd_ammonia: "Аміачний світ"
 pd_ammonia_desc: "Ця холодна планета має щільну азотно-аміачну атмосферу над океанами рідкого аміаку, а рясний зв'язаний азот підтримує квітучу аміачну біосферу. Той самий аміак є корозійним для більшості металів, поступово зношуючи незахищену інфраструктуру."

 # Planet-class static modifier (applied at game start to flag methane worlds)
 pd_methane: "Метановий світ"
 pd_methane_desc: "Ця крижана планета має щільну азотно-метанову атмосферу над величезними морями рідкого метану та етану — колосальним резервуаром горючого палива. Ця ж летючість робить атмосферу небезпечно займистою, тому кожну споруду потрібно ретельно захищати від вибуху."

 # Planet-class static modifier (applied at game start to flag nitrogen worlds)
 pd_nitrogen: "Азотний світ"
 pd_nitrogen_desc: "Ця замерзла планета має розріджену азотну атмосферу над морями рідкого азоту, з товстими нітратними та мінеральними пластами, замкненими під льодом. Екстремальний холод робить природні надпровідники життєздатними, але змушує кожен об'єкт постійно обігрівати, щоб він продовжував функціонувати."

 # Core trait
 trait_cryophile: "Кріофіл"
 trait_cryophile_desc: "Повільний низькотемпературний метаболізм цієї раси потребує суміші екзотичних гідридів поряд зі звичайними поживними речовинами. Вони переживають інші раси на покоління, але кожне завдання, за яке вони беруться, виконується значно довше."
 TRAIT_CRYOPHILE_EFFECT: "$r_exotic_gases$ Утримання на кожні $pop_group_unit$ £pop£ Поселень: §R+0.05§!"

 # Preference traits
 trait_pc_pd_methane_preference: "Уподобання метанових світів"
 trait_pc_pd_methane_preference_desc: "Ця раса еволюціонувала поряд з морями рідких вуглеводнів метанових світів, процвітаючи в глибокому холоді й повністю оптимізована для біохімії на основі рідкого метану."
 trait_pc_pd_ammonia_preference: "Уподобання аміачних світів"
 trait_pc_pd_ammonia_preference_desc: "Ця раса еволюціонувала в щільних аміачно-хмарних атмосферах аміачних світів, процвітаючи в глибокому холоді й повністю оптимізована для біохімії на основі аміачних сполук."
 trait_pc_pd_nitrogen_preference: "Уподобання азотних світів"
 trait_pc_pd_nitrogen_preference_desc: "Ця раса еволюціонувала поряд з морями рідкого азоту та кріовулканічними гейзерами азотних світів, процвітаючи в глибокому холоді й повністю оптимізована для біохімії на основі рідкого азоту."

 # Habitability modifiers
 mod_pc_pd_methane_habitability: "Придатність метанового світу"
 mod_pc_pd_ammonia_habitability: "Придатність аміачного світу"
 mod_pc_pd_nitrogen_habitability: "Придатність азотного світу"

 # Ammonia atmosphere zone gate (planet-side modifier applied by arcology atmosphere checks)
 pd_ammonia_atmosphere:0 "Аміачна атмосфера"
 pd_ammonia_atmosphere_desc:0 "Щільний азот і газоподібний аміак за низьких температур. По всій товщі зависають сліди метанолу та замерзлих вуглеводневих часток."

 # Methane atmosphere zone gate (planet-side modifier applied by arcology atmosphere checks)
 pd_methane_atmosphere:0 "Метанова атмосфера"
 pd_methane_atmosphere_desc:0 "Щільний азот, метан та етан за дуже низьких температур. Завислі толінові аерозолі надають повітрю характерного оранжевого відтінку."

 # Nitrogen atmosphere zone gate (planet-side modifier applied by arcology atmosphere checks)
 pd_nitrogen_atmosphere:0 "Азотна атмосфера"
 pd_nitrogen_atmosphere_desc:0 "Розріджений молекулярний азот за екстремально кріогенних температур. Завислі крижані частки та сліди неону надають повітрю блідо-блакитного відтінку."

 # Start screen intro (PART_ONE per planet class)
 START_SCREEN_PART_ONE_PD_METHANE: "За еони, що минули відтоді, як перші примітивні спільноти [GetSpeciesName] сформувалися на берегах рідких вуглеводнів [GetHomeWorldName], наша цивілізація поширилася та розквітла."
 START_SCREEN_PART_ONE_PD_AMMONIA: "За еони, що минули відтоді, як перші примітивні спільноти [GetSpeciesName] сформувалися під аміачними хмарами [GetHomeWorldName], наша цивілізація поширилася та розквітла."
 START_SCREEN_PART_ONE_PD_NITROGEN: "За еони, що минули відтоді, як перші примітивні спільноти [GetSpeciesName] сформувалися біля морів рідкого азоту [GetHomeWorldName], наша цивілізація поширилася та розквітла."

 # Ammonia world planet features
 d_pd_ammonia_lightning_storms: "Азотні грозові фронти"
 d_pd_ammonia_lightning_storms_desc: "Там, де стикаються аміачні й азотні фронти, небо розряджається майже безперервним каскадом блискавок. Струм можна забирати прямо з повітря."
 d_pd_ammonia_thermocline: "Розшарування аміачних хмар"
 d_pd_ammonia_thermocline_desc: "Атмосфера розшаровується на різко виражені хмарні яруси, кожен з яких тепліший за верхній. Енергію можна отримувати з градієнта між ними."
 d_pd_ammonia_salt_dunes: "Дюни амонієвої солі"
 d_pd_ammonia_salt_dunes_desc: "Виточені вітром дюни чистої амонієвої солі тягнуться поверхнею, готові до збору й переробки на мінерали."
 d_pd_ammonia_brine_caverns: "Печери аміачного розчину"
 d_pd_ammonia_brine_caverns_desc: "Глибока мережа печер, де просочуваний аміак з часом вкрив стіни багатими жилами руди."
 d_pd_ammonia_chemosynthetic_pools: "Озера рідкого аміаку"
 d_pd_ammonia_chemosynthetic_pools_desc: "Широкі спокійні водойми рідкого аміаку, вкриті товстими мікробними килимами. Ця біомаса — основне джерело їжі для будь-якої колонії, адаптованої до холоду."
 d_pd_ammonia_organic_haze: "Аміачний снігопад"
 d_pd_ammonia_organic_haze_desc: "М'які пориви аміачного льоду безперервно опускаються з верхніх хмар, несучи із собою їстівну органіку."
 d_pd_ammonia_pure_gas_vents: "Аміачно-азотні виверження"
 d_pd_ammonia_pure_gas_vents_desc: "Глибокі тріщини вивергають шлейфи аміаку й азотного газу, достатньо чистого, щоб живити переробні заводи без попередньої обробки."
 d_pd_ammonia_polar_ion_columns: "Полярні іонізаційні колони"
 d_pd_ammonia_polar_ion_columns_desc: "На полюсах насичене аміаком повітря іонізується у високі колони струму, що здіймаються на сотні кілометрів у небо. Розряд можна використовувати для отримання сирої електроенергії."
 d_pd_ammonia_cryolite_reefs: "Кріолітові рифи"
 d_pd_ammonia_cryolite_reefs_desc: "Величезні донні поклади кристалізованого кріоліту, утворені за геологічний час і пронизані рідкісноземельними та літієвими рудами."
 d_pd_ammonia_ammoniated_kelp_forests: "Аміачні ламінарієві ліси"
 d_pd_ammonia_ammoniated_kelp_forests_desc: "Здіймні підводні ліси забирають аміак прямо з моря й перетворюють його на щільну їстівну біомасу. Найбагатший урожай на будь-якому замерзлому світі."

 # Methane world planet features
 d_pd_methane_tholin_storm_belts: "Толінові грозові пояси"
 d_pd_methane_tholin_storm_belts_desc: "Заряджені толінові аерозолі вирують у верхній атмосфері безперервними грозовими поясами, скидаючи статичну електрику по всьому хмарному шару. Розряд можна відвести через провідні вежі."
 d_pd_methane_cryovolcanic_vents: "Кріовулканічні виверження"
 d_pd_methane_cryovolcanic_vents_desc: "Тріщини вивергають суміш рідкого метану та водно-аміачної магми в морозне повітря. Тепловий градієнт приводить у рух турбіни, встановлені над кожним отвором."
 d_pd_methane_supercooled_geysers: "Переохолоджені гейзери"
 d_pd_methane_supercooled_geysers_desc: "Підземні резервуари стисненого етану вивергаються через лінії розломів високими струменями переохолодженого розпилення. Кожен шлейф — постійне джерело енергії, придатної для видобутку."
 d_pd_methane_carbonate_caverns: "Карбонатні печери"
 d_pd_methane_carbonate_caverns_desc: "Мережі печер, вирізьблені в аміачно-водяній корінній породі давніми потоками метану, зі стінами, вкритими кристалічними карбонатами та складною органікою."
 d_pd_methane_clathrate_shelves: "Метаноклатратні шельфи"
 d_pd_methane_clathrate_shelves_desc: "Великі шельфи метаноклатратного льоду покривають краї континентів; ґратка вловлює корисні метали та солі в промислових кількостях."
 d_pd_methane_ice_diamonds: "Метанові крижані діаманти"
 d_pd_methane_ice_diamonds_desc: "Колосальний атмосферний тиск стискає вуглець, отриманий з метану, у зливи мікроалмазів, що осідають на полярних плато."
 d_pd_methane_tholin_haze: "Толіновий серпанок"
 d_pd_methane_tholin_haze_desc: "Завислі вуглеводневі аерозолі осідають з неба безперервним їстівним опадом. Поверхнева фауна живиться безпосередньо цим осадом."
 d_pd_methane_liquid_methane_seas: "Моря рідкого метану"
 d_pd_methane_liquid_methane_seas_desc: "Широкі моря рідкого метану та етану підтримують товсті килими тубільної мікробіології на мілководді. Ця біомаса — основне джерело їжі для будь-якої колонії, адаптованої до холоду."
 d_pd_methane_hydrocarbon_marshes: "Вуглеводневі болота"
 d_pd_methane_hydrocarbon_marshes_desc: "Величезні приливні болота тубільної флори, що живиться метаном, вкривають узбережжя, перетворюючи атмосферні вуглеводні на щільну їстівну біомасу. Найбагатший урожай на будь-якому замерзлому світі."
 d_pd_methane_pure_gas_vents: "Метаново-етанові виверження"
 d_pd_methane_pure_gas_vents_desc: "Глибокі тріщини вивергають шлейфи метану та важчих вуглеводневих газів, достатньо чистих, щоб живити переробні заводи без попередньої обробки."

 # Nitrogen world planet features
 d_pd_nitrogen_geyser_fields: "Поля азотних гейзерів"
 d_pd_nitrogen_geyser_fields_desc: "Величезні рівнини, де стиснений підземний азот вивергається сталими струменями переохолодженої пари. Турбіни, встановлені над кожним отвором, отримують енергію від колон, що вивергаються."
 d_pd_nitrogen_aurora_curtains: "Полярні завіси"
 d_pd_nitrogen_aurora_curtains_desc: "Сонячний вітер створює майже безперервні полярні сяйва в розрідженій верхній атмосфері. Заряджені шари можна використовувати для отримання сирої електроенергії за допомогою заземлених антен."
 d_pd_nitrogen_plasma_columns: "Полярні плазмові колони"
 d_pd_nitrogen_plasma_columns_desc: "На магнітних полюсах іонізований азот здіймається у високі плазмові колони, що сягають сотень кілометрів у небо. Розряд можна використовувати для отримання сирої електроенергії."
 d_pd_nitrogen_frost_caverns: "Печери крижаних кристалів"
 d_pd_nitrogen_frost_caverns_desc: "Глибокі мережі печер, вкриті жилами металевої руди, замкненої в давньому азотному льоду. Стіни дають багаті екстракти, щойно їх достатньо нагріють для обробки."
 d_pd_nitrogen_nitrate_flats: "Замерзлі нітратні рівнини"
 d_pd_nitrogen_nitrate_flats_desc: "Широкі западини кристалізованих нітратних солей, утворені давніми азотними морями. Поклади залягають глибоко й дають стабільний видобуток мінералів."
 d_pd_nitrogen_diamond_rinds: "Алмазні кірки"
 d_pd_nitrogen_diamond_rinds_desc: "Давній азотний лід стиснув атмосферний вуглець у товсті кірки кристалічного вуглецю вздовж полярних плато. Пласти залягають достатньо близько до поверхні для прямого видобутку."
 d_pd_nitrogen_frost_blooms: "Азотні крижані цвітіння"
 d_pd_nitrogen_frost_blooms_desc: "Ділянки тубільної кріофлори ростуть на замерзлих низовинах, забираючи азот прямо з повітря. Цю біомасу можна збирати як їстівну сировину."
 d_pd_nitrogen_nitrogen_seas: "Моря рідкого азоту"
 d_pd_nitrogen_nitrogen_seas_desc: "Широкі водойми рідкого азоту підтримують товсті килими тубільної мікробіології на мілководді. Ця біомаса — основне джерело їжі для будь-якої колонії, адаптованої до холоду."
 d_pd_nitrogen_cryoplankton_drifts: "Дрейфи кріопланктону"
 d_pd_nitrogen_cryoplankton_drifts_desc: "Величезні дрейфуючі скупчення тубільного кріопланктону метаболізують рідкий азот у щільну їстівну біомасу. Найбагатший урожай на будь-якому замерзлому світі."
 d_pd_nitrogen_pure_gas_vents: "Чисто-азотні виверження"
 d_pd_nitrogen_pure_gas_vents_desc: "Глибокі тріщини вивергають шлейфи чистого азоту та слідів екзотичних газів, достатньо чистих, щоб живити переробні заводи без попередньої обробки."

 # Urban districts (link to vanilla city/hive/nexus loc so submods stay compatible)

 # Rural districts
 district_pdexotic_cryo_riftvent: "Розломна станція"
 district_pdexotic_cryo_riftvent_plural: "Розломні станції"
 district_pdexotic_cryo_riftvent_desc: "Кріовулканічні виверження вивільняють переохолоджений розсіл і захоплений газ. Турбінні масиви, встановлені над розломами, отримують енергію з крутого теплового градієнта між підземним теплом і поверхневим повітрям."
 district_pdexotic_cryo_sublimation: "Сублімаційний кар'єр"
 district_pdexotic_cryo_sublimation_plural: "Сублімаційні кар'єри"
 district_pdexotic_cryo_sublimation_desc: "Відкриті виїмки, де величезні обсяги летючого льоду миттєво сублімуються, вивільняючи метали й солі, ув'язнені всередині. Дрейфуючі завіси пари позначають кожен робочий вибій."
 district_pdexotic_cryo_chemovat: "Сад хемочанів"
 district_pdexotic_cryo_chemovat_plural: "Сади хемочанів"
 district_pdexotic_cryo_chemovat_desc: "Поля герметичних чанів, що вирощують тубільне хемосинтетичне життя. Організми метаболізують атмосферу планети в їстівну біомасу і вивільняють рідкісні гази як побічний продукт."
 pdexotic_cryo_chemovat_basic: "Базові хемочани"
 pdexotic_cryo_chemovat_basic_desc: "Базові операції хемочанів: культивування тубільної хемосинтетичної біомаси в очікуванні спеціалізації."

 # District cap modifiers (auto-generated by engine; loc must match vanilla style)
