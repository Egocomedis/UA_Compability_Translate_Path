 # Chemovat zones
 zone_pdexotic_cryo_chemovat_refinement: "Вирощування в чанах"
 zone_pdexotic_cryo_chemovat_refinement_desc: "Герметичні чани по всіх полях хемочанів культивують тубільні хемосинтетичні штами, перетворюючи вловлену атмосферу на їстівну біомасу в промислових масштабах."
 zone_pdexotic_cryo_chemovat_hydride_synthesis: "Дистиляція гідридів"
 zone_pdexotic_cryo_chemovat_hydride_synthesis_desc: "Кожен хемочан оснащений дистиляційними колонами, що конденсують летючі гідриди в резервуари. Вихід біомаси знижується пропорційно до зростання видобутку газу."
 zone_unavailable_tech_mine_exotic_gases: "$society_research_icon_with_space$$tech_mine_exotic_gases$"

