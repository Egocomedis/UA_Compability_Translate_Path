 ap_pd_cryothermal_workforce_machine_effect: "$mod_pop_pdexotic_cryo_chemist_machine_bonus_workforce_mult$: §G+20%§!"

 # Single planet-summary line for the AP card, instead of a per-planet modifier list.
 ap_pd_cryothermal_engineered_planets_effect: "['concept_pd_cryogenic_planets'] у вашій імперії отримують модифікатор §Y$pd_cryothermal_engineered_planet$§!."

 # Cryogenic planet concept (linked from the AP tooltip and reusable across exotic content).
 concept_pd_cryogenic_planet: "Кріогенна планета"
 concept_pd_cryogenic_planets: "Кріогенні планети"
 concept_pd_cryogenic_planet_desc: "$concept_pd_cryogenic_planet$ — це світи, чиї біосфери працюють на кріогенній хімії, а не на рідкій воді:$NEW_LINE$- $pc_pd_ammonia$$NEW_LINE$- $pc_pd_methane$$NEW_LINE$- $pc_pd_nitrogen$"

 # Country workforce modifiers (auto-render their constituent mults via the mod_job_* keys below)
 pd_cryothermal_workforce: "Оптимізація кріотермальної робочої сили"
 pd_cryothermal_workforce_desc: "$pd_cryothermal_workforce_shared_desc$"
 pd_cryothermal_workforce_drone: "$pd_cryothermal_workforce$"
 pd_cryothermal_workforce_drone_desc: "$pd_cryothermal_workforce_shared_desc$"
 pd_cryothermal_workforce_machine: "$pd_cryothermal_workforce$"
 pd_cryothermal_workforce_machine_desc: "$pd_cryothermal_workforce_shared_desc$"
 pd_cryothermal_workforce_shared_desc: "Підготовка, розрахована на особливу атмосферу, зміцнене оснащення та лінії постачання екзотичних гідридів підвищують продуктивність кожної робочої сили хемочанів."

 # Per-planet modifier granted by the AP to cryo (ammonia/methane) worlds
 pd_cryothermal_engineered_planet: "Кріотермально інженероване"
 pd_cryothermal_engineered_planet_desc: "Інфраструктура, розрахована на особливу атмосферу, та переохолоджені виробничі лінії дозволяють цьому світу підтримувати щільніше заселення, ніж дозволило б його природне середовище."

 # Vatkeeper job-efficiency modifiers, shown in the workforce modifier's hover breakdown.
 mod_pop_pdexotic_cryo_chemist_bonus_workforce_mult: "[pdexotic_cryo_chemist.GetName] $MOD_POP_BONUS_WORKFORCE_MULT$"
 mod_pop_pdexotic_cryo_chemist_drone_bonus_workforce_mult: "[pdexotic_cryo_chemist_drone.GetName] $MOD_POP_BONUS_WORKFORCE_MULT$"
 mod_pop_pdexotic_cryo_chemist_machine_bonus_workforce_mult: "[pdexotic_cryo_chemist_machine.GetName] $MOD_POP_BONUS_WORKFORCE_MULT$"

 # Pressure Suits tech (AP-only, granted by ap_pd_cryothermal_engineering)
 tech_pd_pressure_suits: "Скафандри високого тиску"
 tech_pd_pressure_suits_desc: "Зміцнені холодовакуумні скафандри та герметичні атмосферою поселення дозволяють нашим колоністам витримувати кисень, тиск і тепло світів, відмінних від нашого. Інші раси, своєю чергою, можуть виживати в наших атмосферах."
 tech_pd_pressure_suits_effect_title: "§HВідкриває колонізацію:§! ['concept_pd_cryogenic_planet'] для не-кріогенних рас"
 tech_pd_pressure_suits_effect_desc: "§HКріогенне проживання§!\nГерметичні поселення та холодовакуумні скафандри підтримують життя киснедихаючих колоністів у метанових, аміачних та азотних атмосферах."

 # Cryoforming tech (normal research, cryophile-founder empires only; gates ingress terraforming into ammonia and methane)
 tech_pd_cryoforming: "Кріоформування"
 tech_pd_cryoforming_desc: "Досягнення в кріогенній хімії та атмосферному реформуванні дають нам засоби для поширення нашої біосфери на світи, де вона природно не формується. Помірну планету можна перебудувати на холодну, щільну атмосферу, потрібну нашій расі."
 tech_pd_cryoforming_effect_title: "§HВідкриває можливість:§! Кріогенне тераформування"
 tech_pd_cryoforming_effect_desc: "Дозволяє тераформувати помірні світи в Аміачні, Метанові та Азотні світи."
 tech_pd_cryogenic_terraforming_effect_title: "§HВідкриває можливість:§! Кріогенне тераформування"
 tech_pd_cryogenic_terraforming_effect_desc: "Дозволяє тераформувати Аміачні, Метанові та Азотні світи в помірні світи."

 # Habitat atmosphere toggle decisions (auto-stamped by on_megastructure_built; these let players add it to inherited habitats or vent it after conquest)
 decision_pd_exotic_habitat_add_ammonia_atmosphere: "Герметизувати аміачну атмосферу"
 decision_pd_exotic_habitat_add_ammonia_atmosphere_desc: "Заповнити системи життєзабезпечення поселення аміаком та азотом, щоб наша раса могла тут оселитися. Після зміни атмосфери на борту зможуть жити лише раси, адаптовані до кріогенних умов."
 decision_pd_exotic_habitat_remove_ammonia_atmosphere: "Видалити аміачну атмосферу"
 decision_pd_exotic_habitat_remove_ammonia_atmosphere_desc: "Очистити це поселення від аміачної атмосфери та замінити її звичайною кисневою сумішшю. Кріогенні раси більше не зможуть тут оселятися."
 decision_pd_exotic_habitat_add_methane_atmosphere: "Герметизувати метанову атмосферу"
 decision_pd_exotic_habitat_add_methane_atmosphere_desc: "Заповнити системи життєзабезпечення поселення азотом і метаном, щоб наша раса могла тут оселитися. Після зміни атмосфери на борту зможуть жити лише раси, адаптовані до кріогенних умов."
 decision_pd_exotic_habitat_remove_methane_atmosphere: "Видалити метанову атмосферу"
 decision_pd_exotic_habitat_remove_methane_atmosphere_desc: "Очистити це поселення від метанової атмосфери та замінити її звичайною кисневою сумішшю. Кріогенні раси більше не зможуть тут оселятися."
 decision_pd_exotic_habitat_add_nitrogen_atmosphere: "Герметизувати азотну атмосферу"
 decision_pd_exotic_habitat_add_nitrogen_atmosphere_desc: "Заповнити системи життєзабезпечення поселення чистим азотом під кріогенним тиском, щоб наша раса могла тут оселитися. Після зміни атмосфери на борту зможуть жити лише раси, адаптовані до кріогенних умов."
 decision_pd_exotic_habitat_remove_nitrogen_atmosphere: "Видалити азотну атмосферу"
 decision_pd_exotic_habitat_remove_nitrogen_atmosphere_desc: "Очистити це поселення від кріогенної азотної атмосфери та замінити її звичайною кисневою сумішшю. Кріогенні раси більше не зможуть тут оселятися."

 # Domed Colony atmosphere toggle decisions (auto-stamped on build and at game start; these let players add it to inherited colonies or vent it after conquest)
 decision_pd_exotic_domed_add_atmosphere: "Герметизувати куполи"
 decision_pd_exotic_domed_add_atmosphere_desc: "Переобладнати куполи колонії під нашу кріогенну атмосферу, щоб наша раса могла тут оселитися. Після зміни повітря під куполами зможуть жити лише раси, адаптовані до кріогенних умов."
 decision_pd_exotic_domed_remove_atmosphere: "Видалити атмосферу з куполів"
 decision_pd_exotic_domed_remove_atmosphere_desc: "Очистити куполи від кріогенної атмосфери та замінити її звичайною кисневою сумішшю. Кріогенні раси більше не зможуть тут оселятися."

 # Cryogenic SR deposits (volatile motes pair)
 d_pd_cryo_clathrate_pockets: "Клатратні кишені"
 d_pd_cryo_clathrate_pockets_desc: "Летючі гази, захоплені всередині кліток замерзлої води та аміачного льоду. Ґратки руйнуються під теплом видобутку, вивільняючи придатні до використання порошинки."
 d_pd_cryo_volatile_geyser_fields: "Поля летючих гейзерів"
 d_pd_cryo_volatile_geyser_fields_desc: "Величезні рівнини, де стиснені летючі речовини вивергаються з тріщин замерзлої кори. Виверження відкладають стабільний запас придатних до переробки порошинок по всій поверхні."

 # Cryogenic SR deposits (rare crystals pair)
 d_pd_cryo_cryocrystal_caverns: "Печери кріокристалів"
 d_pd_cryo_cryocrystal_caverns_desc: "Підземні печери, вкриті рідкісними кристалічними ґратками, що формуються лише в екстремальному холоді. Поклади стабільні, доки не порушено навколишній лід."
 d_pd_cryo_cryocrystal_spires: "Шпилі кріокристалів"
 d_pd_cryo_cryocrystal_spires_desc: "Поверхневі утворення голкоподібних рідкісних кристалів, що росли тисячі років повільного осадження. Кожен шпиль дає велику кількість рідкісних кристалів після збору."

 # Cryogenic SR deposits (exotic gases pair)
 d_pd_cryo_gas_seeps: "Замерзлі газові просочення"
 d_pd_cryo_gas_seeps_desc: "Повільні витоки екзотичних газів, що виходять з тріщин під льодом. Видобуток скромний, але стабільний по всій навколишній місцевості."
 d_pd_cryo_gas_columns: "Замерзлі газові колони"
 d_pd_cryo_gas_columns_desc: "Стійкі шлейфи екзотичних газів, що здіймаються з глибоких підземних резервуарів. Видобуток не поступається найбільшим газовим родовищам на тепліших світах."

 # Cryogenic SR deposits (special)
 d_pd_cryo_betharian_deposit: "Замерзле бетаріанське поле"
 d_pd_cryo_betharian_deposit_desc: "Бетаріанські камені, завислі в глибокому льодовиковому льоду по всьому широкому регіону. Поклади залишаються інертними, доки їх не розморозять і не переробять."
 d_pd_cryo_alien_pets_deposit: "Захищена долина кріофауни"
 d_pd_cryo_alien_pets_deposit_desc: "Захищена низовина, де тубільна фауна холодного світу виживає в незвичному достатку. Місцева дика природа лагідна і добре підходить для компанійства."

 # Cryogenic natural blockers and their clear techs
 d_pd_cryo_toxic_mire: "£blocker£ Токсична кріотопа"
 d_pd_cryo_toxic_mire_desc: "Широкі простори хімічно активної кашоподібної маси, де токсичні сполуки концентруються в точці замерзання. Інфраструктуру поселення неможливо безпечно будувати на забрудненій місцевості."
 d_pd_cryo_glacier_wall: "£blocker£ Замерзла льодовикова стіна"
 d_pd_cryo_glacier_wall_desc: "Величезна стіна щільного давнього льоду перетинає ландшафт. Маса надто товста й нестабільна для будівництва без спеціальних робіт з розчищення."

 tech_pd_cryo_toxic_mire: "Меліорація кріотоп"
 tech_pd_cryo_toxic_mire_desc: "Рідини хімічної нейтралізації та низькотемпературні скрубери дозволяють нам осушувати й знезаражувати токсичні кріотопи на кріогенних світах. Меліоровану землю потім безпечно освоювати."
 tech_pd_cryo_glacier_wall: "Кріогенне льодовикове буріння"
 tech_pd_cryo_glacier_wall_desc: "Підігріті бурові установки та кумулятивні заряди пробивають щільні крижані стіни, що блокують колоніальну експансію на кріогенних світах. Групи розчищення можуть проклавити прохідну місцевість за частку природного часу танення."

 # Empire-creation picker tooltips (rare-world style: concept link, mechanics, then the three building choices)
 pc_pd_ammonia_tooltip: "§Y$pc_pd_ammonia$s§! — це ['concept_pd_cryogenic_planets']\n- £district£ §Y$district_pdexotic_cryo_chemovat_plural$§!: §G+3§!\n- Швидкість приросту населення: §G+10%§!\n- Утримання споруд і районів: §R+10%§!\n- $rare_building_warning$\n$t$- ['building:building_pd_ammonia_fixation_institute']\n$t$- ['building:building_pd_ammonia_pharma_works']\n$t$- ['building:building_pd_ammonia_biome_reserve']"
 pc_pd_methane_tooltip: "§Y$pc_pd_methane$s§! — це ['concept_pd_cryogenic_planets']\n- £district£ §Y$district_pdexotic_cryo_riftvent_plural$§!: §G+3§!\n- Швидкість будівництва: §G+15%§!\n- Вартість споруд і районів: §R+10%§!\n- $rare_building_warning$\n$t$- ['building:building_pd_methane_tholin_lab']\n$t$- ['building:building_pd_methane_hydrocarbon_foundry']\n$t$- ['building:building_pd_methane_polymer_plant']"
 pc_pd_nitrogen_tooltip: "§Y$pc_pd_nitrogen$s§! — це ['concept_pd_cryogenic_planets']\n- £district£ §Y$district_pdexotic_cryo_sublimation_plural$§!: §G+3§!\n- £physics£ §YФізичні дослідження§!: §G+10%§!\n- Утримання споруд і районів: §R+10%§!\n- $rare_building_warning$\n$t$- ['building:building_pd_nitrogen_supercomputer']\n$t$- ['building:building_pd_nitrogen_munitions_foundry']\n$t$- ['building:building_pd_nitrogen_cryonics_sanctuary']"

 # Ammonia signature buildings (pick one)
 building_pd_ammonia_fixation_institute: "Інститут синтезу аміаку"
 building_pd_ammonia_fixation_institute_desc: "Багата на азот хімія планети дає нашим біологам та інженерам безліч нових реакцій для вивчення й удосконалення."
 building_pd_ammonia_pharma_works: "Аміачний фармацевтичний завод"
 building_pd_ammonia_pharma_works_desc: "Рясний аміак тут легко переробляється на фармацевтику та миючі засоби, що постачаються на ринки по всій імперії."
 building_pd_ammonia_biome_reserve: "Аміачний біомний заповідник"
 building_pd_ammonia_biome_reserve_desc: "Дивна екосистема холодної хімії цього світу приваблює допитливих відвідувачів з-поза меж зірок."

 # Methane signature buildings (pick one)
 building_pd_methane_tholin_lab: "Лабораторія метанової хімії"
 building_pd_methane_tholin_lab_desc: "Густий органічний серпанок цього світу сповнений екзотичної низькотемпературної хімії, яку належить розкрити нашим дослідникам."
 building_pd_methane_hydrocarbon_foundry: "Завод крекінгу метану"
 building_pd_methane_hydrocarbon_foundry_desc: "Нескінченні вуглеводні тут піддаються крекінгу й перековуються на сплави, а дешеве місцеве паливо підтримує роботу наших заводів."
 building_pd_methane_polymer_plant: "Метановий полімерний завод"
 building_pd_methane_polymer_plant_desc: "Метанові моря пропонують майже необмежену сировину для пластмас та інших готових товарів."

 # Nitrogen signature buildings (pick one)
 building_pd_nitrogen_supercomputer: "Комплекс азотного суперкомп'ютера"
 building_pd_nitrogen_supercomputer_desc: "Природний глибокий холод дозволяє нашим надпровідним комп'ютерам працювати на швидкостях, що розплавили б машини на будь-якому теплішому світі."
 building_pd_nitrogen_munitions_foundry: "Азотний завод боєприпасів"
 building_pd_nitrogen_munitions_foundry_desc: "Багаті нітратні пласти цього світу легко переробляються на вибухівку та військові сплави для наших армій."
 building_pd_nitrogen_cryonics_sanctuary: "Азотне кріонічне святилище"
 building_pd_nitrogen_cryonics_sanctuary_desc: "Ідеально консервуючий холод робить цей світ ідеальним святилищем, приваблюючи клієнтів і туристів з-поза меж зірок."
