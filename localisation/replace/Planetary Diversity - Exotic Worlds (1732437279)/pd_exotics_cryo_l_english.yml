 # Cryo chemist jobs (worked at Chemovat Gardens)
 job_pdexotic_cryo_chemist: "Доглядач чанів"
 job_pdexotic_cryo_chemist_plural: "Доглядачі чанів"
 job_pdexotic_cryo_chemist_desc: "Доглядачі чанів культивують герметичні хемочани, де тубільне хемосинтетичне життя вирощується на власній атмосфері планети. Ця робота — наполовину землеробство, наполовину низькотемпературна хімія: організми дають їстівну біомасу і вивільняють рідкісні гази як побічний продукт."

 job_pdexotic_cryo_chemist_drone: "Дрон-доглядач чанів"
 job_pdexotic_cryo_chemist_drone_plural: "Дрони-доглядачі чанів"
 job_pdexotic_cryo_chemist_drone_desc: "Дрони-доглядачі чанів обслуговують герметичні хемочани вулика, спрямовуючи вирощену хемосинтетичну біомасу в потік їжі та вловлюючи вивільнені гази для промисловості рою."

 job_pdexotic_cryo_chemist_machine: "Одиниця-доглядач чанів"
 job_pdexotic_cryo_chemist_machine_plural: "Одиниці-доглядачі чанів"
 job_pdexotic_cryo_chemist_machine_desc: "Одиниці-доглядачі чанів експлуатують герметичні хемочани як інфраструктуру видобутку газу, забираючи летючі побічні продукти з кріогенного циклу біомаси. Там, де імперія все ще потребує органічного споживання, біомаса вилучається як вторинний продукт."

 # Cryophile livestock variant. Aliases to vanilla livestock loc so flavor text stays consistent across phenotypes.
 job_livestock_cryophile: "$job_livestock$"
 job_livestock_cryophile_plural: "$job_livestock_plural$"
 job_livestock_cryophile_desc: "$job_livestock_desc$"

 # Cryogenic terraforming tech (mirrors vanilla volcanic; covers ammonia and methane)
 tech_pd_cryogenic_terraforming: "Кріогенне тераформування"
 tech_pd_cryogenic_terraforming_desc: "Досягнення в кріогенній інженерії та хімії екзотичних розчинників дозволяють геоінженерію за раніше немислимих температур і тисків. Ми можемо тераформувати кріогенний світ у помірну планету."

