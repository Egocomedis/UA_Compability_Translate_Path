 # Cryothermal Engineering ascension perk
 ap_pd_cryothermal_engineering: "Кріотермальна інженерія"
 ap_pd_cryothermal_engineering_desc: "Процвітання в кріогенних умовах вимагає переосмислення матеріалів, біології та хімії. Ми стоїмо біля витоків науки холоду."

 # Greyed-out requirement line shown before Terrestrial Sculpting is researched.
 requires_technology_tech_terrestrial_sculpting:0 "$TRIGGER_FAIL$Потребує технології £society£ §Y$tech_terrestrial_sculpting$§!."

 # Civ-conditional job-efficiency effect lines shown in the AP card; only one renders per empire type.
 ap_pd_cryothermal_workforce_effect: "$mod_pop_pdexotic_cryo_chemist_bonus_workforce_mult$: §G+20%§!"
