 mt_leader_event.7.i:0"Підготувати 9 лідерів"
 mt_leader_event.7.j:0"Підготувати 10 лідерів"
 mt_leader_event.1.name:0"Спеціальна підготовка"
 mt_leader_event.1.desc:0"Ми витратимо ресурси на виховання висококласних талантів — тепер оберемо бажаний рівень лідера"
 mt_leader_event.1.a:0"Рівень 2"
 mt_leader_event.1.b:0"Рівень 4"
