 situation_mt_produce_aggressiveexecution: "Активне впровадження"
 approach_mt_produce_aggressiveexecution_tt: "$situation_speed_tt$: §G+20%§!"
 situation_mt_produce_invisiblehand_approach_tt: "Невидима рука"
 situation_mt_produce_aggressiveexecution_approach_tt: "Активне впровадження"
 situation_mt_produce_pause_desc: "Ситуацію призупинено"
 tr_mt_produce_modifier: "Прийнято традицію"

 mt_situations_event.2.name: "Земля та космос"
 mt_situations_event.2.desc: "Стара виробнича система будувалась на землі, а тепер ми вступили в безпрецедентну космічну еру — у міру просування космічних досліджень ми з'ясували, що в космосі є майже необмежені ресурси.\n\nТепер у нас є два чітко визначені табори: консерватори вважають, що не можна відмовлятись від наземного виробництва, радикали ж вважають, що майбутнє — за космічним великим виробництвом.\n\nЯкий шлях нам обрати?"
 mt_situations_event.2.a: "Земля"
 mt_situations_event.2.b: "Космос"
 mt_situations_event.2.c: "Можливо, щось інше?"
 modifiers_mt_tr_produce_2_a: "Виробнича реформа: акцент на землі"
 modifiers_mt_tr_produce_2_b: "Виробнича реформа: акцент на космосі"
 modifiers_mt_tr_produce_2_a_desc: "Отримано за вибір наземного варіанту у виробничій реформі"
 modifiers_mt_tr_produce_2_b_desc: "Отримано за вибір космічного варіанту у виробничій реформі"
 mt_situations_event.3.name: "Робітники, фахівці та правителі"
 mt_situations_event.3.desc: "Наш світ складається з трьох великих класів із чітким розподілом праці, але збалансувати їх — непросте завдання.\n\nУ ході реформи ми неминуче стикаємось із вибором: на кому нам зосередитись?"
 mt_situations_event.3.a: "Робітники"
 mt_situations_event.3.b: "Фахівці"
 mt_situations_event.3.c: "Правителі"
 modifiers_mt_tr_produce_3_a: "Виробнича реформа: робітники"
 modifiers_mt_tr_produce_3_b: "Виробнича реформа: фахівці"
 modifiers_mt_tr_produce_3_c: "Виробнича реформа: правителі"
 modifiers_mt_tr_produce_3_a_desc: "Отримано за вибір варіанту з робітниками у виробничій реформі"
 modifiers_mt_tr_produce_3_b_desc: "Отримано за вибір варіанту з фахівцями у виробничій реформі"
 modifiers_mt_tr_produce_3_c_desc: "Отримано за вибір варіанту з правителями у виробничій реформі"
 mt_situations_event.4.name: "Акцент на космосі чи на землі"
 mt_situations_event.4.desc: "Після безперервних реформ ми знову стоїмо перед вибором між землею й космосом. Через модернізацію наявного обладнання та вдосконалення всієї виробничої системи подальші зміни даються нелегко — доведеться заплатити певну ціну\n\nЯкщо ми хочемо просунути космічне виробництво далі, доведеться інвестувати в модернізацію обладнання; а якщо покращувати наземну виробничу систему — доведеться діяти через централізовану координацію\n\nЯкий шлях кращий?"
 mt_situations_event.4.a: "Видобувні станції — наше майбутнє"
 mt_situations_event.4.b: "Наземне виробництво треба вдосконалити"
 mt_situations_event.4.c: "Ми не можемо собі цього дозволити"
 modifiers_mt_tr_produce_4_b: "Виробнича реформа: акцент на землі"
 modifiers_mt_tr_produce_4_a: "Виробнича реформа: акцент на космосі"
 modifiers_mt_tr_produce_4_b_desc: "Отримано за вибір наземного варіанту у виробничій реформі"
 modifiers_mt_tr_produce_4_a_desc: "Отримано за вибір космічного варіанту у виробничій реформі"
 mt_situations_event.5.name: "Виробничу реформу завершено"
 mt_situations_event.5.desc: "У старі часи така реформа спричинила б величезні потрясіння в нашій державі, можливо, навіть розкол — але тепер усе пройшло спокійно"
 mt_situations_event.5.a: "Як і очікувалось"
 mt_situations_event.5.a.tt: "Розблоковує всі ефекти традиції: §Y$tradition_mt_produce$§!"

 council_agenda_agenda_mt_produce_name: "Виробнича реформа"
 council_agenda_agenda_mt_produce_desc: "Нова модель виробництва принесе нам величезну користь"
 agenda_mt_produce_finish: "Порядок денний «Виробнича реформа»"
#Фокус на дослідженнях
tradition_mt_research:"Фокус на дослідженнях"
 tradition_mt_research_desc:"Наукова сфера потребує значних вкладень, але заради майбутнього це того варте."

 tr_mt_research_adopt:"Традиція фокусу на дослідженнях"
 tr_mt_research_finish:0 "Традицію фокусу на дослідженнях завершено"

 tr_mt_research_1:0 "Допомога ШІ"
 tr_mt_research_1_delayed:0 "Широке застосування штучного інтелекту дозволяє нам заощадити значні кошти й зосередитись на дійсно важливому."

 tr_mt_research_2:0 "Підготовка кадрів"
 tr_mt_research_2_delayed:0 "Нерівномірний рівень дослідницьких команд гальмує подальший розвиток — вкладення додаткових ресурсів виправить цю ситуацію."

 tr_mt_research_4:0 "Виховання лідерів"
 tr_mt_research_4_delayed:0 "Створення досконалої системи виховання наших талантів забезпечить державу невичерпним потоком якісних лідерів."

 tr_mt_research_3:0 "Широке обговорення"
 tr_mt_research_3_delayed:0 "Наукові проєкти не повинні лишатись справою вищого класу — вони можуть стати темою для розмов за чаєм, залучаючи кожного."

 tr_mt_research_5:0 "Наука для всіх"
 tr_mt_research_5_delayed:0 "Завдяки суспільній атмосфері та базовій освіті наш народ може долучатись до будь-яких проєктів, доступних для участі."

 council_agenda_agenda_mt_research_name: "Фокус на дослідженнях"
 council_agenda_agenda_mt_research_desc: "Нам слід зосередитись на наукових дослідженнях"
 agenda_mt_research_finish: "Порядок денний «Фокус на дослідженнях»"
#Підготовка до війни
tradition_mt_preparewar:"Підготовка до війни"
 tradition_mt_preparewar_desc:"Щоб впоратися з можливою кризою, нам необхідно підготуватись заздалегідь."

 tr_mt_preparewar_adopt:"Традиція підготовки до війни"
 tr_mt_preparewar_finish:0 "Традицію підготовки до війни завершено"
 tr_mt_preparewar_finish_desc:0"§HРозблоковує указ:§! Аварійний флот\n§LМожна витратити сплави та вплив, щоб негайно сформувати флотилію корветів.§!"

 tr_mt_preparewar_1:0 "Фокус на сплавах"
 tr_mt_preparewar_1_delayed:0 "Перш ніж настане можлива криза, нам потрібно виплавити якомога більше сплавів про запас."

 tr_mt_preparewar_2:0 "Посилення корпусу"
 tr_mt_preparewar_2_delayed:0 "Професійні дослідницькі команди та кваліфіковані робітники посилили наші кораблі."

 tr_mt_preparewar_3:0 "Посилення зброї"
 tr_mt_preparewar_3_delayed:0 "Стару зброю буде значно вдосконалено, щоб якомога ефективніше знищувати небезпечних ворогів."

 tr_mt_preparewar_4:0 "Розширення флоту"
 tr_mt_preparewar_4_delayed:0 "Заради безпеки всієї держави розширення флоту необхідно поставити на порядок денний."

 tr_mt_preparewar_5:0 "Ефективна мобілізація"
 tr_mt_preparewar_5_delayed:0 "Навіть у міжзоряну епоху розбудова сухопутних військ надзвичайно важлива — ми маємо вміти швидко розгортати сили."

 edict_mt_emergencyfleet:0"Аварійний флот"
 edict_mt_emergencyfleet_desc:0"Витрачає певну кількість сплавів і впливу, щоб одразу сформувати флотилію корветів у столичній системі. Флотилія використовує наявний випадковий проєкт корвета загальною кількістю десять кораблів."

 mt_fleet_event.1.name:0"Аварійний флот"
 mt_fleet_event.1.desc:0"Тимчасово сформований флот готовий — зараз він перебуває в столичній системі"
 mt_fleet_event.1.a:0"Чудово!"
#Освоєння
tradition_mt_reclaim:"Освоєння"
 tradition_mt_reclaim_desc:"Нашій цивілізації потрібно більше простору — ми розширимось по всьому зоряному небу, залишивши слід на кожній землі."

 tr_mt_reclaim_adopt:"Традиція освоєння"
 tr_mt_reclaim_finish:0 "Традицію освоєння завершено"

 tr_mt_reclaim_1:0 "Реформа колоністичних кораблів"
 tr_mt_reclaim_1_delayed:0 "Стару конструкцію колоністичних кораблів можна описати хіба що як неефективну — тепер ми переробимо її за допомогою новітніх технологій."
 tr_mt_reclaim_1_desc:0"Вартість будівництва колоністичного корабля §G-50%§!"

 tr_mt_reclaim_2:0 "Активна колонізація"
 tr_mt_reclaim_2_delayed:0 "Завдяки широкій пропаганді дедалі більше людей охоче вирушають будувати нову домівку."

 tr_mt_reclaim_3:0 "Ефективне розчищення"
 tr_mt_reclaim_3_delayed:0 "Перешкоди на планетах не повинні заважати нашій розбудові — їх треба прибирати, хай яким дивовижним способом."

 tr_mt_reclaim_4:0 "Швидка забудова"
 tr_mt_reclaim_4_delayed:0 "Нашій державі потрібен кращий розвиток, а нашим людям — більше посад, тому нам необхідне масштабне будівництво."

 tr_mt_reclaim_5:0 "Ефективне обслуговування"
 tr_mt_reclaim_5_delayed:0 "Реформовані будівельні матеріали дозволяють краще обслуговувати споруди, значно скорочуючи знос."
#Забудова
tradition_mt_building:"Забудова"
 tradition_mt_building_desc:"Наразі ми можемо забезпечити чимало посад, але цього все ще далеко не досить для дедалі більшого попиту, тож ми продовжимо будівництво та вдосконалення."

 tr_mt_building_adopt:"Традиція забудови"
 tr_mt_building_finish:0 "Традицію забудови завершено"

 tr_mt_building_1:0 "Щільні шахти"
 tr_mt_building_1_delayed:0 "Мінерали в глибинах кори цілком можна видобувати ширше — нам залишається лише будувати якомога більше шахт."

 tr_mt_building_2:0 "Щільні електростанції"
 tr_mt_building_2_delayed:0 "Наявні технології дозволяють зробити наші електростанції компактнішими, вміщуючи більше споруд у тому самому просторі."

 tr_mt_building_3:0 "Центр фахівців"
 tr_mt_building_3_delayed:0 "У цю епоху праця робітників — не суто фізична; наші фахівці можуть скеровувати їхню роботу, значно підвищуючи ефективність виробництва."

 tr_mt_building_4:0 "Зародок ідеального міста"
 tr_mt_building_4_delayed:0 "Перш ніж збудувати справжнє ідеальне місто, ми цілком можемо провести пробну перебудову наявних міст, максимально розширюючи виробничий простір."

 tr_mt_building_5:0 "Науково-дослідний центр"
 tr_mt_building_5_delayed:0 "Кожна планета повинна мати спеціалізовану дослідницьку установу — лише так наша наука завжди буде на вершині світу."
#Виховання
tradition_mt_develop:"Виховання"
 tradition_mt_develop_desc:"Лідери вказують народу шлях уперед — ми маємо переконатись, що вони видатні."

 tr_mt_develop_adopt:"Традиція виховання"
 tr_mt_develop_finish:0 "Традицію виховання завершено"

 tr_mt_develop_1:0 "Подолання межі"
 tr_mt_develop_1_delayed:0 "Межа можливостей лідера безмежна — постійні пошуки приведуть нас на нечувані висоти."
 tr_mt_develop_1_desc: "Лідери отримують потужну рису ради, досягши 10 рівня"

 tr_mt_develop_2:0 "Обмін досвідом"
 tr_mt_develop_2_delayed:0 "Окрім індивідуального навчання, наші лідери обмінюватимуться думками одне з одним, досягаючи спільного прогресу."

 tr_mt_develop_3:0 "Розширення бази"
 tr_mt_develop_3_delayed:0 "Кожен має потенціал стати лідером — нам слід розширити відбір, щоб не проґавити можливий талант."

 tr_mt_develop_4:0 "Спеціальна підготовка"
 tr_mt_develop_4_delayed:0 "Уряд ретельно розробив програму підготовки — вона коштує чимало, але здатна виховати вражаючих геніїв."
 tr_mt_develop_4_desc:0"§HРозблоковує указ:§! Спеціальна підготовка\n§LМожна витратити енергокредити та вплив, щоб виховати лідера високого рівня або багатообіцяючого генія.§!"
 edict_mt_leaderdecelop:0"Спеціальна підготовка"
 edict_mt_leaderdecelop_desc:0"Ми витратимо певну кількість впливу та енергокредитів на виховання таланту, щоб отримати лідера високого рівня або обдарованого перспективного кандидата."

 tr_mt_develop_5:0 "Лідери з народу"
 tr_mt_develop_5_delayed:0 "Для лідерства немає непереборних бар'єрів — наш суворий відбір уже не відповідає сучасній ситуації, і нам слід ще більше розширити його масштаб."

 mt_leader_event.7.name:0"Спеціальна підготовка"
 mt_leader_event.7.desc:0"Кожен наш лідер потребує значних ресурсів — спершу визначимо, скількох лідерів ми будемо готувати"
 mt_leader_event.7.a:0"Підготувати 1 лідера"
 mt_leader_event.7.b:0"Підготувати 2 лідерів"
 mt_leader_event.7.c:0"Підготувати 3 лідерів"
 mt_leader_event.7.d:0"Підготувати 4 лідерів"
 mt_leader_event.7.e:0"Підготувати 5 лідерів"
 mt_leader_event.7.f:0"Підготувати 6 лідерів"
