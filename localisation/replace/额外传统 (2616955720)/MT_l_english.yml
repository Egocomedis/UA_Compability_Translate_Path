l_english:
#Виробнича реформа
tradition_mt_produce:"Виробнича реформа"
 tradition_mt_produce_desc:"Ми переосмислимо спосіб виробництва, щоб значно підвищити ефективність — це неминучий шлях."
 tr_mt_produce_adopt_desc: "Розпочинає §Yситуацію§!, пов'язану з виробничою реформою."

 tr_mt_produce_adopt:"Традиція виробничої реформи"
 tr_mt_produce_finish:0 "Традицію виробничої реформи завершено"
 tr_mt_produce_finish_effects: "\n§HПід час виробничої реформи§!\nШвидкість ситуації: §G+25%§!\n\n§SПісля виробничої реформи§!\n$mod_planet_jobs_produces_mult$: §G+5%§!\n$MOD_COUNTRY_ASCENSION_PERKS_ADD$: §G+1§!"

 tr_mt_produce_1:0 "Згуртована співпраця"
 tr_mt_produce_1_delayed:0 "Раніше робота надто зосереджувалась на розподілі праці, нехтуючи, а то й ігноруючи співпрацю; тепер ми переосмислимо виробничу систему, щоб усі працювали як одне ціле."
 tr_mt_produce_1_effects: "\n§HПід час виробничої реформи§!\nШвидкість ситуації: §G+5%§!\n\n§SПісля виробничої реформи§!\n$mod_planet_jobs_unity_produces_mult$: §G+25%§!"

 tr_mt_produce_2:0 "Далекоглядність"
 tr_mt_produce_2_delayed:0 "Виробництво без чіткої мети — марна праця; ми реформуємо всю адміністративну систему, складаючи довгострокові плани з ширшим поглядом на майбутнє — це втримає нас на правильному шляху."
 tr_mt_produce_2_effects: "\n§HПід час виробничої реформи§!\nШвидкість ситуації: §G+5%§!\n\n§SПісля виробничої реформи§!\n$mod_country_influence_produces_mult$: §G+25%§!"

 tr_mt_produce_3:0 "Ефективне виробництво"
 tr_mt_produce_3_delayed:0 "Раніше технічний прогрес завжди вибірково оновлював обладнання; тепер ми активно прискоримо поширення нових технологій, щоб вони приносили користь усім посадам."
 tr_mt_produce_3_effects: "\n§HПід час виробничої реформи§!\nШвидкість ситуації: §G+5%§!\n\n§SПісля виробничої реформи§!\n$mod_planet_jobs_produces_mult$: §G+5%§!"

 tr_mt_produce_4:0 "Точне виробництво"
 tr_mt_produce_4_delayed:0 "Раніше ми надто цінували варварську масштабну експансію, але тепер ситуація змінилась — високоточне обладнання дозволяє нам зосередитись на витонченіших методах виробництва."
 tr_mt_produce_4_effects: "\n§HПід час виробничої реформи§!\nШвидкість ситуації: §G+5%§!\n\n§SПісля виробничої реформи§!\n$mod_planet_jobs_rare_crystals_produces_mult$: §G+25%§!\n$mod_planet_jobs_exotic_gases_produces_mult$: §G+25%§!\n$mod_planet_jobs_volatile_motes_produces_mult$: §G+25%§!"

 tr_mt_produce_5:0 "Самодостатність"
 tr_mt_produce_5_delayed:0 "Кожна посада здатна задовольнити власні потреби — нам залишається лише розумно розподілити ресурси."
 tr_mt_produce_5_effects: "\n§HПід час виробничої реформи§!\nШвидкість ситуації: §G+5%§!\n\n§SПісля виробничої реформи§!\n$mod_planet_jobs_upkeep_mult$: §G-25%§!"

 situation_mt_produce: "Виробнича реформа"
 situation_mt_produce_outcome: "Виробнича реформа"
 situation_mt_produce_desc: "Стрибок від планетарної до космічної ери означає, що нам доведеться докласти чимало зусиль, щоб реформувати всю виробничу систему"
 situation_mt_produce_monthly_change_tooltip: "Завдяки централізованому плануванню ми зрештою здійснимо всебічну реформу виробництва."
 stage_mt_produce_effects: "Завдяки централізованому плануванню ми зрештою здійснимо всебічну реформу виробництва."
