#Енергетика
tradition_mt_electric:"Енергетика"
 tradition_mt_electric_desc:"Енергокредити — життєва артерія держави; ми маємо підвищити кваліфікацію та статус техніків, щоб відповідати вимогам епохи."

 tr_mt_electric_adopt:"Традиція енергетики"
 tr_mt_electric_finish:0 "Традицію енергетики завершено"

 tr_mt_electric_1:0 "Енергетичне оновлення"
 tr_mt_electric_1_delayed:0 "Нові технології створюють нове обладнання — навіть без якісних змін персоналу наш видобуток значно зростає."

 tr_mt_electric_2:0 "Розширення електростанцій"
 tr_mt_electric_2_delayed:0 "Наявні виробничі потужності не задовольняють наші потреби — нашому народу потрібно більше посад, а державі — більше енергокредитів."

 tr_mt_electric_3:0 "Підготовка техніків"
 tr_mt_electric_3_delayed:0 "Техніки цілком здатні виконувати більше завдань — для цього потрібне спеціалізоване навчання, що розширить їхнє мислення."

 tr_mt_electric_4:0 "Фізичні експерименти"
 tr_mt_electric_4_delayed:0 "У процесі виробництва електроенергії можна проводити нескладні фізичні експерименти — наші елітні техніки цілком здатні впоратись із цим завданням."

 tr_mt_electric_5:0 "Дослідницька електростанція"
 tr_mt_electric_5_delayed:0 "Стара електростанція виробляла лише енергокредити, що є очевидним марнотратством — після модернізації вона цілком може стати спеціальною фізичною лабораторією."

#Гірнича справа
tradition_mt_mining:"Гірнича справа"
 tradition_mt_mining_desc:"Ресурси під поверхнею перевершують наші уявлення — конче необхідно реформувати гірничу справу, щоб максимально розкрити ці скарби."

 tr_mt_mining_adopt:"Традиція гірничої справи"
 tr_mt_mining_finish:0 "Традицію гірничої справи завершено"

 tr_mt_mining_1:0 "Глибокі мінерали"
 tr_mt_mining_1_delayed:0 "Наші бури можуть заглибитись значно далі — дедалі більше мінералів видобувається."

 tr_mt_mining_2:0 "Високоякісні мінерали"
 tr_mt_mining_2_delayed:0 "Під поверхнею приховані мінерали надзвичайно високої якості — їх можна виплавляти на сплави прямо на місці."

 tr_mt_mining_3:0 "Точна робота"
 tr_mt_mining_3_delayed:0 "Рідкісні ресурси часто ховаються в дрібних мінералах — ретельніший видобуток дозволить знайти ці скарби."

 tr_mt_mining_4:0 "Практика на місці"
 tr_mt_mining_4_delayed:0 "Міцна руда має різну пластичність, а самі шахтарі також можуть виконувати певні експериментальні завдання."

 tr_mt_mining_5:0 "Величезні заводи"
 tr_mt_mining_5_delayed:0 "Наші шахти стають дедалі більшими, а заводи — дедалі фантастичнішими: окрім базового видобутку, вони можуть виконувати й інженерні дослідження."

 mod_planet_miners_rare_crystals_produces_add:0"£rare_crystals£ $rare_crystals$ від £job_miner£ [GetMinerPlural]"
 mod_planet_miners_exotic_gases_produces_add:0"£exotic_gases£ $exotic_gases$ від £job_miner£ [GetMinerPlural]"
 mod_planet_miners_volatile_motes_produces_add:0"£volatile_motes£ $volatile_motes$ від £job_miner£ [GetMinerPlural]"

#Сільське господарство
tradition_mt_agricultural:"Сільське господарство"
 tradition_mt_agricultural_desc:"Народ живе їжею — це непорушна істина, принаймні наразі це справді так."

 tr_mt_agricultural_adopt:"Традиція сільського господарства"
 tr_mt_agricultural_finish:0 "Традицію сільського господарства завершено"

 tr_mt_agricultural_1:0 "Ефективне виробництво"
 tr_mt_agricultural_1_delayed:0 "Сучасні технології переосмислять спосіб вирощування врожаю — це значно підвищить нашу ефективність."

 tr_mt_agricultural_2:0 "Високоврожайні культури"
 tr_mt_agricultural_2_delayed:0 "Завдяки генним технологіям ми можемо вільно визначати форму сільськогосподарських культур, безперервно забезпечуючи нас їжею."

 tr_mt_agricultural_3:0 "Піднесення понад буденне"
 tr_mt_agricultural_3_delayed:0 "Це прекрасна епоха, де природа й людина досконало злилися воєдино — кожен фермер став видатним філософом."

 tr_mt_agricultural_4:0 "Технологія гібридизації"
 tr_mt_agricultural_4_delayed:0 "Яке обладнання нам потрібне, які технології нам потрібні — фермери на полях знають це найкраще."

 tr_mt_agricultural_5:0 "Природне мислення"
 tr_mt_agricultural_5_delayed:0 "Колись ми прагнули підкорити природу, а тепер розуміємо: природу не треба підкоряти — ми з нею одне ціле."

#Реліквії
tradition_mt_relic:"Реліквії"
 tradition_mt_relic_desc:"Задовго до того, як наша цивілізація почала досліджувати космос, у цьому всесвіті вже існували незліченні першопрохідці — вони залишили безліч реліквій, що приховують безмежні знання."

 tr_mt_relic_adopt:"Традиція реліквій"
 tr_mt_relic_finish:0 "Традицію реліквій завершено"

 tr_mt_relic_1:0 "Загальнонародний огляд"
 tr_mt_relic_1_delayed:0 "Реліквії не повинні пилюжитись на полицях — кожен може оглянути їх, насолодитись їхньою красою й відчути велич цивілізації першопрохідців."
 tr_mt_relic_1_desc:0"§MРозблоковує дію з реліквіями:§! Загальнонародний огляд.\n§LВикористовує §Yрідкісні реліквії§! для підвищення щастя громадян.§!"

 tr_mt_relic_2:0 "Гучна виставка"
 tr_mt_relic_2_delayed:0 "За кожною реліквією стоїть історія — надихаюча чи застережлива; нам слід оприлюднювати ці таємниці для широкого загалу."
 tr_mt_relic_2_desc:0"§MРозблоковує дію з реліквіями:§! Гучна виставка.\n§LВикористовує §Yрідкісні реліквії§! для отримання впливу.§!"

 tr_mt_relic_3:0 "Археологічна підготовка"
 tr_mt_relic_3_delayed:0 "Археологічні розкопки вимагають вкрай точної техніки — необхідно навчити наших науковців ще до практики, щоб вони могли впоратись із будь-якими проблемами."

 tr_mt_relic_4:0 "Досвід першопрохідців"
 tr_mt_relic_4_delayed:0 "Знання, залишені першопрохідцями, приховані в реліквіях — їхнє дослідження прискорить розвиток наших власних технологій."
 tr_mt_relic_4_desc:0"§MРозблоковує дію з реліквіями:§! Досвід першопрохідців.\n§LВикористовує §Yрідкісні реліквії§! для підвищення швидкості дослідження.§!"

 tr_mt_relic_5:0 "Глибоке дослідження"
 tr_mt_relic_5_delayed:0 "Колись ми вкрай недбало досліджували планети — можливо, пропустили чимало руїн; тепер ми можемо організувати добре оснащені загони для глибшого дослідження в надії знайти можливі рештки."
 tr_mt_relic_5_desc:0"§HРозблоковує планетарний указ:§! Глибоке дослідження.\n§LРозпочинає глибоке обстеження планети в пошуках археологічних руїн. Зауважте: не на кожній планеті можна знайти руїни.§!"

 decision_mt_relic:0"Глибоке дослідження"
 decision_mt_relic_desc:0"Організовує персонал для пошуку археологічних руїн!"

 artifact_mt_appreciation:0"Загальнонародний огляд"
 artifact_mt_appreciation_desc:0"Наші реліквії варто показати всьому народу"
 modifiers_mt_appreciation_cooldown:0"Загальнонародний огляд"
 requires_mt_appreciation_no_cooldown:0"Загальнонародний огляд на відновленні"
 artifact_mt_appreciation_effect:0"Протягом десяти років щастя громадян: §G+5%§!"

 artifact_mt_exhibition:0"Гучна виставка"
 artifact_mt_exhibition_desc:0"Кожен має знати історію, приховану за реліквіями — і закордонні друзі також"
 modifiers_mt_exhibition_cooldown:0"Гучна виставка"
 requires_mt_exhibition_no_cooldown:0"Гучна виставка на відновленні"
 artifact_mt_exhibition_effect:0"Протягом десяти років вплив: §G+10%§!"

 artifact_mt_experience:0"Досвід першопрохідців"
 artifact_mt_experience_desc:0"Глибше розкриття таємниць реліквій може прискорити наші дослідження"
 modifiers_mt_experience_cooldown:0"Досвід першопрохідців"
 requires_mt_experience_no_cooldown:0"Досвід першопрохідців на відновленні"
 artifact_mt_experience_effect:0"Протягом десяти років швидкість дослідження: §G+30%§!"

#Грандіозні задуми
tradition_mt_fancies:"Грандіозні задуми"
 tradition_mt_fancies_desc:"Космічне середовище цілковито відрізняється від поверхні планети — воно здатне втілити найшаленіші ідеї наших конструкторів."

 tr_mt_fancies_adopt:"Традиція грандіозних задумів"
 tr_mt_fancies_finish:0 "Традицію грандіозних задумів завершено"

 tr_mt_fancies_1:0 "Шалений дизайн"
 tr_mt_fancies_1_delayed:0 "Металеві матеріали й генна інженерія не такі вже й різні — ми можемо проєктувати за надзвичайно витонченими концепціями."

 tr_mt_fancies_2:0 "Рідкісні сплави"
 tr_mt_fancies_2_delayed:0 "Мегаспоруди потребують ефективніших сплавів — наше найпередовіше обладнання впоралось із їх виплавкою."

 tr_mt_fancies_3:0 "Система контролю"
 tr_mt_fancies_3_delayed:0 "Мегаспоруди потребують безперервного спостереження, щоб запобігти будь-яким можливим помилкам; заразом ми також перевіряємо відповідний персонал."

 tr_mt_fancies_4:0 "Модульне будівництво"
 tr_mt_fancies_4_delayed:0 "Сучасна технологія будівництва дозволяє вести виробництво паралельно кількома лініями, готуючи початкові матеріали у формі модулів і збираючи їх майже автоматично."

 tr_mt_fancies_5:0 "Загальне захоплення"
 tr_mt_fancies_5_delayed:0 "Увесь народ вітає мегаспоруди — усі прагнуть підкорити цей всесвіт грандіозними інженерними звершеннями."

 mod_megastructures_alloys_cost_mult:0"Вартість £alloys£ §Hсплавів§! для мегаспоруд"
 mod_megastructures_produces_mult:0"§HВидобуток§! мегаспоруд"
 mod_megastructures_influence_cost_mult:0"Вартість £influence£ §Hвпливу§! для мегаспоруд"
 mod_megastructures_unity_cost_mult:0"Вартість £unity£ §Hєдності§! для мегаспоруд"

#Сухопутні війська
tradition_mt_army:"Сухопутні війська"
 tradition_mt_army_desc:"Ми захищатимемо батьківщину силою зброї, гарантуючи, що наш народ не зазнає жодної шкоди."

 tr_mt_army_adopt:"Традиція сухопутних військ"
 tr_mt_army_finish:0 "Традицію сухопутних військ завершено"

 tr_mt_army_1:0 "Військова академія"
 tr_mt_army_1_delayed:0 "Недосвідчені люди не впораються із сучасною війною — заснування спеціалізованої академії дозволить виховати справжніх військових фахівців."

 tr_mt_army_2:0 "Посилення спорядження"
 tr_mt_army_2_delayed:0 "Головний чинник перемоги у війні — люди, але якісне спорядження також необхідне."

 tr_mt_army_3:0 "Тверда віра"
 tr_mt_army_3_delayed:0 "Армія без віри нічим не відрізняється від зграї бандитів — наші солдати мають мати тверду й чітку віру, завжди йдучи правильним шляхом."

 tr_mt_army_4:0 "Взаємодія загонів"
 tr_mt_army_4_delayed:0 "Навіть у масштабних бойових діях необхідна взаємодія всередині загонів і між ними — це значно підвищить нашу бойову міць."

 tr_mt_army_5:0 "Загальна військова повинність"
 tr_mt_army_5_delayed:0 "Широке впровадження ополчення та політики демобілізації забезпечить нам стійку військову базу, завжди готову протистояти можливій кризі."

#Столиця
job_elitetechnician:0 "Елітний технік"
 job_elitetechnician_plural:0 "Елітні техніки"
 job_elitetechnician_desc:0 "Електростанції потребують чимало персоналу для керування обладнанням і контролю за його роботою."
 job_elitetechnician_effect_desc:0 "£job_elitetechnician£ $job_elitetechnician_plural$ виробляють £energy£ §Y$energy$§!"
 mod_job_elitetechnician_add:0 "Посади $job_elitetechnician$"
 mod_job_elitetechnician_per_pop:0 "На кожні $VALUE$ поселенців §G+1§! посада $job_elitetechnician$"
 mod_job_elitetechnician_per_pop_short:0 "\nНа кожні $VALUE$ £pop£ §G+1§! £mod_job_elitetechnician_add£ "

 job_eliteminer:0 "Елітний шахтар"
 job_eliteminer_plural:0 "Елітні шахтарі"
 job_eliteminer_desc:0 "Завдяки сучасним електричним бурам та іншим високотехнологічним інструментам видобуток руди вже не та виснажлива фізична праця, що раніше, — але легкою її теж не назвеш."
 job_eliteminer_effect_desc:0 "£job_eliteminer£ $job_eliteminer_plural$ виробляють £minerals£ §Y$minerals$§!"
 mod_job_eliteminer_add:0 "Посади $job_eliteminer$"
 mod_job_eliteminer_per_pop:0 "На кожні $VALUE$ поселенців §G+1§! посада $job_eliteminer$"
 mod_job_eliteminer_per_pop_short:0 "\nНа кожні $VALUE$ £pop£ §G+1§! £mod_job_eliteminer_add£ "

 job_elitefarmer:0 "Елітний фермер"
 job_elitefarmer_plural:0 "Елітні фермери"
 job_elitefarmer_desc:0 "Лише піднявшись зі зручного крісла й попрацювавши на кукурудзяному полі, зрозумієш, наскільки важке сільське господарство."
 job_elitefarmer_effect_desc:0 "£job_elitefarmer£ $job_elitefarmer_plural$ виробляють £food£ §Y$food$§!"
 mod_job_elitefarmer_add:0 "Посади $job_elitefarmer$"
