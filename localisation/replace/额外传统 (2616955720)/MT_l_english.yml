#Укази
tradition_mt_writ:"Укази"
 tradition_mt_writ_desc:"Лише ефективний уряд здатний вести народ крізь це небезпечне зоряне небо, не зламавшись."

 tr_mt_writ_adopt:"Традиція указів"
 tr_mt_writ_finish:0 "Традицію указів завершено"
 tr_mt_writ_finish_desc:0"§HРозблоковує укази:§! «Простір без меж» і «Величні звершення», з акцентом на військову справу та економіку відповідно"

 tr_mt_writ_1:0 "Система підготовки"
 tr_mt_writ_1_delayed:0 "Раніше пошук адміністративних талантів був наче голкою в копиці сіна, але тепер ми можемо систематизувати досвід — завдяки спеціалізованій підготовці навіть нерозумна мавпа зможе долучитись до адміністративного управління."

 tr_mt_writ_2:0 "Розумна адміністрація"
 tr_mt_writ_2_delayed:0 "Технічний прогрес змінив усе — можливо, одного дня ми зможемо повністю довірити політику роботам."

 tr_mt_writ_3:0 "Гнучкі установи"
 tr_mt_writ_3_delayed:0 "Кожен відділ має конкретні обов'язки, але чи справді потрібно стільки бюрократичних процедур у реальній роботі?"

 tr_mt_writ_4:0 "Спрощена система"
 tr_mt_writ_4_delayed:0 "Неважливо, скільки людей просиджують посади без діла, — відтепер їх більше не буде."

 tr_mt_writ_5:0 "Широке визнання"
 tr_mt_writ_5_delayed:0 "Коли народ цілковито довіряє уряду, влада досягає безпрецедентних висот — і має нести відповідно більшу відповідальність."

edict_mt_greatfleet:0"Традиція указів: Простір без меж"
 edict_mt_greatfleet_desc:0"Дальність гармат визначає межі істини, а наш флот цілком здатен проєктувати силу на весь простір."
 edict_mt_majestic:0"Традиція указів: Величні звершення"
 edict_mt_majestic_desc:0"Грандіозна архітектура та процвітаюча економіка — запорука нашої державної потуги та основа довгострокового планування."

#Мініатюризація
set_mt_smallarc:0"Мініатюрний дуговий випромінювач"
 set_mt_smallarc_DESC:0"Експериментальний дуговий випромінювач — і потужність, і дальність значно нижчі за звичайну дугу, але його можна встановити на менші кораблі."
 template_mt_smallarc:0"Крихітний дуговий випромінювач"
 template_mt_mediumarc:0"Малий дуговий випромінювач"
 set_mt_smalllance:0"Мініатюрне світлове списо"
 set_mt_smalllance_DESC:0"Експериментальне світлове списо — і потужність, і дальність значно нижчі за звичайне, але його можна встановити на менші кораблі."
 template_mt_smalllance:0"Крихітне світлове списо"
 template_mt_mediumlance:0"Мале світлове списо"
 set_mt_brilliantarc:0"Осяйний енергетичний випромінювач"
 set_mt_brilliantarc_DESC:0"Потужна енергетична зброя з сяючим світлом — і потужність, і пробивна здатність надзвичайні."
 template_mt_brilliantarc:0"Осяйний енергетичний випромінювач"

tradition_mt_smallarms:"Мініатюризація"
 tradition_mt_smallarms_desc:"Науковці висунули сміливу гіпотезу: нашу потужну зброю можна зробити меншою й точнішою — це не лише дозволить малим кораблям носити спеціальну зброю, а й ефективно прискорить розробку великої зброї."

 tr_mt_smallarms_adopt:"Традиція мініатюризації"
 tr_mt_smallarms_finish:0 "Традицію мініатюризації завершено"

 tr_mt_smallarms_1:0 "Експерименти з мініатюризації"
 tr_mt_smallarms_1_delayed:0 "Ми повинні розпочати дослідження мініатюризації великої зброї — дуги, списа — і повністю осягнути та підкорити їхню силу."

 tr_mt_smallarms_2:0 "Крихітний дуговий випромінювач"
 tr_mt_smallarms_2_delayed:0 "Найменша можлива версія дугового випромінювача, яку може нести навіть корвет — вінець наукової думки."

 tr_mt_smallarms_3:0 "Малий дуговий випромінювач"
 tr_mt_smallarms_3_delayed:0 "Спершу зменшити, потім збільшити — ми готові зробити наступний крок, трохи збільшивши мініатюрну версію дуги."

 tr_mt_smallarms_4:0 "Крихітне світлове списо"
 tr_mt_smallarms_4_delayed:0 "Найменша можлива версія світлового списа, яку може нести навіть корвет — вінець наукової думки."

 tr_mt_smallarms_5:0 "Мале світлове списо"
 tr_mt_smallarms_5_delayed:0 "Спершу зменшити, потім збільшити — ми готові зробити наступний крок, трохи збільшивши мініатюрну версію списа."

tech_mt_s_smallarc:0"Крихітний дуговий випромінювач"
 tech_mt_s_smallarc_desc:0"Найменша можлива версія дугового випромінювача, яку можна встановити на найдрібніші кораблі — вихідна потужність, можливо, не досягає рівня справжньої дуги, але це відображає наш науковий прогрес."
 tech_mt_m_smallarc:0"Малий дуговий випромінювач"
 tech_mt_m_smallarc_desc:0"Мініатюризувавши дуговий випромінювач, ми спробували знову збільшити його — мала версія є саме таким експериментом."
tech_mt_s_smalllance:0"Крихітне світлове списо"
 tech_mt_s_smalllance_desc:0"Потужне світлове списо здатне знищити все — озброївши ним якнайбільше кораблів, ми здобудемо жахливу бойову міць."
 tech_mt_m_smalllance:0"Мале світлове списо"
 tech_mt_m_smalllance_desc:0"Наш науковий рівень дозволяє не лише зменшувати світлове списо, а й перепроєктовувати та розробляти його заново, намагаючись розкрити справжню силу зброї — мала версія є важливою віхою на цьому шляху."
tech_mt_x_smallarc:0"Осяйний енергетичний випромінювач"
 tech_mt_x_smallarc_desc:0"Потужна енергетична зброя з сяючим світлом — і потужність, і пробивна здатність надзвичайні."

#Мілітаристська традиція
tradition_mt_exmilitarism:"Мілітаристська традиція"
 tradition_mt_exmilitarism_desc:"У цьому безжальному глибокому космосі ніщо не має такої ваги в переговорах, як сила зброї."

 tr_mt_exmilitarism_adopt:"Мілітаристська традиція"
 tr_mt_exmilitarism_finish:0 "Мілітаристську традицію завершено"

 tr_mt_exmilitarism_1:0 "Спеціалізація проти щитів"
 tr_mt_exmilitarism_1_delayed:0 "Щити кораблів надзвичайно ефективно захищають корпус — щоб потопити ворожий корабель, спершу треба зруйнувати захист щита."

 tr_mt_exmilitarism_2:0 "Спеціалізація проти броні"
 tr_mt_exmilitarism_2_delayed:0 "Руйнуючи щит, ми маємо також враховувати броню ворожого корабля — необхідно пробити броню, щоб завдати шкоди корпусу."

 tr_mt_exmilitarism_3:0 "Посилення щитів"
 tr_mt_exmilitarism_3_delayed:0 "Історія досліджень щитів не така вже й довга, але вони — улюблениця міжзоряних воєн, і ми не можемо відставати."

 tr_mt_exmilitarism_4:0 "Посилення броні"
 tr_mt_exmilitarism_4_delayed:0 "Броня корабля відображає глибину досліджень держави в матеріалознавстві — хай там як, ми не можемо відставати."

 tr_mt_exmilitarism_5:0 "Дослідження корпусу"
 tr_mt_exmilitarism_5_delayed:0 "Корпус військового корабля — найважливіша гарантія, останній рубіж оборони корабля."

#Ксенофобська традиція
tradition_mt_exxenophobe:"Ксенофобська традиція"
 tradition_mt_exxenophobe_desc:"Лише зберігаючи чистоту, тримаючись за справжню сутність і залишаючись відданими світу, що виплекав нашу цивілізацію, ми зможемо вберегтись від тлетворних чужинських змов."

 tr_mt_exxenophobe_adopt:"Ксенофобська традиція"
 tr_mt_exxenophobe_finish:0 "Ксенофобську традицію завершено"

 tr_mt_exxenophobe_1:0 "Експансіонізм"
 tr_mt_exxenophobe_1_delayed:0 "Виживання — головний пріоритет цивілізації, тому нам потрібно зайняти весь всесвіт, не проминувши жодної зорі."

 tr_mt_exxenophobe_2:0 "Багато дітей — велике щастя"
 tr_mt_exxenophobe_2_delayed:0 "Для збереження нашої переваги потрібне достатнє населення — заради цього можна вдатись до певних наукових технологій."

 tr_mt_exxenophobe_3:0 "Широке заселення"
 tr_mt_exxenophobe_3_delayed:0 "За межами батьківщини лежить набагато ширший світ — ми маємо першими зайняти його, вкривши нові світи нашим народом."

 tr_mt_exxenophobe_4:0 "Підтримка чисельності"
 tr_mt_exxenophobe_4_delayed:0 "Дедалі більше людей охоче вирушає на прикордоння — ми маємо надавати достатню підтримку, щоб кожна територія мала достатньо громадян."

 tr_mt_exxenophobe_5:0 "Піднебесна імперія"
 tr_mt_exxenophobe_5_delayed:0 "Не потрібне ні спілкування, ні торгівля — усьому всесвіту досить лише однієї нашої держави."

#Егалітарна традиція
tradition_mt_exegalitarian:"Егалітарна традиція"
 tradition_mt_exegalitarian_desc:"Суспільство, що не зважає на потреби й інтереси всіх своїх членів, — не суспільство, а злочинне угруповання."

 tr_mt_exegalitarian_adopt:"Егалітарна традиція"
 tr_mt_exegalitarian_finish:0 "Егалітарну традицію завершено"

 tr_mt_exegalitarian_1:0 "Спільне процвітання"
 tr_mt_exegalitarian_1_delayed:0 "Сильна держава — заможний народ; усі купаються у славі могутньої держави."

 tr_mt_exegalitarian_2:0 "Соціальний ліфт"
 tr_mt_exegalitarian_2_delayed:0 "У нас чіткий шлях до успіху, що надихає народ прагнути більшого — це наповнює все суспільство енергією."

 tr_mt_exegalitarian_3:0 "Рівність професій"
 tr_mt_exegalitarian_3_delayed:0 "Різні професії відрізняються лише змістом роботи, а не статусом."

 tr_mt_exegalitarian_4:0 "Соціальна держава"
 tr_mt_exegalitarian_4_delayed:0 "Щоб підтримувати рівень життя народу та рушійну силу всього суспільства, уряд повинен безпосередньо втручатись у розподіл суспільних ресурсів."
 tr_mt_exegalitarian_4_desc:0"§HРозблоковує політику:§! Загальний рівень соціального забезпечення.\n§LКоригує щастя та видобуток ресурсів залежно від державних вкладень.§!"

 tr_mt_exegalitarian_5:0 "Стабільне суспільство"
 tr_mt_exegalitarian_5_delayed:0 "Наше суспільство досягло безпрецедентного морального й соціального рівня забезпечення — це привело все суспільство до безпрецедентної стабільності."

 policy_policy_mt_welfare:0"Загальний рівень соціального забезпечення"
 policy_policy_mt_welfare_desc:0"Обирає рівень соціального забезпечення всього нашого суспільства"
 policy_mt_welfare.1:0"Пропаганда"
 policy_mt_welfare.2:0"Мінімальна допомога"
 policy_mt_welfare.3:0"Базова допомога"
 policy_mt_welfare.4:0"Базове соціальне забезпечення"
 policy_mt_welfare.5:0"Загальне соціальне забезпечення"
 policy_mt_welfare.6:0"Утопія"
 policy_mt_welfare.1_desc:0"У нас немає можливості впровадити соціальну політику, але принаймні ми можемо вести пропаганду.\n\n"
 policy_mt_welfare.2_desc:0"Лише громадяни на межі суспільного краху можуть отримати державну допомогу.\n\n"
 policy_mt_welfare.3_desc:0"Коли громадянин потрапляє у скрутне становище, держава зобов'язана йому допомогти.\n\n"
 policy_mt_welfare.4_desc:0"Кожен, хто відповідає критеріям, може отримувати соціальні виплати.\n\n"
 policy_mt_welfare.5_desc:0"Усі користуються соціальним забезпеченням.\n\n"
 policy_mt_welfare.6_desc:0"Усі користуються безпрецедентним рівнем забезпечення — це необхідна умова для досягнення утопії.\n\n"

#Матеріалістична традиція
tradition_mt_exmaterialist:"Матеріалістична традиція"
 tradition_mt_exmaterialist_desc:"Хоч це й жорстоко, ми повинні подорослішати й відкинути застарілі моральні уявлення."

 tr_mt_exmaterialist_adopt:"Матеріалістична традиція"
 tr_mt_exmaterialist_finish:0 "Матеріалістичну традицію завершено"

 tr_mt_exmaterialist_1:0 "Масове виробництво"
 tr_mt_exmaterialist_1_delayed:0 "Роботи — важлива частина нашого суспільства, і що їх більше, то краще."

 tr_mt_exmaterialist_2:0 "Майстер модифікацій"
 tr_mt_exmaterialist_2_delayed:0 "Згуртованість, точність, досконалість — що ж таке найкращий робот?"

 tr_mt_exmaterialist_3:0 "Нове мислення"
 tr_mt_exmaterialist_3_delayed:0 "Дослідження штучного інтелекту надихнуло нашу думку, дозволивши поглянути на проблеми цілком по-новому."

 tr_mt_exmaterialist_4:0 "Цінність практики"
 tr_mt_exmaterialist_4_delayed:0 "З практики виходимо, до практики повертаємось."

 tr_mt_exmaterialist_5:0 "Оновлення теорії"
 tr_mt_exmaterialist_5_delayed:0 "Лише теорія, що постійно оновлюється, — правильна теорія."

#Пацифістська традиція
tradition_mt_expacifist:"Пацифістська традиція"
 tradition_mt_expacifist_desc:"Як втілення цивілізації, ми переконані: сила зброї не здатна розв'язати жодної проблеми."

 tr_mt_expacifist_adopt:"Пацифістська традиція"
 tr_mt_expacifist_finish:0 "Пацифістську традицію завершено"

 tr_mt_expacifist_1:0 "Прикордонні переговори"
 tr_mt_expacifist_1_delayed:0 "Прикордонні переговори з сусідніми державами допоможуть розв'язати суперечки між двома країнами."

 tr_mt_expacifist_2:0 "Переговорна команда"
 tr_mt_expacifist_2_delayed:0 "Нам потрібно більше й краще підготованих посланців для виконання дедалі складніших дипломатичних завдань."

 tr_mt_expacifist_3:0 "Гармонійне суспільство"
 tr_mt_expacifist_3_delayed:0 "Усе суспільство надзвичайно гармонійне — насильство й злочинність практично зникли."

 tr_mt_expacifist_4:0 "Мирне співіснування"
 tr_mt_expacifist_4_delayed:0 "У стосунках з іншими державами слід цінувати мир, докладаючи всіх зусиль, щоб уникнути збройного зіткнення."

 tr_mt_expacifist_5:0 "Спокій духу"
 tr_mt_expacifist_5_delayed:0 "Наш народ має майже святий моральний рівень, здатний спокійно сприймати все суще."

#Ксенофільська традиція
tradition_mt_exxenophile:"Ксенофільська традиція"
 tradition_mt_exxenophile_desc:"Дорога зірок довга, але ми ніколи не самотні."

 tr_mt_exxenophile_adopt:"Ксенофільська традиція"
 tr_mt_exxenophile_finish:0 "Ксенофільську традицію завершено"

 tr_mt_exxenophile_1:0 "Ефективне спілкування"
 tr_mt_exxenophile_1_delayed:0 "Ми повинні ставитись до інших зі скромністю, щоб обидві сторони могли повноцінно обмінятись думками."

 tr_mt_exxenophile_2:0 "Красномовність"
 tr_mt_exxenophile_2_delayed:0 "Кваліфікація наших посланців бездоганна — вони найвидатніші дипломати."

 tr_mt_exxenophile_3:0 "Міжнародне посередництво"
 tr_mt_exxenophile_3_delayed:0 "Якщо ми можемо навести мости для інших держав — чому б і ні?"
 tr_mt_exxenophile_3_desc:0"Посланець, що §Yпокращує стосунки§!, щомісяця має §G1%§! шанс отримати 200 £influence£§Yвпливу§!."

 tr_mt_exxenophile_4:0 "Посланець великої держави"
 tr_mt_exxenophile_4_delayed:0 "За посланцем стоїть могутня держава — будь-яке мирне спілкування відбувається під його потужним стримувальним впливом."
 tr_mt_exxenophile_4_desc:0"Посланець, що §Yпокращує стосунки§!, щомісяця має §G1%§! шанс отримати §Yдипломатичну підтримку§!."

 tr_mt_exxenophile_5:0 "Дії великої держави"
 tr_mt_exxenophile_5_delayed:0 "Ми маємо і можливості, і рішучість сяяти на всій міжзоряній сцені."
 tr_mt_exxenophile_5_desc:0"Посланець, що §Yпокращує стосунки§!, щомісяця має §G1%§! шанс отримати £unity£§Yєдність§! у розмірі 24-місячного видобутку."

 MESSAGE_ENVOY_IMPROVE_GAIN_TITLE:0"Посланець досяг значного успіху"
 MESSAGE_mt_country_event_1_DESC:0 "Посланець сприяв успішному проведенню багатосторонньої дипломатії, прославивши нашу державу — за це ми отримали £influence£§Yвплив§!."
 MESSAGE_mt_country_event_2_DESC:0 "Посланець допоміг іншій державі розв'язати проблему — за це ми отримали §Yдипломатичну підтримку§! від $WHO|Y$."
 MESSAGE_mt_country_event_3_DESC:0 "Посланець представив нашу державу в міжнародних справах, надихнувши наш народ, — за це ми отримали £unity£§Yєдність§! у розмірі 24-місячного видобутку."

#Авторитарна традиція
tradition_mt_exauthoritarian:"Авторитарна традиція"
 tradition_mt_exauthoritarian_desc:"Один голос, одна влада, одна держава."

 tr_mt_exauthoritarian_adopt:"Авторитарна традиція"
