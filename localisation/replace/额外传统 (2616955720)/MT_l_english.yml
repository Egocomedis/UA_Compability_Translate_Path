#Спіритуалістична традиція
tradition_mt_exspiritualist:"Спіритуалістична традиція"
 tradition_mt_exspiritualist_desc:"Наша наука вже довела: свідомість — батько реальності."

 tr_mt_exspiritualist_adopt:"Спіритуалістична традиція"
 tr_mt_exspiritualist_finish:0 "Спіритуалістичну традицію завершено"

 tr_mt_exspiritualist_1:0 "Медитація"
 tr_mt_exspiritualist_1_delayed:0 "Наш народ безперервно медитує."

 tr_mt_exspiritualist_2:0 "Схильність до роздумів"
 tr_mt_exspiritualist_2_delayed:0 "Наш народ має унікальну перевагу в мисленні — це дає нам перевагу в дослідницьких місіях."

 tr_mt_exspiritualist_3:0 "Шляхетний дух"
 tr_mt_exspiritualist_3_delayed:0 "Тривалі дослідження свідомості перетворили весь народ на філософів."

 tr_mt_exspiritualist_4:0 "Аскет"
 tr_mt_exspiritualist_4_delayed:0 "Наш народ прагне істини світу свідомості, зневажаючи матеріальні насолоди."

 tr_mt_exspiritualist_5:0 "Єдність духу і тіла"
 tr_mt_exspiritualist_5_delayed:0 "Наш народ вірить у вирішальну роль свідомості й готується до трансцендентності."

#Пошук істини
tradition_mt_seektruth:"Пошук істини"
 tradition_mt_seektruth_desc:"Пошук істини — єдиний сенс нашого існування."

 tr_mt_seektruth_adopt:"Традиція пошуку істини"
 tr_mt_seektruth_finish:0 "Традицію пошуку істини завершено"
 tr_mt_seektruth_finish_desc:0 "Завершивши дослідження, отримуємо певну кількість £energy£§Yенергокредитів§!, £minerals£§Yмінералів§! та £food£§Yїжі§!."

 tr_mt_seektruth_1:0 "Наукова одержимість"
 tr_mt_seektruth_1_delayed:0 "Дослідники виявляють тривожно палку одержимість науковими дослідженнями."

 tr_mt_seektruth_2:0 "Фізична одержимість"
 tr_mt_seektruth_2_delayed:0 "Увесь народ поринув у гранично пристрасне прагнення фізики."
 tr_mt_seektruth_2_desc:0"Завершивши дослідження, отримуємо £physics_research£§Yочки фізичних досліджень§! у розмірі 12-місячного видобутку."

 tr_mt_seektruth_3:0 "Соціологічна одержимість"
 tr_mt_seektruth_3_delayed:0 "Увесь народ поринув у гранично пристрасне прагнення соціології."
 tr_mt_seektruth_3_desc:0"Завершивши дослідження, отримуємо £society_research£§Yочки соціологічних досліджень§! у розмірі 12-місячного видобутку."

 tr_mt_seektruth_4:0 "Інженерна одержимість"
 tr_mt_seektruth_4_delayed:0 "Увесь народ поринув у гранично пристрасне прагнення інженерії."
 tr_mt_seektruth_4_desc:0"Завершивши дослідження, отримуємо £engineering_research£§Yочки інженерних досліджень§! у розмірі 12-місячного видобутку."

 tr_mt_seektruth_5:0 "Наукова хвиля"
 tr_mt_seektruth_5_delayed:0 "Прагнення істини згуртувало нас, утворивши величезну хвилю."
 tr_mt_seektruth_5_desc:0"Завершивши дослідження, отримуємо £unity£§Yєдність§! у розмірі 12-місячного видобутку."

#Космічні битви
tradition_mt_starwar:"Космічні битви"
 tradition_mt_starwar_desc:"Перемоги в космосі надзвичайно надихнули наш народ — він прагне здобувати ще більше й ще славетніших перемог."

 tr_mt_starwar_adopt:"Традиція космічних битв"
 tr_mt_starwar_finish:0 "Традицію космічних битв завершено"

 tr_mt_starwar_1:0 "Штабний план"
 tr_mt_starwar_1_delayed:0 "Наші командувачі флоту повинні бути видатними — лише так вони зможуть керувати потужним флотом."

 tr_mt_starwar_2:0 "Гартовані боєм"
 tr_mt_starwar_2_delayed:0 "Перемоги надихають нас, і ми можемо здобувати з них досвід."
 tr_mt_starwar_2_desc:0"Після перемоги в космічній битві §Yкомандувач флоту§! отримує додатково §G20§! очок §Yдосвіду§!."

 tr_mt_starwar_3:0 "Незмінний переможець"
 tr_mt_starwar_3_delayed:0 "Безперервні перемоги перетворили наших командувачів флоту на рідкісних для цього світу воєначальників."
 tr_mt_starwar_3_desc:0"Після перемоги в космічній битві §Yкомандувач флоту§! отримує або підвищує рису §YНезмінний переможець§! до максимального §G10§! рівня."

 tr_mt_starwar_4:0 "Розбирання на сплави"
 tr_mt_starwar_4_delayed:0 "У уламках ворожого флоту також приховані скарби — ми можемо їх використати."
 tr_mt_starwar_4_desc:0"Після перемоги в космічній битві отримуємо £alloys£§Yсплави§! у розмірі 6-місячного видобутку."

 tr_mt_starwar_5:0 "Розвиток успіху"
 tr_mt_starwar_5_delayed:0 "Перемоги мають йти одна за одною, не даючи ворогу перепочинку."
 tr_mt_starwar_5_desc:0"Після перемоги в космічній битві протягом наступних 6 місяців §Yшвидкострільність корабельної зброї§! підвищується на 50%."

