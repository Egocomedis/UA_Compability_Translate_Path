 mt_planet_event.3.name:0"Проєкт освоєння №1 завершено"
  mt_planet_event.3.desc:0"Проєкт освоєння №1 успішно завершено — [Root.GetName] отримала більше доступних районів.\n\nПроєкт №1 підвищив інтелект диких істот, щоб спланувати зони їхньої активності — це дозволяє додатково розширити наш простір, зберігаючи природне середовище, хоча чимало дослідників вважають підвищення інтелекту певним ризиком, особливо на цій майже досконалій планеті."
  mt_planet_event.3.a:0"Хіба тут може бути якийсь ризик?"
 mt_planet_event.4.name:0"Повстання планети мавп?"
  mt_planet_event.4.desc:0"Найновіший звіт з [Root.GetName].\n\nНаше попереднє підвищення інтелекту тварин дало несподіваний ефект — інтелект деяких істот розвивається з вражаючою швидкістю. Дослідники вважають, що досконале середовище каталізувало попереднє підвищення інтелекту, і за кілька місяців з'являться справжні розумні істоти — а якщо ми діятимемо, можна навіть прискорити цей процес.\n\nЧерез це наша дослідницька команда розкололась на два табори: одні вважають, що цих істот потрібно знищити, інші — що їм слід допомогти розвинутись і згодом прийняти їх.\n\nТепер нам потрібно вирішити їхню долю."
  mt_planet_event.4.a:0"Знищити негайно."
  mt_planet_event.4.b:0"Схоже, у нашій державі з'явився новий член."
  mt_planet_event.4.b.tooltip:0"Створює на §Y[Root.GetName]§! новий вид із §Y3 поселенцями§! й випадковими рисами."
 mt_planet_event.5.name:0"Покірний улюбленець"
  mt_planet_event.5.desc:0"Найновіший звіт з [Root.GetName].\n\nНаше попереднє підвищення інтелекту тварин дало обнадійливі результати — деякі милі на вигляд істоти почали часто взаємодіяти з нашими мешканцями. Опитування показало, що люди дуже задоволені цими милими створіннями."
  mt_planet_event.5.a:0"Це щастя для мешканців [Root.GetName]."
  mt_planet_event.5.b:0"Нам слід зробити їх домашніми улюбленцями всього народу."
 mt_planet_event.6.name:0"Дослідження різноманіття"
  mt_planet_event.6.desc:0"Найновіший звіт з [Root.GetName].\n\nНаше попереднє підвищення інтелекту тварин дало очікуваний результат — дикі істоти почали заселяти сплановані зони активності, їхня кількість і різноманітність перевершили очікування.\n\nЗа статистикою, різноманіття видів на [Root.GetName] значно перевищує інші планети, і через ідеальну екосистему воно продовжує зростати. Наші науковці вважають це чудовою нагодою для досліджень, хоча дехто побоюється, що це порушить досконалу екосистему."
  mt_planet_event.6.a:0"Тоді досліджуймо."
  mt_planet_event.6.b:0"Не можна йти на такий ризик."
 mt_planet_event.7.name:0"Незвичайна людина"
  mt_planet_event.7.desc:0"Найновіший звіт з [Root.GetName].\n\nБоже! Під час попереднього підвищення інтелекту тварин ми випадково зачепили одного з мешканців! Тепер цей громадянин, що ненавмисно потрапив під експеримент, виявляє вражаючий інтелект — здається, наші генетичні методи, розроблені для диких істот, спрацювали і на нас самих!\n\nДослідницька команда з радістю розпочала дослідження, але виявилось, що всі інші випробувані лишились без змін — схоже, ця людина просто дещо незвичайна.\n\nВона з нетерпінням чекає на завдання."
  mt_planet_event.7.a:0"Тобто ми отримали генія?"
  mt_planet_event.7.b:0"Хай керує місцевими справами."
  mt_planet_event.7.a.tooltip:0"Отримує науковця §Y5 рівня§! з усіма рисами."

 mt_planet_event.8.name:0"Проєкт освоєння №2 завершено"
  mt_planet_event.8.desc:0"Проєкт освоєння №2 успішно завершено — [Root.GetName] отримала більше доступних районів.\n\nПроєкт №2 розширив простір за рахунок будівництва летючих міст — для збереження природного вигляду ці міста спроєктовані спеціально, щоб органічно вписатись у досконале середовище."
  mt_planet_event.8.a:0"Чудово."
 mt_planet_event.9.name:0"Туристична принада"
  mt_planet_event.9.desc:0"Летючі міста, збудовані за проєктом №2, стали несподівано популярними — туристи з усієї держави в захваті від них, але місцеві мешканці незадоволені дедалі більшою кількістю відвідувачів."
  mt_planet_event.9.a:0"Це не привілей для когось окремого."
  mt_planet_event.9.b:0"Ми повинні задовольнити вимоги місцевих мешканців."
 mt_planet_event.10.name:0"Дивовижна ідея"
  mt_planet_event.10.desc:0"Інженерна команда проєкту №2 повідомила про важливий випадок: один з інженерів, схоже, таємно змінив креслення, через що кінцевий результат значно відрізнявся від запланованого.\n\nОднак після певного часу перевірки команда виявила, що змінені частини виявились доцільнішими — дещо здавалось фантастичним, але після ретельного вивчення все стало зрозумілим.\n\nЗагалом наша інженерна команда може багато чому навчитись із цих споруд."
  mt_planet_event.10.a:0"Наша інженерія зробить крок уперед."
  mt_planet_event.10.b:0"У нашій державі не бракує талантів."

 mt_planet_event.11.name:0"Проєкт освоєння №3 завершено"
  mt_planet_event.11.desc:0"Проєкт освоєння №3 успішно завершено — [Root.GetName] отримала більше доступних районів.\n\nПід час реалізації проєкту вищої Геї ми переробили океан, але лише поверхово, не використавши глибоководні ресурси повністю — проєкт №3 побудував на морському дні один міський конгломерат за іншим, розширивши наш простір і посприявши подальшому дослідженню океану."
  mt_planet_event.11.a:0"Ще один успіх."
 mt_planet_event.12.name:0"Океанський скарб"
  mt_planet_event.12.desc:0"Відколи почав діяти проєкт №3, у підводні міста прибуло чимало фахівців і туристів — спершу вони використовувались лише для науки й туризму.\n\nАле в міру поглиблення дослідження морського дна ми виявили приховані там скарби — перли, якими захоплюються майже всі, та надзвичайно поживні водорості.\n\nНа жаль, якщо ми масово збиратимемо перли, це завдасть непоправної шкоди зростанню водоростей, і навпаки, тож нам доведеться обрати щось одне."
  mt_planet_event.12.a:0"Перли."
  mt_planet_event.12.b:0"Водорості."

 mt_planet_event.13.name:0"Проєкт освоєння №4 завершено"
  mt_planet_event.13.desc:0"Проєкт освоєння №4 успішно завершено — [Root.GetName] отримала більше доступних районів.\n\nПроєкт №4 не переробляв саму планету, а натомість надав ресурси й запровадив політику заохочення мешканців до самостійного дослідження — покинувши міські зони, вони виявили, що вся планета придатна для проживання, і різниця між містом і диким краєм зникла."
  mt_planet_event.13.a:0"Ось вона, досконала планета."
 mt_planet_event.14.name:0"Первісні люди?"
  mt_planet_event.14.desc:0"Відколи почав діяти проєкт №4, дедалі більше людей охоче покидають міські зони, вирушаючи досліджувати глибини планети — це справді ефективно розширило наш простір.\n\nАле незабаром ми виявили проблему: чимало людей добровільно відмовились від сучасних технологій, живучи в дикій природі планети майже первісним життям! Це нас вельми здивувало — і, схоже, це явище поширюється: на планеті з'являється дедалі більше «первісних племен».\n\nДослідницька команда вважає, що втрата цього населення не вплине на розвиток планети, а їхня поведінка навіть корисна для визначених нами первісних зон, хоча фахівці все ж радять запровадити певний рівень управління."
  mt_planet_event.14.a:0"Забезпечити їм гарантії життя."
  mt_planet_event.14.b:0"Це чудовий соціологічний зразок."
  mt_planet_event.14.c:0"Транслювати їхнє реаліті-шоу на весь світ."
  mt_planet_event.14.a.tooltip:0"Первісний район отримує додатковий бонус до швидкості зростання населення."
  mt_planet_event.14.b.tooltip:0"Первісний район отримує додатковий бонус до соціологічного видобутку від науковців."
  mt_planet_event.14.c.tooltip:0"Первісний район отримує додаткове зниження споживання зручностей населенням."

 mt_planet_event.15.name:0"Проєкт освоєння №5 завершено"
  mt_planet_event.15.desc:0"Проєкт освоєння №5 успішно завершено — [Root.GetName] отримала більше доступних районів.\n\nСуть проєкту №5 полягає у використанні генної інженерії для зміни закономірностей росту рослин планети, щоб вони могли адаптуватись до розвитку наших міст — тепер наша експансія може бути сміливішою, не побоюючись завдати нищівного удару рослинному покриву планети."
  mt_planet_event.15.a:0"Чудова робота."
 mt_planet_event.16.name:0"Розумні рослини"
  mt_planet_event.16.desc:0"Звіт з [Root.GetName].\n\nГенна модифікація рослин у рамках проєкту №5 досягла величезного — ні, варто сказати, несподіваного успіху. За спостереженнями, окремі рослини набули певного рівня розуму — здається, вони переживають безпрецедентну еволюцію. Дослідники повідомляють, що ця еволюція обмежена, і ці рослини ніколи не отримають справжнього розуму, але вони справлятимуть величезний вплив на всю нашу планету."
  mt_planet_event.16.a:0"У нашого народу з'явився супутник."
  mt_planet_event.16.b:0"Дослідити їх глибше."

 mt_planet_event.17.name:0"Урожай"
  mt_planet_event.17.desc:0"[Root.GetName] освоєно максимально — вона стане найдосконалішою планетою. Наприкінці проєкту вся планета продемонструвала безпрецедентну гнучкість — ми можемо обрати свій урожай за потребою."
  mt_planet_event.17.a:0"Підвищити біорізноманіття."
  mt_planet_event.17.a.tooltip:0"Створює на §Y[Root.GetName]§! §Y8 нових видів§!, кожен із §Y5 поселенцями§! та випадковими рисами."
  mt_planet_event.17.b:0"Покращити екосистему."
  mt_planet_event.17.c:0"Продемонструвати наукову цінність."
