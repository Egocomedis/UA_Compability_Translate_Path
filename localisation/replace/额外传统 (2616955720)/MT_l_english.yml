 mt_leader_event.1.d:0"Рівень 8"
 mt_leader_event.1.e:0"Багатообіцяючий геній"
 mt_leader_event.2.name:0"Спеціальна підготовка"
 mt_leader_event.2.desc:0"Ми можемо виховати лідера будь-якого напрямку — тепер визначимо остаточний результат"
 mt_leader_event.2.a:0"Губернатор"
 mt_leader_event.2.b:0"Науковець"
 mt_leader_event.2.c:0"Командувач флоту"
 mt_leader_event.2.d:0"Генерал сухопутних військ"

