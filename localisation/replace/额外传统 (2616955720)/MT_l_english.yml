 tr_mt_exauthoritarian_1:0 "Централізація влади"
 tr_mt_exauthoritarian_1_delayed:0 "Центр повинен міцно контролювати всю державу — ніхто не сміє суперечити волі центру."

 tr_mt_exauthoritarian_2:0 "Космічні раби"
 tr_mt_exauthoritarian_2_delayed:0 "На жаль, навіть у космічну епоху ці бідолахи не уникли долі рабства."

 tr_mt_exauthoritarian_3:0 "Абсолютний авторитет"
 tr_mt_exauthoritarian_3_delayed:0 "Авторитет лідера абсолютний."

 tr_mt_exauthoritarian_4:0 "Без жалю"
 tr_mt_exauthoritarian_4_delayed:0 "Немає потреби жаліти рабів — вони лише дешевший інструмент."

 tr_mt_exauthoritarian_5:0 "Найвища влада"
 tr_mt_exauthoritarian_5_delayed:0 "Вітаємо нашого найвищого лідера."

