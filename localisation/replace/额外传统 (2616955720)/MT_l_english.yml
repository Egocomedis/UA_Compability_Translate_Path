 leader_trait_mt_develop_official_desc: "Традиція виховання: подолання межі"

#Псіонічний зв'язок
tradition_mt_psychic:"Псіонічний зв'язок"
 tradition_mt_psychic_desc:"У цьому всесвіті існує дивна сила, що видається магією — але, можливо, ми зможемо дослідити її науковим методом."

 tr_mt_psychic_adopt:"Традиція псіонічного зв'язку"
 tr_mt_psychic_finish:0 "Традицію псіонічного зв'язку завершено"

 tr_mt_psychic_1:0 "Псіонічні дослідження"
 tr_mt_psychic_1_delayed:0 "Ми назвали цю дивну силу псіонікою — заради цього наша елітна команда фахівців розпочала масштабне дослідження."

 tr_mt_psychic_2:0 "Загальна псі-мережа"
 tr_mt_psychic_2_delayed:0 "Кожен може підключитись до псіонічної мережі — це значно підвищить нашу адміністративну ефективність."

 tr_mt_psychic_3:0 "Видобуток із порожнечі"
 tr_mt_psychic_3_delayed:0 "У міру поглиблення досліджень наша команда спробувала видобувати ресурси прямо з порожнечі — звучить неймовірно магічно, але, схоже, справді працює."

 tr_mt_psychic_4:0 "Штучний зв'язок"
 tr_mt_psychic_4_delayed:0 "Перш ніж досягти справжньої трансцендентності, ми можемо спробувати доторкнутись до сили псіоніки штучними засобами."
 tr_mt_psychic_4_desc:0"Усі представники нашого початкового виду отримають спеціальний пристрій для симуляції псіонічних здібностей."

 tr_mt_psychic_5:0 "Псіонічне посилення"
 tr_mt_psychic_5_delayed:0 "Традиційна модель виробництва вже не задовольняє наш розвиток — впровадження псіонічної сили, можливо, виправить цю ситуацію."

 trait_mt_psychic:0"Штучний зв'язок"
 trait_mt_psychic_desc:0"Використовує штучний пристрій для симуляції псіонічних здібностей — ефект виглядає непогано"

 mt_pop_event.1.name:0"Штучний зв'язок"
 mt_pop_event.1.desc:0"Усе населення нашого початкового виду вже оснащене штучними пристроями — результат відповідає очікуванням і продовжуватиме приносити користь."
 mt_pop_event.1.a:0"Рано чи пізно ми пробудимо справжню псіоніку"
#Розведення
tradition_mt_breeding:"Розведення"
 tradition_mt_breeding_desc:"У цьому космосі є величезні істоти, яких ми ніколи раніше не бачили — це надихнуло наших дослідників переосмислити нашу біотехнологію."

 tr_mt_breeding_adopt:"Традиція розведення"
 tr_mt_breeding_finish:0 "Традицію розведення завершено"

 tr_mt_breeding_1:0 "Селекція рослин"
 tr_mt_breeding_1_delayed:0 "Традиційним культурам важко задовольнити потреби народу — чи, точніше, космічних істот; нам потрібно їх удосконалити."

 tr_mt_breeding_2:0 "Досконале сільське господарство"
 tr_mt_breeding_2_delayed:0 "Із розвитком технологій умови на фермах перевершили всі уявлення — принаймні в невеликому масштабі мрія про ідилічне сільське життя здійснилась."

 tr_mt_breeding_3:0 "Біологічна зброя"
 tr_mt_breeding_3_delayed:0 "Форми космічних істот надзвичайно різноманітні — наші науковці помітили військовий потенціал і сподіваються розвинути цей напрямок."

 tr_mt_breeding_4:0 "Розведення амеб"
 tr_mt_breeding_4_delayed:0 "Наша дослідницька команда успішно вивела керованих космічних амеб — вони приєднаються до нашого флоту."
 tr_mt_breeding_4_desc:0"§HРозблоковує указ:§! Флот амеб\n§LМожна витратити їжу, щоб створити флотилію амеб.§!"

 tr_mt_breeding_5:0 "Розведення тіянкі"
 tr_mt_breeding_5_delayed:0 "Тіянкі — покірна істота, і наша команда спробувала застосувати її у військових цілях, досягнувши певного успіху."
 tr_mt_breeding_5_desc:0"§HРозблоковує указ:§! Флот тіянкі\n§LМожна витратити їжу, щоб створити флотилію тіянкі.§!"

 edict_mt_amoeba:"Флот амеб"
 edict_mt_amoeba_desc:0"Наша професійна команда успішно вивела амеб — тепер ми можемо використати їхню силу! Витрачає їжу, щоб створити в столичній системі флотилію з 10 маток космічних амеб!"
 edict_mt_tiyanki:"Флот тіянкі"
 edict_mt_tiyanki_desc:0"Наша професійна команда успішно вивела тіянкі — тепер ми можемо використати їхню силу! Витрачає їжу, щоб створити в столичній системі флотилію з 10 самиць космічних китів!"

 mt_fleet_event.2.name:0"Розведення завершено"
 mt_fleet_event.2.desc:0"Тепер у нас є флот космічних істот!"
#Модифікація
tradition_mt_transform:"Модифікація"
 tradition_mt_transform_desc:"Дике й неконтрольоване природне еволюціонування — надто неефективний шлях; нашому народу потрібні вічні й досконалі тіла."

 tr_mt_transform_adopt:"Традиція модифікації"
 tr_mt_transform_finish:0 "Традицію модифікації завершено"

 tr_mt_transform_1:0 "Розширене мислення"
 tr_mt_transform_1_delayed:0 "Уже на етапі проєктування слід враховувати механічну перспективу — лише так ми зможемо ефективніше використовувати наші машини."

 tr_mt_transform_2:0 "Ефективна адаптація"
 tr_mt_transform_2_delayed:0 "Риси виду не є незмінними — різні посади потребують різних властивостей, і нам залишається лише задовольнити ці вимоги."

 tr_mt_transform_3:0 "Швидке складання"
 tr_mt_transform_3_delayed:0 "Роботів, звісно, ніколи не буває забагато — складання не повинно зупинятись."

 tr_mt_transform_4:0 "Розумна людина"
 tr_mt_transform_4_delayed:0 "Фахівці запропонували нову можливість — здається, вони знайшли цілком новий напрямок розвитку роботів."

 tr_mt_transform_5:0 "Спеціальні протези"
 tr_mt_transform_5_delayed:0 "Ми можемо розробити спеціальні протези для базових посад — вони майже нічого не коштують, але приносять значну користь."
 tr_mt_transform_5_desc:0"Усе населення нашого початкового виду отримає спеціально розроблені протези, значно підвищуючи продуктивність робітників."

 trait_mt_prosthesis:0"Спеціальні протези"
 trait_mt_prosthesis_desc:0"Спеціально розроблені протези коштують дуже дешево, але приносять велику користь на базових посадах"

 mt_pop_event.2.name:0"Спеціальні протези"
 mt_pop_event.2.desc:0"Усе населення нашого початкового виду вже оснащене спеціальними протезами — усі робітничі посади даватимуть додатковий прибуток."
 mt_pop_event.2.a:0"Це лише перший крок"
#Згуртованість
tradition_mt_heart:"Згуртованість"
 tradition_mt_heart_desc:"У нашого народу немає поділу за расою чи класом — кожен може розкрити свій потенціал на власній посаді."

 tr_mt_heart_adopt:"Традиція згуртованості"
 tr_mt_heart_finish:0 "Традицію згуртованості завершено"

 tr_mt_heart_1:0 "Спільна праця"
 tr_mt_heart_1_delayed:0 "Наша держава величезна — у ній можуть бути різні народи чи різні погляди, але це неважливо: ми цілком можемо відкинути всі упередження й працювати разом."

 tr_mt_heart_2:0 "Без різниці"
 tr_mt_heart_2_delayed:0 "Класи більше не важливі й геть не потрібні — доки є посада, наш народ може працювати."

 tr_mt_heart_3:0 "Духовна єдність"
 tr_mt_heart_3_delayed:0 "Лише відкинувши всі упередження, ми зможемо звести погляд до сяючіших зірок."

 tr_mt_heart_4:0 "Спільні зусилля"
 tr_mt_heart_4_delayed:0 "Жоден відділ чи установа не є ізольованим органом — вони можуть співпрацювати, ідеально розкриваючи потенціал народу."
 tr_mt_heart_4_desc:0"§HРозблоковує планетарний указ:§! Спільні зусилля.\n§LВитрачає певну кількість £unity£єдності на виконання указу — надає тривалий бонус і одразу дає певну кількість £influence£впливу залежно від кількості населення.§!"

 tr_mt_heart_5:0 "Нове життя"
 tr_mt_heart_5_delayed:0 "Розклад старої епохи вже застарів — ми можемо розробити новий, ефективний графік, що ідеально поєднає роботу й відпочинок."
 tr_mt_heart_5_desc:0"§HРозблоковує політику:§! Робочий режим.\n§LМожна коригувати режим праці народу, обираючи різні ефекти.§!"

 decision_mt_heart:0"Спільні зусилля"
 decision_mt_heart_desc:0"Протягом десяти років отримуємо бонус +15% до видобутку ресурсів; крім того, за кожного поселенця отримуємо одне очко £influence£впливу"

 modifiers_mt_heart:0"Спільні зусилля"
 modifiers_mt_heart_desc:0"Завдяки ефективному управлінню державних органів по всьому світу та спільним зусиллям усього народу наш видобуток значно зріс"

 policy_policy_mt_work:0"Робочий режим"
 policy_policy_mt_work_desc:0"Впроваджує робочий режим, гарантований державою"
 policy_mt_work.1:0"Нормальний режим праці"
 policy_mt_work.2:0"Інтенсивний режим праці"
 policy_mt_work.3:0"Режим без обмежень"
 policy_mt_work.4:0"Високооплачуваний режим"
 policy_mt_work.5:0"Режим із багатьма вихідними"
 policy_mt_work.6:0"Дозвілля як наука"
 policy_mt_work.1_desc:0"Найзвичайніший робочий режим, хоча іноді й важкодосяжний.\n\n"
 policy_mt_work.2_desc:0"Заохочує понаднормову роботу та конкуренцію, вичавлюючи максимум користі.\n\n"
 policy_mt_work.3_desc:0"Створення робочих місць — шляхетна справа, майже благодійність.\n\n"
 policy_mt_work.4_desc:0"Обслуговування обладнання та зарплати персоналу — все має бути гарантоване.\n\n"
 policy_mt_work.5_desc:0"Народ прагне вихідних — у них має бути більше часу на бажані справи.\n\n"
 policy_mt_work.6_desc:0"Наш народ сприймає науку як дозвілля.\n\n"

 mod_planet_technician_physics_research_produces_add:0"£physics_research£ $physics_research$ від £job_technician£ [GetTechnicianPlural]"
 mod_planet_farmers_society_research_produces_add:0"£society_research£ $society_research$ від £job_farmer£ [GetFarmerPlural]"
 mod_planet_miners_engineering_research_produces_add:0"£engineering_research£ $engineering_research$ від £job_miner£ [GetMinerPlural]"

#Торговельна реформа
tradition_mt_trade:"Торговельна реформа"
 tradition_mt_trade_desc:"Традиційна торгівля вкрай неефективна — ми можемо поступово її вдосконалити."

 tr_mt_trade_adopt:"Традиція торговельної реформи"
 tr_mt_trade_finish:0 "Традицію торговельної реформи завершено"

 tr_mt_trade_1:0 "Активізація економіки"
 tr_mt_trade_1_delayed:0 "Держава може безпосередньо втручатись в економічний ринок — це принесе величезну користь усьому ринку."
 tr_mt_trade_1_desc:0"Раз на рік: якщо поточні §Hзапаси енергокредитів§! перевищують §H10 тис.§!, отримуємо модифікатор товарообігу §H+10%§! (максимум §H+100%§!), інакше рівень модифікатора знижується.\n§LПрийнявши цю традицію, одразу отримуємо третій рівень модифікатора.§!"

 tr_mt_trade_2:0 "Ефективна торгівля"
 tr_mt_trade_2_delayed:0 "Ми можемо вести кілька торговельних операцій одночасно або об'єднувати кілька в одну — хай там як, ефективність значно перевищує попередню."

 tr_mt_trade_3:0 "Спеціальні райони"
 tr_mt_trade_3_delayed:0 "Наша держава повинна виділити спеціальні райони, щоб торговці могли вести справи ефективніше."

 tr_mt_trade_4:0 "Зовнішня торгівля"
 tr_mt_trade_4_delayed:0 "Секрет зовнішньої торгівлі — у взаємній довірі сторін."

 tr_mt_trade_5:0 "Спеціалізована економіка"
 tr_mt_trade_5_delayed:0 "Наша торговельна політика відображає пріоритети нашого економічного розвитку — нам потрібно визначати конкретну політику залежно від ситуації."
 tr_mt_trade_5_desc:0"Раз на рік надає новий модифікатор відповідно до обраної §Hторговельної політики§!:§L\nВиробництво багатства: +5% до видобутку енергокредитів\nІнтереси споживачів: +5% до видобутку споживчих товарів\nРинок ідей / Священна угода: +5% до видобутку єдності\nТорговельний союз: +5% до товарообігу§!"

 modifiers_mt_trade_default:0"Спеціалізована економіка: виробництво багатства"
 modifiers_mt_trade_consumer_goods:0"Спеціалізована економіка: інтереси споживачів"
 modifiers_mt_trade_unity:0"Спеціалізована економіка: ринок ідей / священна угода"
 modifiers_mt_trade_league:0"Спеціалізована економіка: торговельний союз"

 modifiers_mt_trade_default_desc:0"Цей модифікатор надає традиція торговельної реформи, змінюючись щороку залежно від торговельної політики"
 modifiers_mt_trade_consumer_goods_desc:0"Цей модифікатор надає традиція торговельної реформи, змінюючись щороку залежно від торговельної політики"
 modifiers_mt_trade_unity_desc:0"Цей модифікатор надає традиція торговельної реформи, змінюючись щороку залежно від торговельної політики"
 modifiers_mt_trade_league_desc:0"Цей модифікатор надає традиція торговельної реформи, змінюючись щороку залежно від торговельної політики"

 modifiers_mt_trade_revitalization_1:0"Активізація економіки: рівень 1"
 modifiers_mt_trade_revitalization_2:0"Активізація економіки: рівень 2"
 modifiers_mt_trade_revitalization_3:0"Активізація економіки: рівень 3"
 modifiers_mt_trade_revitalization_4:0"Активізація економіки: рівень 4"
 modifiers_mt_trade_revitalization_5:0"Активізація економіки: рівень 5"
