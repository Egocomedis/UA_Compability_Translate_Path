 district_mt_exgaia_city:0"Головний міський район"
  district_mt_exgaia_city_plural:0"Головні міські райони"
  district_mt_exgaia_city_desc:0"Цей район слугує адміністративною й промисловою зоною планети, тому природно є й головним населеним районом"
  district_mt_exgaia_city_job_desc:0"£job_bureaucrat£ $job_bureaucrat_plural$ переробляють £consumer_goods£ §Y$consumer_goods$§! на £unity£ §Y$unity$§!\n£job_culture_worker£ $job_culture_worker_plural$ переробляють £consumer_goods£ §Y$consumer_goods$§! на £unity£ §Y$unity$§!, [GetCultureWorkerSpiMatOutput][GetCultureWorkerEgalAuthOutput][GetCultureWorkerMilPacOutput][GetCultureWorkerXenoOutput], а також £mod_ethic_attraction_mult£ §Yпривабливість домінантної течії§!. Ефект £job_culture_worker£діячів культури змінюється залежно від течій держави\n£job_entertainer£ $job_entertainer_plural$ переробляють £consumer_goods£ §Y$consumer_goods$§! на £unity£ §Y$unity$§! та £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!\n£job_artisan£ $job_artisan_plural$ переробляють £minerals£ §Y$minerals$§! на £consumer_goods£ §Y$consumer_goods$§!\n£job_enforcer£ $job_enforcer_plural$ знижують £crime£ §Y$PLANET_CRIME_TITLE$§! та створюють £defense_army£ §Yоборонні війська§!"

