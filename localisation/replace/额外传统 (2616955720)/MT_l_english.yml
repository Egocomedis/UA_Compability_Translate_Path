modifiers_mt_capital_0:0"Традиція столиці: централізоване виробництво"
 modifiers_mt_capital_1:0"Традиція столиці: елітний технік"
 modifiers_mt_capital_2:0"Традиція столиці: елітний шахтар"
 modifiers_mt_capital_3:0"Традиція столиці: елітний фермер"
 modifiers_mt_capital_4:0"Традиція столиці: елітний майстер"
 modifiers_mt_capital_5:0"Традиція столиці: елітний металург"

tradition_mt_capital:"Столиця"
 tradition_mt_capital_desc:"Наша столиця розвивається вже багато років, але має ще більший потенціал — ми можемо зосередити зусилля на подальшому розвитку."

 tr_mt_capital_adopt:"Традиція столиці"
 tr_mt_capital_finish:0 "Традицію столиці завершено"

 tr_mt_capital_1:0 "Елітний технік"
 tr_mt_capital_1_delayed:0 "Традиційну посаду техніка можна вдосконалити — можливо, це дасть більше енергокредитів."

 tr_mt_capital_2:0 "Елітний шахтар"
 tr_mt_capital_2_delayed:0 "Краще обладнання, кращі кадри — мінерали столиці мають розроблятись ефективніше."

 tr_mt_capital_3:0 "Елітний фермер"
 tr_mt_capital_3_delayed:0 "Важко уявити, що навіть через стільки років ми можемо розвивати сільське господарство в столиці — і робити це ще краще."

 tr_mt_capital_4:0 "Елітний майстер"
 tr_mt_capital_4_delayed:0 "Столиця не повинна тонути в смозі — нам слід розвивати екологічнішу промисловість, можливо, це навіть підвищить продуктивність."

 tr_mt_capital_5:0 "Елітний металург"
 tr_mt_capital_5_delayed:0 "Ми ніколи не наразимо столицю на небезпеку, але вона мусить виробляти певну кількість сплавів про всяк випадок."

#Кораблі
tradition_mt_battleship:"Кораблі"
 tradition_mt_battleship_desc:"У цьому всесвіті надто багато небезпек, а наша конструкція кораблів безнадійно застаріла."

 tr_mt_battleship_adopt:"Традиція кораблів"
 tr_mt_battleship_finish:0 "Традицію кораблів завершено"

 tr_mt_battleship_1:0 "Вдосконалення носової частини лінкора"
 tr_mt_battleship_1_delayed:0 "Лінкор — безумовна основа нашого флоту, але його вогневої потужності все ще недостатньо."

 tr_mt_battleship_2:0 "Вдосконалення кормової частини лінкора"
 tr_mt_battleship_2_delayed:0 "Стара конструкція лінкора надто зосереджувалась на носових гарматах — ми цілком можемо розмістити потужну вогневу міць і на кормі."

 tr_mt_battleship_3:0 "Вдосконалення корвета"
 tr_mt_battleship_3_delayed:0 "Щільні зграї корветів завжди були основною силою флоту — їх можуть замінити, але ніколи не варто забувати."

 tr_mt_battleship_4:0 "Вдосконалення есмінця"
 tr_mt_battleship_4_delayed:0 "Конструкція есмінця надто хаотична — нам слід зосередитись на точковій обороні."

 tr_mt_battleship_5:0 "Вдосконалення крейсера"
 tr_mt_battleship_5_delayed:0 "Потужна вогнева міць дозволяє нам панувати у всесвіті — конструкція крейсера має стати ще сміливішою."

CORVETTE_MID_mt_battleship_S2PD1:0"Традиція кораблів: вдосконалений відсік"
 DESTROYER_STERN_mt_battleship_P4:0"Традиція кораблів: вдосконалений відсік"
