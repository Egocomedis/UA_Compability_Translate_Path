 decision_mt_planetexgaia_project:0"Проєкт «Планета вищої Геї»"
  decision_mt_planetexgaia_project_desc:0"Ми створимо безпрецедентну штучну планету, що збереже природну красу й водночас задовольнить усі наші вимоги"
  decision_mt_planetexgaia_project_effects:0"Перетворює планету на §Yпланету вищої Геї§!, розблоковуючи спеціальний £district£ §Yрайон вищої Геї§!"
  mt_planet_event.2.name:0"Перетворення на планету вищої Геї завершено"
  mt_planet_event.2.desc:0"Проєкт успішно завершено — [Root.GetName] стала планетою вищої Геї.\n\nЦя планета, як і справжня планета Гея, приймає будь-які види, і водночас приховує безмежні можливості — дослідники вважають, що вона значно перевершує звичайні планети Гея.\n\nХай там як, вона стане символом нашої величі."
  mt_planet_event.2.a:0"Дивовижно."

