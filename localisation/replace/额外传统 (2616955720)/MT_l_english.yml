 job_eliteartisan:0 "Елітний майстер"
 job_eliteartisan_plural:0 "Елітні майстри"
 job_eliteartisan_desc:0 "Група висококваліфікованих ливарних майстрів, що спеціалізується на виробництві товарів повсякденного вжитку та розкоші для внутрішнього ринку."
