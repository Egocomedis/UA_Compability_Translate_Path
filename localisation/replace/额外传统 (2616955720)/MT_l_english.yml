 job_elitefoundry:0 "Елітний металург"
 job_elitefoundry_plural:0 "Елітні металурги"
 job_elitefoundry_desc:0 "Металургійна галузь потребує великої кількості вишколеного персоналу для перетворення сирих мінералів на міцні й довговічні сплави — сировину для найпередовіших споруд."
