 ###################################
 ### main menu
 UI_OVERHAUL_TITLE: "UI Overhaul Dynamic"
 UI_OVERHAUL_VERSION: "4.4"
 UI_OVERHAUL_BETA: "$UI_OVERHAUL_VERSION$ Відкрита бета"
 UI_OVERHAUL_INFO: "Відкриває інформаційне вікно мода"
 UI_OVERHAUL_DONATE: "Якщо вам сподобався мій мод, будь ласка, розгляньте можливість donate! £energy£"
 UI_OVERHAUL_STEAM: "Steam Workshop"
 UI_OVERHAUL_STEAM_TOOLTIP: "Відкриває сторінку мода в Steam Workshop"
 UI_OVERHAUL_DISCORD: "Сервер Discord"
 UI_OVERHAUL_DISCORD_TOOLTIP: "Відкриває Discord-сервер мода"
 UI_OVERHAUL_TEXT_TOP: "Цей мод наразі оновлений для версії §H$UI_OVERHAUL_VERSION$§! Stellaris. Він має працювати з будь-якими подальшими патчами з виправленням багів, якщо не вказано інше."
 UI_OVERHAUL_TEXT_CENTER: "Про будь-які баги, зауваження чи питання можна повідомити на моєму Discord-сервері. Я відкритий до пропозицій щодо змін інтерфейсу користувача."
 UI_OVERHAUL_TEXT_BOTTOM: "Якщо ви використовуєте §HGigastructural Engineering§!, обов'язково встановіть патч сумісності — інакше ви не зможете використовувати EHOF.\nПатч можна знайти на сторінці мода в Steam Workshop."
 ###################################
 ### tech tree
 UI_OVERHAUL_TECHTREE: "Дерево технологій"
 UI_OVERHAUL_TECHTREE_TOOLTIP: "§H$UI_OVERHAUL_TECHTREE$§!\n§GНатисніть, щоб відкрити зовнішнє дерево технологій.§!"
 UI_OVERHAUL_TECHTREE_TOOLTIP_DELAYED: "Це дерево технологій жодним чином не пов'язане, не асоційоване й не схвалене §HParadox Interactive§!.\nЦе просто фанатський проєкт, який підтримує §HBloodStainedCrow§! на GitHub."
 ####################################
