EMPIRE_DESIGN_SHYNZ1:"Альянс Vtuber-ів за Відродження"
EMPIRE_DESIGN_SHYNZ1_desc:"Vtuber-и — частина величезної міжзоряної імперії, генетично адаптована так, щоб бути повністю жіночою й здатною до одностатевого розмноження. Вони живуть на одній зі столичних планет імперії та заробляють на життя, надаючи послуги прямих трансляцій для всієї імперії.\n\nДні миру та спокою тривали недовго, і планета-місто спорожніла наприкінці існування Імперії. Але працьовиті й відважні Vtuber-и провели століття, відбудовуючи порядок і цивілізацію, і вирішили повернутися на міжзоряну сцену!"

