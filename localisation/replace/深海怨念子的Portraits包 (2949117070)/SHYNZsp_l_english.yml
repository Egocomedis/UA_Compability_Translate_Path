EMPIRE_DESIGN_shynz2:0"Федерація Валькірій Schicksal"
EMPIRE_DESIGN_shynz2_desc:0 "Валькірії — вершина воїнів цієї цивілізації. Посилені модифікаціями, вони мають надзвичайну силу і присвячують себе протистоянню таємничим ворогам з-поза меж зірок. Раз у раз ворог вторгався; раз у раз цивілізація занепадала, лише щоб відродитися знову. Нарешті, цього разу, вони піднялися на міжзоряну сцену."
