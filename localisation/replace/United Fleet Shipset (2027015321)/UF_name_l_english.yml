 START_SCREEN_WSG:0 "Після розгрому останньої лінії оборони Безодняного флоту решта безодняних дівчат-кораблів раптово зникла з нашої батьківщини. З розшифрованих даних бази Безодні ми дізналися, що ті, хто вцілів, утекли в глибокий космос за допомогою гіперпросторових двигунів. Тепер ми нарешті опанували ці технології, і настав час покласти край нашому давньому ворогу."




