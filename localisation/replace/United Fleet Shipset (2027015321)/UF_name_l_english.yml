 wsg_trait_warshipgirls_desc2:0 "Warship Girls розроблені компанією Illumoe Inc. шляхом зворотної інженерії технологій Безодняного флоту. Їхнє призначення — протистояти вторгненню Безодняного флоту та врятувати людську цивілізацію."

