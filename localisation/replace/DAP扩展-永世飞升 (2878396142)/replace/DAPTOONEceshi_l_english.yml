l_english:
ap_DAP_AEON:0"§RA§!§Y·§!§BE§!§Y·§!§MN§!—Остання відповідь"
ap_DAP_AEON_desc:0"Вершина душі (Animus), вершина творіння (Element), вершина життя (Organiod) — досконала тріада, доповнена Ядром порожнечі (Nucleus), що запускає остаточне перетворення. Об'єднавши три начала воєдино, можна пройти крізь туман творіння, піднятися над сліпим і недолугим тілом майстра-деміурга та досягти справжньої чистої духовної сфери. AEON — істинне обличчя буття, момент злиття Я (Ego) з Іншим (Alter), коли все суще — лише витвір думки Первісної Єдності (Oneness).\nМожливо, це вже вершина еволюції, кінцева точка сходження."
tradition_aeon:0"§YВічність§!"
tradition_aeon_desc:0"Ви готові вирушити до останнього стану буття, але для цього доведеться відмовитися від чогось важливого"
ap_DAP_aeon_tooltip:0"Розпочинає спецпроєкт — AEON"
tr_aeon_adopt:0"§RA§!§Y·§!§BE§!§Y·§!§GO§!§Y·§!§MN§!-Народження"
tr_aeon_adopt:0"Розблоковує спецпроєкт-§RA§!§Y·§!§BE§!§Y·§!§GO§!§Y·§!§MN§!"
tr_aeon_finish:0"Oneness — Єдність усього сущого"
tr_aeon_finish_desc:0"«Ви досягли кінця, тому жодного ефекту немає.»\n§YПеремога в грі§!"
tr_aeon_1:0"§YArchevita — Первісне буття§!"
tr_aeon_1_desc:0"§HГранична глибина пізнання життя наблизила нас до справжнього поняття життя. Archevita — абсолютне, первісне втілення творіння й водночас остаточна форма життя — тепер відома нам як проєкція самої думки.§!\n\nПідвищує ліміт рис виду та кількість очок рис, але уповільнює природне зростання популяції\nРозблоковує указ — Archevita: витворення-загибель\nЦей указ дозволяє взаємно перетворювати популяцію та єдність"
tr_aeon_2:0"§YIdeation — Принцип витворення§!"
tr_aeon_2_desc:0"§HДосягнувши остаточного сходження, ми нарешті збагнули основоположний принцип усього сущого: думку і витвір думки, їхню споконвічно єдину сутність, і те, як витвори підкоряються течії думки. Це вже не має жодного стосунку ні до матеріалізму, ні до ідеалізму — адже це і є гранична реальність, а чим наші теорії, наші уявлення можуть пояснити настільки грандіозне буття?§!\n\nРозблоковує указ — Ideatenze: витворений стан духу. Перетворює будь-яку планету на планету «Ideatenze — витворений стан духу»: вона майже не виробляє матеріальних ресурсів, окрім £unity£ єдності та £physics_research£ фізичних досліджень, але дає модифікатор-бонус усій державі\nРозблоковує новий тип корабля — Ideatenture: витворена форма, яку будують за єдність, ігноруючи вартість деталей"
tr_aeon_3:0"§YOmniverse — Сфера всього сущого§!"
tr_aeon_3_desc:0"§HДуша блукає безмежжям думки; у найглибших глибинах свідомості вона неначе вміщує цілий всесвіт — усі можливості буття, першовзірці всього сущого. У єдності Я з Іншим ми вже торкнулися злиття внутрішнього із зовнішнім всесвітом — граничного стану, що охоплює все. Якщо в пошуку духу і є кінцева точка — це вона, єдино можлива.§!\n\nРозблоковує деталь зоряної бази — Omniverse: Всевидюче Око, яка знищує ефект невидимості кораблів у системі та повністю нейтралізує їхні щити\nРозблоковує указ — Omniverse: розбір усього сущого, що дозволяє будь-коли додавати чи знімати течії думки держави\nРозблоковує механіку — Omniverse: витворений духовний простір, доступ до власного простору Omniverse\n§BТрансцендент зрештою повертається до зірок§!"
tr_aeon_4:0"§YEternium — Вічний елемент§!"
tr_aeon_4_desc:0"§HЩо таке реальність? Що таке порядок? Усе видиме в цьому світі колись зникне, колись повернеться в хаос. Навіть чорні діри, частинки і сам всесвіт — не є незмінними. Тому лише заглибившись у саму суть творіння, у вирі хаосу, що постійно перевертається, можна знайти те, що дійсно вічне — Eternium, вічний елемент: незмінне серед усіх змін, єдиний незмінний порядок у хаосі. Він вічний, і час для нього не має значення.§!\n\nКораблі типу Ideatenture — витворена форма можуть воскресати в бою: воскреслий у бою корабель протягом 60 днів отримує +200% до всіх модифікаторів характеристик відносно початкових значень; кожен корабель може активувати цей ефект лише раз на 60 днів\nПланета Ideanteze — витворений стан духу, якщо колонію знищено, миттєво відбудовується як Ideatenze — витворений стан духу\nРозблоковує указ — Eternium: вічне творіння, що дозволяє повністю скопіювати будь-який ваш флот, але одночасно може існувати не більш ніж 5 таких флотів"
mod_country_upkeep_mult:0"Витрати на утримання держави"
tr_aeon_5:0"§YNihility — Стан порожнечі§!"
tr_aeon_5_desc:0"§HЗдається, ми вже досягли стану всезнання й всемогутності, і подальший розвиток неможливий. Та чи задовольняє це нас? Ні — що ж лежить за межею граничного? Зазираючи в цю можливість, ми ніби вже осягнули все.§!\n\nOmniverse — витворений духовний простір здатен давати ще потужніші ефекти; використання цих ефектів через певний час запускає §RNihility — повернення в порожнечу§!\n§RNihility — повернення в порожнечу§!\nВи відчуваєте, що в цій грі більше нема нічого цікавого, тож вирішуєте завершити це збереження. У вас є три варіанти: продовжити гру як спостерігач, продовжити під іншою особистістю, або ж одразу обернути все на порожнечу."
project_AEON:0"A.E.O.N"
project_AEON_DESC:0"Archevita, Eternium, Omniverse — потрійна вершина життя, матерії та духовного стану. Крізь останню браму Nihility, подолавши безмежність, досягнувши вічності, ви зрештою прийдете до таємничої форми буття на ім'я Aeon.\nВи готові? Це змусить вас відмовитися від багато чого — від розуміння буття, від погляду на реальність, навіть... від самої свідомості існування.\nПісля завершення цього спецпроєкту риса MBP перетвориться на рису «Витвір думки», а традиція «Вічність» стане доступною"
