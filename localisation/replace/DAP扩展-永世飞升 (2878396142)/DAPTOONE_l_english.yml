TTOONE_zengqiang_modifier:0"§EСинтезована еволюція§!§Y/§!§MПіднесення до святості§!§Y/§!§GПідкорена еволюція§!"
TTOONE_zengqiang_modifier_desc:0"Наднадлюдина сходження\nМає купу різношерстих бонусів"
trait_TTONE_MBP:0"§RM§!§Y·§!§BB§!§Y·§!§GP§!-§YТрифазна форма життя§!"
trait_TTONE_MBP_desc:0"Форма життя, що постала внаслідок одночасного проходження шляхів сходження — механічного, псіонічного та генетичного; за допомогою псіонічної сили зливає протезоване тіло з плоттю воєдино"
trait_TTONE_BIO:0"§GO§!-§YОрганічна субстанція§!"
trait_TTONE_BIO_desc:0"Органічна складова трифазної форми життя, яка досі зберігає початковий генетичний матеріал — життя завжди знаходить свій шлях"
trait_TTONE_MA:0"§EM§!-§YМеханічний образ§!"
trait_TTONE_MA_desc:0"Механічна складова трифазної форми життя — роботизований вид із значно ефективнішими псіонічними контурами та нанорозмірними обчислювальними механізмами"
decision_MBP_change:0"§RM§!§Y·§!§BB§!§Y·§!§GP§!-§YПеретворення§!"
decision_MBP_change_tooltip:0"Змінює популяцію"
decision_MBP_change_desc:0"Трифазна форма життя здатна ефективніше вести подвійне зростання популяції"
