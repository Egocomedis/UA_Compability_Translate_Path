DAP_TOONE.13:0"§RM§!§Y·§!§BB§!§Y·§!§GP§!-Мімікрія виду"
DAP_TOONE.13.desc:0"§GМімікрія виду§!\nДозволяє перетворити частину поселенців цієї планети на інший вид із зоряного моря"
decision_MBP_wuzhong:0"§RM§!§Y·§!§BB§!§Y·§!§GP§!-Мімікрія виду"
decision_MBP_wuzhong_tooltip:0"Перетворює частину поселенців цієї планети на інший вид із зоряного моря"
decision_MBP_wuzhong_desc:0"Ця форма життя здатна відтворити будь-який вид у всесвіті"
trait_mechanical_DAPTTONE:0 "Механічне тіло"
trait_mechanical_DAPTTONE_desc:2 "§LМеханічні тіла на порядки складніші за традиційних спеціалізованих роботів, проте більшість із них усе одно мають лише обмежену обчислювальну потужність.§!\n"
trait_psionic_DAPTTONE:0"Псіонічність"
trait_psionic_DAPTTONE_desc:0"§LУсі представники цього виду опанували потужну псіонічну силу. Це означає, що між собою вони спілкуються телепатично.§!\n"
PLANET_ASCENSION_TIER_EFFECT_DESC:1 "Сходження планети дає різні ефекти залежно від обраного шляху сходження."
building_MBP_yizhi:0"§RA§!§Y§!§BE§!§Y§!§GO§!§Y§!§HN§!·Витвір інакшості"
building_MBP_yizhi_desc:0"Ця інакша споруда, що існує в тріщинах примарної фази, здатна видобувати пил думок із свідомості надіндивіда, аби перекроювати реальність всесвіту"
