civic_DAPTTONE_FS:0"Звір розуму"
civic_DAPTTONE_FS_tooltip:0"§YКоли вашу колонію бомбардують, автоматично призивається Вартовий живої зорі (оборонний флот); Вартовий живої зорі існує 45 днів§!\nЧас відновлення Вартового живої зорі −50%\nОскільки вартового каталізовано поза станом живої зорі, його утримання суттєво зростає"
civic_DAPTTONE_FS_desc:0"Розблоковує частину ефектів псіо-генетичного шляху сходження"
civic_DAPTTONE_FT:0"Симбіотична угода"
civic_DAPTTONE_FT_tooltip:0"§YЛідер із рисою M·B·P миттєво воскресає після смерті§!, що коштує певної кількості їжі та сплавів\nРозблоковує тип корабля — Сірий Туман"
civic_DAPTTONE_FT_desc:0"Розблоковує частину ефектів генно-механічного шляху сходження"
civic_DAPTTONE_ST:0"Псі-механічний захист"
civic_DAPTTONE_ST_tooltip:0"§YНа початку бою весь флот отримує благословення псі-механіки: імунітет до трьох смертельних ударів і тимчасове підвищення шкоди зброї§!\nОскільки в нас немає справжньої псі-машини як осередку, доводиться витрачати більше енергії на підтримку духовної схильності"
DAP_TOONE.4.a:0"Перетворює всіх поселенців із рисою «Органічна субстанція» або «Механічний образ» на ваш основний вид\nДодає рису «M·B·P — Трифазна форма життя» поселенцям, які її ще не мають"
DAP_TOONE.4.b:0"Перетворює одного випадкового поселенця з MBP на «Органічну субстанцію»\nДодає рису «Органічна субстанція» всім поселенцям без риси «M·B·P — Трифазна форма життя»"
DAP_TOONE.4.c:0"Додає рису «M — Механічний образ» усім роботизованим поселенцям"
decision_MBP_SOUL:0"MBP — Псіонічна аватара"
decision_MBP_SOUL_tooltip:0"100 випадкових поселенців MBP перетворюються на псіонічні аватари й вирушають у космічний бій; бойовий бонус аватари залежить від бонусу ефективності роботи цього поселенця"
decision_MBP_SOUL_desc:0"Псіонічна плоть здіймається до зірок"
NAME_SOUL_HUASHEN:0"§MMBP — Псіонічна аватара§!"
NAME_SOUL_HUASHEN_SHIP:0"§BДух-аватара§!"
NAME_Shroud_TTONE:0"Псі-провідний конгломерат"
mod_country_nanites_produces_mult:0"Наніти на місяць"
ap_DAPTTONE_1:0"Гібридна еволюція"
ap_DAPTTONE_1_desc:0"Усе на шляху сходження існує заради піднесення виду й цивілізації, незалежно від обраного шляху"
ap_DAPTTONE_1_tooltip:0"§HДодає механічну та псіонічну риси всім поселенцям§!\n§HДозволяє прийняти три генетичні традиції§!"
ap_DAPTTONE_2:0"§RM§!§Y·§!§BB§!§Y·§!§GP§!"
ap_DAPTTONE_2_tooltip:0"§EВсі поселенці та лідери отримують рису — M·B·P§!\nМожна перетворювати поселенців MBP через укази (див. планетарні укази)\n§HПідвищує контроль над різними формами життя§!\n§HЧерез укази можна перетворювати поселенців на духів для космічного бою (див. планетарні укази)§!"
ap_DAPTTONE_2_desc:0"Це один із роздоріж на шляху сходження — саме на незліченних роздоріжжях цивілізація записує минуле, обирає теперішнє й творить майбутнє"
leader_trait_DAPTTONE_admiral_tooltip:0"§RM§!§Y·§!§BB§!§Y·§!§GP§!-§YПсіонічний резонанс§!\nКоли цей командувач флоту б'ється разом із психічною аватарою MBP, бойові можливості аватари тимчасово зростають на 30 днів"
DAOTTONE_TRAIT:0"Контроль над життям"
DAOTTONE_TRAIT_tooltip:0"Підвищує контроль над різними формами життя"
DAOTTONE_TRAIT_desc:0"Простими словами: додає очки рис і піднімає ліміт рис\nСумісно з частиною видів з інших модів"
DAP_TOONE.4:0"Коригування популяції MBP"
DAP_TOONE.4.desc:0"\n«Перетворення на органічну субстанцію» — надає рису «Органічна субстанція» поселенцям планети без риси MBP, а також знімає рису MBP з будь-якого одного поселенця з цією рисою й натомість додає «Органічну субстанцію»; «Органічна субстанція» здатна природно розмножуватися\n«Покращення механічного образу» — додає рису «Механічний образ» усім роботизованим поселенцям планети, підвищуючи ефективність складання роботів\n«Трифазне перетворення» — перетворює всіх поселенців із рисою «Органічна субстанція» або «Механічний образ» на ваш основний вид і додає рису MBP поселенцям без риси «Трифазна форма життя»\nТому спершу перетворивши поселенців на «Органічну субстанцію», а потім застосувавши «Трифазне перетворення», можна асимілювати чужі види\nТакож можливе природне зростання популяції через «Органічну субстанцію» та будівництво роботів"
