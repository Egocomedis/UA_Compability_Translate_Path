  broken_cluster:0 "Розбите скупчення"
  tiny:0 "Крихітне (200 зірок)"
  small:0 "Мале (400 зірок)"
  medium:0 "Середнє (600 зірок)"
  large:0 "Велике (800 зірок)"
  huge:0 "Величезне (1000 зірок)"
  starcluster.4.name:0 "Покинутий сектор"
  starcluster.4.desc:0 "Побіжне сканування зоряної системи [Root.GetStarName] дає змогу доволі впевнено стверджувати, що ця система колись давно входила до складу імперії якоїсь давньої цивілізації. На це вказують численні руїни космічних споруд. Крім того, схоже, що ця система — лише частина зоряного сектора, системи якого були з'єднані мережею воріт і магістралей."
  starcluster.5.name:0 "Область зореутворення"
  starcluster.5.desc:0 "Увійшовши в систему [Root.GetStarName], наші астрономічні спостереження показують, що ми потрапили в область зореутворення. Щільні пилові туманності та агресивне космічне середовище в цьому «лоні зірок» можуть негативно вплинути на наші кораблі."
  starcluster.6.name:0 "Ворожий кластер"
  starcluster.6.desc:0 "Ми фіксуємо в системі характерну активність численних об'єктів. Екіпаж корабля [ship.GetName] погоджується, що ми дісталися дуже небезпечної області космосу."
  starcluster.7.name:0 "Закрита зона"
  starcluster.7.desc:0 "Одразу після входу в систему [Root.GetStarName] екіпаж корабля [ship.GetName] отримав безліч ідентичних сигналів. Розшифрувати сигнал було практично неважко — він являє собою категоричну вимогу: «Негайно залиште охоронювану зону!» Численні уламки найрізноманітніших кораблів у цій зоряній системі красномовно свідчать, що це не просто попередження."
  starcluster.8.name:0 "Штормова область"
  starcluster.8.desc:0 "Після початкового огляду системи [Root.GetStarName] та звірки астрономічних спостережень екіпаж корабля [ship.GetName] дійшов висновку, що ця область космосу є зоною штормів. Усі світила цієї області вкрай нестабільні й перебувають на завершальній стадії своєї еволюції. Ці системи можуть бути дуже небезпечними для наших кораблів."
  starcluster.9.name:0 "Мертва зона"
  starcluster.9.desc:0 "Прилади корабля [Root.GetStarName], увійшовши в систему [Root.GetStarName], фіксують дуже слабку сонячну активність і радіаційні збурення, характерні для зоряних решток у цій області. Схоже, це регіон мертвих зірок, що перебувають на різних стадіях згасання світил."
