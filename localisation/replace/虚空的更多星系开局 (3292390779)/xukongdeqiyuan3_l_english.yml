 ######## Кілька бафів
 xzkz_prosp_uni_mod: "Процвітання та єдність"
 xzkz_prosp_uni_mod_desc: "З дня об'єднання світ невпинно процвітає."


 ########
 origin_xzkz_taohuayuan: "Персикове джерело"
 origin_xzkz_taohuayuan_desc: "За часів правління Тайюань династії Цзінь жив собі рибалка з Улін, що заробляв на життя рибальством. Ідучи вздовж потоку, він забув, як далеко зайшов. Раптом він натрапив на гай персикових дерев у цвіту, що тягнувся на кількасот кроків уздовж обох берегів, без жодного іншого дерева серед них; духмяна трава була свіжою й прекрасною, а пелюстки, що опадали, кружляли навсібіч. Рибалка вельми здивувався цьому. Він рушив далі, бажаючи дістатися кінця гаю."
 origin_xzkz_taohuayuan_effects: "§YПочаткова позиція:§! Персикове джерело\nЦя система має багаті ресурси й численні мегаспоруди.\n§HВідірване від світу походження виживання на небесному острові§!"
 xzkz_taohuayuan_system_NAME: "Персикове джерело"
 xzkz_taohuayuan_system_DESC: "«За часів правління Тайюань династії Цзінь жив собі рибалка з Улін...»"

 xzkz_weijixingcunzhe_system_NAME: "Острів кризи"
 xzkz_weijixingcunzhe_system_DESC: "Голос у радіоприймачі поступово згасає, лишається тільки остання зоряна система..."

#####
 origin_xzkz_guifushengong: "Творіння природи"
 origin_xzkz_guifushengong_desc: "Природа неймовірно таємнича — своєю незбагненною рукою вона ретельно виточила диво цілої зоряної системи. Кожна зоря мерехтить неповторним світлом, кожна планета несе в собі нескінченну історію, наче розповідаючи про таємниці й велич усесвіту."
 origin_xzkz_guifushengong_effects: "§YПочаткова позиція:§! Диво системи\n§YЗафіксована придатність до життя:§! адаптація до мертвих планет\nЦя система має всі види ресурсів.\nУ цій системі є планети, повні природних дивес.\n§HПоходження виживання на небесному острові, повне природних дивес§!"

 xzkz_guifushengong_system_NAME: "Диво системи"
 xzkz_guifushengong_system_DESC: "Природне диво, витворене самою природою."
 xzkz_weixingheidong: "Мініатюрна чорна діра"

#####
 origin_xzkz_shiluozhidi: "Втрачена земля"
 origin_xzkz_shiluozhidi_desc: "Це система, повна загадок — 12 таємничих мегалітів оточують наш світ, уся система сповнена невідомого й таємниць, але ми відважно вирушимо досліджувати й відкривати прадавні таємниці."
 origin_xzkz_shiluozhidi_effects: "§YПочаткова позиція:§! Втрачена система\nЦя система має багаті ресурси.\nВипадково з'являється 12 ванільних археологічних об'єктів.\n§HПоходження виживання на небесному острові, повне руїн§!"
 xzkz_shiluozhidi_system_NAME: "Втрачена система"
 xzkz_shiluozhidi_system_DESC: "Загадкові мегаліти оточують усю зоряну систему."
 xzkz_shenmijushi: "Таємничий мегаліт" #Стоунхендж

######
 origin_xzkz_taixuxinghai: "Море зірок Порожнечі"
 origin_xzkz_taixuxinghai_desc: "З прадавніх часів система Порожнечі була саме такою — жодного придатного для життя світу, лише одна житлова станція за іншою. Зрештою всі об'єдналися разом і розпочали велику епоху мореплавства."
 origin_xzkz_taixuxinghai_effects: "§YПочаткова позиція:§! Система Порожнечі\nЦя система має багаті ресурси та житлові станції.\nУ цій системі є 3 мегаспоруди прадавньої епохи.\n§HПоходження виживання на розбитому небесному острові§!"
 xzkz_taixuxinghai_system_NAME: "Система Порожнечі"
 xzkz_taixuxinghai_system_DESC: "Розлога розбита система."
 d_shenmifuzhiji_xzkz_deposit: "Таємничий реплікатор"
 d_shenmifuzhiji_xzkz_deposit_desc: "Ця прадавня машина глибоко прихована всередині житлової станції, вбудована в головний реактор і живиться від нього. Це спадок, залишений первісними будівничими цієї станції — технологія матеріальної реплікації, яка нам цілком незбагненна."

######
 origin_xzkz_mofawangguo: "Магічне королівство"
 origin_xzkz_mofawangguo_desc: "Колись усі магічні світи процвітали, а люди подорожували між світами магічними шляхами — доки один експеримент зі сходженням не спричинив небачений досі вибух, що знищив усе колишнє й обірвав усі магічні шляхи. Нарешті, після довгого часу, вони знову ступили в зоряне небо."
 origin_xzkz_mofawangguo_effects: "§YПочаткова позиція:§! Магічне королівство\n§YНа старті все населення отримує рису:§! §MПсіонік§!\n§YНа старті розблоковано технологію:§! §BПсіонічна теорія§!\n§YНа старті розблоковано технологію:§! §BТеорія сходження§!\nЦя система має багаті ресурси.\n§HПоходження виживання на небесному острові, повне магії§!"
 xzkz_mofawangguo_system_NAME: "Магічне королівство"
 xzkz_mofawangguo_system_DESC: "Система, повна магічної сили."


###### Королівство велетнів
 origin_xzkz_jurenguo: "Королівство велетнів"
 origin_xzkz_jurenguo_desc: "Ця дивовижна система складається з 5 велетенських світів — уся система обертається навколо центральної планети-велетня."
 origin_xzkz_jurenguo_effects: "§YПочаткова позиція:§! Королівство велетнів\nЦя система має величезні світи й багаті ресурси.\n§HПоходження виживання на небесному острові з макроекологією§!"
 xzkz_jurenguo_system_NAME: "Небесний острів: Королівство велетнів"
 xzkz_jurenguo_system_DESC: "Світ велетнів."
 jurenguo_1_plant: "Зима"
 jurenguo_2_plant: "Весна"
 jurenguo_3_plant: "Літо"
 jurenguo_4_plant: "Осінь"

#### Прихисток
 origin_xzkz_binansuo: "Прихисток β"
 origin_xzkz_binansuo_desc: "Це просторий, цілісний кільцевий світ. Першопрохідці, що його створили, вже зникли — тепер ми, як їхні спадкоємці, вийдемо на сцену зоряної річки."
 origin_xzkz_binansuo_effects: "§YПочаткова позиція:§! Прихисток β\nНа старті наявний повний сегмент кільцевого світу.\nЦя система має звичайні ресурси та довогонну (до-надсвітлову) цивілізацію.\n§HПоходження виживання на небесному острові — спадкоємець Прихистку β§!"
 xzkz_binansuo_system_NAME: "Прихисток β"
 xzkz_binansuo_system_DESC: "Прадавній прихисток."
 d_huanshijiekongzhizhongxin_xzkz_deposit: "Центр обслуговування кільцевого світу"
 d_huanshijiekongzhizhongxin_xzkz_deposit_desc: "Скарб, залишений прадавніми першопрохідцями — з ним ми можемо краще обслуговувати весь кільцевий світ."

#### Дослідник порожнечі
 civic_xukongtanxianjia: "Дослідник порожнечі"
 civic_xukongtanxianjia_desc: "Ця цивілізація прагне пригод — вона завчасно дослідила технологію червоточин і стрибкову технологію."
 civic_xukongtanxianjia_effect: "§YНа старті розблоковано варіант технології:§! §BСтрибковий двигун§!\n§YНа старті розблоковано технологію:§! §BНавігація через червоточини§!"

#### Північний Ківш (Велика Ведмедиця)
 origin_xzkz_beidou: "Північний Ківш"
 origin_xzkz_beidou_desc: "Шу — небо, Сюань — земля, Цзи — людина, Цюань — час, Юйхен — звук, Кайян — закон, Яогуан — зоря."
 origin_xzkz_beidou_effects: "§YПочаткова позиція:§! Північний Ківш\nЦя система має звичайні ресурси.\n§HПоходження виживання скупчення Північного Ковша§!"
 xzkz_beidou_system_NAME: "Північна небесна брама"
 xzkz_beidou_system_DESC: "Небесна брама Північного Ковша."

