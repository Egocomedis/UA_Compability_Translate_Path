 d_xingyunbinansuo_jiantingqi_xzkz_deposit_desc: "Таємничий пристрій, що за загадковими принципами стежить за простором-часом, зливаючи віртуальне з реальним — цей пристрій не лише підвищує наші можливості виявлення й дослідження, а й дозволяє безпосередньо в реальності проводити віртуальні розважальні заходи."

### Звичайне скупчення зір, далекі зоряні вітри
 origin_xzkz_putongxingtuan: "Далеке скупчення зір"
 origin_xzkz_putongxingtuan_desc: "У далекій далині є таємниче скупчення зір."
 origin_xzkz_putongxingtuan_effects: "§YПочаткова позиція:§! Далеке скупчення зір\nКілька систем згенеровано повністю випадково.\nЦя система має відносно багаті ресурси.\n§HСтандартне походження виживання скупчення зір§!"
 xzkz_putongxingtuan_system_NAME: "Далека зоря"
 xzkz_putongxingtuan_system_DESC: "Яскрава зоря в далекій далині — місце, де починається історія."
