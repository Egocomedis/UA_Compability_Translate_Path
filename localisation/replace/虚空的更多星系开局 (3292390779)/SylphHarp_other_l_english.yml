 SH_tianming_fuyong:"Васал Мандата"
 SH_tianming_fuyong_desc:"Васал Мандата — особливий тип держави-васала, притаманний Державі Мандата: щомісяця зобов'язаний сплачувати сюзерену податок базовими ресурсами й не має права розширювати кордони."
