 SH_NAME_pops_fight_win:"Вид Мандата"
 SH_NAME_country_fight_win:"Гегемонія Носія Небесного Мандата"
 SH_play_lost.11_desc:"Ви нарешті схаменулись і повернулись на правильний шлях — це заощадило чимало сил, але більшість вашої наявної спадщини, схоже, не покриває наших втрат, навіть якби ми повністю вас знищили.\nТож... ми даємо вам ще один шанс вибору. Мерщій підписуйте ці договори. Наші рахунки будуть закриті.\nЗвісно, більшу частину вашої спадщини ми все одно заберемо."
 SH_play_lost_pay:"§RМи можемо виплатити компенсацію!§!"
 SH_play_lost.12:"Збір ренти"
 SH_play_lost.53.name: "Псіоніка?"
 SH_play_lost.53_desc:"Повторна перевірка авторитетних установ виявила, що Держава Божественного Веління не має жодних ознак псіонічного сходження. Звідки ж тоді в неї псіонічні здібності?!"
 SH_play_lost.53.a:"Що ж насправді відбувається?!"
 SH_play_lost.59.name:"Божественне веління?"
 SH_play_lost.59.desc:"Авторитетні установи виявили, що §KГегемонія Носія Небесного Мандата§! готує будівництво гігантського флагмана, що потрясе весь всесвіт — його потужність здатна обернути на порох будь-який корабель на шляху. Під час спостереження ми також виявили сліди прадавніх першопрохідців......"
 SH_play_lost.60.name:"Незупинний!?"
 SH_play_lost.60.desc:"§KГегемонія Носія Небесного Мандата§! вже завершила будівництво гігантського флагмана — як нам тепер їм протистояти?\nУ їхньому бойовому строю ми також помітили постаті, яких ще ніколи не бачили......"
 SH_play_lost.12_desc:"Після розправи держава збанкрутіла, і нам довелося наказати місцевим чиновникам конфіскувати майно й підвищити оренду для місцевої знаті — зрештою вдалось зібрати частину ресурсів, але останні наявні ресурси держави вже ледве вистачає. Ми маємо раціонально розподілити ці ресурси, щоб пережити скруту......"
 SH_play_lost.12_desc1:"Ретельний розрахунок! Переживемо труднощі!"
 SH_play_lost.13:"Про лінії відродження"
 SH_play_lost.13_desc:"Походження Мандата визначає для гравця три лінії відродження: §Bрозвиток технологій: наука§!, §Pбудівництво кораблів: суверенітет§! або §Yплин часу: процвітання§! — кожна дає відповідний бонус, і з плином часу та розвитком подій клопотання поступово знімається §Rзанепад§!. §KПрийняття будь-якого сходження§! також знижує §Rзанепад§! і дає модифікатор §CБлизьке сходження§! §RБудь ласка, не провокуйте Державу Божественного Веління без потреби§!"
 SH_play_lost_pay1:"Наша корабельна оборона буде суворо обмежена й перебуватиме під §Rнаглядом§!.\n§gЗначно обмежена швидкість будівництва кораблів, а також потрібно сплачувати податки — вартість будівництва кораблів зросте!§!"
 SH_play_lost_pay2:"Усі §Rнаукові матеріали§!, що вироблятимуться надалі, будуть повністю передані під нагляд вашої держави.\n§gНе можна виробляти очки досліджень§!"
 SH_play_lost_pay3:"Ваша держава розправиться з усіма воєнними злочинцями імперії. Вони §Rне зупиняться на цьому§!\n§gРозправа над усіма воєнними злочинцями, держава залишається без керівництва§!"
 SH_play_lost_pay4:"§RЩороку виплачуємо§! 500 енергокредитів, сума зростає з розвитком, доки §Rвся компенсація не буде виплачена§!. Хто знає, скільки вони насправді хочуть зібрати?!\n§gСподіваємось, компенсація нас не розорить§!"
 SH_play_lost.50_desc:"Ми прибули за наказом зібрати компенсацію — сподіваємось на вашу співпрацю."
 SH_play_lost_pay5:"§RМи не можемо покрити компенсацію!§!"
 SH_play_lost_pay6:"§RМи поки заплатимо компенсацію, але не надто радійте§!"
 SH_play_lost_pay7:"§RМи не платитимемо компенсацію, ви занадто необґрунтовано вимагаєте!§!"
 SH_play_lost_pay7_desc:"§HЦей вчинок розлютить Державу Божественного Веління — вона цілком може одразу напасти на нас!§!"
 SH_wg_conquest:"Реквізиція"
 SH_play_lost.51_desc:"Дуже прикро, але нам доведеться забрати потрібні ресурси з §Rваших інших сховищ§! — сподіваємось, це на вас не надто вплине."
 SH_pay_ship:"Не думайте, що я не знаю — ви вже збудували кілька військових кораблів. Поводьтесь чесно, не змушуйте мене попереджати вас ще раз!"
 SH_play_lost.6:"Занепад"
 SH_play_lost.6_desc:"Ми зазнали поразки в бою — і без того занепала держава занурюється в ще глибший занепад"
 SH_play_lost.8_desc:"Ми втратили забагато державної могутності в бою — і без того занепалий народ більше не підтримує наші дії"
 SH_play_lost.7:"Піднесення духу"
 SH_play_lost.7_desc:"§YНіщо не надихає так, як перемога.§!"
 player_awake_fight:"Відродження!"
 player_awake_fight_desc:"Після довгого мовчання ми нарешті прокинулись від занепаду — ми знову спрямуємо меч у вершину зоряного моря, обагримо кров'ю обряд Фен-Шань і розтрощимо Мандат під ногами!"
 player_awake_fight_option:"§HМи доведемо, хто справжній носій Мандата!§!"
 player_awake_fight_option1:"Інженерним кораблем можна збудувати §Hбойовий корабель «Небесний Палац» рівня Мандата§!."
 SH_chenqing1:"Клопотання: допомога постраждалим"
 SH_chenqing2:"Клопотання: незадоволені вимоги"
 SH_chenqing3:"Клопотання: покращення умов"
 SH_chenqing_desc1:"Народ [From.GetName] сподівається, що ми виділимо трохи ресурсів на допомогу тим, хто живе в скруті"
 SH_chenqing_desc2:"Занепалий народ [From.GetName] незадоволений становищем — чи слід нам їм допомогти?"
 SH_chenqing_desc3:"Народ [From.GetName] сподівається на виділення коштів для покращення умов життя"
 SH_chenqing_option1:"Погодитись на виділення коштів"
 SH_chenqing_option2:"Вимоги народу не задоволено, це посилить занепад\n§RКоли ресурсів недостатньо, кошти виділити неможливо§!"
 SH_chenqing_option3:"Рішуче відмовити"
 SH_play_lost.501.name:"Війна за Мандат"
 SH_play_lost.501.desc:"Після відродження ми одразу спрямували мету на нашого давнього ворога — §YДержаву Божественного Веління§!. Тепер, коли світ настільки змінився, доведемо: хто справжній носій §HМандата§!!"
 SH_fight_begame_fight:"Давно не бачились"
 SH_play_lost.502:"Перемога"
 tianming_tiangong_ship_can_bud:"Інженерним кораблем можна збудувати §KБойовий корабель «Небесний Палац» рівня Мандата§!"
 tianming_tiangong_ship_can_bud_again:"Відбудувати §KБойовий корабель «Небесний Палац» рівня Мандата§!"
 SH_play_lost.502_desc:"Пройшовши крізь незліченні труднощі, ми нарешті перемогли Мандат — тепер ми стоїмо на вершині зоряного моря, здійснили заповіт предків, завершили відродження держави, розтоптавши небесний морок під ногами."
 SH_play_lost.503_desc:"У війні за відродження ми домоглись проміжної перемоги — не можна розслаблятись, продовжуємо наступ!"
 SH_play_lost503:"Знову зазнали поразки"
 SH_play_lost.300name:"Бойовий корабель «Небесний Палац» рівня Мандата знищено"
 SH_play_lost.300desc:"У черговій катастрофічній битві наш флагман Мандата знищено — миттєво по всій державі поширилась втома від війни. Перш ніж відбудувати §HБойовий корабель «Небесний Палац» рівня Мандата§!, нам не уникнути періоду заворушень."
 SH_play_lost.503.desc:"Охоплені гнівом, ми спровокували давнього ворога §HДержаву Божественного Веління§! — попри мінливість долі, ми зазнали поразки. Можливо, нам уже ніколи не піднятись."
 SH_play_lost.507.desc:"Ми спрямували мету на нашого давнього ворога §HДержаву Божественного Веління§!, але в цій кампанії зазнали чималої невдачі — сподіваємось, ми зможемо оговтатись."
 SH_play_lost.502_option1:"Наше завдання виконано"
 SH_play_lost.502_option1_desc:"Завершити гру перемогою гравця"
 SH_play_lost.502_option2:"Ще стільки всього треба зробити."
 name_skylife_longthree:"Слуга небесного дракона"
 name_skylife_longthree1:"Слуга жадібності"
 name_skylife_longthree2:"Слуга гніву"
 name_skylife_longthree3:"Слуга омани"
 SH_play_lost.700:"Бойовий корабель «Небесний Палац» рівня Мандата збудовано"
 SH_play_lost.700_desc:"Бойовий корабель «Небесний Палац» рівня Мандата, що вражає весь всесвіт, добудовано. Цей велетенський флагман озброєний нищівною вогневою потужністю й здатен значно підсилювати можливості кораблів поблизу, дозволяючи нам розбивати будь-якого ворога стрімким наступом. Тепер лише безумець наважиться протистояти [owner.GetName]."
 SH_play_lost.14:"Прагнення відродження"
 SH_play_lost.14_desc:"Сильне прагнення відродження доводить нас майже до божевілля. Але саме в цю мить хтось запропонував: можна підкоритись, перейняти передові ідеї опонента й відмовитись від ворожості — це теж непоганий варіант."
 SH_play_lost_14_option1:"Так, так і слід зробити"
 SH_play_lost_14_option1_desc:"Дозволяє знизити складність гри через підкорення"
 SH_play_lost_14_option2:"Розправитись з усіма прихильниками підкорення..."
 SH_play_lost.21a:"Негайно розпустіть зайві військові кораблі!"
 SH_play_lost.21b:"§RМи розлютимо опонента, і ціна цього може бути непосильною§!"
 #Системи та уряди
 personality_SH_god_divine_empire:"§HДержава Божественного Веління§!"
 personality_SH_god_divine_empire_desc:"Держава Божественного Веління — особливий комплексний диктаторський уряд, де правителя вважають справжнім богом, що ходить землею, керуючи безмежною імперією зоряного моря."
 SH_play_system_start.NAME:"Ноїв ковчег"
 SH_play_system_start.DESC:"Спадок, залишений предками, і досі осяює нас"
