 SH_fallen_help_tag1:"Процес передачі слів посланцем не є таємним — інші занепалі імперії поступово зацікавляться вашим позитивним ставленням"
 SH_fallen_help_tag3:"Слова, передані посланцем, стимулюють занепалу імперію: її військова міць поступово зростатиме, а шанс пробудження підвищиться"
