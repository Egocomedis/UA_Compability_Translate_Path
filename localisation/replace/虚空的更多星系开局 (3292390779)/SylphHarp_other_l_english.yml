 origin_xzkz_guilaishengquan: "Відродження Священної Влади · Повернення минулих днів"
 origin_xzkz_guilaishengquan_desc: "Колись правили галактикою, але з плином часу, як і інші давні імперії, занепали — та, на відміну від інших, вони були забуті власним простором-часом, доки не впала кам'яна стела, не відбудувалась вежа, і не спалахнув вогонь зорі знову. Вони повернулись і готові знову зайняти трон зоряного моря."
 origin_xzkz_guilaishengquan_effects: "Початкова система має 3 планети Гея.\nПридатність до життя планет Гея не фіксується\nНа старті з часом розблоковуються деякі технології занепалих імперій та варіанти їх дослідження.\n§RЗанепалі імперії дещо посилено, щоб відповідати вашому давньому ворогу, що на вас чекає\nСповнене викликів походження§!"
 origin_SH_fallen_player:"Мандат більше не з нами · Де шукати порятунку"
 origin_SH_fallen_player_desc:"§RПопередження: надзвичайно складне походження§!\nЦя держава на межі краху, ледве вижила після розправи. Фінансовий дефіцит, внутрішні й зовнішні негаразди. Наразі становище хитке, тримається насилу.\nЗанепавши так, як нам віднайти впевненість у собі"
 origin_SH_player_start_effects_fallen:"Держава на старті контролює цілий §Yзоряний регіон§!, має §Eпевний прогрес розвитку§! та §Hчастину колоній§!. Після початку гри спрацюють ситуації §Rрозправи§! й §Rбанкрутства§!. Попередження: §Rобирайте договір про розправу вкрай обережно§! \n§RДержава цього походження настільки прагне відродження, що не може стати нічиєю васальною державою§!"
 origin_SH_win_empire:"Отримали небесне веління · Вічно й довговічно"
 origin_SH_win_empire_desc:"Ця держава з самого початку є домінантною силою системи — навіть давні занепалі імперії їй не страшні."
 origin_SH_win_empire_desc2:"На старті одразу стає особливою §Kпередовою державою§! і отримує численні §Bресурси та наукові матеріали§!."
 SH_play_lost_6_name:"Поразка"
 SH_play_lost_6_desc:"Наш воєнний лідер беззастережно капітулював, обидві сторони припинили вогонь. Ворог розпочинає розправу над нашою власністю — вони не зупиняться на цьому..... сподіваємось, ми ще виживемо."
