 SH_fallen_like_you_ap:"Прихильність частини занепалих імперій"
 SH_fallen_like_you_ap_desc:"Ваш вибір задовольнив більшість занепалих імперій наявним станом справ"
 SH_fallen_jianshi_tianzai_ap:"Нагляд занепалих імперій"
 SH_fallen_jianshi_tianzai_ap_desc:"Наша усна обіцянка викликала сильну цікавість занепалих імперій — вони почали стежити за нашими діями, нам потрібно вживати певних показових заходів, щоб заспокоїти їхні почуття"
 SH_fallen_fennu_xiuzheng:"Модифікатор гніву занепалих імперій"
 SH_fallen_waijiao_tiaokan1:"Наукова підтримка занепалих імперій"
 SH_fallen_waijiao_tiaokan1_desc:"Підтримати запитувані занепалою імперією витрати"
 SH_fallen_waijiao_tiaokan2:"Технологічна підтримка"
 SH_fallen_waijiao_tiaokan2_desc:"Пришвидшення досліджень, надане занепалою імперією"
 holy_xzkz_beiyiwangdediguo_desc:"Затяті старомодні консерватори в державі все ще утримують більшість впливу — складність нашої експансії лише зростатиме разом із розміром держави"
 fallen_SH_xianqv:"Модифікатор множника лиха"
 fallen_SH_xianqv_modifi:"Фіксований модифікатор"
 sleep_lion:"Сплячий лев"
 sleep_lion1:"Сплячий лев"
 SH_fallen_tianzai_power:"Відроджена імперія"
 SH_fallen_tianzai_power_desc:"Сплячий велет уже прокинувся — хто стане першим, хто спробує зупинити колесо історії власними руками"
 civic_SH_ship_debuff:"Військо переможця: занепад"
 civic_SH_ship_debuff_desc:"Наразі терпимо, уникаючи вістря клинка."
 civic_SH_ship_1:"Військо переможця: піднесення"
 civic_SH_ship_1_desc:"Час настав — сьогодні піднімаємо війська!"
 civic_SH_ship_2:"Військо переможця: щит"
 civic_SH_ship_2_desc:"Хай лише я одноосібно бороню цей корабель — нехай тисячі коней не лякають."
 civic_SH_ship_3:"Військо переможця: оборона"
 civic_SH_ship_3_desc:"Зміцнюємо мури, спустошуємо поля, щоб зламати натиск ворога."
 civic_SH_tech_1:"Залишок"
 civic_SH_tech_1_desc:"Скоригований завод поповнення наукових ресурсів"
 civic_SH_tech_2:"Коригування"
 civic_SH_tech_2_desc:"Зменшити витрати на дослідження заради поповнення заводу"
 civic_SH_tech_3:"Компенсація"
 civic_SH_tech_3_desc:"Не досягли очікуваного — компенсуємо дослідженнями"
 ai_tianming_sky:"Мандат"
 mod_damage_vs_country_type_default_mult:"Шкода проти звичайних держав"
 mod_damage_vs_country_type_SH_crisis_fallen_xianqv_mult:"Шкода проти першопрохідців-занепалих"
 SH_play_game_lost_1:"§RЗанепад§!"
 SH_play_game_lost_1_desc:"Держава зазнала поразки — як нам повернути впевненість?"
 SH_planet_game_lost_tiaoyue1:"§RДоговір про космічні кораблі§!"
 SH_planet_game_lost_tiaoyue2:"§RДоговір про дослідницькі матеріали§!"
 SH_planet_game_lost_tiaoyue3:"§RДоговір про міжзоряний ковчег§!"
 SH_planet_game_lost_tiaoyue3_desc:"§HМіжзоряний ковчег§! більше не належатиме [From.GetName]"
 SH_planet_game_lost_tiaoyue4:"§RДоговір про престиж лідерів§!"
 SH_planet_game_lost_tiaoyue5:"§RВоєнні репарації§!"
 SH_planet_game_lost_tiaoyue5_desc:"Наш народ докладає зусиль, щоб зібрати репарації"
