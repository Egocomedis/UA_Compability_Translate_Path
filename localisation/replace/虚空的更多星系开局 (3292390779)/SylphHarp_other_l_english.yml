 # Події
 SylphHarp_fallen_events_other.8:"Дипломатія занепалих імперій"
 SylphHarp_fallen_events_other.8_desc:"Минуло чимало часу, багато старих облич уже зникли, нових майже не з'являлось, і навіть колись активні тепер затихли. Хоча між нами й лишилось чимало непорозумінь, згадати минуле все ж не завадить... далі посланець передасть наші слова, нам залишається лише чекати на відповідь"
 SylphHarp_fallen_events_other.8_descop1:"Налагодити стосунки згори донизу"
 SylphHarp_fallen_events_other.8_descop2:"Оце несподіванка, що вони ще живі"
 SylphHarp_fallen_events_other_11op:"Дванадцять тисяч років? А чи, може, тридцять тисяч? Час давно стерся з пам'яті — а ви повернулись. Ті флотилії заліза й вогню, той рій, що галасував у порожнечі. Ви принесли нові зоряні карти, нові поклади руди, можливо, навіть нові бойові прапори — так само, як колись майоріли ваші прапори в Небесній Війні. Але яке нам до цього діло? Про ваше існування ми давно забули. Ваше повернення — лише чергове відлуння прадавнього відлуння."
 SylphHarp_fallen_events_other_11op_desc:"§IЗанепала імперія наразі не виявляє бажання спілкуватися з нами — подальші варіанти подій із посланцями вплинуть на позицію фіналу, можливо, вони стануть нашими надійними союзниками§!"
 SylphHarp_fallen_events_other_11op1:"Активна відповідь"
 SylphHarp_fallen_events_other_11op2:"Байдужість"
 SylphHarp_fallen_events_other_11op3:"Виявити ворожість"
 SylphHarp_fallen_events_other_12op:"Дивитись на те, як жалюгідно ви борсаєтесь, — справжня жалість. Просто стоячи там, ви нагадуєте маленьку тваринку, що жебракує з жалю. Але нічого, виконайте мою вимогу — і я, звісно, зроблю вам подарунок."
 SylphHarp_fallen_events_other_13op:"Хіба вам не цікаво, чому його кораблі завжди перемагали? Нам, у всякому разі, цікаво. Чули, що ви знайшли залишений ним корабель — ми вже вислали дослідницький корабель, щоб виловити його уламки. Якщо ви нам трохи допоможете, ми віддячимо."
 SylphHarp_fallen_events_other_14op:"Занепала імперія дотримала слова й передала вам частину відремонтованого корабля. При цьому зазначили, що матеріалів для цього типу кораблів обмаль, і масове виробництво неможливе навіть після дослідження — те, що маємо на руках, — це, по суті, все, що лишилось."
 SylphHarp_fallen_events_other_14op1:"У вашій столиці з'явився корабель із деталями прадавніх першопрохідців"
 SylphHarp_fallen_events_other_15op:"Днів, коли ваш нинішній образ ще перетинається з минулим, лишається дедалі менше — ви, можливо, замислитесь, чи варто заново починати давню історію. Час, здається, не стирає вашу ненависть, але якщо ви більше не шукатимете минулого, минуле й не знайде вас. Не повторюйте старих помилок!"
 SylphHarp_fallen_events_other_15op1:"Я лише сподіваюсь, що ви не станете проти мене"
 SylphHarp_fallen_events_other_15op2:"Здається, ви втручаєтесь трохи забагато"
 SylphHarp_fallen_events_other_16op:"Ваша наука схожа на каліку без милиць — якщо ви сподіваєтесь на прорив за такої швидкості досліджень, це справді смішно. Але якщо ви впадете навколішки й благатимете, я міг би поступитись кількома застарілими книжками для дітей молодшої школи, хе-хе."
 SylphHarp_fallen_events_other_17op:"Ваш зв'язок із занепалими імперіями дедалі міцніший, деякі відомства навіть досягли певних результатів у переговорах. Долучитесь до проєкту?"
 SylphHarp_fallen_events_other_18op_title:"Більше не пасивні"
 SylphHarp_fallen_events_other_18op:"Як успішно відроджена колишня імперія, ми маємо право визначати подальший курс"
 SylphHarp_fallen_events_other_18op_desc1:"Зберігати активний зв'язок"
 SylphHarp_fallen_events_other_18op_desc2:"Перш ніж битися з давнім ворогом, треба прибрати ще дещо"
 SylphHarp_fallen_events_other_18op_desc2_tooltip:"Негайно оголосити війну іншим занепалим імперіям — вони одразу перейдуть у бойову готовність, і розпочнеться Небесна Війна\n§RБагато залежить від результатів подій — збережіться перед вибором.§!"
 SylphHarp_fallen_events_other_18op_desc3:"Продовжити виявляти ворожість"
 SylphHarp_fallen_events_other_20op:"Дурні сирітки! Що ви робите! Ви намагаєтесь ступити на цей шлях без вороття — що ви взагалі хочете довести! Попереджаємо вас: не намагайтесь перетнути межу, краще зупиніться зараз!"
 SylphHarp_fallen_events_other_20op1:"Лицемірна покора"
 SylphHarp_fallen_events_other_20op2:"Ще не вам нас повчати!"
 SylphHarp_fallen_events_other_21op:"Занепала імперія вельми задоволена вашим вибором — безпека зоряного моря завжди була справою кожного, і вона вирішила нагородити вас за безкорисливість. Звісно, відмовитись не можна (окремі посланці ставляться до цього зневажливо)"
 SylphHarp_fallen_events_other_22op:"Що ви робите! Ваша зухвалість уже порушила табу! Вам слід пообіцяти більше не переступати межу — час нарешті усвідомити своє справжнє становище!"
 SylphHarp_fallen_events_other_22op1:"Такого більше не повториться!"
 SylphHarp_fallen_events_other_22op1_desc:"Ваша слабкість не втамувала гнів занепалої імперії — вони й далі лишатимуться з вами у стані війни. Але якщо ви §Yзнову переступите межу§!, інші занепалі імперії неодмінно §Rпідготуються§!"
 SylphHarp_fallen_events_other_22op2:"Чого боятися?"
 SylphHarp_fallen_events_other_22op2_desc:"Ваша зухвалість розлютила опонента — усі флоти вже готові до бою, §Rсплячий лев прокидається негайно!§!"
 SylphHarp_fallen_events_other_22op3:"Вибачте..."
 SylphHarp_fallen_events_other_22op3_desc:"Ми визнали свою помилку — здається, доведеться довго тонути в цих хвилях втрати"
 SylphHarp_fallen_events_other_23op_title:"Посланці більше не приходять"
 SylphHarp_fallen_events_other_23op:"У цій військовій кампанії посланців більше немає — нам відповідають лише спалахи вогню флотів"
 SylphHarp_fallen_events_other_23op1:"Нарешті ці старі стерв'ятники дали мені спокій"
 SylphHarp_fallen_events_other_23op1_desc:"Повністю розриває зв'язок посланців із занепалими імперіями — якщо є інші занепалі імперії, будь-яка зі звичайних занепалих імперій візьме участь у війні (ця подія не впливає на розстановку сил у фінальній події з давнім ворогом)"

 SylphHarp_awaken_fallen_events.3_desc:"Правильніше сказати не те, що ми успішно виявили й позначили його, а те, що він сам зв'язався з нами... Схоже, звістка про наше повторне панування над усією системою не лишилась ними непоміченою. Ми — вічні давні вороги, наша ненависть жодного разу не згасла з плином часу — ми прокинулись від сну, аби продовжити прадавнє протистояння на полі бою всієї системи."
 SylphHarp_awaken_fallen_events.3_desca:"Заради слави флоту ми знову відтворимо небеса!"
 war_goal_SH_fallen_war_in_heaven:"Небесна Війна"
 SylphHarp_awaken_fallen_events.11:"Відроджені втягнуті у війну!"
 SylphHarp_awaken_fallen_events.11_desc:"Держава давнього ворога вважає інші занепалі імперії нашими союзниками — з пихатим виглядом він оголосив війну всім відродженим, хто хоч трохи контактував із нами! Занепалі імперії не сидітимуть склавши руки — більшість відроджених уже прокинулись від сну, і хоча між нами є певні непорозуміння, зараз доводиться стати на один бік."
 SylphHarp_awaken_fallen_events.11_desca:"Це шлях, який він обрав сам"
 SylphHarp_awaken_fallen_events.11_descb:"Ха-ха, старий, і в тебе настав такий день!"
 SylphHarp_awaken_fallen_events.12:"Шалена помста!"
 SylphHarp_awaken_fallen_events.12_desc:"Держава давнього ворога шалено оголошує війну всім звичайним державам, незалежно від ідеології чи стосунків. З пихатим виглядом він перетворив усю систему на поле бою й розпалив полум'я війни."
 SylphHarp_awaken_fallen_events.12_desca:"Якщо він хоче війни — буде йому війна"
 SylphHarp_awaken_fallen_events.13:"Несподівана коаліція"
 SylphHarp_awaken_fallen_events.13_desc:"Звістка про оголошення війни давнім ворогом швидко розповсюдилась. Хоча наші дипломатичні посланці доклали всіх зусиль, щоб зв'язатися з дружніми державами, у відповідь надійшли лише повідомлення про оголошення війни — поточна ситуація вкрай несприятлива для нас."
 SylphHarp_awaken_fallen_events.13_desca:"Вони можуть стояти за мною, але не проти мене"
 SylphHarp_awaken_fallen_events.14:"Людські зусилля вичерпано, волю небес не подолати"
 SylphHarp_awaken_fallen_events.14_desc:"Ми зробили все можливе, але ситуація все одно розвивається в непередбачуваному напрямку. Втім, не всі відмовили нам — союз неодмінно зростатиме дедалі більше."
 SylphHarp_awaken_fallen_events.14_desca:"Ми неодмінно подолаємо перешкоди"
 SylphHarp_awaken_fallen_events.15:"Пролог війни"
 SylphHarp_awaken_fallen_events.15_desc:"Усі посланці вже доповіли новини — ситуація в системі остаточно визначена, але від цієї війни, що охопить усю систему, нікому не втекти неушкодженим."
 SylphHarp_awaken_fallen_events.15_desca:"Розпочинаємо"

