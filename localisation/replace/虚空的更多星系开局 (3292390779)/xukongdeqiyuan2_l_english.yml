 DISTAR_XZKZ_WEIGUANG: "Таємниче мерехтіння"
 DISTAR_XZKZ_DISTAR_XZKZ_WEIGUANG_DESC: "Тут сяє таємниче мерехтіння, тут повно невідомого."
 xzkz_weiguang: "Мерехтіння"
 xzkz_weiguang_desc: "Тут перетинаються таємниця та наука."
 xzkz_weiguangfushe: "Мерехтливе випромінювання"
 xzkz_weiguangfushe_desc: "Тут сяє таємниче мерехтіння."
 xzkzyidongxingxiewai.01.title: "Мерехтіння"
 xzkzyidongxingxiewai.01.desc: "Після тривалого дослідження й аналізу виявилось, що в цій чорній дірі приховане таємниче явище, яке безперервно породжує дещо зване мерехтінням — цю річ можна назвати першоджерелом магії. Ми можемо дослідити мерехтіння глибше."
 xzkz_jianzaoweiguang: "Оце краса"
 xzkz_weiguangchanyu: "Спадок мерехтіння"
 xzkz_weiguangchanyu_desc: "Хоча суть мерехтіння вже не тут, під його тривалим впливом лишився незгасний слід мерехтіння."

 xzkz_shengmingxingxing: "Жива планета"
 xzkz_shengmingxingxing_desc: "Ця планета має власну волю планети — вона жива."

 xzkz_weiguang_sites: "Мерехтіння"
 xzkz_weiguang_sites_intro: "У цій системі існує явище, зване мерехтінням.\n\nРекомендується подальше дослідження."

 xzkz_weiguang_sites_desc: "Мерехтіння сяє по всій системі."
 xzkzyidongxingxiewai.02.name: "Властивості мерехтіння"
 xzkzyidongxingxiewai.02.desc: "Мерехтіння осяює всю систему, можна навіть сказати, що воно наповнює всю систему. Здається, воно ледь помітно впливає на структуру світу, роблячи сам світ якимось «дводимірнішим»? Можливо, ця зміна досягається через вплив на світло. Подальші відкриття показують, що мерехтіння здатне зливатися з нами, даруючи нам магію."
 xzkzyidongxingxiewai.02.a: "Продовжити розслідування"

 xzkzyidongxingxiewai.03.name: "Суть мерехтіння"
 xzkzyidongxingxiewai.03.desc: "Суть мерехтіння та цього таємничого явища — щось конкретне: можливо, це гіпервимірний кокон, можливо, коштовний камінь поза часом-простором. Хай там що це, наші науковці вірять, що можна знайти спосіб визначити місцезнаходження суті мерехтіння."

 xzkzyidongxingxiewai.04.name: "Обшук системи"
 xzkzyidongxingxiewai.04.desc: "Ми обстежили всі планети системи, дослідили присутнє на них мерехтіння й визначили місцезнаходження суті мерехтіння — це щось на кшталт кокона, що перебуває всередині горизонту подій чорної діри. Мерехтіння визначено, залишилось лише одне питання: що нам із ним робити?"

 xzkzyidongxingxiewai.05.a: "Я опаную суть мерехтіння"
 xzkzyidongxingxiewai.05.b: "Перенести це до нашої столиці"
 xzkzyidongxingxiewai.05.c: "Хай мерехтіння й далі сяє в цій системі"

 xzkzyidongxingxiewai.05.name: "Ефірний кокон"
 xzkzyidongxingxiewai.05.desc: "Суть мерехтіння сяє світлом — це і є суть мерехтіння, Ефірний кокон"

 d_xzkz_weiguangta: "Вежа мерехтіння"
 d_xzkz_weiguangta_desc: "Тут сяє суть мерехтіння — тепер ми можемо використовувати магію мерехтіння."

 leader_trait_xzkz_weiguangzhijian: "Володар мерехтіння"
 leader_trait_xzkz_weiguangzhijian_desc: "Цей лідер повністю опанував і злився із суттю мерехтіння."
 xzkz_yidongxingxi_xuanbiE_system_name: "Небесний сад"

 r_xzkz_tianzhijing: "Небесний кришталь"
 r_xzkz_tianzhijing_desc: "Володіє неймовірною силою, з його допомогою можна звернутись по допомогу до предків."

 r_xzkz_tianzhijing_effect: "Один із наших лідерів може отримати рису §YОбранець долі§!."

 xzkz_tiankongtingyuan_sites: "Прадавній палац"
 xzkz_tiankongtingyuan_sites_intro: "На цій планеті є комплекс прадавніх споруд.\n\nРекомендується подальше дослідження."
 xzkz_tiankongtingyuan_sites_desc: "На цій планеті розкинувся величезний давній архітектурний комплекс."

 xzkzyidongxingxiewai.06.name: "Палац"
 xzkzyidongxingxiewai.06.desc: "Ландшафт усієї планети надзвичайно природний і стабільний — можливо, це витвір самої природи, а можливо, витончений штучний задум, недосяжний для нашого розуміння. Прадавні споруди на планеті переважно зосереджені на найвищому гірському хребті, за формою нагадуючи давній палац — величний, величезний прадавній палац."

 xzkzyidongxingxiewai.07.name: "Прадавні фрески"
 xzkzyidongxingxiewai.07.desc: "Усередині палацу є величезна кількість прадавніх фресок, вирізьблених у своєрідній математичній і логічній формі на міцному камені. На них зображені прадавні історії та легенди."

 xzkzyidongxingxiewai.08.name: "Спільне коріння"
 xzkzyidongxingxiewai.08.desc: "У прадавньому палаці виявлено величезну кількість капсул сну — але всі вони вже вийшли з ладу, а живі істоти всередині зникли. Проте ці істоти напрочуд схожі на нас — можливо, у нас спільне коріння? Потрібне подальше дослідження всіх руїн."

 xzkzyidongxingxiewai.09.name: "Правда"
 xzkzyidongxingxiewai.09.desc: "Тепер уся правда відома — наше походження, унікальність нашої системи. Ці руїни розповідають історію: у прадавні часи всесвіт, у якому жили наші предки, стояв на межі знищення. Тож вони зібрали ресурси й викували цю систему, а потім витратили ще десятки тисяч років, перетворивши всю систему на фортецю й ядро. Після цього за допомогою якогось прадавнього пристрою вони перенесли всю систему в наш нинішній всесвіт. У цьому процесі, через нещасний випадок, пристрій збереження предків вийшов з ладу — їхні технології зникли, споруди поглинув час, і вижила лише невелика група нащадків. Хоча вони забули все, вони почали заново — і це те, що є зараз...\n\nУ скарбниці руїн є коштовний камінь, залишений нам предками. Здається, вони передбачили і кінець, і майбутнє — за переказами, цей камінь є квінтесенцією колишнього всесвіту після його загибелі; у ньому міститься наше море душ. Можливо, наші предки саме зараз дивляться на нас зсередини нього."

 xzkzyidongxingxiewai.09.a: "Забрати §MНебесний кришталь§!"
 d_yuangugongdian_deposit: "Прадавній палац"
 d_yuangugongdian_deposit_desc: "Тут височить величний прадавній палац."

 d_xushushengwu_deposit: "Занепад"
 d_xushushengwu_deposit_desc: "Тут існує явище, зване Занепадом, і похідні від нього істоти."

