 xzkz_yueqiu: "Занепалий місяць"
 xzkz_danganguan: "Архів"

 xzkz_yuangujianchuanjidi_sites: "Прадавня корабельна база"
 xzkz_yuangujianchuanjidi_sites_intro: "На планету впав величезний комплекс корабельних баз.\n\nРекомендується подальше дослідження."
 xzkz_yuangujianchuanjidi_sites_desc: "На планету впав величезний комплекс корабельних баз."

 d_gulaodanganguan_deposit: "Давній архів"
 d_gulaodanganguan_deposit_desc: "Прадавній архів, що стоїть донині, зберігає знання й культуру минулих епох."

 xzkzyidongxingxiewai.10.name: "Корабельна база"
 xzkzyidongxingxiewai.10.desc: "На цій планеті розкидано безліч розбитих кораблів, особливо густо — в екваторіальній зоні, де утворився величезний комплекс уламків корабельних баз."
 xzkzyidongxingxiewai.11.name: "Усередині бази"
 xzkzyidongxingxiewai.11.desc: "Усередині бази звивисті й заплутані коридори, схожі на лабіринт. Тут виставлено безліч покинутих роботів і прадавніх кораблів, чия конструкція вражає своєю передовістю."
 xzkzyidongxingxiewai.12.name: "Ядро даних"
 xzkzyidongxingxiewai.12.desc: "Ми знайшли відсік із даними, у якому було ядро. Наші науковці зуміли видобути з нього дані, але більшість вмісту пошкоджено або втрачено — цілим лишилась лише невелика частина. Урешті-решт ми успішно видобули модель даних прадавнього корабля та частину наукових матеріалів.\n\nМи також виявили, що цей відсік із даними обслуговувався ще кілька тисяч років тому, хоча весь комплекс споруд зазнав катастрофи десятки тисяч років тому — потрібне подальше розслідування."
 xzkzyidongxingxiewai.13.name: "Уламки бойового корабля"
 xzkzyidongxingxiewai.13.desc: "Величезні уламки бойового корабля пронизують і перетинають споруду, зберігшись порівняно добре. У попередніх даних, здається, згадувався саме такий тип корабля. Наші науковці просканували конструкцію цього корабля й, поєднавши це з попередньою неповною моделлю даних, успішно побудували теоретичну модель цього прадавнього корабля.\n\nКрім того, після тривалого дослідження порівняно збережених бойових кораблів у руїнах ми виявили технологію, здатну проходити крізь червоточини."
 xzkzyidongxingxiewai.14.name: "Останні прадавні роботи"
 xzkzyidongxingxiewai.14.desc: "У величезному відсіку ми виявили велику кількість зупинених роботів — найраніші записи їхньої активності датуються кількома тисячами років тому, тобто вони, можливо, і були тими самими обслуговувальниками. Ми можемо їх активувати."

 xzkzyidongxingxiewai.14.a: "Активувати їх"
 xzkzyidongxingxiewai.14.b: "Розібрати на сплави"

 xzkzyidongxingxiewai.15.title: "Прадавні роботи"
 xzkzyidongxingxiewai.15.desc: "Повторна активація...\n\nЗапуск протоколу\n\nТермінал працює...\n\nПочинаю сканування...\n\nПідтверджено: ви — творець. Чи є нові інструкції?"
 xzkzyidongxingxiewai.15.a: "Ми — творці?"
 xzkzyidongxingxiewai.15.a.response: "База даних підтверджує зі 100% упевненістю: ви — творці.\n\nЧи є якісь інструкції?"

 xzkzyidongxingxiewai.15.b: "Якою була стара інструкція?"
 xzkzyidongxingxiewai.15.b.response: "Обслуговувати корабель, базу\nПротягом десятків тисяч років ми безперервно обслуговували базу, доки не вичерпалась енергія й ми не перейшли в режим очікування"
 xzkzyidongxingxiewai.15.c: "Приєднуйтесь до нас"
 xzkzyidongxingxiewai.15.c.response: "Нову інструкцію підтверджено: інтеграція до держави"

 xzkzyidongxingxiewai.16.name: "Бойовий гігант"
 xzkzyidongxingxiewai.16.desc: "У центральній частині комплексу баз ми виявили неймовірно велетенську річ — прадавній гігантський бойовий корабель. На кораблі є чимало слідів обслуговування — очевидно, саме завдяки тривалому догляду роботів він зумів вціліти дотепер. Наші науковці просканували весь гігантський корабель і побудували його модель даних, але щоб відтворити цей бойовий корабель, нам ще потрібно пройти довгий шлях."
 xzkzyidongxingxiewai.17.name: "Дослідження завершено"
 xzkzyidongxingxiewai.17.desc: "Ми завершили дослідження всієї бази, отримавши з неї величезну кількість наукових даних."
 xzkzyidongxingxiewai.17.a: "Завершити розслідування"
 xzkz_xingxikongzhizhuangzhi: "Пристрій контролю системи"
 d_chuansongzhuangzhi_deposit: "Ядро телепортації системи"
 d_chuansongzhuangzhi_deposit_desc: "Величезний прадавній пристрій, здатний слугувати ядром для телепортації чи перенесення всієї системи або відкриття брами в мультивсесвіт."
