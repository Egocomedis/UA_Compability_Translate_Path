 origin_xzkz_yidongxingxi: "Внутрішнє море зірок"
 origin_xzkz_yidongxingxi_desc: "Прадавня цивілізація народилась у втраченому світі — зрештою вони створили диво: покинули свій прабатьківський всесвіт разом із власноруч викуваною зоряною системою, вирушили в мультивсесвіт і зрештою прибули сюди."
 origin_xzkz_yidongxingxi_effects: "§YПочаткова позиція:§! Внутрішнє море зірок\nЦя система має надзвичайно багаті ресурси й контент.\n§HРозкішне походження виживання на небесному острові§!"

