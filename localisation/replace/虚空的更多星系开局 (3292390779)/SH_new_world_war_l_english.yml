  NNW_cirisi_god_ship_m:"Лінійний крейсер"
  NNW_cirisi_god_ship_l:"Титан"
  NNW_cirisi_god_ship_bu:"Інженерний корабель"
  NNW_main_ship_hexing:"Кількість основних ядер маркування даних"
  NNW_time_return_crisis:"Зворотний відлік до лиха"
  NNW_can_bud_real:"Можна редагувати реальність"

  bud_real_is_on:"Редагування всесвіту виконано"
  SH_new_world_war_501:"Часті помилки"
  SH_new_world_war_502:"Фальшива реальність"
  SH_new_world_war_504:"Розірвана завіса"
  SH_new_world_war_502_desc:"Відколи ми прибули в цей всесвіт, незрозумілі речі трапляються одна за одною. Тоді ми були зайняті ремонтом Голки й розвитком держави, тож не встигли розібратись. Тепер Голку вже відремонтовано, але ці проблеми не лише не зникли, а й ще більше загострились — вони вже виходять за межі нашого розуміння. Наукова сфера зазнає невдач одна за одною — чи це через зловживання законами всесвіту? Чи проявились приховані проблеми з минулого? Ми поки не знаємо."
  SH_new_world_war_503_desc:"Останнім часом дедалі більше звітів показують, що проблеми виникають не лише в науці — інженерія та суспільна сфера теж дають збої. Навіть базовий здоровий глузд починає підводити: пришвартовані кораблі раптово з'являються на далеких планетах, орбітальні пости безпричинно зникають, дані незрозуміло як пропадають. Відредагована реальність стає некерованою. Нам потрібно нарешті поглянути в очі тому напрямку, якого ми весь час уникали."
  SH_new_world_war_504_desc:"Щойно надійшли телеметричні дані — поблизу зафіксовано масштабні коливання матерії. Хоча ніхто з нас нічого не помітив, система раннього попередження вже відреагувала. Щойно стався слід редагування реальності, спричинений не нами — навіть наш час, у якому ми перебуваємо, було відредаговано. У цій системі щось змінилося!"
  SH_new_world_war_502a:"Розслідувати ретельно"
  SH_new_world_war_502b:"Чого хвилюватись?"
  SH_new_world_war_502c:"Добре"
  SH_new_world_war_503a:"Дуже схоже на те, коли ми щойно прибули"
  SH_new_world_war_503b:"Стабілізувати реальність"
  SH_new_world_war_504a:"Гості не з добрими намірами"
  SH_new_world_war_504b:"§gВерховний правителю... вони так схожі на нас..§!"
  SH_new_world_war_510:"Ціль успішно виявлено. §R$name_shaozhan_real_bud$§! активовано.\n\nВаше руйнування реальності на цьому закінчується — у майбутньому ви завдасте системі непоправної шкоди. Я повернувся з однією метою: зупинити вас, зупинити все, що ви заподієте в майбутньому!"
  SH_new_world_war_510a:"Чому?"
  SH_new_world_war_511:"Звідки з'явились?"
  SH_new_world_war_511_desc:"З'явилась невідома сила, що також володіє силою редагування — ми не знаємо їхніх мотивів,\nхай там як, нам потрібно почати діяти"
  SH_new_world_war_511a:"§KУсі війська — у бойову готовність!§!"

  SH_new_world_war_512_1:"Я ж уже стільки разів попереджав тебе! Не повторюй помилок знову і знову!"
  SH_new_world_war_512_2:"Зупинись, поки не пізно повернутись, — ти навіть не розумієш, яку силу тримаєш у руках"
  SH_new_world_war_512_3:"Редагування реальності не спокутує провини. Шрами часу не загоюються."
  SH_new_world_war_512_4:"Маючи таку силу, стати демоном дуже легко."
  SH_new_world_war_512_5:"Спокутувати провину більше не потрібно... лише зачекай. Наші помилки розвіються, наче дим"
  SH_new_world_war_512_6:"Озирнись довкола — скільки з цього справжнє?"
  SH_new_world_war_512_7:"§RРедагування реальності незворотне§!"
  SH_new_world_war_512a:"Хто ви такі"
  SH_new_world_war_512a_desc:"Ми — це ви."
  SH_new_world_war_512b:"Навіщо ви це робите"
  SH_new_world_war_512b_desc:"Врятувати цей всесвіт, що вже хитається на межі падіння, спокутувати нашу провину..."
  SH_new_world_war_512c:"Спокутувати провину?"
  SH_new_world_war_512c_desc:"§RРедагування незворотне§! Будь ласка, припиніть надмірне редагування всесвіту!"
  SH_new_world_war_512d:"Суцільні дурниці"
  SH_new_world_war_512hp:"§RМи зробимо, як ви кажете§!"
  SH_new_world_war_512hp_desc:"Дуже добре..."
  SH_new_world_war_513:"Ніхто не відповідає"
  SH_new_world_war_513_desc:"Після завершення взаємодії вони більше не відповідають. Хоча ми втратили здатність редагувати, до завершення ситуації ми все ще можемо обрати перемогти їх..."
  SH_new_world_war_513a:"Цікаво"
  SH_new_world_war_513b:"Марно..."

  SH_new_world_war_512op:"§RЗрадник§!"
  SH_new_world_war_512ed:"Що нам робити?"
  SH_new_world_war_512op_desc:"§RНевиправний§!!"
  SH_new_world_war_512ed_desc:"§RЗнищити Голку§!... відмовитись від редагування реальності, чекати..... спокутувати провину!"
  real_has_bud_mub:"Кількість вимірних осередків редагування в регіоні"

  SH_new_world_war_531:"Розірване майбутнє"
  SH_new_world_war_531_desc:"Цей всесвіт уже сильно постраждав від протистояння, закони всесвіту дедалі більше хилиться до хаосу, складність редагування значно зросла й стала вкрай нестабільною..."
  SH_new_world_war_531a:"Просто знайти новий всесвіт"
  SH_new_world_war_531a_desc:"Запускаємо редагування реальності, вирушаємо до нового всесвіту"
  SH_new_world_war_531b:"Минуле потребує завершення — нам треба щось із цим зробити"
  SH_new_world_war_531b_desc:"Повернутись у минуле, зупинити себе минулого."
  SH_new_world_war_531c:"Це погано? Я так не вважаю"
