  SH_new_world_war_23_desc:"Наше редагування реальності досягло вершин майстерності — чи то перетворення планети на зорю, чи зорі на землеподібну планету — усе стається за мить...\n\n§HАле енергетичні коливання зорі надзвичайно сильні, тож науковці не радять проводити надто сміливі редагування, особливо перетворення зорі на планету...§!"
