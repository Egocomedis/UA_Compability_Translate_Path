  # Події
  SH_new_world_war.2.name:"Після безмежності"
  SH_new_world_war.2.desc: "$crisis.7516.intro$Численні звіти даних свідчать, що наша ситуація, можливо, не найкраща, але, на щастя, модуль редагування досі онлайн. Попри це нам усе одно потрібно чимало часу, щоб полагодити й налаштувати корабель у пошуках іншої чорної діри для проникнення.\n\n\nБудь ласка, не використовуйте $SH_new_world_war_ship_cap$ для колонізації планет — Голку буде покинуто, і подія обірветься."
  SH_new_world_war2:"Запустити редагування всесвіту"
  SH_new_world_war2_a:"План уже успішно виконано, нам нема чого панікувати!"
  SH_new_world_war2_a_desc:"§HЧого тепер хвилюватись??\n§RМи вже досягли успіху!§! Через редагування реальності всі проблеми буде вирішено.§!\n\nСтаємо §HЗанепалою імперією§!\nРівень технологій піднімається до §ET3§!\nПісля §IпробудженнЯ§! розпочинається ситуація §H$situation_SH_new_world_war$§!\n§gнадзвичайно складна§!"
  SH_new_world_war2_b_desc:"§BПочинаємо перевіряти закони перезапису цього всесвіту. §!"
  SH_new_world_war.3.name:"Невдалий провал"
  SH_new_world_war.3.desc:"Це нелогічно, але це факт. Хай як ми старались, редагування реальності лишається тимчасовим. Закони простору вже виявили впертий, незмінний характер — жодних змін статись не може\nШторм не лише пошкодив Голку, а й зачепив нашу базу даних — багаторічні дослідження зазнали непоправної шкоди. Багато теорій доведеться виводити заново з нуля.\nШлях крутий і небезпечний, та наполегливість зрештою приведе до успіху."
  SH_new_world_war.3.desc.a:"Що ж, розпочнімо."
  SH_new_world_war.9.name:"Робота з ремонту Голки"
  SH_new_world_war.9.desc:"Ремонт Голки вже затверджено й підписано, кошти виділено. Усі завдання просуваються стабільно. Пильно вдивляючись у мерехтливі дані на голографічному екрані, поступово поринаєш у роздуми."
  SH_new_world_war.11.name:"Попередній ремонт Голки"
  SH_new_world_war.11.desc: "Попередній ремонт Голки завершено — тепер ми можемо визначити напрям свого розвитку!"
  SH_new_world_war.11.desc.a:"Не можна розслаблятись, ще стільки роботи попереду"
  SH_new_world_war.11.desc.b:"Добре"
  SH_new_world_war.11.desc.c:"Непогано — можливо, варто трохи відсвяткувати?"
  SH_new_world_war.13.name:"Побудова модуля редагування Голки"
  SH_new_world_war.13.desc:"Голку повністю відремонтовано, але вона втратила здатність проникати в новий небокрай;\nЗдатність до редагування реальності частково відновлена, але наразі діє лише на саму Голку — сфера дії вкрай обмежена."
  SH_new_world_war.15.desc:"Функція редагування реальності здебільшого відновлена — тепер ми можемо проводити обмежене редагування реальності в межах усієї держави через укази.\nМасштабне редагування несе приховані ризики\nЗі зростанням частоти редагувань більшість редагувань ставатимуть дедалі складнішими"
  SH_new_world_war.17.name:"Редагування реальності"
  SH_new_world_war.17.desc:"Голку повністю відремонтовано — тепер ми можемо робити сміливі рішення через укази! Голка також може вільно редагувати систему, у якій перебуває. Творіть сміливо!"
  SH_new_world_war.17.desc.a:"Наскільки сміливо можна?"
  SH_NNW_bud_real_num:"Редагування реальності Голкою"
  SH_NNW_bud_real_num1:"Редагування реальності Голкою_зоря"
  # Події асамблеї
  SH_new_world_war.100.name:"Державна асамблея"
  SH_new_world_war.100.desc:"Державна асамблея, що скликається раз на п'ять років, відбулася за розкладом — два табори запекло сперечаються, обстоюючи власні позиції, у залі стоїть галас. Обидві сторони наполягають на своєму й не поступаються, через що асамблея нагадує дебатний турнір.\nЗвісно, кому в підсумку віддати перевагу — вирішувати мені."
  SH_new_world_war_100_op1:"Підтримати $SH_new_world_war_ec1$"
  SH_new_world_war_100_op2:"Підтримати $SH_new_world_war_ec2$"
  SH_new_world_war_100_op3:"Придушити $SH_new_world_war_ec1$"
  SH_new_world_war_100_op4:"Придушити $SH_new_world_war_ec2$"
  SH_new_world_war_100_op5:"Відкласти це — у мене вже є свій план"
  SH_new_world_war_100_op6:"Ефективність роботи асамблеї надто застаріла — краще її розпустити"
  SH_new_world_war_100_op7:"Отримуємо модифікатор §G$SH_new_world_war_country_mod1$§!, значення = (§HВага $SH_new_world_war_ec1$§! − §RВага $SH_new_world_war_ec2$§!) × §G$SH_new_world_war_country_mod1$§!. Якщо підсумкова §HВага $SH_new_world_war_ec1$§! від'ємна, отримуваний модифікатор змінюється на §R$SH_new_world_war_country_mod3$§!"
  SH_new_world_war_100_op8:"Отримуємо модифікатор §G$SH_new_world_war_country_mod2$§!, значення = (§HВага $SH_new_world_war_ec2$§! − §RВага $SH_new_world_war_ec1$§!) × §G$SH_new_world_war_country_mod2$§!. Якщо підсумкова §HВага $SH_new_world_war_ec2$§! від'ємна, отримуваний модифікатор змінюється на §R$SH_new_world_war_country_mod4$§!"
  SH_new_world_war_100_op9:"§HПрибрати всі модифікатори асамблеї§!\nВага не змінюється."
  SH_new_world_war_100_op10:"Прибрати й розпустити асамблею, скасувати всі її модифікатори"
  SH_new_world_war_100_awaken:"Відродження Священної Влади"

  SH_new_world_war.101.desc:"Хоча засідання позачергове, гострота обговорення анітрохи не зменшилась.\nПроте заради ефективності асамблеї варто трохи прискорити темп..."
  SH_new_world_war.105.name:"Опір редагуванню"
  SH_new_world_war.105.desc:"Відколи почалося редагування реальності, зміни законів всесвіту викликали в асамблеї сильне невдоволення. Частина наукових офіцерів подали петиції одна за одною, вимагаючи призупинити чи навіть повністю припинити масштабне редагування реальності, стверджуючи, що кожна зміна — незворотний удар по фундаменту законів нового всесвіту."
  SH_new_world_war.105.desc_op1:"Відмовитись від розвитку заради збереження середовища?"
  SH_new_world_war.105.desc_op2:"Розумно сказано, але, вибачте, не можу пристати на це."
  SH_new_world_war.106.name:"Опір редагуванню"
  SH_new_world_war.106.desc:"Наслідки попередніх редагувань почали виявлятися один за одним. Нам довелося вкласти чимало трансцендентної логіки, щоб стабілізувати реальність, серед цивільних уже є жертви, виробничі лінії одна за одною зупиняються. Масштаб петицій продовжує зростати — люди вимагають повернути їм «справжню» реальність, а не багаторазово переписану «фальшиву»."
  SH_new_world_war.106.op1:"Відредагувати для них «справжню» реальність і повернути."
  SH_new_world_war.106.op2:"Можна тимчасово призупинитись, але зупинитись зовсім ми не можемо."
  SH_new_world_war.107.name:"Опір редагуванню"
  SH_new_world_war.107.desc:"Спалахнув заколот. Терпіння людей щодо редагування реальності повністю вичерпалось. Бунтівники масово вриваються в зони редагування, руйнуючи все на своєму шляху — межі реальності починають руйнуватись. Ситуація виходить з-під контролю, необхідно вдатись до примусових заходів."
  SH_new_world_war.107.op1:"Вигнати бунтівників, замінивши їх відредагованим населенням"
  SH_new_world_war.107.option_desc1:"Справжня лінія майбутнього\n\n§gЛиха генеруються нормально, ланцюг подій відкривається за умови§!"
  SH_new_world_war.107.op2:"Та ну?!#*(помилка)"
  SH_new_world_war.107.option_desc2:"§RПомилка: нереальний варіант§!\n\n§gРозходиться з майбутнім, лиха більше не генеруються§!"
  NNW_time_return_crisis_lost:"Пропущене лихо"
  no_has_SH_new_world_war_ec:"Асамблею розпущено"
  # Подія занепаду
  SH_new_world_war_201:"Після довгих — а чи, може, коротких — часів насолоди $SH_new_world_war_ec1$ нарешті знову отримав головну владу. Незабаром ми повернемось на це велике поле шахів, яким є галактика.\nХто стане першим, хто спробує зупинити колесо історії власними руками?"

  #Події лиха
  real_has_nnw_crisis:"Наявне лихо"
  NNW_main_pc:"Тимчасова база"
  NNW_sol_main_crisis:"Якір змін реальності"
  name_shaozhan_crisis_shouhu:"Оборонний осередок редагування реальності"
  origin_NNW_fallen_empire:"Розвідка реальності"
  NNW_crisis_tianzai_weiwu:"Ворог з майбутнього"
  name_shaozhan_real_bud:"Осередок редагування реальності"
