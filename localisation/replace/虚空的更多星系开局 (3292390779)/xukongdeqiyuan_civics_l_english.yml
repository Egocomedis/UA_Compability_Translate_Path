 d_xzkz_xingxingzhixin_deposit_desc: "Осередок волі живої планети.\n§RЯкщо втратити цей ландшафт, подальше поглинання планет стане неможливим§!"
 d_xzkz_xingxingjuexing: "Воля планети"
 d_xzkz_xingxingjuexing_desc: "Сила волі живої планети."
 d_dimai_xzkz_deposit: "Енергетична жила"
 d_dimai_xzkz_deposit_desc: "Тут збирається й перетікає таємнича енергія, породжуючи незліченні цінні ресурси."
 d_zilvqukuai_xzkz_deposit: "Самокерований блок"
 d_zilvqukuai_xzkz_deposit_desc: "Цей блок функціонує автономно — він не лише допомагає в будівництві, а й виробляє додаткові ресурси."
 d_rudongzhichu_xzkz_deposit: "Звивисте щупальце"
 d_rudongzhichu_xzkz_deposit_desc: "Величезні щупальця розповзаються всесвітом — це відгалуження сили Звивистої зорі."

