### Жива планета
 civic_xzkz_huoxingxing: "Жива планета"
 civic_xzkz_huoxingxing_desc: "Це жива планета, що володіє неймовірною силою. Під поверхнею планети — незліченні пов'язані енергетичні жили, чудовиська та незбагненне ядро планети."
 civic_xzkz_huoxingxing_effect: "§YРозблоковує указ§!: Зростання планети\n§YРозблоковує указ§!: Поглинання планети\n§YОсоблива здатність§!: коли розмір планети перевищує 99, кожна отримана одиниця волі планети дає бонус енергетичної жили"

 civic_xzkz_huoxingxing2: "Звивиста зоря"
 civic_xzkz_huoxingxing2_desc: "Це жива планета, що володіє неймовірною силою. Під поверхнею планети — незліченна звивиста плоть і велетенські нейронні синапси."
 civic_xzkz_huoxingxing2_effect: "§YРозблоковує указ§!: Зростання планети\n§YРозблоковує указ§!: Поглинання планети\n§YОсоблива здатність§!: кожна отримана одиниця волі планети дає бонус звивистого щупальця"

 civic_xzkz_huoxingxing3: "Самокерована механічна зоря"
 civic_xzkz_huoxingxing3_effect: "§YРозблоковує указ§!: Зростання планети\n§YРозблоковує указ§!: Поглинання планети\n§YОсоблива здатність§!: коли розмір планети перевищує 99, кожна отримана одиниця волі планети дає бонус самокерованого блоку"
 civic_xzkz_huoxingxing3_desc: "Це жива планета, що володіє неймовірною силою. Під поверхнею планети — величезний комплекс із незліченних механічних структур і комп'ютерів."

 decision_xzkz_huoxingxing_tunshi: "Поглинути планету"
 decision_xzkz_huoxingxing2_tunshi: "Поглинути планету"
 decision_xzkz_huoxingxing3_tunshi: "Поглинути планету"
 decision_xzkz_huoxingxing_tunshi_desc: "Поглинути цю планету."
