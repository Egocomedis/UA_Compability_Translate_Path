 decision_xzkz_huoxingxing3_tunshi_desc: "Поглинути цю планету."

 decision_xzkz_hxx_chengzhang: "Зростання планети"
 decision_xzkz_hxx_chengzhang_desc: "Зрушити гори, засипати моря, створити нову землю, спілкуватися з планетою, надаючи ресурси для прискорення еволюції та зростання планети."
 decision_xzkz_hxx_chengzhang2: "Зростання планети"
 decision_xzkz_hxx_chengzhang2_desc: "Зрушити гори, засипати моря, створити нову землю, спілкуватися з планетою, надаючи ресурси для прискорення еволюції та зростання планети."
 decision_xzkz_hxx_chengzhang3: "Зростання планети"
 decision_xzkz_hxx_chengzhang3_desc: "Зрушити гори, засипати моря, створити нову землю, спілкуватися з планетою, надаючи ресурси для прискорення еволюції та зростання планети."
 decision_xzkz_hxx_chengzhang_effects_short: "Кожне зростання збільшує розмір планети на 4, водночас створюючи 2 випадкові ландшафтні особливості та додаючи 1 волю планети."

