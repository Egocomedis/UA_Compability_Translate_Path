 d_hengxingzhihua_xzkz_deposit: "Зоряна квітка"
 d_hengxingzhihua_xzkz_deposit_desc: "Прекрасна квітка, що розквітає після того, як зорепожираюча рослина повністю огорне зорю — вона безперервно виливає ресурси, а з неї також можна вирощувати нове зорепожираюче насіння."
