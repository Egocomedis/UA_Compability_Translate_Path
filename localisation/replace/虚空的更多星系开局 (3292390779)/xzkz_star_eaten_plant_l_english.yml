 desc_xxgcz_of_eaten_sun2: "Наша сівба на [GetName] завершена. Тепер цю зорю повністю огорнула зорезгублена лоза, утворивши буяючу зорю."
 option_xxgcz_of_aten_sun2: "Ідемо цим важким шляхом просто до зірок."
 efect_xxgcz_of_aten_sun2: "Ми отримали нову зорю розмноження."
