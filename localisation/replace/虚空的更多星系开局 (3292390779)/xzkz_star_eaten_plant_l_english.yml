l_english:
 origin_xxgcz_sun_eaten_plant: "Зорезгублена лоза"
 origin_xxgcz_sun_eaten_plant_desc: "Незліченні втрачені століття ми стежили за високим сонцем, ми росли, тягнулись, чіплялись, огортали й поглинули наше сонце — але це лише проростання. Ми ростимемо, поширюватимемось, здобуватимемо більше сонячного світла, продовжуючи наше зростання."
 origin_xxgcz_sun_eaten_plant_tooltips_effects: "Центральну зорю домашньої системи замінено на §Yзорю розмноження§!, і вона стане початковою колонією.\n\nМожна будувати спеціальний колоністичний корабель §Yзорепожираючий сіяч§!, чия головна зброя здатна перетворити придатну зорю в межах кордонів на §Y$pc_eaten_sun$§!.\n§RУвага: цей процес перетворить усі непридатні для штучної колонізації планети системи на замерзлі планети, а зорепожираючий сіяч буде знищено після завершення сівби.§!\n\nІнші держави ставитимуться до нас вороже."
 sc_xxgcz_eaten: "Система полоненого сонця"
 pc_xxgcz_eaten_sun: "Буяюча зоря"
 pc_xxgcz_eaten_sun_desc: "Ця величезна рослина огорнула внутрішню зорю, наче клітка."
 pc_xxgcz_got_sun: "Сонце в клітці"
 pc_xxgcz_got_sun_desc: "Цю зорю захопила рослина з глибоким корінням і пишним листям. Її випромінювана енергія поглинається, частинки сонячного вітру пожираються. Вона вже давно стала поживою для цієї рослини."
 EATEN_XXGCZ_SUN_NAME: "Буяюча зоря [ROOT.GetName]"
 trait_pc_xxgcz_eaten_sun_preference: "$trait_sun_eaten_leaves$"
 trait_pc_xxgcz_eaten_sun_preference_desc: "$trait_sun_eaten_leaves_desc$"
 trait_pc_xxgcz_eaten_sun_preference_tooltip: "$trait_sun_eaten_leaves_tooltip$"
 mod_pc_xxgcz_eaten_sun_habitability: "Придатність до життя на буяючій зорі"
 trait_xxgcz_sun_eaten_leaves: "Зорепожираючі гілки"
 trait_xxgcz_sun_eaten_leaves_desc: "Ми буяємо гілками й листям, огортаючи зорю."
 trait_xxgcz_sun_eaten_leaves_tooltip: "Споживання житла на §Yбуяючій зорі§!: §G-10%§!\nВидобуток їжі, енергокредитів і мінералів на §Yбуяючій зорі§!: §G+10%§!\nСпоживання житла поза §Yбуяючою зорею§!: §R+100%§!\nВидобуток з посад поза §Yбуяючою зорею§!: §R-100%§!\nПридатність до життя поза §Yбуяючою зорею§!: §R-200%§!"
 sun_xxgcz_eaten_plant_begining_NAME: "Зоряна рослина"
 sun_xxgcz_eaten_plant_begining_DESC: "Зореїдна лоза."
 sun_xxgcz_eaten_plant_begining_eaten_sun: "Початок пожирання зорі"
 sun_xxgcz_eaten_plant_begining_sun: "Первісний день"
 sun_xxgcz_eaten_plant_begining_sun_home: "Первісна земля"
 sun_xxgcz_eaten_plant_begining_sun_planet_1: "Джерело лози-I"
 sun_xxgcz_eaten_plant_begining_sun_planet_2: "Джерело лози-II"
 sun_xxgcz_eaten_plant_begining_sun_planet_3: "Джерело лози-III"
 triggered_xxgcz_opinion_tr_versatility_universal_compatibility: "Затьмарити небеса"
 district_xxgcz_city_for_eaten_sun: "Буяючі лози"
 district_xxgcz_city_for_eaten_sun_desc: "Ця величезна буяюча лісова структура зберігає поживні речовини для зорезгубленої лози, розширює гілля й листя, прискорює обіг матерії та енергії, а також слугує нашою домівкою."
 district_xxgcz_city_for_eaten_sun_plural: "Буяючі лози"
 district_xxgcz_hive_for_eaten_sun: "$district_city_for_eaten_sun$"
 district_xxgcz_hive_for_eaten_sun_desc: "$district_city_for_eaten_sun_desc$"
 district_xxgcz_hive_for_eaten_sun_plural: "$district_city_for_eaten_sun$"
 district_xxgcz_nexus_for_eaten_sun: "$district_city_for_eaten_sun$"
 district_xxgcz_nexus_for_eaten_sun_desc: "$district_city_for_eaten_sun_desc$"
 district_xxgcz_nexus_for_eaten_sun_plural: "$district_city_for_eaten_sun$"
 district_xxgcz_industrial_for_eaten_sun: "Ліс едемських плодів"
 district_xxgcz_industrial_for_eaten_sun_desc: "Це величезний плід, усередині якого росте безліч дивовижних квітів і трав та могутні лози — тут повсюди їжа, а ще є величезні квіти-ліхтарі, що правлять за сонце."
 district_xxgcz_industrial_for_eaten_sun_plural: "Ліс едемських плодів"
 district_xxgcz_mining_uncapped_for_eaten_sun: "Гіпервимірне коріння"
 district_xxgcz_mining_uncapped_for_eaten_sun_desc: "Ця структура невидимо розповзається по планетах і поясах астероїдів, витягуючи з них матерію."
 district_xxgcz_mining_uncapped_for_eaten_sun_plural: "Гіпервимірне коріння"
 district_xxgcz_farming_uncapped_for_eaten_sun: "Фотосинтетична шахта"
 district_xxgcz_farming_uncapped_for_eaten_sun_desc: "Ця структура, що росте всередині зорепожираючої рослини, здатна використовувати електромагнітні хвилі різних частот, випромінювані зорею, для фотосинтезу, фіксуючи енергію, яку та випромінює."
 district_xxgcz_farming_uncapped_for_eaten_sun_plural: "Фотосинтетичні шахти"
 district_xxgcz_hab_science_for_eaten_sun: "Центральний гормональний район"
 district_xxgcz_hab_science_for_eaten_sun_desc: "Цю структуру зорезгублена лоза використовує для виробництва, розподілу та зберігання різноманітних рослинних гормонів — водночас це і величезний біомолекулярний комп'ютер."
 district_xxgcz_hab_science_for_eaten_sun_plural: "$district_hab_science_for_eaten_sun$"
 START_XXGCZ_SCREEN_PART_STAR_EATEN_PLANT: "Колись сонячне світло, наче меч, пронизувало хмари, розливаючись по родючій землі, у яку ми вкорінились;\nа ми могли лише крізь просвіти в листі підглядати таємниці зоряного неба.\n\nПотім ми виросли, наче бамбук після дощу, вказуючи прямо на палюче сонце.\n\nМи давно покинули ту бідну планету, вкорінившись у зоряному морі.\n\nМи нарешті прийняли розпечене сонце, розкривши листя до безмежної порожнечі.\n\nМи все ще ростемо, ми все ще поширюємось, ми все ще розширюємось…\n\nМи прагнемо, прагнемо більше сонць, більше сонячного світла…"
