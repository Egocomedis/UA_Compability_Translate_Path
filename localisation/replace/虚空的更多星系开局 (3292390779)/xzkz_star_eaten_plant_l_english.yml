 requires_xxgcz_no_anomaly_eaten_sun: "$TRIGGER_FAIL$Не можна засівати на планеті з недослідженою аномалією."
 requires_xxgcz_not_black_hole_eaten_sun: "$TRIGGER_FAIL$Не можна засівати чорну діру — вона не може забезпечити зорезгублену лозу світловим тиском, випромінюванням і частинками сонячного вітру."
 requires_xxgcz_not_eaten_eaten_sun: "$TRIGGER_FAIL$Цю зорю вже поглинула зорезгублена лоза."
