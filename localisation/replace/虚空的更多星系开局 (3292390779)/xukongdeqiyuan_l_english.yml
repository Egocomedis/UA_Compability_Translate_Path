l_english:

 xzkz_guilaishengquan_system_NAME: "Небеса"
 xzkz_guilaishengquan_system_DESC: "Наша домівка, початок і продовження нашої історії, наше велике відродження."
 xzkz_tiantang2: "Трон минулого"
 xzkz_tiantang3: "Скарбниця колишніх днів"
 d_yuanguzhishibaoku_deposit: "Скарбниця прадавніх знань"
 d_yuanguzhishibaoku_deposit_desc: "Спадок, залишений прадавніми предками, — у цю добу відродження дарує неповторні дива."

 d_gudaijunshijidi_deposit: "Прадавня база священної варти"
 d_gudaijunshijidi_deposit_desc: "Тут прадавні предки колись спостерігали, як величні бойові кораблі поступово розбирали, а зброю запечатували, поки держава занепадала — а тепер усе, що тут лишилося, стане початком нашої могутньої армії."

 d_yuangufeixu_deposit: "Прадавні руїни"
 d_yuangufeixu_deposit_desc: "Тут спочивають колись величні споруди й могутні бойові кораблі — у руїнах приховані таємниці минулого."

 d_yuangufeixu_deposit2: "Прадавні руїни"
 d_yuangufeixu_deposit2_desc: "Тут спочивають колись величні споруди й могутні бойові кораблі — у руїнах приховані таємниці минулого."

 d_jiurihuanggong_deposit: "Палац минулих днів"
 d_jiurihuanggong_deposit_desc: "Незліченне минуле знову спливає на поверхню — тепер ми відродимося знову!"

 d_yuangufeixu_deposit3: "Прадавні руїни"
 d_yuangufeixu_deposit3_desc: "Тут спочивають колись величні споруди й могутні бойові кораблі — у руїнах приховані таємниці минулого."


 situation_xzkz_shengquanfuxing: "Відродження Священної Влади"
 situation_xzkz_shengquanfuxing_desc: "Ми вже вступили на шлях піднесення — зоряне море скориться нам, і ми досягнемо вічності!"

 xzkz_fuxing1_xd_1: "Зосередитись на наукових дослідженнях"
 xzkz_fuxing1_xd_2: "Зосередитись на розвитку держави"
 xzkz_fuxing1_xd_3: "Стрімке відродження"
 xzkz_fuxing1_xd_4: "Збалансований розвиток"
 xzkz_fuxing1_xd_5: "Ухил у військову справу"
 xzkz_fuxing_shibai: "Відродження зазнало невдачі"
 xzkz_fuxing_wancheng: "Відродження Священної Влади!\nРозпочинається остаточна битва\nМодифікатор «Занепала імперія» знято."

 xzkz_fuxing_stage_1_effects: "Ми повстанемо!"
 xzkz_fuxing_stage_2_effects: "Ми дослідимо втрачені прадавні технології"
 xzkz_fuxing_stage_3_effects: "Час подати сигнал і зібрати розкиданих по зоряному морю співвітчизників!"
 xzkz_fuxing_stage_4_effects: "Ми знову стоїмо тут, ставши тим самим велетнем — тепер настав час вирішити свою долю."

 xukongdeqiyuankaijushijian.02.title: "Загадка прадавньої технології"
 xukongdeqiyuankaijushijian.02.desc: "У нашому світі повсюди розкидані прадавні руїни та зброя — ми давно забули ці технології минулого, але завдяки накопиченому досвіду ми вже здатні розшифрувати ці прадавні технології. (Розпочинається дослідження в спецпроєктах)"

 XZKZ_POJIEGUDAIKEJI: "Розшифрувати прадавню технологію"
 XZKZ_POJIEGUDAIKEJI_DESC: "Розгадати загадку прадавньої технології"
 xukongdeqiyuankaijushijian.03.title: "Загадка прадавньої технології"
 xukongdeqiyuankaijushijian.03.desc: "Таємниці предків важко осягнути, але завдяки нашим зусиллям ми зрештою розшифрували частину їхніх прадавніх технологій — принаймні тепер маємо повну теорію й можемо досліджувати деякі прадавні технологічні споруди. (Тепер можна досліджувати 3 втрачені технології)"

 xukongdeqiyuankaijushijian.04.desc: "У міру накопичення знань ми можемо продовжити розшифровувати технології, залишені предками."
 XZKZ_POJIEGUDAIKEJI2: "Розшифрувати прадавню технологію"
 XZKZ_POJIEGUDAIKEJI2_DESC: "Розгадати загадку прадавньої технології"

 xukongdeqiyuankaijushijian.05.desc: "Таємниці предків важко осягнути, але завдяки нашим зусиллям ми зрештою розшифрували частину їхніх прадавніх технологій — принаймні тепер маємо повну теорію й можемо досліджувати деякі прадавні технологічні споруди. (Тепер можна досліджувати 4 втрачені технології)"
 XZKZ_POJIEGUDAIKEJI3: "Розшифрувати прадавню технологію"
 XZKZ_POJIEGUDAIKEJI3_DESC: "Розгадати загадку прадавньої технології"

 xukongdeqiyuankaijushijian.07.desc: "Таємниці предків важко осягнути, але завдяки нашим зусиллям ми зрештою розшифрували частину їхніх прадавніх технологій — принаймні тепер маємо повну теорію й можемо досліджувати деякі прадавні технологічні споруди. (Тепер можна досліджувати 6 втрачених технологій)"
 XZKZ_POJIEGUDAIKEJI4: "Розшифрувати прадавню технологію"
 XZKZ_POJIEGUDAIKEJI4_DESC: "Розгадати загадку прадавньої технології"

 xukongdeqiyuankaijushijian.07.desc: "Таємниці предків важко осягнути, але завдяки нашим зусиллям ми зрештою розшифрували частину їхніх прадавніх технологій — принаймні тепер маємо повну теорію й можемо досліджувати деякі прадавні технологічні споруди. (Тепер можна досліджувати 6 втрачених технологій)"

 xukongdeqiyuankaijushijian.09.desc: "Таємниці предків важко осягнути, але завдяки нашим зусиллям ми зрештою розшифрували частину їхніх прадавніх технологій — принаймні тепер маємо повну теорію й можемо досліджувати деякі прадавні технологічні споруди. (Тепер можна досліджувати 6 втрачених технологій)"

 xukongdeqiyuankaijushijian.10.title: "Відтворення прадавніх кораблів"
 xukongdeqiyuankaijushijian.10.desc: "Кораблі, що дійшли до нас із прадавніх часів, здатні захищати нашу безпеку зараз, але вже незабаром настане епоха, коли повстануть молоді держави й почнеться боротьба за владу — наших кораблів стане не досить. Нам потрібно дослідити прадавні технології, щоб здобути знання для виробництва цих прадавніх кораблів."

 XZKZ_POJIEGUDAIKEJI5: "Таємниця прадавніх кораблів"
 XZKZ_POJIEGUDAIKEJI5_DESC: "Розгадати загадку прадавньої технології"
 xukongdeqiyuankaijushijian.11.title: "Таємниця прадавніх кораблів"
 xukongdeqiyuankaijushijian.11.desc: "Ми вже здобули знання про шифрований ескортний корабель — залишилося лише продовжити дослідження, щоб отримати можливість будувати цей прадавній бойовий корабель. (Шифрований ескортний корабель тепер доступний для дослідження)"

 xukongdeqiyuankaijushijian.12.desc: "У прадавніх легендах таємничий бойовий крейсер мав силу, порівнянну з левіафаном — за переказами, на легендарних полях битв один загін таких крейсерів здатен був розгромити ворога, що переважав його вдесятеро. Серед решток кораблів, що дійшли до нас, ці велетенські прадавні вартові, таємничі бойові крейсери, досі захищають нас — ми можемо спробувати відтворити ці прадавні гіганти."
 XZKZ_POJIEGUDAIKEJI6: "Таємниця прадавніх кораблів"
 XZKZ_POJIEGUDAIKEJI6_DESC: "Розгадати загадку прадавньої технології"
 xukongdeqiyuankaijushijian.13.desc: "Ми вже здобули знання про таємничий бойовий крейсер — залишилося лише продовжити дослідження, щоб отримати можливість будувати цього прадавнього гіганта. (Таємничий бойовий крейсер тепер доступний для дослідження)"

 xukongdeqiyuankaijushijian.16.title: "Священна Влада: повернення світу"
 xukongdeqiyuankaijushijian.16.desc: "У минулі дні багато наших світів занурилися в річку часу. У незліченних древніх сувоях є запис: занурений світ, скорбота зоряної річки, скарб цивілізації — один зі світів, надзвичайно важливих для нашої цивілізації, з якоїсь причини зник. Але недавно, після складання нової зоряної карти, ми виявили, що цей «занурений світ», можливо, все ще існує. Ми маємо знайти цей світ! Розпочинаємо дослідницький проєкт для його виявлення."


 XZKZ_SHOUFUSHIJIE: "Виявити втрачений світ"
 XZKZ_SHOUFUSHIJIE_DESC: "Виявити наш втрачений світ через дослідницький проєкт."

 xukongdeqiyuankaijushijian.17.desc: "Ми знайшли втрачений світ!"
 NAME_xzkz_shoufushijie: "Втрачене королівство"
 NAME_xzkz_shoufushijie_1: "Втрачене королівство I"
 NAME_xzkz_shoufushijie_2: "Розбита домівка"
 NAME_xzkz_shoufushijie_3: "Втрачена домівка"
 NAME_xzkz_shoufushijie_4: "Втрачене королівство II"
 NAME_xzkz_shoufushijie_5: "Втрачене королівство III"
 NAME_xzkz_shoufushijie_6: "Вершина небес"

 NAME_xzkz_jiurizhidi: "Давній ворог"
 NAME_xzkz_jiurijuntuan: "Прадавній легіон"

 NAME_xzkz_jiurijuntuan_huhang: "Прадавній ескортний корабель"
 NAME_xzkz_jiurijuntuan_zhanxun: "Прадавній бойовий крейсер"
 xukongdeqiyuankaijushijian.19.desc: "Невдовзі після того, як ми знайшли втрачений світ, наші зонди виявили в загубленій системі таємничий корабель. Розслідування показало, що це записаний у стародавніх текстах флагман штучної свідомості, яка ще в прадавні часи була ворогом наших предків. Хоча ця штучна свідомість була переможена предками, її залишкові сили в кінцевій священній війні виступили проти нас. Продовжуємо розслідування."
 xukongdeqiyuankaijushijian.20.desc: "Ми легко зібрали всю інформацію: після завершення кінцевої священної війни величезний флагман через серйозні пошкодження зупинився в цій системі й не може рухатись, але досі виконує наказ знищувати всіх ворогів. Нам потрібно діяти дуже обережно; перемігши цей прадавній бойовий корабель, ми зможемо дослідити його глибше."
 xukongdeqiyuankaijushijian.19.a: "Продовжити розслідування"
 xukongdeqiyuankaijushijian.20.a: "Зрозуміло"
 NAME_xzkz_Crisis_Star_Eater: "Флагман давнього ворога"
 xukongdeqiyuankaijushijian.21.name: "Перемогти давнього ворога"
 xukongdeqiyuankaijushijian.21.1.desc: "Ми перемогли зграю флагманів, залишених давнім ворогом — тепер можна вирішити остаточну долю цього флагмана!"

 xukongdeqiyuankaijushijian.21.a: "Ми відремонтуємо цей бойовий корабель"
 xukongdeqiyuankaijushijian.21.b: "Розберемо й дослідимо"
 xukongdeqiyuankaijushijian.21.c: "Хай цей корабель поховає гравітація зорі!"
 XZKZ_XIUFUJIURIZHIDI: "Відремонтувати флагман давнього ворога для власного використання"
 XZKZ_XIUFUJIURIZHIDI_DESC: "Відремонтувати флагман давнього ворога для власного використання"
 NAME_xzkz_fentianshenbin: "Небопалюче священне військо"

 xzkzshengquanshijian.02.name: "Ремонт завершено"
 xzkzshengquanshijian.02.desc: "Наші науковці й інженери невтомною працею успішно відремонтували й переобладнали цей флагман — тепер він наш!"

 DISTAR_XZKZ_BEIFENGSUOSHIJIE_CAT: "Втрачений світ"
 DISTAR_XZKZ_BEIFENGSUOSHIJIE_CAT_DESC: "Це втрачений світ — хоч і замкнений бар'єром, ми можемо знайти спосіб відкрити його."

 xzkzshengquanshijian.03.name: "План руйнування бар'єра"
 xzkzshengquanshijian.03.desc: "Ретельно дослідивши бар'єр втраченого світу, наші науковці успішно розбили його — втрачений світ знову зустрів справжнє сонячне світло!"

 xzkzshengquanshijian.03.a: "Це наш перший столичний світ! (Так довго був втрачений, що перетворився на покинутий світ)"
 xzkzshengquanshijian.03.b: "Це наша святиня!"

 holy_xzkz_shengdi_planet: "Святиня"
 holy_xzkz_shengdi_planet_desc: "Ця планета вважається сусідньою втраченою імперією священним місцем — якщо ми колонізуємо її, це неабияк розлютить втрачену імперію."

 xzkzshengquanshijian.06.name: "Священна Влада: заклик зоряного моря"
 xzkzshengquanshijian.06.desc: "Кинемо клич, щоб розкидані по зоряному морю співвітчизники знову зібралися під одним прапором! Ми повстанемо!"

 xzkzshengquanshijian.06.a: "Кинути клич!"
 xzkzshengquanshijian.07.name: "Священна Влада: заклик зоряного моря — Навігатор"
 xzkzshengquanshijian.07.desc: "Невдовзі після нашого заклику з нами зв'язався співвітчизник, що назвався Навігатором"
 xzkzshengquanshijian.07.a: "Увімкнути комунікатор"

 xzkzshengquanshijian.08.title: "Зв'язок"
 xzkzshengquanshijian.08.desc: "Вітаю, як же довго... стільки всього хочеться сказати."

 xzkzshengquanshijian.08.a: "Як ви жили?"
 xzkzshengquanshijian.08.a.response: "Ми весь час блукали в темряві, у порожнечі, ховаючись, боячись, що давні вороги нас знайдуть. Тепер, схоже, окрім нас, усі вони поховані в часі."

 xzkzshengquanshijian.08.b: "Що ви принесли?"
 xzkzshengquanshijian.08.b.response: "Я та мій народ повернемось до держави."

 xzkzshengquanshijian.08.c: "Ласкаво просимо назад"
 xzkzshengquanshijian.08.c.response: "Хай усе прискориться!"

 xzkzshengquanshijian.09.name: "Священна Влада: заклик зоряного моря"
 xzkzshengquanshijian.09.desc: "Навігатор приєднався до нашої держави — його народ оселився в нашій столиці."

 xzkz_linghangzhe: "Навігатор"
 xzkzshengquanshijian.11.name: "Священна Влада: заклик зоряного моря — Щит Імперії"
 xzkzshengquanshijian.11.desc: "Невдовзі після прибуття Навігатора до нашої системи прибув пошарпаний транспортний корабель, і з нами зв'язалась сутність, що назвалась Щитом Імперії."

 xzkzshengquanshijian.12.desc: "Коротко кажучи, я — великий генерал давньої імперії на прізвисько Щит Імперії. — він труснув значок на грудях. — У найтемніші часи я воював за імперію; хоч і не вдалося уникнути кінця, — вираз його обличчя потьмянів, — але після моєї сплячки машина автоматично мене розбудила. Перевіривши все, я виявив, що це ви — ми знову повстали! Дозвольте мені знову воювати за імперію!"
 xzkzshengquanshijian.12.a: "Що ти вмієш?"
 xzkzshengquanshijian.12.a.response: "Битися, тільки битися! Я здатен розтрощити будь-якого ворога на шляху імперії!"
 xzkzshengquanshijian.12.b: "Що ж насправді сталося в давнину?"
 xzkzshengquanshijian.12.b.response: "У вашій історії стався розрив — воно й зрозуміло, минуло надто багато часу. Кінцева священна війна — у вашій історії має бути такий термін. У той період ми воювали з великим ворогом, поле бою охоплювало весь простір-час, від початку всесвіту до його кінця. Усі наші вороги об'єдналися, і наприкінці цієї великої війни ми розтрощили всіх ворогів, але й самі занурились у неминучу темну добу. Проте тепер ви знову повстали! Ми можемо спробувати ще раз!"

 xzkzshengquanshijian.12.c: "Ласкаво просимо назад"
 xzkzshengquanshijian.12.c.response: "Знову воюватиму за імперію!"


 xzkzshengquanshijian.13.name: "Священна Влада: заклик зоряного моря"
 xzkzshengquanshijian.13.desc: "Щит Імперії повернувся до держави."
 xzkz_diguozhidun: "Щит Імперії"

 xzkzshengquanshijian.14.name: "Священна Влада: заклик зоряного моря"
 xzkzshengquanshijian.14.desc: "З нами зв'язалась сутність, що назвалась Великим Мудрецем."
 xzkzshengquanshijian.14.a: "Увімкнути зв'язок"

 xzkzshengquanshijian.15.desc: "Зберігай смирення."
 xzkzshengquanshijian.15.a: "Хто ти?"
 xzkzshengquanshijian.15.a.response: "Великий Мудрець давньої імперії. Учорашній вигнанець, сьогоднішній повернений — я Великий Мудрець."
 xzkzshengquanshijian.15.b: "Що ти вмієш?"
 xzkzshengquanshijian.15.b.response: "Я повернуся до держави й стану науковцем, а також надам вам забуті прадавні знання."
 xzkzshengquanshijian.15.c: "Ласкаво просимо назад"
 xzkzshengquanshijian.15.c.response: "Зберігай смирення — світ великий."

 xzkzshengquanshijian.16.desc: "Великий Мудрець повернувся до держави."
 xzkz_daxianzhe: "Великий Мудрець"
 xzkzshengquanshijian.17.name: "Повернення нащадків"
 xzkzshengquanshijian.17.desc: "Невеликий загін втрачених нащадків повернувся й висадився на нашій батьківщині."
 xzkzshengquanshijian.20.desc: "Це, мабуть, останні втрачені нащадки."

 xzkzshengquanshijian.22.name: "Пробудження дракона"
 xzkzshengquanshijian.22.desc: "Легкий неспокій на прикордонних світах держави став початком усього. Інші держави отримали розрізнені відомості — хоча раніше активність відбувалась лише в межах власного простору, тепер наш флот почав рухатись до далеких зоряних систем усередині галактики. Надзвичайно передові розвідувальні кораблі почали відвідувати давні, зруйновані планети й атакувати будь-які кораблі, що вітали їх чи ухилялись. Тепер наша мета й наша місія стали очевидними.\n\nНаша армія вже готова до бою, науковці відновили канал даних розвідувальних маяків і знову ввели в дію розвідувальні пости, покинуті, коли ми відступили до нинішнього кордону. Ми повернемось на це велике поле шахів, яким є галактика.\n\nУ ядрі систем держави збирається флот, армія отримала наказ про мобілізацію, і прадавні заводи знову гуркочуть. Вперше за кілька століть ми звертаємо погляд на широкі простори за межами кордону.\n\nЗанедбані верфі знову відремонтовано й налаштовано, колись мовчазні ливарні титанічних гігантів знову запрацювали. Уся галактика зосереджена на одному питанні: коли цей сплячий велетень вирішить повернути собі колишню славу, хто стане першим, хто спробує зупинити колесо історії власними руками?"

 xzkzshengquanshijian.22.a: "Відродження Священної Влади"
 xzkzshengquanshijian.23.desc: "Наш флот завершив зосередження."

 xzkzshengquanshijian.35.desc: "Ми вже по-справжньому відродились — настав час звести рахунки з минулим мороком! (Усі варіанти дослідження втрачених технологічних споруд 2-го рівня розблоковано)"
 xzkzshengquanshijian.35.a: "Ми не зупинимось!"
 xzkzshengquanshijian.35.b: "Ми захищатимемо галактику (3 великі лиха настануть через рік)"

 xzkzshengquanshijian.36.name: "Визначити сховок давнього ворога"
 xzkzshengquanshijian.36.desc: "Відколи ми занурились у сон, давній ворог теж зник із поля зору. Якщо ми прагнемо помсти, спершу треба визначити, де він переховується. Але технології давнього ворога значно перевищують наші — перш ніж визначати його місцезнаходження, нам потрібно розробити тактику"
 xzkzshengquanshijian.37.desc: ""
 xzkzshengquanshijian.36a: "Об'єднатися з іншими занепалими імперіями"
 xzkzshengquanshijian.36b: "Об'єднатися з іншими цивілізаціями зоряного моря"
 xzkzshengquanshijian.36c: "Ми можемо звести рахунки з минулим самі"
 xzkzshengquanshijian.36da: "§H Занепалі імперії§! отримають посилення та бонуси; якщо їхнє ставлення до вас достатньо прихильне, є шанс, що вони приєднаються до вашого табору\n§RПопередження: давній ворог надзвичайно складний, обирайте обережно§!"
 xzkzshengquanshijian.36db: "Усі §H звичайні держави§! отримають підсилення; якщо у вас є сходження §HВартовий Зоряної Річки§!, давній ворог оголосить війну всім звичайним державам; якщо у вас є будь-яке §Kсходження лиха§!, звичайні держави можуть не відреагувати або навіть приєднатись до давнього ворога §RПопередження: давній ворог надзвичайно складний, обирайте обережно§!"
 xzkzshengquanshijian.36dc: "Ви будете битися самотужки §RПопередження: давній ворог надзвичайно складний, обирайте обережно§!"

 xzkzshengquanshijian.35.c: "Продовжити накопичувати сили"
 SH_ship_power_need: "§HПідвищити загальну міць флоту до 30 млн, після чого на пізніх етапах можна відкрити ланцюг подій «Відтворення небес»§!"
 civic_xzkz_revanchist_fervor: "Реваншистський запал"
 civic_xzkz_revanchist_fervor_desc: "Ця давня імперія вже пробудилась."
 civic_xzkz_ancient_caches_of_technology: "Прадавні сховища технологій"
 civic_xzkz_ancient_caches_of_technology_desc: "Ця давня імперія вже пробудилась."

 holy_xzkz_fuxingshengquan: "Прадавнє прозріння"

 d_yuangugongyequ_xzkz_deposit: "Прадавня промислова зона"
 d_yuangugongyequ_xzkz_deposit_desc: "Це прадавня промислова зона — передові технології дозволили цій ділянці порівняно добре зберегтися до наших днів. Тут є наноливарні, багаті торговельні порти, вимірні виробники та інші передові споруди."

 d_yuangufazhanqu_xzkz_deposit: "Прадавня зона розвитку"
 d_yuangufazhanqu_xzkz_deposit_desc: "Це прадавня зона розвитку — передові технології дозволили цій ділянці порівняно добре зберегтися до наших днів. Тут є квантові свердловини, центри живлення, сингулярності четвертого рівня та інші передові споруди."

 #######################################3
 origin_xzkz_weijixincunzhe: "Той, хто пережив кризу"
 origin_xzkz_weijixincunzhe_desc: "Хрипкий радіоприймач приймав сигнали з усієї галактики, але вони згасали один за одним; поступово лишився тільки останній, хто вцілів..."
 origin_xzkz_weijixincunzhe_effects: "§YПочаткова позиція:§! Острів кризи\nОсобливий планетарний ландшафт столиці: центр виробництва зоряної системи\nПовний масив вартових\nЖодного зв'язку через червоточину із зовнішнім світом\n§RНа старті активуються події трьох великих лих!§!\n§HПовне викликів походження виживання на небесному острові§!"
 d_weijixingcunzhe_xzkz_deposit: "Центр виробництва зоряної системи"
 d_weijixingcunzhe_xzkz_deposit_desc: "Диво всередині зоряної системи, що централізовано планує й виробляє ресурси для постачання всієї системи."
