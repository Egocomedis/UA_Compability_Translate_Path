l_english:

#Senate
 decision_pd_arcology_senate: "Побудувати купол сенату"
 decision_pd_arcology_senate_desc: "Щоб задовольнити зростаючі потреби нашої нації, ми повинні звести монументальну будівлю сенату на нашій столиці, виділивши значний простір для посилення адміністративних можливостей нашого уряду."
 decision_pd_arcology_senate_effects: "Додає §Y$d_pd_senate_building$§! до цієї столиці, обмінюючи потенційні райони на посилення адміністративних можливостей нашого уряду."
 d_pd_senate_building: "Купол сенату"
 d_pd_senate_building_desc: "Купол сенату, величний символ влади, височіє як адміністративне серце, де кується майбутнє нашої цивілізації."

#Palace
 decision_pd_arcology_palace: "Побудувати палацовий комплекс"
 decision_pd_arcology_palace_desc: "Щоб відобразити міць і владу нашої імперії, ми зведемо колосальний палац у нашій столиці. Ця грандіозна споруда втілюватиме силу нашого керівництва та значно посилить наше урядове адміністрування."
 decision_pd_arcology_palace_effects: "Додає §Y$d_pd_palace_building$§! до цієї столиці, обмінюючи потенційні райони на посилення адміністративних можливостей нашого уряду."
 d_pd_palace_building: "Палацовий комплекс"
 d_pd_palace_building_desc: "Палацовий комплекс, величний символ нашого суверенітету та влади правителя, панує над столицею. Це серце влади, де формується доля нашої імперії."

#Headquarters
 decision_pd_arcology_headquarters: "Побудувати планетарний штаб"
 decision_pd_arcology_headquarters_desc: "Щоб продемонструвати силу та вплив нашої мегакорпорації, ми зведемо величний штаб у цьому економічному центрі. Ця вражаюча споруда відображатиме силу нашого керівництва та значно посилить наші галактичні операції."
 decision_pd_arcology_headquarters_effects: "Додає §Y$d_pd_headquarters_building$§! до цієї столиці, обмінюючи потенційні райони на посилення адміністративних можливостей нашої корпорації."
 d_pd_headquarters_building: "Планетарний штаб"
 d_pd_headquarters_building_desc: "Монументальний символ панування, цей штаб височіє над планетою. Він слугує нервовим центром наших операцій, де формується майбутнє нашої мегакорпорації."

#Hive Confluence Spire
 decision_pd_hive_confluence_spire: "Побудувати шпиль злиття"
 decision_pd_hive_confluence_spire_desc: "Щоб проявити панування та досяжність нашого колективу, ми виростимо могутній шпиль злиття. Ця владна споруда значно посилить наші операції серед зірок."
 decision_pd_hive_confluence_spire_effects: "Додає §Y$d_pd_confluence_spire_building$§! до цієї столиці, обмінюючи потенційні райони на посилення адміністративних можливостей."
 d_pd_confluence_spire_building: "Шпиль злиття"
 d_pd_confluence_spire_building_desc: "Цей шпиль панує над поверхнею планети, здіймаючись як маяк контролю. Це осередок нашої колективної волі, де витончено тчеться наш шлях серед зірок."

#Machine Centralized Processing
 decision_pd_machine_centralized_processing: "Побудувати централізований процесорний блок"
 decision_pd_machine_centralized_processing_desc: "Щоб утвердити нашу перевагу та розширити операційні можливості, ми збудуємо централізований процесорний блок. Ця споруда значно посилить наші галактичні функції."
 decision_pd_machine_centralized_processing_effects: "Додає §Y$d_pd_machine_centralized_processing$§! до цієї столиці, обмінюючи потенційні райони на посилення адміністративних можливостей."
 d_pd_machine_centralized_processing: "Централізований процесорний блок"
 d_pd_machine_centralized_processing_desc: "Цей процесорний блок панує над поверхнею планети та є центральним вузлом наших колективних директив, витончено координуючи наших дронів."
