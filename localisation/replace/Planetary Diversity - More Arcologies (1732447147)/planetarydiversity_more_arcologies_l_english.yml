#Modifiers
 pd_garden_arcology: "Садова аркологія"
 pd_garden_arcology_desc: "Цей екуменополіс може похвалитися величезними просторами ретельно доглянутих і контрольованих садів, що утворюють широкі зелені пояси серед міської забудови."
 pd_fortress_arcology: "Аркологія-фортеця"
 pd_fortress_arcology_desc: "Цей екуменополіс слугує загальнопланетарним військовим командним центром, повним казарм, навчальних об'єктів та заводів з виробництва зброї."
 pd_commercial_arcology: "Комерційна аркологія"
 pd_commercial_arcology_desc: "Цей екуменополіс є міжгалактичним торговельним вузлом, повним жвавих ринків, великих комерційних центрів та розвиненої логістичної інфраструктури."
 pd_garden_arcology_rs: "$pd_garden_arcology$"
 pd_garden_arcology_rs_desc: "$pd_garden_arcology_desc$"
 pd_fortress_arcology_rs: "$pd_fortress_arcology$"
 pd_fortress_arcology_rs_desc: "$pd_fortress_arcology_desc$"

#Districts
 district_pd_arcology_research: "Дослідницька аркологія"
 district_pd_arcology_research_plural: "Дослідницькі аркології"
 district_pd_arcology_research_desc: "Лабораторії здіймаються ввись, повні блискучих розумів, де конкуренція настільки ж запекла, як і самі дослідження."
 district_pd_arcology_industrial: "Промислова аркологія"
 district_pd_arcology_industrial_plural: "Промислові аркології"
 district_pd_arcology_industrial_desc: "Переповнені плавильними цехами й фабриками, ці райони перетворюють сировину на передові продукти в своїх здіймних спорудах."
 district_arcology_pd_trade: "Комерційна аркологія"
 district_arcology_pd_trade_plural: "Комерційні аркології"
 district_arcology_pd_trade_desc: "Величні комерційні шпилі й вежі здіймаються до неба, їхні грандіозні форми затуляють світло."
 district_pd_arcology_naval: "Логістична аркологія"
 district_pd_arcology_naval_plural: "Логістичні аркології"
 district_pd_arcology_naval_desc: "Офісні башти та ситуаційні кімнати оптимізують флотські операції до максимальної ефективності."

#Jobs
 #Regular Logistics
 job_pd_naval_admin: "Спеціаліст з логістики"
 job_pd_naval_admin_plural: "Спеціалісти з логістики"
 job_pd_naval_admin_desc: "Висококваліфіковані в управлінні постачанням, ці спеціалісти забезпечують ефективні флотські операції, підтримуючи та відстежуючи ключові лінії постачання."
