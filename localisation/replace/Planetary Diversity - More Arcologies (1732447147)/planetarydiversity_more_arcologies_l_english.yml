 #Modifiers
 pd_hive_military: "Світ Надрозуму"
 pd_hive_military_desc: "Цей світ має вирішальне значення для основних функцій Розуму Вулика і укріплений проти зовнішніх загроз і впливу. Могутній щит огортає планету, а дрони-воїни стоять напоготові, забезпечуючи її захист."
 pd_machine_military: "Світ-Вузол"
 pd_machine_military_desc: "Ця планетарна одиниця є невіддільною частиною операційної матриці цього машинного інтелекту. Вона захищена від зовнішнього втручання, оточена невразливим оборонним механізмом. Бойові підрозділи перебувають у постійній готовності, зберігаючи цілісність одиниці."

