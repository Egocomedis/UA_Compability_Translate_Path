 job_pd_naval_admin_effect_desc: "£job_pd_naval_admin£ $job_pd_naval_admin_plural$ підвищують ефективність флоту, перетворюючи £consumer_goods£ §Y$consumer_goods$§! на £society£ §YОчки досліджень§!, та £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!."
 #Gestalt Logisitics
