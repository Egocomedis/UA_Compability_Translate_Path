 pc_pd_machine: "Світ Машинного Вузла"
 pc_pd_machine_desc: "Кам'янистий світ, вкритий штучними спорудами, розгорнутими для підтримки найпередовіших обчислювальних процесів. Розріджена атмосфера складається переважно з промислових забруднювачів і не може підтримувати біологічне життя."
