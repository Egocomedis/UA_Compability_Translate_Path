 job_pd_naval_admin_gestalt_effect_desc: "£job_pd_naval_admin_gestalt£ $job_pd_naval_admin_gestalt_plural$ підвищують ефективність флоту, перетворюючи £minerals£ §Y$minerals$§! на £society£ §YОчки досліджень§!, та £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!."
 job_pd_capital_bio_politician: "Біо-Делегати"
 job_pd_capital_bio_politician_plural: "Біо-Делегати"
 job_pd_capital_bio_politician_desc: "Деякі Біо-Трофеї відчувають більше задоволення, коли вважають себе важливішими за інших. Ця видимість домінантного становища позитивно впливає на їхній моральний дух і щастя всіх."
 mod_job_pd_capital_bio_politician_add: "Робочі місця $job_pd_capital_bio_politician$"
 mod_job_pd_capital_bio_politician_per_pop: "§G+1§! робоче місце $job_pd_capital_bio_politician$ на кожні $VALUE$ поселень"
 mod_job_pd_capital_bio_politician_per_pop_short: "\n§G+1§! £mod_job_pd_capital_bio_politician_add£ на $VALUE$ £pop£"
 job_pd_capital_bio_effect_desc: "$job_pd_capital_bio_politician$ $job_pd_capital_bio_politician_plural$ перетворюють £consumer_goods£ §Y$consumer_goods$§! на £unity£ §Y$unity$§! і підвищують §Y$mod_planet_jobs_complex_and_simple_drone_produces_mult$§!"
 #Rogue Rangers
 job_pd_robo_ranger: "Дрон біорізноманіття"
 job_pd_robo_ranger_plural: "Дрони біорізноманіття"
 job_pd_robo_ranger_desc: "Дрони біорізноманіття спеціалізуються на тому, щоб наші планети залишалися чистими та природними для наших Біо-Трофеїв."
 mod_job_pd_robo_ranger_add: "Робочі місця $job_pd_robo_ranger$"
 mod_job_pd_robo_ranger_per_pop: "§G+1§! робоче місце $job_pd_robo_ranger$ на кожні $VALUE$ поселень"
 mod_job_pd_robo_ranger_per_pop_short: "\n§G+1§! £mod_job_pd_robo_ranger_add£ на $VALUE$ £pop£"
 job_pd_robo_ranger_effect_desc: "$job_pd_robo_ranger$ $job_pd_robo_ranger_plural$ виробляють £amenities£ §YЗручності§! та £society_research£ §Y$society_research$§!."

#Buildings
 building_pd_rogue_council: "Рада Біо-Трофеїв"
 building_pd_rogue_council_desc: "Призначення обраних Біо-Трофеїв на керівні ролі задовольняє їхню внутрішню потребу в соціальній ієрархії, а навмисно створений «політичний глухий кут» формує ілюзію конфлікту. Ця стратегія звільняє дронів для зосередження на догляді та задоволенні Біо-Трофеїв."
 building_navel_base: "Флотське управління"
 building_navel_base_desc: "Міжзоряний бастіон, ця планетарна військова база є ключовим вузлом підтримки наших флотів."
 building_navel_command: "Флотський командний центр"
 building_navel_command_desc: "Колосальна командна фортеця, цей військовий комплекс слугує нервовим центром стратегічного управління нашими міжзоряними армадами."

#Decisions
 #Garden
 decision_pd_garden_arcology_project: "Проєкт аркології — Сад"
 decision_pd_garden_arcology_project_desc: "Вплітаючи зелені простори в тканину наших аркологій, ми можемо розвинути розлогий екуменополіс, де природа й урбаністика співіснують у гармонії."
 decision_pd_garden_arcology_project_effects: "Перетворює планету на §Y$pc_city$§!, збільшуючи £housing£ §Y$PLANET_HOUSING_TITLE$§!, §YВиробництво ресурсів§! та §YПриріст населення§! і відкриваючи спеціальні £district£ §YРайони аркології§! за рахунок того, що природні ресурси планети стають §Rнедоступними§!, що унеможливлює подальше будівництво £district£ §YГенераторних§!, §YВидобувних§! та §YСільськогосподарських районів§!."
 decision_pd_garden_arcology_project_effects_short: "Збільшує £housing£ §Y$PLANET_HOUSING_TITLE$§!, §YВиробництво ресурсів§! та §YПриріст населення§!\nВідкриває £district£ §YРайони аркології§!\nВимикає будівництво £district£ §YГенераторних§!, §YВидобувних§! та §YСільськогосподарських районів§!"
 decision_pd_garden_arcology_project_relic: "Відновити екуменополіс — Сад"
 decision_pd_garden_arcology_project_relic_desc: "Ця планета колись була квітучим екуменополісом. Це буде монументальне завдання, але планету можна відбудувати в Садову аркологію"
 decision_pd_garden_arcology_project_relic_effects: "$decision_pd_garden_arcology_project_effects$"
 decision_pd_garden_arcology_project_relic_effects_short: "$decision_pd_garden_arcology_project_effects_short$"
