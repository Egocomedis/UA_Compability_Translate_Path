 #Planet Classess
 pc_pd_hive: "Світ Вулика-Розуму"
 pc_pd_hive_desc: "Цей світ — колосальний живий організм, витончено пов'язаний з Розумом Вулика, що його створив. Його сформовано як бастіон передових розумових процесів, і він добре захищений. Його рельєф готовий атакувати будь-якого небажаного гостя."
 pc_pd_hive_adj: "$pc_hive_adj$"
 mod_pc_pd_hive_habitability: "$mod_pc_hive_habitability$"
