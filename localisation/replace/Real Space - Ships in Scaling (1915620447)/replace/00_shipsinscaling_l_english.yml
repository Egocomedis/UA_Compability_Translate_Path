l_english:

 ARTILLERY_BEHAVIOR_DESC:1 "§HАртилерійська тактика:§! Корабель триматиметься на великій дистанції (§Y13§!) і вестиме вогонь по цілі далекобійною зброєю."
 CARRIER_BEHAVIOR_DESC: "§HАвіаносна тактика:§! Корабель триматиметься на граничній дистанції (§Y25§!) і вестиме вогонь по цілі далекобійною зброєю."
 LINE_BEHAVIOR_DESC:1 "§HЛінійна тактика:§! Корабель наблизиться до середньої дистанції (§Y8§!) і триматиме стрій."
 PICKET_BEHAVIOR_DESC:1 "§HДозорна тактика:§! Корабель наблизиться до близької дистанції (§Y5§!) і намагатиметься перехопити ворога."

 SHIP_THRUSTER_2_DESC: "§WПрискорення крейсерського ходу:§! §G+100%§!§W\n--------------\n§!Ці електричні двигуни створюють тягу за допомогою пучків іонів, не потребуючи робочого тіла."
 SHIP_THRUSTER_3_DESC: "§WПрискорення крейсерського ходу:§! §G+200%§!§W\n--------------\n§!Вдосконалена форма електричної тяги — плазмові двигуни надають кораблям більшу досвітлову швидкість і маневреність."
 SHIP_THRUSTER_4_DESC: "§WПрискорення крейсерського ходу:§! §G+300%§!§W\n--------------\n§!Ці високотехнологічні термоядерні двигуни надають кораблям неперевершену маневреність і швидкість у досвітлових умовах."
 SHIP_THRUSTER_5_DESC: "§WПрискорення крейсерського ходу:§! §G+400%§!§W\n--------------\n§!Ці двигуни використовують технологію темної матерії для створення тяги у спосіб, що, здається, порушує численні закони фізики."
