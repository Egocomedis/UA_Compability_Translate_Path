### PR
 PR_tip_plnt_HC:0 "§HЗагальна потреба в живій силі (сума $CURRENT_POPULATION_AMOUNT$ і живої сили):§!"
 PR_failtip_plnt_HC_MORE:0 "§YЗагальна жива сила§! недостатня"
 PR_failtip_plnt_HC_LESS:0 "§YЗагальна жива сила§! перевищена"
 PR_tip_MAN_desc:1 "Жива сила еквівалентна поселенцям і може перетворюватись на них у співвідношенні §Y1:1§!. \nКожна одиниця живої сили створює $@PR_svar_MAN_empire_size|G2$ розміру держави і залежить від §Yмодифікаторів розміру держави від населення§!. \nКожна одиниця живої сили споживає $@PR_svar_MAN_usage|G2$ житла й зручностей і залежить від відповідних §Yмодифікаторів населення§!. \nЖива сила створює товарообіг і споживає ресурси утримання залежно від пропорції видів у державі. \n\nЖива сила, не розподілена по колоніях, вважається ресурсом і зберігається у формі £PR_sr_MAN£§Y$PR_sr_MAN$§!. \nЯкщо ресурс живої сили вчасно не розподілити, його запас зменшуватиметься на $@PR_svar_MAN_decline|G%0$ кожні півроку — це можна розглядати як втрату населення без постійного місця проживання. \n§EКоли на колонії з увімкненою системою живої сили з'являється безробіття, вважається, що додаткові поселенці не потрібні, тож зростання населення перетворюється на видобуток £PR_sr_MAN£$PR_sr_MAN|Y$. \nЯкщо §HРозподіл ресурсу живої сили§! увімкнено, £PR_sr_MAN£$PR_sr_MAN|Y$ розподілятиметься між усіма колоніями кожні 6 місяців з урахуванням їхньої §Yшвидкості приросту живої сили§!.§!"
 # ресурс
