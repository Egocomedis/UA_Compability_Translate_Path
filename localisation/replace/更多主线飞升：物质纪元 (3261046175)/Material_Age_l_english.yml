 mythology_army:0 "Міфічні маги"
 mythology_army_plural:0 "Міфічні маги"
 mythology_army_desc:0 "Загадкові війська, що успадкували традиції з часів середньовіччя, здатні на масштабні руйнування, але самі вкрай вразливі."
