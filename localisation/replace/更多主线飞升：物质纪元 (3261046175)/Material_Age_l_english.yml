 tradition_productivity:0 "Розумне виробництво"
 tradition_productivity_desc:0 "Ваш флот з часом виснажується, а наша промислова продукція — невичерпна."
 tr_productivity_adopt:0 "Традиція розумного виробництва"
 tr_productivity_adopt_desc:0 "Розблоковує £district£§Yрозумний район§!, здатний самостійно виробляти §G базові§! ресурси."
 tr_productivity_adopt_delayed:0 "Промисловість — кров цивілізації, розум — її душа."
 tr_productivity_finish:0 "Традицію розумного виробництва завершено"
 tr_productivity_finish_desc:0 "Розблоковує £district£§Yрозумний район§!, здатний самостійно виробляти §G передові§! ресурси.\nЗапускає кампанію з модернізації застарілих районів у розумні."
 tr_productivity_finish_delayed:0 "Жодна промислова продукція галактики не обійдеться без нас — так само, як Захід не обійдеться без Єрусалима."
 tr_productivity_liberate_works:0 "Звільнення праці"
 tr_productivity_liberate_works_desc:0 "Отримує варіант дослідження §YЗвільнення праці§!\nМожна будувати споруду §YΔ-система централізованого планування§!, що дає посаду §Yінженера розумного виробництва§!, виробляючи £engineering£ £unity£ та підвищуючи видобуток £district£§Yрозумних районів§!."
 tr_productivity_liberate_works_delayed:0 "Відмовившись від людської праці у виробничих процесах, ми неодмінно досягнемо нових вершин."
 tr_productivity_promote_plans:0 "Просунуті плани"
 tr_productivity_promote_plans_desc:0 "§YРозумні райони§! дають посаду §Yрозумного зворотного зв'язку§!, підвищуючи видобуток £district£§Yрозумних районів§!."
 tr_productivity_promote_plans_delayed:0 "Продуктивність остаточно вирвалася з-під обмежень чисельності населення, але останнє, здається, все ще має незначну цінність."
 tr_productivity_motivate_productions:0 "Стимулювання виробництва"
 tr_productivity_motivate_productions_delayed:0 "Ніхто не може спростувати перевагу об'єкта."
 tr_productivity_efficient_utilization:0 "Ефективне використання"
 tr_productivity_efficient_utilization_desc:0 "Розблоковує тип колонії §YРозумне виробництво§!."
 tr_productivity_efficient_utilization_delayed:0 "Час — гроші, ефективність — життя."
 tr_productivity_scale_effects:0 "Ефект масштабу"
 tr_productivity_scale_effects_desc:0 "Потужність £district£§Yрозумних районів§! зростає разом із їхньою кількістю."
 tr_productivity_scale_effects_delayed:0 "Наші машини — всюди у всесвіті."
