l_english:
 FTL_MISSILE_1:0 "Надсвітлова ракета"
 FTL_MISSILE_1_DESC:0 "Точно наведена надсвітлова кінетична боєголовка, встановлюється лише на великі корабельні пускові шахти."
 FTL_MISSILE_2:0 "Гіпер-надсвітлова ракета"
 FTL_MISSILE_2_DESC:0 "Вдосконалена надсвітлова ракета, яку майже неможливо перехопити."
 SOLAR_MISSILE_1:0 "Ракета сонячного шторму"
 SOLAR_MISSILE_1_DESC:0 "Надшвидкісна ракета наддальньої дії, потребує гігантської корабельної пускової шахти."
 SOLAR_MISSILE_2:0 "Ракета космічного розширення"
 SOLAR_MISSILE_2_DESC:0 "Несе більше заряду, ніж ракета сонячного шторму — її потужність здатна навіть вплинути на темп розширення всесвіту."
 STRIKE_CRAFT_BOMBER_HANGER_1:0 "Базовий бомбардувальник"
 STRIKE_CRAFT_BOMBER_HANGER_1_DESC:0 "Базовий бомбардувальник, завдає підвищеної шкоди важкоброньованим кораблям."
 STRIKE_CRAFT_BOMBER_HANGER_2:0 "Вдосконалений бомбардувальник"
 STRIKE_CRAFT_BOMBER_HANGER_2_DESC:0 "Вдосконалений бомбардувальник, завдає підвищеної шкоди важкоброньованим кораблям."
 STRIKE_CRAFT_BOMBER_HANGER_3:0 "Передовий бомбардувальник"
 STRIKE_CRAFT_BOMBER_HANGER_3_DESC:0 "Передовий бомбардувальник, завдає підвищеної шкоди важкоброньованим кораблям."
 STRIKE_CRAFT_BOMBER_HANGER_4:0 "Бомбардувальник «Скаравейд»"
 STRIKE_CRAFT_BOMBER_HANGER_4_DESC:0 "Досвід конструювання, запозичений у Скарланда та його людей — ці передові бомбардувальники здатні вести тривалі бойові дії, гнучко адаптуючи тактику."

 tech_homeworld_gaia:0 "Відновлення батьківщини"
 tech_homeworld_gaia_desc:0 "Завдяки розумінню, здобутому на інших придатних для життя планетах, ми можемо повернути до життя мертву батьківщину — і навіть перевершити її колишній стан."
 TECH_UNLOCK_UNENDING_DREAM_EVT_TITLE:0 "Нескінченний сон: пробудження"
 TECH_UNLOCK_UNENDING_DREAM_EVT_DESC:0 "Розблоковує наступний ланцюг подій §YНескінченного сну§!."

 tech_automation:0 "Промислова автоматизація"
 tech_automation_desc:0 "Наше розуміння автоматизації набагато випереджає інших."
 tech_ftl_missiles_1:0 "Надсвітлова ракета"
 tech_ftl_missiles_1_desc:0 "Точно наведена надсвітлова кінетична боєголовка, встановлюється лише на великі корабельні пускові шахти."
 tech_ftl_missiles_2:0 "Гіпер-надсвітлова ракета"
 tech_ftl_missiles_2_desc:0 "Вдосконалена надсвітлова ракета, яку майже неможливо перехопити."
 tech_solar_missiles_1:0 "Ракета сонячного шторму"
 tech_solar_missiles_1_desc:0 "Надшвидкісна ракета наддальньої дії, потребує гігантської корабельної пускової шахти."
 tech_solar_missiles_2:0 "Ракета космічного розширення"
 tech_solar_missiles_2_desc:0 "Несе більше заряду, ніж ракета сонячного шторму — її потужність здатна навіть вплинути на темп розширення всесвіту."

 tech_MITL:0 "Людина в контурі"
 tech_MITL_desc:0 "Наголошує на праві розумних видів ухвалювати рішення і наглядати за інтелектуальними системами — це гарантує наш контроль над ключовими рішеннями."

 tech_until_death:0 "До останнього подиху"
 tech_until_death_desc:0 "Ми битимемось на краю зоряного моря, ми битимемось до кінця всесвіту... Ми ніколи не здамося, до останнього подиху!"
##
 building_automatic_government_1:0 "Комп'ютер централізованого планування"
 building_automatic_government_1_desc:0 "Керувати державою за допомогою алгоритмів нелегко, але ми впоралися."
 mod_planet_building_automatic_government_1_build_speed_mult:0 "Швидкість будівництва комп'ютера централізованого планування"
 mod_building_automatic_government_1_max:0 "Ліміт комп'ютерів централізованого планування"

 building_automatic_government_2:0 "Планетарний комп'ютер централізованого планування"
 building_automatic_government_2_desc:0 "Застосовуючи нові технології кібер-врядування, ми справляємось краще, ніж будь-коли!"
 mod_planet_building_automatic_government_2_build_speed_mult:0 "Швидкість будівництва планетарного комп'ютера централізованого планування"
 mod_building_automatic_government_2_max:0 "Ліміт планетарних комп'ютерів централізованого планування"

 building_global_restaurant:0 "Зоряний ресторан"
 building_global_restaurant_desc:0 "Мережа закладів, що відкриваються в кожному куточку колоній — мандрівники з усіх усюд насолоджуються тут смачною їжею."
 mod_planet_building_global_restaurant_build_speed_mult:0 "Швидкість будівництва зоряного ресторану"
 mod_building_global_restaurant_max:0 "Ліміт зоряних ресторанів"

 building_5k_stars_restaurant:0 "Ресторан «П'ять тисяч зірок»"
 building_5k_stars_restaurant_desc:0 "Найпрестижніша мережа ресторанів галактики, куди з'їжджаються незліченні гості з чужих світів заради єдиного шматочка неперевершеного делікатесу."
 mod_planet_building_5k_stars_restaurant_build_speed_mult:0 "Швидкість будівництва ресторану «П'ять тисяч зірок»"
 mod_building_5k_stars_restaurant_max:0 "Ліміт ресторанів «П'ять тисяч зірок»"

 building_xeno_club:0 "Ксено-клуб"
 building_xeno_club_desc:0 "Тисячі шанувальників хутрястих, зіркоподібних і тарганоподібних істот збираються тут, аби провести час із коханими «людьми» своєї мрії."
 mod_planet_building_xeno_club_build_speed_mult:0 "Швидкість будівництва ксено-клубу"
 mod_building_xeno_club_max:0 "Ліміт ксено-клубів"
 building_xeno_club_tt:0 "Швидкість зростання популяції: за кожного £pops£§Yчужого поселенця§! §G+1%§!\n(поточне значення: §G+[MultXeno]%§!)"

 holding_party_branch:0 "Осередок авангарду"
 holding_party_branch_desc:0 "Осередок — закордонна база авангарду, що допомагає розвитку держав-сателітів або поширює ідеї рівності."
 mod_planet_holding_party_branch_build_speed_mult:0 "Швидкість будівництва осередку авангарду"
 mod_holding_party_branch_max:0 "Ліміт осередків авангарду"
##
 sm_space_lab:0 "Космічна лабораторія"
 sm_space_lab_desc:0 "За певних обставин ці лабораторії здатні навіть замінити науковців."

 sm_space_base_station:0 "Космічна база зв'язку"
 sm_space_base_station_desc:0 "Приймає оптичні сигнали з відстані у сотні світлових років."
 sm_space_base_station_desc_modifier:0 "£physics£ £society£ £engineering£ на місяць: §G+1%§! за кожну власну систему, максимум §G+100%§!.\n(поточне значення:\n£physics£ £society£ £engineering£ на місяць §G+[MultSystem]%§!)\nПісля ухвалення §Yспільнотою зоряного моря§! резолюції §YПередова ксенологія§! ефект подвоюється!"
 ##
 job_ma_great_programmer:0 "Великий програміст"
 job_ma_great_programmer_plural:0 "Великі програмісти"
 job_ma_great_programmer_desc:0 "Прошу зауважити: ми не хакери й комп'ютери не ремонтуємо."
 job_ma_great_programmer_effect_desc:0 "£job_ma_great_programmer£Великі програмісти виробляють £physics£ £society£ £engineering£ і додають §G+0.5§! до складання роботизованого населення держави."
 mod_job_ma_great_programmer_add:0 "Посади великого програміста"
 mod_job_ma_great_programmer_per_pop:0 "На кожні $VALUE$£pop£ населення §G+1§!£job_ma_great_programmer£великий програміст"
 mod_job_ma_great_programmer_per_pop_short:0 "На кожні $VALUE$£pop£ §G+1§!£job_ma_great_programmer£"
 mod_job_ma_great_programmer_per_crime:0 "На кожен рівень злочинності $VALUE$ §G+1§!£job_ma_great_programmer£великий програміст"

 job_ma_cook:0 "Кухар"
 job_ma_cook_plural:0 "Кухарі"
 job_ma_cook_desc:0 "Життя й смачну їжу не можна залишати без уваги."
 job_ma_cook_effect_desc:0 "$job_ma_cook$ споживає £food£, виробляє £consumer_goods£ £unity£ £amenities£ і підвищує внутрішній £trade_value£ товарообіг від рівня життя."
 mod_job_ma_cook_add:0 "Посади кухаря"
 mod_job_ma_cook_per_pop:0 "На кожні $VALUE$£pop£ населення §G+1§!$job_ma_cook$"
 mod_job_ma_cook_per_pop_short:0 "На кожні $VALUE$£pop£ населення §G+1§!£job_clerk£"
 mod_job_ma_cook_per_crime:0 "На кожен рівень злочинності $VALUE$ §G+1§!$job_ma_cook$"

 job_ma_head_cook:0 "Шеф-кухар"
 job_ma_head_cook_plural:0 "Шеф-кухарі"
 job_ma_head_cook_desc:0 "Кухарі найвищого рівня, чия майстерність — одна на мільйон."
 job_ma_head_cook_effect_desc:0 "$job_ma_head_cook$ споживає £food£, виробляє £consumer_goods£ £unity£ £amenities£ і підвищує внутрішній £trade_value£ товарообіг від рівня життя."
 mod_job_ma_head_cook_add:0 "Посади шеф-кухаря"
 mod_job_ma_head_cook_per_pop:0 "На кожні $VALUE$£pop£ населення §G+1§!$job_ma_head_cook$"
 mod_job_ma_head_cook_per_pop_short:0 "На кожні $VALUE$£pop£ населення §G+1§!£job_manager£"
 mod_job_ma_head_cook_per_crime:0 "На кожен рівень злочинності $VALUE$ §G+1§!$job_ma_head_cook$"
