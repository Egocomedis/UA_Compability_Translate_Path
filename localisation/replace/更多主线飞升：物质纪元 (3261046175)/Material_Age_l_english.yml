 living_standard_democratic_dictatorship:0 "Демократичне будівництво"
 living_standard_democratic_dictatorship_tooltip:0 "$living_standard_democratic_dictatorship$ розподіляє споживчі товари більш рівномірно, водночас заохочуючи людей до праці.\n\nЯкщо не виникає дефіциту £consumer_goods£§Yспоживчих товарів§!, §Yнаселення§! отримує §G+5%§! $HAPPINESS$ і §G+10%§! до ресурсів, що виробляються на £job£посадах.\n\nЗнижує штраф до щастя для безробітного населення.\n\nУ поєднанні з указами типу §Yавангарду§! дає додаткові ефекти."
 living_standard_democratic_dictatorship_tooltip_delayed:0 "§LЦей рівень життя прагне розподіляти блага за працею настільки, наскільки дозволяють об'єктивні умови.§!"
##
 edict_dd_full_ahead:0 "Авангард: повний вперед"
 edict_dd_full_ahead_desc:0 "Відстанеш — і тебе поб'ють, тож нам треба прискорюватися."
 edict_dd_full_ahead_effect:0 "Населення з рівнем життя §YДемократичне будівництво§!:\n -ресурси з посад §G+15%§!\n -утримання населення §R+20%§!"
 edict_dd_golden_mean:0 "Авангард: золота середина"
 edict_dd_golden_mean_desc:0 "Крайнощі часто ведуть до катастрофи — правильний вибір це золота середина."
 edict_dd_golden_mean_effect:0 "Населення з рівнем життя §YДемократичне будівництво§!:\n -ресурси з посад §G+7.5%§!\n -щастя населення §G+5%§!"
 edict_dd_rehabilitate:0 "Авангард: відновлення сил"
 edict_dd_rehabilitate_desc:0 "Зоряне море якось надто урбанізувалося, лол."
 edict_dd_rehabilitate_effect:0 "Населення з рівнем життя §YДемократичне будівництво§!:\n -споживання зручностей §G-20%§!\n -щастя населення §G+10%§!"

 edict_aom_spirits_revival:0 "Відродження духів"
 edict_aom_spirits_revival_desc:0 "Свідомість — батько реальності."

 edict_as_death_for_truth:0 "Ранкове пізнання шляху"
 edict_as_death_for_truth_desc:0 "Найдопитливіші люди з усіх куточків держави прямують до Храму Аксіом — найпередовішого типу дослідницьких станцій у галактиці — щоб проводити експерименти, які будь-якої миті можуть коштувати їм життя. Заради прагнення розумних істот до істини вони готові пожертвувати всім."
 edict_as_death_for_truth_effect:0 "Жертвує §R5%§!£pops£ населення, натомість дає §G[DeathForTruth]§!£physics£ £society£ £engineering£."
