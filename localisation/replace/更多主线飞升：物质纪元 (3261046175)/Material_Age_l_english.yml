 origin_wild_duckweed:0 "Амбіції ряски"
 origin_wild_duckweed_desc:0 "Цю цивілізацію колись роздирали нескінченні громадянські війни — суворе середовище існування та войовничі гени водночас згуртували її та непомітно виплекали буйні амбіції до експансії."
 origin_wild_duckweed_effects:0 "§RУвага: заборонено всі шляхи сходження, крім хана!§!\n-На старті отримує §Gдодаткові§! ресурси та §G20§! кораблів §YКанонерка хана§!, але бракує §R6§! населення.\n-Батьківщина бідніша на ресурси й має менше початкових районів.\n-Початкові споруди §YДослідницька лабораторія§!, §YАдміністративна будівля§!, §YКомерційний район§! замінені на §YПіратську бухту§!."
