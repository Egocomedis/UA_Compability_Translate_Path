 origin_time_lens:0 "Часова лінза"
 origin_time_lens_desc:0 "У ході довгої історії справедливість і верховенство права стали найважливішим моральним стандартом цієї цивілізації. Заради досягнення абсолютної рівності вони планують збудувати комп'ютер зіркового масштабу, що, наче лінза, відображатиме кожен куточок суспільства, зрештою не залишаючи прихованим жодного темного закутка минулого чи теперішнього."
 origin_time_lans_effects:0 "§RУвага: заборонено всі шляхи сходження, крім числення!§!\n-Початкова традиція: §YЧислення§!\n-Домашня система: володіє §YМатрицею всього сущого: фундамент§!\n-Початкові райони: §Yпромисловий район§!\n-Початкова споруда: £building£§YКанал завантаження даних§!\n-Запускає ланцюг подій §YЧасова лінза§!."
##
 START_SCREEN_TIME_LENS:0 "У ході довгої історії справедливість і верховенство права стали найважливішим моральним стандартом [GetSpeciesName].\n\nЗаради цього великого ідеалу незліченні мудреці висували одну прекрасну, але нездійсненну теорію за іншою, і, немов метелики до вогню, втілювали їх у життя... доки не було висунуто теорію матриці всього сущого — і народився «Проєкт «Часова лінза»». Мета проєкту — збудувати комп'ютер зіркового масштабу, що обчислює справжній всесвіт і, наче лінза, відображає кожен куточок суспільства: нам залишається лише поглянути на себе перед цією «лінзою», і жодна темрява минулого чи теперішнього не сховається.\n\nЗ винаходом [GetStartingDrive] ми готові досліджувати це зоряне море."
##
 Material.0007.title:0 "Часова лінза"
 Material.0007.desc:0 "Матриця всього сущого: фундамент, зведена навколо [From.solar_system.GetName], успішно запрацювала — симульована нею частина справжнього всесвіту неочікувано підсилила наші наукові можливості. Хоча наразі підсилення від цього комп'ютера зіркового масштабу здається незначним, з часом воно неодмінно спричинить нову революцію.\nНам потрібно продовжувати вдосконалювати матрицю всього сущого, щоб рухатися далі."
 Material.0007.a:0 "Підтверджено."

 Material.0008.title:0 "Часова лінза: порада вченого"
 Material.0008.desc:0 "Ми завершили апаратну частину матриці всього сущого.\nНаші попередні здогади підтвердились: наукова цінність матриці всього сущого значно перевищила очікування, і в академічних колах пролунали заклики переглянути стратегічне призначення цієї новітньої технології. На їхню думку, серцевиною «Проєкту «Часова лінза»» не повинне бути просте правозастосування — науковий прогрес має стояти на першому місці."
 Material.0008.a:0 "Слушно, нехай інженери скоригують план."
 Material.0008.b:0 "Дурниці, кінцева мета лишається незмінною!"

 Material.0009.title:0 "Часова лінза: народна асамблея"
 Material.0009.desc:0 "Більшу частину програмного забезпечення успішно інтегровано.\nДебати навколо «Проєкту «Часова лінза»» розкололи людей на два табори: консерватори вважають, що матриця всього сущого повинна зосередитись на врядуванні, радикали — що на дослідженнях."
 Material.0009.a:0 "Радикали мають рацію, ще не пізно повернутися на правильний шлях."
 Material.0009.b:0 "Я обираю консерваторів, змінювати курс уже запізно."

 Material.0010.title:0 "Часова лінза: вирок ради"
 Material.0010.desc:0 "Матрицю всього сущого повністю добудовано, настав час твого рішення.\nМайбутнє чи теперішнє? Ухил у дослідження чи в урядування? Відмовитися від утопії заради розвитку цивілізації, чи, навпаки, стежити за всім заради абсолютної справедливості?.."
 Material.0010.a:0 "Ухил у дослідження."
 Material.0010.b:0 "Ухил у врядування."

 Material.0012.title:0 "Часова лінза: крокуємо вперед від сьогодення"
 Material.0012.desc:0 "Повна потужність!\nЦивілізація [GetSpeciesName] увійшла в нову епоху — хоча нам ще не вдалося досягти найповнішої й найсправедливішої рівності, з кожним новим науково-технічним досягненням цей день стає все ближчим."
 Material.0012.a:0 "Це наш власний Великий похід."
 Material.0012.a.desc:0 "-Посилює £building£§YКанал завантаження даних§!."

 Material.0013.title:0 "Часова лінза: просвітлені темні віки"
 Material.0013.desc:0 "Все скінчено.\nАбсолютна рівність сформувала досконалу особистість, тож жодного стимулу до самовдосконалення в [GetSpeciesName] більше не лишилось. Культура й мистецтво вичерпалися, адже кожен став святим; наука й техніка застигли, адже нам більше не потрібне краще життя... [GetSpeciesName] увійшли у зовні світлі, а насправді безпросвітно темні віки."
 Material.0013.a:0 "Ох! Просвітлені темні віки!"
 Material.0013.a.desc:0 "-£building£§YКанал завантаження даних§! втрачає ефект.\n-§YМатриця всього сущого§! більше не виробляє £physics£ £society£ £engineering£."

