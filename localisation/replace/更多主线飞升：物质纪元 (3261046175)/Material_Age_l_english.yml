 war_goal_wg_drug_trade:0 "Демпінг втіхи"
 war_goal_wg_drug_trade_desc:0 "Розв'язати війну, щоб демпінгувати наркотичну речовину заради прибутку."
 wg_drug_trade_accept_them:0 "Пограбувати §Y[From. GetName]§!, наклавши на неї модифікатор §RХворий гігант зоряного моря§! на §Y10§! років.\nМи самі отримуємо модифікатор §GВійна за втіху§! на §Y10§! років.\nТрофеї §Y[Root. GetName]§!:"
##
 civic_automatic_bureaucrat:0 "Алгоритм державного управління"
 civic_automatic_bureaucrat_desc:0 "У ході цивілізаційного розвитку це суспільство поступово усунуло розумних істот із бюрократичного апарату. У їхньому уряді, можливо, ще лишилося трохи людських рук, але переважає холодна раціональна алгоритмічність."
 civic_automatic_bureaucrat_effects:0 "-Розблоковує £building£§YКомп'ютер централізованого планування§!, що виробляє невелику кількість £physics£ £society£ £engineering£ £unity£ і §G+1§!£job_ma_great_programmer£§Yвеликого програміста§!, але §R-5%§! до щастя населення.\n-£job_ma_great_programmer£§YВеликі програмісти§! виробляють £physics£ £society£ £engineering£ і додають §G+0.5§! до складання роботизованого населення держави.\n-Дає технологію §YШтучна робоча сила§!."
 mod_country_unity_cost_mult:0 "Вартість єдності"
 councilor_automatic_bureaucrat:0 "Головний архітектор"
 councilor_automatic_bureaucrat_desc:0 "$councilor_automatic_bureaucrat$ будує міст між науковцями та бюрократами."
 mod_councilor_automatic_bureaucrat_exp_gain:0 "Досвід $councilor_automatic_bureaucrat$"

 civic_space_science:0 "Космічна наука"
 civic_space_science_desc:0 "Замість поверхні планети, скутої гравітацією, це суспільство віддає перевагу науковим пошукам в умовах невагомості."
 civic_space_science_effect:0 "-Можна будувати модуль §YКосмічна лабораторія§! на §Yзоряних базах§!, що виробляє §G3§! £physics£ £society£ £engineering£.\n-Можна будувати споруду §YКосмічна база зв'язку§! на §Yзоряних базах§!, що підвищує видобуток £physics£ £society£ £engineering£ держави залежно від кількості власних систем, максимум §G+100%§!."
 councilor_space_science:0 "Космічний актуарій"
 councilor_space_science_desc:0 "Звикнувши до життя на станціях з обмеженими ресурсами, $councilor_space_science$ має особливий погляд на ефективність використання ресурсів."
 mod_councilor_space_science_exp_gain:0 "Досвід $councilor_space_science$"

 civic_democratic_dictatorship:0 "Демократичний авангард"
 civic_democratic_dictatorship_desc:0 "Це суспільство прагне визволення й рівності, але водночас вірить, що потужний централізований уряд — необхідна умова для досягнення цієї мети."
 civic_democratic_dictatorship_effect:0 "-Дозволяє рівень життя §YДемократичне будівництво§!, що дає §G+10%§! до ресурсів з £job£§Yпосад§!.\n-Дозволяє видавати укази типу §Yавангард§!, що додають модифікатори населенню з рівнем життя §YДемократичне будівництво§!.\n-Розблоковує ділянку §YОсередок авангарду§!."
 councilor_democratic_dictatorship:0 "Кадровий керівник"
 councilor_democratic_dictatorship_desc:0 "Присутність $councilor_democratic_dictatorship$ прискорює розвиток продуктивних сил."
 mod_councilor_democratic_dictatorship_exp_gain:0 "Досвід $councilor_democratic_dictatorship$"

 civic_age_of_mythology:0 "Доба міфології"
 civic_age_of_mythology_desc:0 "Під керівництвом пророків і верховних жерців це суспільство нарешті ступило на шлях трансцендентного."
 civic_age_of_mythology_effect:0 "-Можна будувати сухопутні війська §YМіфічні маги§!, здатні на масштабні руйнування, але самі вкрай вразливі.\n-Можна видати указ §YВідродження духів§!, що суттєво підвищує бойову міць флоту й сухопутних військ.\n-За вибору на початку гри — отримує технологію §YПсіонічна теорія§! та перетворює 3 органічних поселенців на псіонічних."
 councilor_age_of_mythology:0 "Легендарний маг"
 councilor_age_of_mythology_desc:0 "Бачите? Ось що буває, коли награєшся в «Доба міфології: переказ»."
 mod_councilor_age_of_mythology_exp_gain:0 "Досвід $councilor_age_of_mythology$"

 civic_drug_trade:0 "Торгівля втіхою"
 civic_drug_trade_desc:0 "Цей корпоративний уряд випадково виявив речовину, що викликає залежність у будь-якої органічної форми життя, і вирішив на цьому заробити."
 civic_drug_trade_effect:0 "-За вибору на початку гри — отримує технологію §YПідшкірна стимуляція§!.\n-Володіючи технологією §YПідшкірна стимуляція§!, можна розпочати casus belli §YДемпінг втіхи§!, викачуючи £energy£енергокредити, £consumer_goods£споживчі товари, £alloys£сплави та накладаючи на §Rворога§!/§Gсебе§! модифікатори §RХворий гігант зоряного моря§!/§GВійна за втіху§! відповідно."
 councilor_drug_trade:0 "Директор із втіхи"
 councilor_drug_trade_desc:0 "$councilor_drug_trade$ керує всім виробництвом і демпінгом наркотичних речовин у державі."
 mod_councilor_drug_trade_exp_gain:0 "Досвід $councilor_drug_trade$"

 civic_cook_knights:0 "Лицарі-кулінари"
 civic_cook_knights_desc:0 "У цьому суспільстві приготування й споживання їжі — священне й недоторканне право. Їхня кулінарна майстерність надзвичайна, і вони охоче діляться стравами з іншими цивілізаціями."
 civic_cook_knights_effect:0 "-Можна будувати або покращувати споруду £building£§YЗоряний ресторан§!, що дає посади £job£§YКухар§! та §YШеф-кухар§!.\n-£job_clerk£§YКухарі§! та £job_manager£§YШеф-кухарі§! споживають £food£, виробляють £consumer_goods£ £unity£ £amenities£ та підвищують внутрішній £trade_value£ товарообіг від рівня життя."
 councilor_cook_knights:0 "Головний шеф-кухар"
 councilor_cook_knights_desc:0 "Найкращий кулінар у всій державі — жодна органічна істота не встоїть перед його стравами."
 mod_councilor_cook_knights_exp_gain:0 "Досвід $councilor_cook_knights$"

 civic_corporate_cook_knights:0 "Ресторанна корпорація"
 civic_corporate_cook_knights_desc:0 "Прототип цієї корпорації — мережа фастфуду, а смачна їжа — ключ до їхнього прибутку."
 councilor_corporate_cook_knights:0 "Гастрономічний консультант"
 councilor_corporate_cook_knights_desc:0 "$councilor_corporate_cook_knights$ керує кухарями, готуючи найпопулярніші страви."
 mod_councilor_corporate_cook_knights_exp_gain:0 "Досвід $councilor_corporate_cook_knights$"

 civic_axiom_society:0 "Товариство Аксіом"
 civic_axiom_society_desc:0 "Жага знань живе в розумі кожної розумної істоти — це суспільство просто розвинуло її до рівня, що переважує будь-яке інше бажання. Заради ще одного кроку до остаточної істини люди готові навіть заплатити життям."
 civic_axiom_society_effect:0 "-За кожну досліджену технологію отримує £unity£§Yєдність§! у розмірі §G3§!-місячного видобутку.\n-Розблоковує указ §YРанкове пізнання шляху§!, що жертвує §R5%§!£pops£ населення заради великої кількості £physics£ £society£ £engineering£, пропорційної загальній кількості £pops£ населення держави."
 councilor_axiom_society:0 "Провісник аксіом"
 councilor_axiom_society_desc:0 "Пізнати шлях уранці — і померти ввечері не шкода."
 mod_councilor_axiom_society_exp_gain:0 "Досвід $councilor_axiom_society$"

 civic_mother_killer:0 "Клавіатурний герой"
 civic_mother_killer_desc:0 "У кіберпросторі цього суспільства словесні випади на адресу біологічних батьків опонента вважаються «доблестю». Переміг — батьки живі-здорові, програв — родовід відлітає до небес."
 civic_mother_killer_effect:0 "-На старті отримує технологію §YЗадовільна майстерність образ§!."
 councilor_mother_killer:0 "Кібер-мисливець на матерів"
 councilor_mother_killer_desc:0 "Проти $councilor_mother_killer$ нікому не вдасться вберегти рідну матір."
 mod_councilor_mother_killer_exp_gain:0 "Досвід $councilor_mother_killer$"

 civic_xeno_culture:0 "Ксено-звичаї"
 civic_xeno_culture_desc:0 "У цьому суспільстві панує дух всеосяжної любові — їхні уподобання широкі, а сексуальна орієнтація ніколи не обмежувалась власним видом. Ще до того, як вони на власні очі побачили інопланетян, по всій державі вже набули шаленої популярності ксено-клуби, натхненні самими лише фантазіями."
 civic_xeno_culture_effect:0 "-Можна будувати споруду §YКсено-клуб§!: §G+2§!£job_entertainer£артистів і §G+5%§! до щастя, а також підвищує швидкість зростання населення пропорційно кількості §Yчужого населення§!."
 councilor_xeno_culture:0 "Великий посередник"
 councilor_xeno_culture_desc:0 "$councilor_xeno_culture$ підтримує гармонію життя між видами."
 mod_councilor_xeno_culture_exp_gain:0 "Досвід $councilor_xeno_culture$"
##
 Material.0016.title:0 "Ранкове пізнання шляху"
 Material.0016.desc:0 "Найдопитливіші люди з усіх куточків держави прямують до Храму Аксіом — найпередовішого типу дослідницьких станцій у галактиці — щоб проводити експерименти, які будь-якої миті можуть коштувати їм життя. Заради прагнення розумних істот до істини вони готові пожертвувати всім."
 Material.0016.a:0 "Померти ввечері не шкода."

