 ap_synthetic_productions:0 "Розумне виробництво зоряного моря"
 ap_synthetic_productions_desc:0 "Ручне виробництво вже не пасує сьогоднішньому суспільству. Відмовившись від людської праці у виробничих процесах і масово впровадивши автоматизовані розумні машини, ми неодмінно досягнемо нових вершин."
 synthetic_productions_tooltip:0 "Розблоковує дерево традицій §YРозумне виробництво§!.\nРозблоковує §Yексклюзивний§! порядок денний ради."
 requires_not_ap_synthetic_productions:0 "Не можна мати талант сходження §YРозумне виробництво зоряного моря§!!"
