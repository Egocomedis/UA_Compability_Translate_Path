 origin_unending_dream:0 "Нескінченний сон"
 origin_unending_dream_desc:0 "Ця цивілізація могла б перевершити швидкість світла й процвітати об'єднаною, але випадкова катастрофа знищила її — переважна більшість населення занурилась у вічний зимовий сон у камерах сну... Заради підтримки роботи камер сну на поверхні досі цілодобово трудяться автоматичні машини."
 origin_unending_dream_effects:0 "§RУвага: заборонено всі шляхи сходження, крім розумного виробництва!§!\n—Початкова планета: §Yмертва планета§!\n—Початкове населення: лише §R1§!-§R2§!£pop£\n—Початкові райони: §Yрозумний ресурсний район§! ×4, §Yрозумний міський район§! ×1\n—Початкові споруди: £building£§YВелика камера сну§!, £building£§YРозумна ливарня§!."
##
 START_SCREEN_UNENDING_DREAM:0 "[GetHomeWorldName] колись була неймовірно багата, а цивілізація [Root.GetSpeciesNamePlural] — неймовірно процвітаюча. Роками ми вірили, що маємо шанс об'єднатись і процвітати, злетіти в космос і стати передовою цивілізацією, що панує в зоряному морі.\n\nУ нас справді був такий шанс.\n\nПеред обличчям нескінченних катастроф наші предки натомість обрали здійняти клинок проти власних побратимів — і не забарились голод і війна... Зрештою [GetHomeWorldName] загинула, перетворившись на мертву безжиттєву планету, а цивілізація [Root.GetSpeciesNamePlural], переселивши переважну більшість населення в підземні камери сну, канула в історію. На щастя, перед загибеллю ми володіли вкрай досконалою автоматизованою технологією. Незліченні розумні машини вкрили поверхню батьківщини, цілодобово працюючи заради підтримки роботи камер сну.\n\nНещодавно центр ухвалення рішень ШІ завершив розробку технології надсвітлових міжзоряних подорожей і пробудив найкращих із-поміж нас, щоб дослідити нову домівку у всесвіті. Перед обличчям нових можливостей і викликів ми обрали надію."

