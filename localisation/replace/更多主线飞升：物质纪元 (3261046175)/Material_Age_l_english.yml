 council_agenda_agenda_new_productivity_name:0 "Нова продуктивність"
 council_agenda_agenda_new_productivity_desc:0 "Ручне виробництво настільки неефективне — нам потрібно розкріпачити мислення й прийняти нову якісну продуктивність."
