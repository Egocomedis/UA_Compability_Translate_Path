 Material.0004.title:0 "Нескінченний сон: залишити колиску"
 Material.0004.desc:0 "Ми колонізували придатну для життя планету!\n\nДослідивши її, ми, можливо, знайдемо спосіб відновити середовище нашої батьківщини. Звісно, ми можемо й відмовитися від людей у камерах сну, зосередившись на освоєнні нового світу."
 Material.0004.a:0 "Не можна кидати своїх."
 Material.0004.b:0 "Вони більше не потрібні."

 Material.0005.title:0 "Нескінченний сон: пробудження"
 Material.0005.desc:0 "Рівень нашої науки тепер здатен підтримати відновлення клімату батьківщини — якщо все піде як слід, наші співвітчизники в камерах сну незабаром знову побачать світло."
 Material.0005.a:0 "Нарешті."

 Material.0006.title:0 "Нескінченний сон: останній вибір"
 Material.0006.desc:0 "Проєкт відновлення середовища майже завершено — після нього наша батьківщина стане §Yпланетою Гея§!. Але водночас біологи виявили, що в одній із западин з низьким рівнем радіації якась популяція виявляє інтелект, достатній, аби зарахувати її до нерозвинених розумних видів. Якщо ми наполягатимемо на перетворенні середовища, масштабна екологічна перебудова завдасть їм тяжкого удару.\n§RПродовжувати?§!"
 Material.0006.a:0 "Ми піклуємось про них — а хто подбає про нас?"
 Material.0006.a.desc:0 "Батьківщина стає §Yпланетою Гея§! і отримує 30£pop£ населення.\nВелика камера сну та розумна ливарня будуть покинуті."
 Material.0006.b:0 "Наша епоха вже минула — майбутнє належить їм!"
 Material.0006.b.desc:0 "Велика камера сну та розумна ливарня збережуться.\nВиявлено 3£pop£ тубільного населення."

 Material.1007.title:0 "Самосприйняття, самоадаптація, самоорганізація"
 Material.1007.desc:0 "Наші науковці та чиновники завершили перевірку можливості автоматизації та інтелектуалізації промисловості — промисловці та робітники на передньому краї технологій ось-ось відчують перші плоди реформи.\n§RНаші райони перетворяться на §Yрозумні §district£райони§!.§!"
 Material.1007.a:0 "Не зупиняти виробничу лінію!"
