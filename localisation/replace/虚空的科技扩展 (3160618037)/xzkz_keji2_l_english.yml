l_english:




 tech_xzkz_heikeji2: "Архітектура технологій Піонерів"
 tech_xzkz_heikeji2_desc: "Відкриває споруди технологій Піонерів."

 building_xzkz_fe_security_2: "§MЗала Рівноваги§!"
 building_xzkz_fe_security_2_desc: "Підтримує загальний баланс і координує функціонування всього сущого."

 tech_xzkz_heikeji3: "Споруда технології автоматизації Піонерів"
 tech_xzkz_heikeji3_desc: "Відкриває споруди технології автоматизації Піонерів."

 building_xzkz_fe_stronghold_2: "§MБаза Божественного Щита§!"
 building_xzkz_fe_stronghold_2_desc: "Величезна військова база, де зосереджені передове обладнання та надійні оборонні об'єкти."

 building_xzkz_affluence_center_2: "§MЦентр Багатства§!"
 building_xzkz_affluence_center_2_desc: "Цей центр здатний без зусиль миттєво задовольнити будь-яке найунікальніше бажання."

 building_xzkz_fe_entertainment_2_2: "§MВузол Нескінченного Блаженства§!"
 building_xzkz_fe_entertainment_2_2_desc: "Це вершина розваг, вузол, що виходить за межі звичних обмежень, де всі бажання здійснюються ще до того, як їх висловлять."

 building_xzkz_nourishment_center_2: "§MЦентр Харчування§!"
 building_xzkz_nourishment_center_2_desc: "Будь-який смак, який тільки можна уявити, можна відтворити в цих спорудах."

 building_xzkz_fe_lab_2_2: "§MНадприродна Підвісна Вежа§!"
 building_xzkz_fe_lab_2_2_desc: "Ця споруда — форпост наукового прогресу, що також може похвалитися найпередовішими й найвсебічнішими дослідницькими об'єктами."

 building_xzkz_class_4_singularity_2: "§MСингулярність четвертого порядку§!"
 building_xzkz_class_4_singularity_2_desc: "Енергетичний вихід цієї сингулярності кидає виклик законам фізики, тоді як стримувальне поле підтримує надзвичайно високу стабільність."

 building_xzkz_dimensional_fabricator_2: "§MБаза Вимірного Вузла§!"
 building_xzkz_dimensional_fabricator_2_desc: "Ця споруда використовує таємничу вимірну технологію, щоб відкривати портали в інші світи, дозволяючи збирачам вимірів збирати з них цінні ресурси."

 building_xzkz_fe_mine_2_2: "§MТрансчасове буріння крізь центр§!"
 building_xzkz_fe_mine_2_2_desc: "Цей видобувний центр використовує технологію гіперпростору для видобутку мінералів з усіх ділянок над ядром планети крізь тверді й рідкі об'єкти без фізичного контакту."

 building_xzkz_nano_forge_2: "§MНанопіч§!"
 building_xzkz_nano_forge_2_desc: "У цій кувальній печі величезний нанореплікатор перетворює сировину на передові сплави з приголомшливою ефективністю."

 building_xzkz_fe_assembly_2_2: "§MЦентр Квантового Виробництва Роботів§!"
 building_xzkz_fe_assembly_2_2_desc: "Цей об'єкт — інженерне диво, а його квантова складальна лінія використовує конвертери заплутаності для обробки деталей машин до найменших подробиць. Жоден атом не зміщений."

 building_xzkz_fe_administration_2_2: "§MКінцевий Центр Управління§!"
 building_xzkz_fe_administration_2_2_desc: "Цей масштабний комплекс — центр системи управління, що охоплює галактики, з'єднаний з потужною та передовою мережею управління."

 building_xzkz_fe_dome_2: "§MДев'ятинебесний Купол§!"
 building_xzkz_fe_dome_2_desc: "Це Небесне Місто ширяє завдяки передовій антигравітаційній технології, забезпечуючи райське середовище проживання для своїх мешканців."

 building_xzkz_empyrean_shrine_2: "§MВежа Духовного Царства§!"
 building_xzkz_empyrean_shrine_2_desc: "У цій високій вежі могутні духовні істоти заглиблюються у вивчення сили духовності, і лише невелика їх частина присутня в наших вимірах."

 building_xzkz_fe_silo_2_2: "§MСклад Всесвітньої Бульбашки§!"
 building_xzkz_fe_silo_2_2_desc: "Ми можемо створити космічну бульбашку для зберігання ресурсів."

 building_xzkz_ancient_cryo_chamber_2: "§MГенетичний морозильник§!"
 building_xzkz_ancient_cryo_chamber_2_desc: "Тут зберігаються незліченні генетичні послідовності."

 building_xzkz_master_archive_2: "§MГоловні Архіви§!"
 building_xzkz_master_archive_2_desc: "Тут зберігаються всі знання, тут зібрані всі дані та інформація."

 building_xzkz_fe_market_2_2: "§MМіжзоряний Торговельний Вузол§!"
 building_xzkz_fe_market_2_2_desc: "Ця торгова зона посідає найвище становище в галактичній торгівлі, а її величезний шпиль можна побачити навіть з орбіти."

 building_xzkz_fe_clinic_2_2: "§MІнститут Структурної Регенерації§!"
 building_xzkz_fe_clinic_2_2_desc: "Структурна регенерація — унікальна дисципліна й піонерська галузь, що постійно переосмислює межі, продовжуючи час існування споруд."

 building_xzkz_fe_xeno_zoo_2: "§MПритулок для Прибульців§!"
 building_xzkz_fe_xeno_zoo_2_desc: "Надзвичайно складна захищена зона, що забезпечує природні середовища існування для виживання інопланетних видів."



