 XZKZ_PLANET_KILLER_STAR_CRACKER_ACTION: "Запалення зорі"
 XZKZ_PLANET_KILLER_STAR_CRACKER_DESC: "Спрямований промінь швидкої нейтронної енергії ін'єктується в цю зорю, спричиняючи вибух наднової. Величезна кількість енергії, вивільненої під час цієї події, використовується для генерування достатньої кількості темної матерії.\n\n§RКоли зоря детонує, усі колонії, мегаспоруди й космічні станції в межах зоряної системи, включно з нашими, будуть знищені.§!"
 FLEETORDER_DESTROY_PLANET_WITH_XZKZ_PLANET_KILLER_STAR_CRACKER: "Готуємося розтрощити $PLANET|Y$"

 XZKZ2_PLANET_KILLER_STAR_CRACKER: "ОРЕОЛ"
 XZKZ2_PLANET_KILLER_STAR_CRACKER_ACTION: "Активувати Ореол"
 XZKZ2_PLANET_KILLER_STAR_CRACKER_DESC: "Буде вивільнено дуже потужний особливий енергетичний імпульс, що пройде крізь усі галактики й планети, знищуючи все населення."
