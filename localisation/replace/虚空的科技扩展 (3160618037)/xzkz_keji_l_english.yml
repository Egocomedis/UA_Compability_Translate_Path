 #建筑岗位等

 building_xzkz_affluence_center: "Центр Багатства §Bпрототип§!"
 building_xzkz_affluence_center_desc: "Хоч яким унікальним був би матеріал, тут його можна знайти."

 building_xzkz_nourishment_center: "Центр Харчування §Bпрототип§!"
 building_xzkz_nourishment_center_desc: "Якщо щось має смак, його можна відтворити тут."

 building_xzkz_dimensional_fabricator: "Вимірна виробнича машина §Bпрототип§!"
 building_xzkz_dimensional_fabricator_desc: "Ця споруда використовує маловідому вимірну технологію, щоб відкривати двері в інші світи та збирати з них цінні ресурси."

 building_xzkz_class_4_singularity: "Сингулярність четвертого порядку §Bпрототип§!"
 building_xzkz_class_4_singularity_desc: "Потужне ізоляційне поле контролює центральну енергетичну точку та виробляє велику кількість енергії."

 building_xzkz_nano_forge: "Нанопіч §Bпрототип§!"
 building_xzkz_nano_forge_desc: "Гігантський кронштейн нанореплікатора перетворює сировину на високоякісні сплави з дивовижною ефективністю."

 building_xzkz_master_archive: "Головний Архів §Bпрототип§!"
 building_xzkz_master_archive_desc: "Тут ми зберігаємо всі знання, а також маємо найпередовіші й найвсебічніші дослідницькі об'єкти."

 building_xzkz_empyrean_shrine: "Вежа Духовного Царства §Bпрототип§!"
 building_xzkz_empyrean_shrine_desc: "У цій здійнятій вежі перебувають потужні псайкери, що вивчають і розвивають псіоніку, і лише невелика їх частина існує в наших вимірах."

 building_xzkz_fe_dome: "Повітряний Купол §Bпрототип§!"
 building_xzkz_fe_dome_desc: "Збудований в утопії, що ширяє в повітрі, спираючись на надзвичайно передову антигравітаційну технологію."

 building_xzkz_fe_stronghold: "Щитова База §Bпрототип§!"
 building_xzkz_fe_stronghold_desc: "Масштабна планетарна оборонна база з численними арсеналами, повними передової зброї Піонерів. "

