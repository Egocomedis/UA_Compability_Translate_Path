l_english:

 PLANET_KILLER_XZKZ_CRACKER: "Розколювач Світів"
 PLANET_KILLER_XZKZ_CRACKER_ACTION: "Розколоти планету"
 PLANET_KILLER_XZKZ_CRACKER_DESC: "Спрямований потік теплової енергії перегріває атмосферу та збурює ядро планети, спричиняючи катастрофічні тектонічні процеси. Завершальний, порівняно невеликий ударний вибух розколює планету навпіл."


 PLANET_KILLER_XZKZ_SHIELDER:0 "Глобальний Умиротворювач"
 PLANET_KILLER_XZKZ_SHIELDER_ACTION:0 "Умиротворити"
 PLANET_KILLER_XZKZ_SHIELDER_DESC:1 "Навколо планети розгортається захисне поле, що створює постійний і непроникний бар'єр (за винятком деяких довжин хвиль світла)."


 PLANET_KILLER_XZKZ_NEUTRON:0 "Нейтронна Зачистка"
 PLANET_KILLER_XZKZ_NEUTRON_ACTION:0 "Опромінити"
 PLANET_KILLER_XZKZ_NEUTRON_DESC:0 "Прискорений потік нейтронного випромінювання «фарбує» поверхню планети, серйозно руйнуючи більшість матеріалів і безпосередньо знищуючи біологічні тканини."

 PLANET_KILLER_XZKZ_GODRAY:1 "Божественний Провідник"
 PLANET_KILLER_XZKZ_GODRAY_ACTION:0 "Осяяти божественним"
 PLANET_KILLER_XZKZ_GODRAY_DESC:1 "Псіонічний проєктор осяює світ божественною істиною, перетворюючи на справжніх віруючих усіх, хто здатний вірити, і знищуючи тих, хто не здатний."

 PLANET_KILLER_XZKZ_NANOBOTS:1 "Нанобот-Дифузор"
 PLANET_KILLER_XZKZ_NANOBOTS_ACTION:0 "Кіборгізувати"
 PLANET_KILLER_XZKZ_NANOBOTS_DESC:0 "У атмосфері розсіюються рої наноботів. Вони заражають розумних істот і перебудовуються в кібернетичні імплантати, перетворюючи нічого не підозрюючих носіїв на кіборгів, підвладних Машинному Інтелекту."

 PLANET_KILLER_XZKZ_DELUGE:0 "Машина Потопу"
 PLANET_KILLER_XZKZ_DELUGE_ACTION:0 "Затопити"
 PLANET_KILLER_XZKZ_DELUGE_DESC:0 "На планету скидаються величезні обсяги води, знищуючи всі штучні споруди та наземні форми життя. Потоп супроводжується атмосферними газами, необхідними для стабілізації клімату планети та підтримки планетарного океану."

 PLANET_KILLER_XZKZ_DEVOLUTION: "$tech_archaeo_pk_devolving_beam$"
 PLANET_KILLER_XZKZ_DEVOLUTION_DESC: "Колосальна гармата стирання розуму, що вивільняє загальнопланетарну хвилю енергії, повертаючи більшість розумного життя до передрозумного стану. За оцінками інженерів, з додатковим налаштуванням її також можна використати для повного стирання банків пам'яті та виведення з ладу роботизованих підрозділів."
 PLANET_KILLER_XZKZ_DEVOLUTION_ACTION: "Застосувати §YПромінь Деволюції§! до"

