l_english:

 origin_xzkz_guilaizhe: "Ревенант"
 origin_xzkz_guilaizhe_desc: "Колись вони панували в Чумацькому Шляху, але з часом, як і інші давні імперії, впали у відчай і були навіть забуті. Однак після тривалого періоду темряви вони перегрупувалися та повернулися до Чумацького Шляху. Попри технологічні прориви, вони залишаються могутньою силою, яку не можна ігнорувати."
 origin_xzkz_guilaizhe_effects: "У початковій галактиці є три планети Гея.\n£pops£Початкова кількість населення — 44.\nПридатність планети Гея не буде заблокована.\nВідкриває деякі технології Втраченої Імперії на самому початку.\n§HНа початку є потужний флот Втраченої Імперії.§!"
