DarlokB_shipset_desc: "Кожен корабель флоту дарлоків — це клаптикове франкенштейнівське жахіття з різнорідних вцілілих чи вкрадених технологій та конструкцій, зварених докупи. Вони є свідченням майстерності та кмітливості дарлоків, що дозволяють створювати щось не лише функціональне, а й вельми ефективне."
