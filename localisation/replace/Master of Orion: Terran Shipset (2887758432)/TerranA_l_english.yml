TerranA:0 "TerranA"
TerranA_shipset_desc: "Вигнані під час об'єднання Землі, кораблі терран є темним викривленим відображенням своїх відповідників з Людської Республіки. Їхня міць спрямована на шлях сили — примусове усунення слабких, щоб сильні могли процвітати."

TerranB:0 "TerranB"
TerranB_shipset_desc: "Вигнані під час об'єднання Землі, кораблі терран є темним викривленим відображенням своїх відповідників з Людської Республіки. Їхня міць спрямована на шлях сили — примусове усунення слабких, щоб сильні могли процвітати."
