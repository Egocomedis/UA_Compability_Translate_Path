###修正
 mod_country_produces_mult:0"Щомісячний повний вихід ресурсів"

 eos_tiamat_exp_modifier:0 "§MВальс віртуального світу§!"
 eos_tiamat_anti_Dragon:0 "$draconic_beats$"
 eos_tiamat_anti_Dragon_desc:0 "$draconic_beats_desc$"
 eos_tiamat_anti_Stellarite:0 "Протидія Стелариту"
 eos_tiamat_anti_Stellarite_desc:0 "Це інший підхід, що використовує тепло, аби спрямувати ціль у хибному напрямку, оголюючи її вразливі місця."
 eos_tiamat_anti_Dimensional_Horror:0 "Молот Площин"
 eos_tiamat_anti_Dimensional_Horror_desc:0 "Метод дії Тіамат. Боєприпаси відлиті з псіонічно сумісного металу, щоб порушити стабільність тріщини площини й дозволити законам фізики всесвіту стерти її на порох."
 eos_tiamat_anti_Hatchling:0 "Прелюдія до знищення"
 eos_tiamat_anti_Hatchling_desc:0 "За словами Тіамат, воно ще не пробудило псіоніку, і бездоганний псіонічний «диригент» може втручатися в його свідомість під час бою."
 eos_tiamat_anti_Wraith:0 "Терагерцова частотна модуляція"
 eos_tiamat_anti_Wraith_desc:0 "Технологія поляризації, яку можна застосувати до боєприпасів чи променів; хоча вона суттєво скорочує строк служби пускової установки, за словами Тіамат, вона здатна змусити гіганта відчути «біль»."
 eos_tiamat_anti_Tiyanki_Matriarch:0 "Королева проти королеви"
 eos_tiamat_anti_Tiyanki_Matriarch_desc:0 "«Цей план атаки навіть неможливо науково пояснити. Досить лише вистрілити так — і це його доля», — сказала Тіамат."
 eos_tiamat_anti_Swarm:0 "Таємниці Рою"
 eos_tiamat_anti_Swarm_desc:0 "Навіть тим самим шляхом дехто може збитися з дороги. Певною мірою вони — «одного роду» з Тіамат, а вбивство між одним родом часто ефективніше."
 eos_tiamat_anti_Extradimensional_1:0 "Осцилятор силового поля псіонічної передачі"
 eos_tiamat_anti_Extradimensional_1_desc:0 "Це псіонічний пристрій, здатний встановити псіонічний резонанс між двома цільовими точками, порушуючи стабільність творіння вищих площин на шляху."
 eos_tiamat_anti_Extradimensional_2:0 "Генератор псіонічного поля"
 eos_tiamat_anti_Extradimensional_2_desc:0 "Вдосконалене обладнання здатне не лише заважати їм, а й напряму ефективно їх знищувати, завдаючи прямої дієвої шкоди."
 eos_tiamat_anti_Extradimensional_3:0 "Псіонічний жнець"
 eos_tiamat_anti_Extradimensional_3_desc:0 "Після вдосконалення Тіамат цей пристрій перетворено на далекодіючий псіонічний маяк-проєктор, що напряму споживає потужність двигунів корабля для удару по Непроханих."
 eos_tiamat_anti_AI_Empire:0 "Потоковий імпульс P2M"
 eos_tiamat_anti_AI_Empire_desc:0 "Магічна конструкція від Тіамат використовує псіонічну енергію для імітації випадкових електронних сигналів; процес відрізняється від будь-якого базового електронного глушника і здатний навіть проникати крізь екранувальний шар обладнання, впливаючи на роботу точних приладів."
###army
 eos_tiamat_army_01:0 "Заражувач"
 eos_tiamat_army_01_desc:0 "Величезні рої з твердими панцирами й роговими косами. Їхній основний спосіб дії — розпилення нервового й навіть адаптивного бактеріального гною, здатного заражати техніку. Однак найстрашніша їхня здатність — ефективна трансформація: пожираючи ворогів, чию свідомість контролює грибкова флора, вони перетворюють їх на нові види в черевних міхурцях."
 eos_tiamat_army_02:0 "Мисливець"
 eos_tiamat_army_02_desc:0 "Багатотілі істоти, що вправно використовують псіоніку, аби ховатися в складному середовищі. Гострий псіонічний удар хвостом швидко страчує ціль і відкладає яйця в тілі жертви."
 eos_tiamat_army_03:0 "Королева"
 eos_tiamat_army_03_desc:0 "Королева псіоніки, преторіанка матері всього сущого — елітна сила, вишколена самою Тіамат. Вона величезна, з людським торсом і зміїним нижнім тілом. Поєднує переваги Мисливця й Заражувача, має ефективну здатність до виробництва й розмноження. Лише за кілька днів вони здатні перетворити планету на рай для Тіамат."
###building
 building_eos_tiamat_01:0 "Нерестовий басейн"
 building_eos_tiamat_01_desc:0 "Це величезний допоміжний нерестовий басейн для розмноження. Ооцисти обгорнуті в'язкою протоплазмою для швидкого вилуплення. Навіть якщо це не первісна раса, Тіамат все одно може народити для вас цих дітей."
 building_eos_tiamat_01_tooltip:0 "§H Tiamat.IO §! може створити на цій планеті через цю споруду §G1§! поселення §HАльдабрської робочої бджоли§!\n Використовується через особисту панель $eos_tiamat.100.g$, перезарядка §Y5§! років"
 building_eos_tiamat_01_tooltip_hive:0 "§H Tiamat.IO §! може створити на цій планеті через цю споруду §G1§! поселення §H основної раси §!\n Використовується через особисту панель $eos_tiamat.100.g$, перезарядка §Y5§! років"
 building_eos_tiamat_02:0 "Інкубаторій"
 building_eos_tiamat_02_desc:0 "Органічна структурна споруда, що розподіляє генетичну інформацію й спрямовано культивує яйця Тіамат у бойові підрозділи. Вона має слабкі псіонічні коливання й здатна збирати дорогоцінні конденсати від народження псіонічного життя — у цій галактиці його називають Зро."
 building_eos_tiamat_02_tooltip:0 "Дозволяє цій планеті будувати ексклюзивний військовий підрозділ §HTiamat.IO§!"
 building_eos_tiamat_03:0 "Тронне гніздо"
 building_eos_tiamat_03_desc:0 "Головне гніздо Тіамат виготовлене з органічної матерії та псіонічно спорідненого металу. Його псіонічні коливання можна виявити за межами галактики. Тут триметрова псіонічна королева займатиметься державними справами, народжуватиме дітей і створюватиме планетарну псіонічну структуру, яку інакше було б неможливо збудувати."
 building_eos_tiamat_03_tooltip:0 "Дозволяє зоряну трансформацію §Yпридатної для життя планети за межами системи§!, реалізується через прийняття рішення §E$decision_eos_tiamat_change_planet_class_to_hive$§!.\n$decision_eos_tiamat_change_planet_class_to_hive_desc$"
###jobs
 job_eos_tiamat_servant:0 "Прислужник Королеви"
 job_eos_tiamat_servant_plural:0 "Прислужники Королеви"
 job_eos_tiamat_servant_desc:0 "Вони відповідатимуть за задоволення органічних потреб Тіамат під час відкладання яєць та надаватимуть усі послуги псіонічній королеві — від очищення тіла до супроводу."
 mod_job_eos_tiamat_servant_add:0 "Посада $job_eos_tiamat_servant$"
###decision
 decision_eos_tiamat_change_planet_class_to_hive:0 "Створити $pc_tiamat_hive$"
 decision_eos_tiamat_change_planet_class_to_hive_desc:0 "§HTiamat.IO§! використовує свою силу, щоб перетворити планету на $pc_tiamat_hive$ з поділом, подібним до §Y$pc_city$§!."
###tech
 tech_eos_tiamat_building_01:0 "Нерестовий басейн"
 tech_eos_tiamat_building_01_desc:0 "Це величезний допоміжний нерестовий басейн для розмноження. Ооцисти обгорнуті в'язкою протоплазмою для швидкого вилуплення. Навіть якщо це не первісна раса, Тіамат все одно може народити для вас цих дітей. Крім того, ви можете попросити Тіамат виростити робочу бджолу серед власного населення."
 tech_eos_ship_weapon_P01:0 "$DIMENSIONAL_HORROR_PD$"
 tech_eos_ship_weapon_P01_desc:0 "Після перемоги над Позавимірним Жахіттям Тіамат особливим способом здобула цю енергетичну зброю. Ми геть не розуміємо принцип її дії, але за кресленнями Тіамат можемо повністю відтворити цю енергетичну зброю Позавимірного Жахіття."
###planet
 pc_tiamat_hive:0 "§Небесне тіло Богині Світанку§!"
 pc_tiamat_hive_desc:0 "Ця небесна планета насправді є величезним організмом, подібним до світу-вулика, який також підтримується псіонічною силою. Відмінність у тому, що застосування псіоніки тут глибше, і вона не відштовхує інші форми життя, як звичайний світ-вулик. На поверхні, здавалося б, первісної планети складні й ефективні житлові та промислові простори створюються за допомогою складання простору, а також пропонується псіонічний спосіб пересування. Для псайкера це наче перлина, що сяє в морі зірок."
 mod_pc_tiamat_hive_habitability:0 ""
 trait_pc_tiamat_hive_preference:0 ""
 trait_pc_tiamat_hive_preference_desc:0 ""
