 eos_tiamat_leader.109.desc:0 "«Це те, чого ти очікуєш? Навіть якщо неминуче падіння настане під сяйвом, ти все одно хочеш обійняти реальність в ілюзії, що зветься 'коханням' — хочеш побачити крізь ілюзію й сягнути бридкої правди.»\nСтоячи спиною до світла супутника, вона розправила крила в повітрі й ніжно обійняла тебе:\n«У такому разі... тоді залишся зі мною і прийми мою неприховану сторону. Навіть якщо всі зорі стануть брехнею, у цьому почутті немає сумніву.»"
###相册相关
