###traits
 trait_tiamat_hive:0 "Альдабрська робоча бджола"
 trait_tiamat_hive_desc:0 "Після генетичного налаштування матір'ю всього сущого вони величезні, швидко ростуть, покірні, мають велику силу та певний інтелект і здатні виконувати більшість базової роботи."
 leader_trait_ruler_SOP_tiamat_0:0 "§HМатір усього сущого§!"
 leader_trait_ruler_SOP_tiamat_0_desc:0 "Не бійся, дитино моя. Не здатність вірити в Бога робить віруючих, і не лише Бог знає, як творити. Я поведу вас у майбутнє.\n\n§EВальс віртуального середовища§!：рівень §HTiamat.IO§! підвищено на §Y1§!, швидкість набуття досвіду лідера держави §G+3%§!。"
 leader_trait_ruler_SOP_tiamat_T1:0 "§MПсіонічна королева§!"
 leader_trait_ruler_SOP_tiamat_T1_desc:0 "Електромагнітний імпульс шепоче в глибокому небі, гравітаційні хвилі подвійної зорі коливаються, і незліченні слави підійдуть до кінця. Це лише сон всесвіту, мить у нескінченній темряві. \n\n§Y Дипломатична оцінка §G+50§!§!"
 leader_trait_ruler_SOP_tiamat_T1_hive:0 "$leader_trait_ruler_SOP_tiamat_T1$"
