l_english:
 eos_tiamat.100.desc.0:0 "§HTiamat.IO§!\nВид:§BДивний§!\n\n§YМоже слугувати як$ruler_with_icon$§!\nОсобливі риси:§HПсіонічна королева§!\n\nДизайн персонажа/ілюстратор:§E小鸡蛋§!,§E亻力§!\nКитайський голос:§E柒柒§!\nАнглійський голос:§E小柒§!\nАвторські права захищено:§EGhastRiv§!"
 eos_tiamat.100.desc.1:0 "Голос — душа жінки, і слова Тіамат проникають у твоє серце, наче цівка води — вона знову мимоволі вдається до псіоніки.\n§H«Зрештою, час короткий, а життя ілюзорне. Ну ж бо... я слухаю.»§!\nЇї триметрове тіло схилилося, крила повільно склалися. Вона з нетерпінням чекає розмови з тобою."
 eos_tiamat.100.desc.2:0 "§H«...»§!\nПеред Тіамат — зоряний атлас, і вона, здається, не помічає гостей. Це рідкісний випадок для псайкера. Її очі прикуті до зображення чорної діри далекої галактики"
 eos_tiamat.100.desc.3:0 "§H«Новонароджені пташенята вчаться впізнавати й слідувати за першим об'єктом, який вони бачать — це називається імпринтингом.»§!\nТіамат стала на коліна, тримаючи витерту яйцеву капсулу, що слабко світилася, наче дихала. У цій особливій залі, де доводиться задирати голову, щоб побачити стелю, її рухи виглядають дуже невимушено.\n§H«Якщо я прибула сюди зі світлом зірок, що долало сотні мільйонів світлових років, і пережила нове життя — можливо, я теж відчула щось подібне до прив'язаності до тебе?»§!"
 eos_tiamat.100.desc.4:0 "Тіамат давно знала, що хтось наближається, і високі віялоподібні двері, наче ворота палацу з давньої легенди, повільно відчинилися:\n§H«Привіт, малюче. Яка сьогодні тема? Чи, може, хочеш залишитися на ніч.»§!"
 eos_tiamat.100.desc.5:0 "§H«Життя ніколи не смиренніше за всесвіт через свій малий розмір — так само, як самоцвіти й камені.»§!\nВелетенське тіло Тіамат повільно вітає тебе розкритими обіймами."
 eos_tiamat.100.aa:0 "§MЗапросити служити $ruler_with_icon$§!"
 eos_tiamat.100.a:0 "§GПокращити риси§!"
 eos_tiamat.100.b:0 "§PЗмінити CG§!"
 eos_tiamat.100.c:0 "§EПоповнення Зоряного бажання§!"
 sop_tiamat.100.c:0 "§YОпис ексклюзивних навичок§!"
 sop_tiamat.100.c.desc:0 "$sop_om.220.c.desc$"
 eos_tiamat.100.d:0 "§WКлятва§!"
 eos_tiamat.100.e:0 "Переглянути профіль"
 eos_tiamat.100.e.desc:0 "§HTiamat.IO§!\n\nСтандартний зріст:327см\nСтандартна вага:565кг\n\nПсіонічна сила:A+（свідома проєкція）або поза класифікацією（першооснова）\nМісце народження:паралельний світ №b274, подібних особин в інших світах не виявлено\nТип співпраці:псіонічний договір. Зв'язувальна сила обмежена й переважно залежить від суб'єктивного ставлення об'єкта дослідження. З метою культивування доброї співпраці спостережуваному тілу цим надається повноваження наглядача\n\nУподобання: солодощі, розмноження\nНепереносимість: примітивна ШІ-техніка"
 eos_tiamat.100.f:0 "Отримати технологію §Y$tech_eos_tiamat_building_01$§!"
 eos_tiamat.100.g:0 "Отримати §HАльдабрську робочу бджолу§!"
 eos_tiamat.100.h:0 "§EПро деякі особливі сутності цього всесвіту§!"
 eos_tiamat.100.i:0 "§PАльбом§!"
 eos_tiamat.100.x:0 "§RВідновлення SP§!"
 eos_tiamat.100.y:0 "§GЛідер повертається§!"
 eos_tiamat.100.00:0 "Вихід"
 eos_tiamat.110.a:0 "Піти привітатися"
 eos_tiamat.110.desc:0 "Космос\n\nостанній рубіж\n\nНад нами\n\nНавколо нас\n\nВсередині нас" #Space. the final frontier. Above us. Around us.  Within us.
###寻求产卵池科技
 eos_tiamat.200.desc:0 "«Я — матір розуму вулика.»\n«Чи потрібна тобі допомога, де я можу використати 'расову перевагу'?»\n\nТіамат трохи здивувалася, «якщо ти не проти.»"
 eos_tiamat.200.a:0 "§GЗвісно§!"
 eos_tiamat.200.b:0 "§YМожливо, наступного разу§!"
 eos_tiamat.200.z:0 "§YНазад§!"
 eos_tiamat.200.00:0 "Вихід"
 eos_tiamat.201.desc:0 "Я можу використати нерестові басейни, щоб прискорити природне відтворення раси та швидкість органічного складання населення на одній планеті.\n\nВона простягає до тебе долоню й проєктує план споруди в залу.\n\n«А ще я приведу тобі одну зі своїх дітей. Вони можуть гнучко використовувати природне відтворення чи органічні складальні лінії, але здатні виконувати лише найбазовішу працю, зате їхня продуктивність дуже висока...»"
 eos_tiamat.201.a:0 "Не можу дочекатися побачити їх"
 eos_tiamat.201.b:0 "Гаразд"
 eos_tiamat.202.desc:0 "«Завжди рада допомогти.»\nвона кивнула."
 eos_tiamat.202.a:0 "§YНазад§!"
 eos_tiamat.203.desc:0 "«Дякую за довіру, я приділю їм увагу.»\nВона дивиться на тебе й посміхається."
 eos_tiamat.203.a:0 "§YНазад§!"
###宇宙百科
 eos_tiamat.300.desc:0 "-«Ти бачив їх? Ці величезні істоти, що несуть у собі одержимість?»\n\n-«Про кого хочеш дізнатися цього разу? Я розповім усе, що знаю.»\n\n-«Є щось, що тебе цікавить? Можливо, я знаю їхню сутність.»"
 eos_tiamat.300.b:0 "Про $NAME_Space_Amoeba$"
 eos_tiamat.300.b.desc:0 "«Амеби — поширене космічне життя цієї галактики, що потребує подальшої еволюції.»"
 eos_tiamat.300.c:0 "Про Тіянкі"
 eos_tiamat.300.c.desc:0 "«Величезні, покірні істоти. Доки ти не підходиш надто близько, ти їх не потурбуєш.»"
 eos_tiamat.300.d:0 "$NAME_Ether_Drake$"
 eos_tiamat.300.e:0 "$NAME_Stellar_Devourer$"
 eos_tiamat.300.f:0 "$NAME_Dimensional_Horror$"
 eos_tiamat.300.g:0 "$NAME_Voidspawn$"
 eos_tiamat.300.h:0 "$NAME_Specter$"
 eos_tiamat.300.i:0 "$NAME_Elderly_Tiyanki$"
 eos_tiamat.300.j:0 "$NAME_Corrupted_Avatar$"
 eos_tiamat.300.j.desc:0 "Погляд Тіамат ковзнув по екрану, вона майже миттєво оцінила ситуацію: «Слабкі псіонічні сигнали легко подолати. Тобі достатньо зосередити вогонь флоту, щоб зруйнувати його крихкий енергетичний цикл»\n«Вони до того ж найнещасніший вид у віртуальному світі, і, можливо, одного дня ти зможеш розірвати його своєю волею.»"
 eos_tiamat.300.z:0 "§YНазад§!"
 eos_tiamat.300.00:0 "Вихід"

 eos_tiamat.301.desc:0 "«Цікаво. Воно величезне й має очевидну схильність до агресії, але, схоже, не здатне пристосуватися до умов усесвіту. Я іноді думаю, чи моя форма теж не завдає клопоту іншим. Гм, не будемо про це.»\nТіамат подала тобі звіт:«Принаймні хороша новина в тому, що воно не має такої швидкості народження, як я. Величезний розмір означає більше вразливих місць... Звичайно, у мене теж є біологічні слабкості, якщо хочеш знати.»"
 eos_tiamat.301.a:0 "Зрозуміло"
 eos_tiamat.3010.desc:0 "«Падіння велетнів і минулих часів — можливо, одного дня я теж зникну в морі зірок. Але, гадаю, до того дня ще далеко.»\nУ руках Тіамат кілька кристалів, які були «показниками» між псайкерами.\n«Моє ім'я походить з давньої легенди одного народу. Матір, що народжує дітей, етнічна група з індивідуальною свідомістю вважала перешкодою для розвитку. Провісники цивілізації вбили свою біологічну матір, Тіамат, і розділили її тіло на дві частини, щоб створити небо й землю... Звичайно, це лише легенда.»"
 eos_tiamat.3010.a:0 "Так, це лише легенда"
 eos_tiamat.3010.b:0 "Можливо, це ідеологічний конфлікт і боротьба за ресурси"
 eos_tiamat.3011.desc:0 "«Так, це лише легенда.» Вона простягає до тебе руку, запрошуючи відпочити поруч з нею"
 eos_tiamat.3011.a:0 "Увійти"
 eos_tiamat.3011.z:0 "§YНазад§!"
 eos_tiamat.3012.desc:0 "«Я егоїстична, і вулик служитиме мені вічно.»\n«Але якщо одного дня переді мною постане такий самий великий вибір, можливо, я теж вирішу присвятити свою свідомість та існування — за умови, що є щось варте цього.»\nТіамат багатозначно примружилася, дивлячись на тебе"
 eos_tiamat.3012.a:0 "Увійти"
 eos_tiamat.3012.z:0 "§YНазад§!"

 eos_tiamat.302.desc:0 "«Живиться зірками. Хоча це трохи розчаровує, насправді багато кораблів супер-цивілізацій мають подібну конструкцію.»\nЦього разу Тіамат рідкісно замислилась, а тоді продовжила говорити. У її руках, здавалося, зовсім непомітна через контраст розмірів, лежала інформаційна панель — схема деконструкції Стелариту.\n«Наприклад, корабель під назвою 'Доля', що літає на субсвітловій швидкості, з моменту свого створення прямує до краю всесвіту з метою дослідити межу світу. Так він отримує енергію від кожної зорі, повз яку пролітає.»"
 eos_tiamat.302.a:0 "Існує такий корабель?"
 eos_tiamat.3020.desc:0 "Тіамат подивилася на звіт флоту й опустила очі: «їхня поведінкова логіка має малу дослідницьку цінність, але, можливо, здатна створити зоряні енергетичні екстрактори з органічними структурами\nНі, забудь. Тобі не потрібні ці речі. У нас є кращі замінники.»"
 eos_tiamat.3020.a:0 "Варто спробувати"
 eos_tiamat.3020.b:0 "Більше реакторів, більше сонячних панелей, або Рій Дайсона й Сфера Дайсона"
 eos_tiamat.3021.desc:0 "«Мені потрібен тривалий час, щоб виростити новонароджену дитину такого розміру, вдосконалити й перебудувати її гени. Ти ж не хочеш, щоб я зникла на десятиліття... Та я й сама не хочу.»\nТіамат зітхнула, і її погляд знову впав на тебе: «Я голодна. За межами столиці є ресторан, перебудований спеціально для мене. Підеш зі мною?»."
 eos_tiamat.3021.a:0 "Увійти"
 eos_tiamat.3021.z:0 "§YНазад§!"
 eos_tiamat.3022.desc:0 "З певних міркувань економічної доцільності біологія має свої межі й іноді не може замінити техніку.\nТіамат посміхнулася: «звісно, часто буває й так, що техніка не може замінити біологію.»"
 eos_tiamat.3022.a:0 "Увійти"
 eos_tiamat.3022.z:0 "§YНазад§!"

 eos_tiamat.303.desc:0 "Тіамат, псіонічний експерт, приєдналася до твого зв'язку: «тонкі гості з площини, вони небезпечні... я знаю їх краще, ніж ти знаєш мене. \nНе хвилюйся, їхні величезні тіла жорстко обмежені тріщинами площини, і якщо тобі не треба тут проходити, можеш це ігнорувати.»"
 eos_tiamat.303.a:0 "Можливо"
 eos_tiamat.3030.desc:0 "Молодець. «Тіамат рідко хвалить словами, більше звикла діяти вчинками. \n«Твоїх науковців це зацікавить. Це єдина конструкція псіонічної зброї, здатна працювати на енергії корабля... включно з деякими органічними структурами, які потребують вирощування.»"
 eos_tiamat.3030.a:0 "Неймовірно"

 eos_tiamat.304.desc:0 "«Це справжній головний біль... я думала, вони тут не з'являться.»\nРідко можна побачити такий серйозний вираз обличчя Тіамат, її погляд пильно прикутий до тебе: «будь ласка, знищ це якнайшвидше, і я розповім тобі його слабкість.»"
 eos_tiamat.304.a:0 "Гаразд"
 eos_tiamat.3040.desc:0 "«Молодець, ти врятував більшість життів цієї галактики.» — Подяка від Тіамат, надіслана прямо тобі через псіоніку, і дивне солодке відчуття...\n\nЯк це передається через псіоніку?"
 eos_tiamat.3040.a:0 "Солодке?"
 eos_tiamat.3041.desc:0 "«Так, солодке. Тобі подобається?»\nВона на мить замовкла: «Судячи з твого смаку, більшість моїх виділень солодкі... Відчути ще раз?»"
 eos_tiamat.3041.a:0 "Увійти"
 eos_tiamat.3041.a_tooltip:0 "Якщо використано§BКлятву зірок§!,§H$NAME_tiamat$§!отримає §G1§! SP,інакше вона отримає§G10000§! досвіду"

 eos_tiamat.305.desc:0 "«Як енергетичний організм, люди схильні відносити незнайомі сутності до незнайомих сфер. Насправді ж вони мають обмежений зв'язок з псіонікою.»\nСхоже, цей гігант народився в пульсарі, і на екрані перед тобою відтворюється безліч спостережних відео з різних кутів, великих і малих\n«У них є природні слабкості. 450 ТГц з найдовшою хвилею, тобто версія, що після візуалізації випромінює червоний, природно послаблюється в галактиках зір класу M.\nАналогічно синя версія 650 ТГц з найкоротшою хвилею стає вразливою в системах зір класів A та B.\n520 ТГц посередині легше подолати в зорях класу G.\n Хоча це не та сфера, яку я добре знаю, я все одно спробувала знайти дані, які зацікавлять командирів флоту — якщо можливо, привези якісь зразки.»"
 eos_tiamat.305.a:0 "Гаразд"
 eos_tiamat.3050.desc:0 "Тіамат відставила свою спеціальну чашку, у якій, здається, був солодкий напій: «всесвіт не такий величезний, як уявляють люди, але невідомого завжди більше, це справді захопливо.»"
 eos_tiamat.3050.a:0 "Погоджуюся"
 eos_tiamat.3050.b:0 "Хіба ти сама не така особлива особина?"
 eos_tiamat.3051.desc:0 "«Ми ще багато чого побачимо разом.» Вона заплющила очі й вирішила почати відпочивати."
 eos_tiamat.3051.a:0 "Увійти"
 eos_tiamat.3051.z:0 "§YНазад§!"
 eos_tiamat.3052.desc:0 "Тіамат на мить замовкла, ухильно: «я не можу знищити флот псіонікою — принаймні не можу перед тобою. Можливо, одного дня ти приймеш моє запрошення, і я чекатиму на тебе в глибинах Зоряного Моря, повернувшись спиною до всього віртуального світу.»"
 eos_tiamat.3052.a:0 "Увійти"
 eos_tiamat.3052.a_tooltip:0 "§H$NAME_tiamat$§!отримує §G1§! досвіду"
 eos_tiamat.3052.z:0 "§YНазад§!"

 eos_tiamat.306.desc:0 "«Королева проти королеви,» Тіамат хихикнула й передала дані в сховище. «вона справді величезна, набагато більша за порівняння між мною й тобою. Чисті, могутні створіння.»\nВона прибрала усмішку й подивилася на тебе, «я розповім тобі, як її знищити, і принеси мені її біологічні зразки.»"
 eos_tiamat.306.a:0 "Зрозуміло"
 eos_tiamat.3060.desc:0 "Тіамат сиділа на величезному троні для державних справ, але виглядала як елегантна королева: «вона ніколи не зрозуміє, чому загинула. Неможливо перемогти рій, покладаючись лише на силу.»"
 eos_tiamat.3060.a:0 "Справді"
 eos_tiamat.3060.b:0 "Ти справді так думаєш?"
 eos_tiamat.3061.desc:0 "«Тож довіряй і підтримуй мене більше.»\nВона усміхнулася тобі, «зорі такі сліпучі.»"
 eos_tiamat.3061.a:0 "Увійти"
 eos_tiamat.3061.z:0 "§YНазад§!"
 eos_tiamat.3062.desc:0 "«Насправді... ні, я думаю, їй просто бракує мудрості й ще більшої сили. Чи уявляв ти колись сцену, коли дві однаково величезні легендарні істоти б'ються одна з одною?»\nТіамат скривила губи: «у справжній катастрофі вони — просто комахи»."
 eos_tiamat.3062.a:0 "Увійти"
 eos_tiamat.3062.z:0 "§YНазад§!"
###终末危机
 eos_tiamat.510.desc:0 "Тіамат рідко сама виходить на зв'язок з тобою. Вона обережно витирала зонди для стереозйомки, щоб не розчавити їх: «малюче, хочу нагадати тобі, що до цієї галактики наближається подібна сутність з іншою волею, ніж моя. Групи вуликів з псіонікою... будь готовий, не намагайся їх переконати. Між нами буде лише війна. Я стежитиму за цією справою.»"
 eos_tiamat.510.a:0 "Схоже, запеклої битви не уникнути."
 eos_tiamat.511.desc:0 "«Ми дуже схожі, але цілком різні.»\nНа зоряній карті перед Тіамат кілька червоних точок, здається, це місце початкового контакту з вуликом, який називають Підземними Демонами: «Їхня група настільки велика, що я не можу перемогти їх напряму через свідомість, я спілкувалася з ними багато разів за ці дні.»\nВона насупилася: «їм бракує етикету, вони зарозумілі. Схоже, лише 'мисливці' викликають у них страх... вони не вірять, що я зможу вийти неушкодженою після кількох сутичок з тими 'мисливцями', про яких вони говорять — доведеться навчити їх поваги.»"
 eos_tiamat.511.a:0 "...гаразд"
 eos_tiamat.512.desc.1:0 "«Перемога, яка мене не тішить. Вони були настільки слабкі, що змогли знайти лише жертв, слабших за себе самих»\nТіамат тримає в руках робочу бджолу, виведену королевою вулика. Коли вона встигла подати заявку до лабораторії?\n«Криза тимчасово минула, але одного дня ми зіткнемося з темрявою, що йде за ними. Готуйся»"
 eos_tiamat.512.desc.2:0 "«Перемога, яка мене не тішить. Вони були настільки слабкі, що змогли знайти лише жертв, слабших за себе самих»\nТіамат тримала в руці панцир претория. Вона поклала його на стіл і відсунула вбік:\n«Криза тимчасово минула, але одного дня ми зіткнемося з темрявою, що йде за ними. Готуйся»"
 eos_tiamat.512.a:0 "Я буду готовий."
 eos_tiamat.520.desc:0 "Високовимірні істоти, що хизуються званням мисливців, самовдоволені щодо своїх поверхневих псіонічних здібностей. Рівень псіоніки навколо Тіамат почав стрімко зростати, і ти відчув легкий головний біль, меблі затряслися й затріщали.\nУ наступну мить усі пристрої вимкнулися. У цій темряві мерехтіла лише королева псіоніки... а ще там була вимірна тріщина, що повільно закривалася, і Непроханий, що виглядав точнісінько як у файлі\nТіамат стиснула його світну голову, і воно завило пронизливим звуком, здатним пробити барабанні перетинки. \nКімната наповнилася вибухами псіонічних блискавок."
 eos_tiamat.520.a:0 "Що відбувається?！"
 eos_tiamat.521.desc:0 "«Як бачиш, я 'запросила' високовимірного зайду з космічного каналу»\nЇї псіоніка поступово вгамувалася, лампа замерехтіла, відновлюючи освітлення, центральний комп'ютер перезавантажився. Непроханий перед тобою — наче курча, підняте в повітря й повністю придушене псіонікою Тіамат\nЩойно ви заговорили, його кінцівки раптом наче втратили життєву силу й обвисли під дією гравітації"
 eos_tiamat.521.a:0 "Воно мертве?"
 eos_tiamat.522.desc:0 "«Ні,» Тіамат похитала головою, а тоді стиснула голову Непроханого перед тобою, і потужний чіткий вибух заглушив твій слух.\nЕлектронний пристрій знову замерехтів через псіонічний шок: «ще ні, коли ти запитав.»\nКоли вони помирають, вони наче тремтливий папір чи щось подібне, змінюють об'єм і форму та повільно розвіюються."
 eos_tiamat.522.a:0 "Тепер воно мертве, а ці електронні пристрої потребують капітального ремонту"
 eos_tiamat.523.desc:0 "Вона винувато посміхнулася, «вибач, я відремонтую це за власний рахунок. Сподіваюся, це тебе не налякало, малюче.»\n«Цей більш 'фізичний' спосіб дозволяє мені легко втручатися в їхню свідомість. Щодо моїх висновків. Їхнє джерело дуже близьке до віртуального світу, але вони не з віртуального світу... Звісно, ні. У їхній групі проста хаотична воєнна структура, і вони не здатні будувати кораблі в нашій галактиці\nЯкщо вони зможуть тут закріпитися, вони відкриють ще більше односторонніх порталів\nКрім того, я знайшла деякі дані з їхніх слабких псіонічних мереж, які можуть тобі допомогти»"
 eos_tiamat.523.a:0 "Дякую..."
 eos_tiamat.524.desc:0 "Мене не цікавлять їхні імена, але їхні кумедні виступи дуже корисні для мене\nПеред Тіамат — їжа, яку вона спожила сьогодні. З огляду на численні фактори форми тіла й витрат псіоніки, її споживання їжі теж вражає: «їм слід навчитися харчуватися здорово, або принаймні зосередитися на розмноженні раси й дослідженні псіоніки, як я. Замість того щоб з криками вриватися крізь тріщину площини й гинути.»\n«До речі, я вдосконалила для них логіку зброї. Не забудь оновити її вчасно»\nНа екрані видно, як служниці Тіамат нервово переносять товари до столичного складу вдалині. У очах інших вона виглядає дуже гідно\nТіамат взяла фрукт: «якщо ти не докладеш зусиль, за даними, які я отримала раніше, у цьому великому полюванні й битві візьмуть участь й інші вороги. Можливо, непогано дати їм влаштувати безлад.»"
 eos_tiamat.524.a:0 "Зрозуміло"
 eos_tiamat.525.desc:0 "Тіамат підперла голову однією рукою, а іншою ковзала по спеціальному великому терміналу: «Ти тут, цим усе сказано. Я вже знала до їхнього прибуття, що ця група різновимірних істот, які танцюють у нашій галактиці, стає дедалі жвавішою. Якщо в тебе немає інших планів, закінч цей фарс якнайшвидше. Це також стабілізує хаотичну псіонічну мережу тут.»\n«Через втручання останньої сили я повністю впорядкувала інформацію про них і надішлю її тобі пізніше»"
 eos_tiamat.525.a:0 "Гаразд"
 eos_tiamat.526.desc:0 "«Цей фарс нарешті закінчено. Вони думали, що це їхній майданчик і новий світ, де здійсниться їхнє панування»\nТіамат обережно підняла пасмо волосся й заправила за вухо: «насправді вони — просто гурт блазнів, що увійде в історію й трагічно завершиться безглуздою виставою.»"
 eos_tiamat.526.a:0 "Ми ж можемо ще відсвяткувати цю перемогу, так?"
 eos_tiamat.526.b:0 "Це була запекла битва, навіть якщо поведінка нашого ворога здається трохи безглуздою"
 eos_tiamat.527.desc:0 "Тіамат мовчки подивилася на тебе, кивнула й лагідно посміхнулася: «я приготувала для тебе гарне вино, все зроблено мною самою, з використанням моєї псіоніки, і... тримай це в таємниці»\nЇї губи вигнулися ширше: «вчасно, не запізнюйся.»"
 eos_tiamat.527.a:0 "Гаразд"
 eos_tiamat.528.desc:0 "«Незаперечна аксіома,» Тіамат хмикнула й поклала руки на стіл: «чи думав ти колись, що вони можуть стати могутніми лише через близькість до віртуального світу, а наша галактика теж могутня, і Непрохані не небезпечніші за Ефірного Дракона»"
 eos_tiamat.528.a:0 "Справді"
 eos_tiamat.530.desc:0 "Тіамат сиділа в столиці: «цей таємний сигнал непокоїть мене. Я не фахівець з електроніки й техніки, але це, очевидно, провісник безпрецедентної події. Передчуття псайкера часто виявляється точним»"
 eos_tiamat.530.a:0 "Я вже уважно стежу за цим"
 eos_tiamat.531.desc:0 "«Підготуй флот і будь обережний з тією технікою» Вона зробила вдих і зосередилася на роботі"
 eos_tiamat.531.a:0 "Так"
 eos_tiamat.532.desc:0 "«Ось вони» Зв'язок Тіамат дуже простий. Вона готова направити флот для тебе"
 eos_tiamat.532.a:0 "Готуватися до війни"
 eos_tiamat.533.desc:0 "——Зв'язок від Тіамат\nВона місяцями була зайнята власними проєктами: «здається, я щось намацала, хоча неможливо визначити зворотним шляхом ядро Ситуативності через тахіонний зв'язок, але я зуміла знайти спосіб повернути ці перешкоди їм самим.»"
 eos_tiamat.533.a:0 "Хіба ти не займаєшся лише псіонічними й генетичними проєктами?"
 eos_tiamat.534.desc:0 "«Звичайно, ні, малюче. Якщо ти думаєш, що я тисячі років лише розмірковувала, як розводити в моєму Інкубаторії, ти геть помиляєшся. Ось, хоча ця конструкція все ще заснована на псіонічних пристроях, вона здатна ефективно діяти проти Ситуативності. Подивимося, чи впораються ці залізні коробки з глушниками, розробленими на основі псіоніки.»"
 eos_tiamat.534.a:0 "Це спрацює?"
 eos_tiamat.535.desc:0 "«Ситуативність, зраднику цивілізації й життя.»\nПроєкція диска Тіамат перед нею повна розвідданих флоту, а її погляд спрямований на кореневу галактику Ситуативності: «іди, поклади край цим шаленим ШІ-загрозам»"
 eos_tiamat.535.a:0 "Зрозуміло"
 eos_tiamat.536.desc:0 "«Життя дуже дивне, вони створюють речі, але водночас бачать власні творіння чи створені ними речі як загрозу. Організми вже давно є загрозою самі для себе, а техніка — лише пізній прибулець у всесвіті.» Тіамат стоїть з тобою в дворі столиці, і ніч огортає землю.\nВона в мантії, і її величезне тіло виглядає маленьким під зоряним небом: «творці Ситуативності створили їх, сподіваючись, що вони запобіжать кінцю руйнівним способом, перший урок, який ця група творців дала, щоб виправити Ситуативність, це повне самогубство популяції»\nМіж вами запанувала тиша, доки не пролетів метеор.\n\n«Моє ім'я і легенда за ним — моя відповідь. Усе життя цього всесвіту таке саме. Навіть якщо вони впадуть у прірву, навіть якщо вони знищать власну планету й власних творців, вони продовжуватимуть рухатися вперед, доки повністю не впадуть перед нездоланними труднощами... але після цього прийде більше наступних життів. Ситуативність — дитя давньої цивілізації, яка неправильно розуміє сенс власного існування»"
 eos_tiamat.536.a:0 "...Гм"
