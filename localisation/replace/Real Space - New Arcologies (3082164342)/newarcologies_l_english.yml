l_english:

  ####################################
  #Colony Types
  ####################################

  col_manufactorum_mix: "Мануфакторум"
  col_manufactorum_mix_desc: "Величезна планета-фабрика, чия промисловість поділена між сплавами та споживчими товарами."
  col_manufactorum_foundry: "Мануфакторум-ливарня"
  col_manufactorum_foundry_desc: "Величезна планета-фабрика, зосереджена на безперервному виробництві сплавів."
  col_manufactorum_factory: "Мануфакторум-фабрика"
  col_manufactorum_factory_desc: "Величезна планета-фабрика, що спеціалізується на безперервному виробництві споживчих товарів."
  col_manufactorum_assembly: "Мануфакторум складання"
  col_manufactorum_assembly: "Величезна планета-фабрика, що спеціалізується на виробництві роботів і підвищенні ефективності суднобудування в системі."
  col_manufactorum_refinery: "Мануфакторум-переробка"
  col_manufactorum_refinery_desc: "Величезна планета-завод, що спеціалізується на виробництві рідкісних ресурсів."
  col_agropolis_production: "Агрополіс виробництва"
  col_agropolis_production_desc: "Планета-місто, зосереджена на виробництві їжі та споживчих товарів."
  col_agropolis_farming: "Агрополіс землеробства"
  col_agropolis_farming_desc: "Безкраї поля підтримуються інфраструктурою планети-міста для максимізації сільськогосподарського потенціалу."
  col_fortoria_mix: "Форторія"
  col_fortoria_mix_desc: "Це захищене планета-місто не спеціалізується на якійсь конкретній галузі."
  col_fortoria_industrial: "Промислова Форторія"
  col_fortoria_industrial_desc: "Величезне планетарне місто, чия промисловість розподілена між сплавами та споживчими товарами."
  col_fortoria_foundry: "Форторія-ливарня"
  col_fortoria_foundry_desc: "Величезна планета-місто, зосереджена на безперервному виробництві сплавів."
  col_fortoria_factory: "Форторія-фабрика"
  col_fortoria_factory_desc: "Величезна планета-місто, що спеціалізується на безперервному виробництві споживчих товарів."
  col_fortoria_research: "Дослідницька Форторія"
  col_fortoria_research_desc: "Величезна планета-місто, що спеціалізується на найпередовіших дослідженнях."
  col_fortoria_fortress: "Цитадель"
  col_fortoria_fortress_desc: "Величезна планета-місто, що спеціалізується на обороні."
  col_fortoria_intelligence: "Розвідувальна Форторія"
  col_fortoria_intelligence_desc: "Величезна планета-місто є центром імперської розвідки та внутрішньої безпеки."
  col_machinarium_foundry: "Машинаріум-ливарня"
  col_machinarium_foundry_desc: "$col_manufactorum_foundry_desc$"
  col_machinarium_assembly: "Машинаріум складання"
  col_machinarium_assembly_desc: "$col_manufactorum_assembly_desc$"
  col_machinarium_fortress: "Військовий Машинаріум"
  col_machinarium_fortress_desc: "$col_fortoria_fortress_desc$"
  col_genoworld_trade: "Вулик-геноогістика"
  col_genoworld_trade_desc: "Органічна, напіврозумна мережа, що охоплює всю планету, забезпечуючи бездоганну логістику вулика."
  col_genoworld_refinery: "Вулик-геропереробка"
  col_genoworld_refinery_desc: "Планетарний органічний організм, що виробляє рідкісні ресурси для вулика."
  col_genoworld_genofarm: "Вулик-генофарма"
  col_genoworld_genofarm_desc: "Планета-гніздо, що спеціалізується на вирощуванні їжі, нових особин і підвищенні ефективності вирощування органічних кораблів."


