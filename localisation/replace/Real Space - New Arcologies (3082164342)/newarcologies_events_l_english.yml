l_english:

 newarcologies_decision_event.1.name: "§HМануфакторум§!: [Root.GetName] закуто в метал"
 newarcologies_decision_event.1.desc: "Заводи й фабрики, що розростаються, шар за шаром вкривають кору планети.\n\nМинуло лише кілька років від початку цього грандіозного проєкту, а вже важко пригадати, якою зеленою була поверхня [Root.GetName]. Вкрита рослинністю? Важкопрохідна? Тепер усюди сталь, на милі в усіх напрямках.\n\nМісце, колись сформоване випадковістю та бездумними законами природи, тепер є промисловою машиною імперії."
 newarcologies_decision_event.1.a: "Неймовірно."
 newarcologies_decision_event.2.name: "§HАгрополіс§!: [Root.GetName] закуто в метал"
 newarcologies_decision_event.2.desc: "Міста й сільськогосподарські поля, що розростаються, шар за шаром вкривають кору планети.\n\nМинуло лише кілька років від початку цього амбітного проєкту, а вже важко пригадати, якою була поверхня [Root.GetName]. Вкрита рослинністю? Важкопрохідна? Тепер усюди безкраї сільськогосподарські землі, де автоматичні комбайни обробляють майбутній урожай, який згодом переробляють у гігантських містах.\n\nМісце, колись сформоване випадковістю та бездумними законами природи, тепер є житницею цілої імперії."
 newarcologies_decision_event.2.a: "Неймовірно."
 newarcologies_decision_event.3.name: "§HФорторія§!: [Root.GetName] закуто в метал"
 newarcologies_decision_event.3.desc: "Міста, що розростаються, шар за шаром вкривають кору планети, захищені потужним металевим та енергетичним щитом.\n\nМинуло лише кілька років від початку цього амбітного проєкту, а вже важко пригадати, якою була поверхня [Root.GetName]. Вкрита рослинністю? Важкопрохідна? Тепер усюди сталь, на милі в усіх напрямках.\n\nМісце, колись сформоване випадковістю та бездумними законами природи, тепер є твердинею цілої імперії."
 newarcologies_decision_event.3.a: "Приголомшливо."
 newarcologies_decision_event.4.name: "[Root.GetName]: §HМашинаріум§!"
 newarcologies_decision_event.4.desc: "Поверхню машинного світу [Root.GetName] повністю перепрофільовано під військові завдання колективу. Тепер, завдяки цьому планетарному складальному комплексу, ми зможемо значно збільшити темп виробництва оборонної продукції та дронів. А планетарний щит надійно захистить заводи від ворожого бомбардування."
 newarcologies_decision_event.4.a: "Протокол виконано."
 newarcologies_decision_event.5.name: "[Root.GetName]: §HГеносвіт§!"
 newarcologies_decision_event.5.desc: "Поверхню світу-вулика [Root.GetName] повністю перебудовано для потреб розширення вулика. Організм ще росте, але вже дуже скоро ми зможемо масово вирощувати нових особин, а генетичні відходи використовувати як їжу. Мутації організму відкриють нові й дивовижні можливості в галузі біологічних досліджень, логістики та виробництва рідкісних ресурсів для вулика."
 newarcologies_decision_event.5.a: "Продовжуємо мутацію."
