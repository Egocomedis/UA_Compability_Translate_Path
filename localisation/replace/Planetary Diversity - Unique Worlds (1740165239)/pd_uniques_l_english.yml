l_english:
 # Заглушка-громадянство (завжди «ні», ніколи не показується); справжнє громадянство постачається в сабмоді Ascension Worlds. Локалізація тут лише вирішує виключення громадянств унікальних origin'ів, коли Unique Worlds працює окремо.
 civic_hive_pd_planetary_infesters: "Планетарні Заражувачі"
 civic_hive_pd_planetary_infesters_desc: "Цей розум вулика вбудовує себе в екосистеми планети. Кожен світ стає його продовженням, процвітаючи як єдина мережа під його керівництвом."
###Floating World
 sr_eludium:0 "Елюдієва руда"
 sr_eludium_desc:0 "Ця екзотична речовина має безліч властивостей, що суперечать законам фізики. Лише на цій планеті вона здатна змінювати масу матерії, впливаючи на гравітацію."
 mod_planet_miners_sr_eludium_produces_add: "£sr_eludium£ $sr_eludium$ від £job_miner£ [GetMinerPlural]"
 pd_floating: "Летючий світ"
 pd_floating_desc: "Цей дивний світ має острови, що ширяють у небі, підтримувані рідкісною рудою, яка трапляється лише тут. Численні шари островів надають планеті значно більше життєвого простору."
 pc_pd_floating: "Летючий світ"
 pc_pd_floating_desc: "Дивний світ з островами, що ширяють у небі, підтримуваними рідкісною рудою, яка трапляється лише тут. Численні шари островів надають планеті значно більше життєвого простору."
 pc_pd_floating_adj: "летючий"
 mod_pc_pd_floating_habitability: "Придатність летючого світу"
 trait_pc_pd_floating_preference: "Уподобання летючих світів"
 trait_pc_pd_floating_preference_desc: "$trait_pc_arctic_preference_desc$"
 d_pd_floating_the_great_knot: "Великий Вузол"
 d_pd_floating_the_great_knot_desc: "Розсіяна група островів, де стародавні дерева, вирвані з корінням мінливими вітрами, утворюють природні мости між летючими масивами суходолу. Унікальні вітрові потоки, різноманітні мікроклімати та рідкісна флора й фауна роблять це місце ідеальним для вивчення еволюційних адаптацій і живучості життя в мінливих умовах."
 d_pd_floating_whispering_glades: "Шепітні Галявини"
 d_pd_floating_whispering_glades_desc: "Спокійне скупчення вертикальних летючих островів ширяє над луками. Ніжна взаємодія вітру з вузькими проходами створює заспокійливий, майже музичний звук, ідеальний для відпочинку та відновлення сил."
 d_pd_floating_skyfall_islands: "Острови Небопаду"
 d_pd_floating_skyfall_islands_desc: "Регіон кільцеподібних островів з потужною гідросферою, де водоспади каскадами спадають з країв і зникають у тумані внизу. Захопливі краєвиди й природна краса роблять це місце головним напрямком для торгівлі й туризму, приваблюючи відвідувачів і торговців з усієї галактики."
 d_pd_floating_mining_operation: "Кар'єрний видобуток елюдію"
 d_pd_floating_mining_operation_desc: "Екосистему планети, яка раніше блокувала масштабний видобуток, розчищено для повного використання рідкісної елюдієвої руди."
 d_pd_eludium_islands: "Елюдієві острови"
 d_pd_eludium_islands_desc: "Хоча корінна порода цієї планети насичена елюдієм, багато менших островів містять концентровані поклади з легким доступом, що дозволяє видобутку мати мінімальний вплив на довкілля."
 decision_d_pd_the_great_knot_mining: "Видобуток у районі $d_pd_floating_the_great_knot$"
 decision_d_pd_the_great_knot_mining_desc: "Область, відому як $d_pd_floating_the_great_knot$, буде перетворено на масштабний елюдієвий видобуток."
 decision_d_pd_whispering_glades_mining: "Видобуток у районі $d_pd_floating_whispering_glades$"
 decision_d_pd_whispering_glades_mining_desc: "Область, відому як $d_pd_floating_whispering_glades$, буде перетворено на масштабний елюдієвий видобуток."
 decision_d_pd_skyfall_islands_mining: "Видобуток у районі $d_pd_floating_skyfall_islands$"
 decision_d_pd_skyfall_islands_mining_desc: "Область, відому як $d_pd_floating_skyfall_islands$, буде перетворено на масштабний елюдієвий видобуток."
 tech_eludium_research:1 "Переробка елюдію"
 tech_eludium_research_desc: "Видобуток елюдію нескладний, але значно складніше зрозуміти його потенціал і процес переробки. Як і з усіма ресурсами, розкриття повного потенціалу потребує часу."
 tech_eludium_research_tt_desc: "§HВідкриває:§! Видобуток елюдію\n§HВідкриває:§! Укази елюдію"
 edict_eludium_research:0 "Прискорення досліджень елюдію"
 edict_eludium_research_desc:0 "Оснащення наших лабораторій переробленим елюдієм значно посилить дослідницькі можливості наших фізичних відділів."
 edict_eludium_energy:0 "Елюдієва енергомережа"
 edict_eludium_energy_desc:0 "Використання елюдію як надпровідного матеріалу в нашій енергомережі значно підвищує її пропускну потужність."
 edict_eludium_weapons:0 "Елюдієві зброярні транзистори"
 edict_eludium_weapons_desc:0 "Інтеграція транзисторів на основі елюдію в нашу енергетичну зброю різко підвищує швидкість розряду та силу удару."
 decision_pd_add_floating_island: "Створити штучні летючі острови"
 decision_pd_add_floating_island_desc: "Використовуючи силу елюдію, ми можемо підняти цілі острови в небо цього світу, відкриваючи величезні нові простори для будівництва."
 d_pd_artifical_floating_islands: "Штучні летючі острови"
 d_pd_artifical_floating_islands_desc: "Використовуючи силу елюдію, ми підняли цілі острови в небо цього світу, відкривши величезні нові простори для будівництва."
 tech_eludium_floating_islands: "Формування штучних островів"
 tech_eludium_floating_islands_desc: "Хоча острови, просякнуті елюдієм, ширяють природно, під островами інших світів можна створити пристрої плавучості, що дозволить значно розширити життєвий простір на інших планетах."
 tech_eludium_floating_islands_tt_desc: "§HВідкриває рішення:§! $decision_pd_add_floating_island$"
 building_pd_eludium_floating_resort: "Летючий курорт"
 building_pd_eludium_floating_resort_desc: "Використовуючи елюдій, щоб утримувати цю споруду в повітрі, цей захопливий курорт пропонує вражаючі краєвиди завдяки своєму небесному розташуванню."
 tech_eludium_floating_resort: "Будівництво летючого курорту"
 tech_eludium_floating_resort_desc: "Використовуючи елюдій, щоб утримувати споруди в повітрі, ми можемо створювати захопливі курорти, що пропонують вражаючі краєвиди завдяки небесному розташуванню."
 tech_eludium_floating_overseer: "Летючі станції нагляду"
 tech_eludium_floating_overseer_desc: "Використовуючи елюдій, щоб утримувати споруди в повітрі, ми можемо створювати летючі станції нагляду за нашими дронами."
 building_pd_eludium_floating_overseer: "Летюча станція нагляду"
 building_pd_eludium_floating_overseer_desc: "Використовуючи елюдій, щоб утримувати споруди в повітрі, ці летючі станції нагляду постійно нагадують дронам про їхнє призначення."
 pd_origin_init_floating_NAME:0 "Летюча система"
 pd_origin_init_floating_DESC:0 "Стартова система з Летючим світом"

 #Events
 pdfloating.100.name: "Острови в небі"
 pdfloating.100.desc: "Завершивши сканування §Y[From.GetName]§!, §Y[Root.GetName]§! повідомляє про надзвичайне відкриття. Масиви суходолу цієї планети ширяють у небі, кидаючи виклик фізиці завдяки унікальній руді під назвою елюдій.\n\nВластивості цієї надзвичайної руди заслуговують на подальше вивчення. Захоплення й утримання цієї планети буде вирішальним для вивчення потенціалу елюдію та розкриття його таємниць."
 pdfloating.100.a: "Дивовижно."

 #Origin
 origin_pd_floating_world:0 "Острови в небі"
 origin_pd_floating_world_desc:0 "Ця цивілізація розвинулася у світі, не схожому на жоден інший у галактиці. Завдяки елементу елюдій масиви суходолу цієї планети невимушено ширяють у небі."
 origin_tooltip_floating_world_effects:0 "- $HOMEWORLD$$TABBED_NEW_LINE$- §Y$pc_continental$§! (Розмір: £planetsize£ 20)$TABBED_NEW_LINE$- ['concept_pd_floating'] Модифікатор планети$TABBED_NEW_LINE$- Дві ['concept_d_pd_eludium_islands'] Планетарні особливості\n- Доступ до додаткових технологій:$TABBED_NEW_LINE$- ['concept_eludium_research', £engineering_research£ $tech_eludium_research$]$TABBED_NEW_LINE$- ['concept_eludium_floating_islands', £physics_research£ $tech_eludium_floating_islands$]$TABBED_NEW_LINE$- ['concept_eludium_floating_resort', £physics_research£ $tech_eludium_floating_resort$] (звичайні держави)$TABBED_NEW_LINE$- ['concept_eludium_floating_overseer', £physics_research£ $tech_eludium_floating_overseer$] (гештальт-держави)"
