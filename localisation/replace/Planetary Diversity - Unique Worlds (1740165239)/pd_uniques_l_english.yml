 concept_eludium_floating_overseer_desc: "$i_unlocks_building$ ['building:building_pd_eludium_floating_overseer']\n\n§L$tech_eludium_floating_overseer_desc$§!"

###Crystal World
 sr_acean:0 "Ассеанський кристал"
 sr_acean_desc:0 "Унікальний резонанс цього кристала посилює регенерацію здоров'я та ріст органічних форм життя."
 mod_planet_miners_sr_acean_produces_add: "£sr_acean£ $sr_acean$ від £job_miner£ [GetMinerPlural]"
 pd_crystal: "Кристальний світ"
 pd_crystal_desc: "Планета вкрита великими стовпами ассеанського кристала, унікальний резонанс яких посилює регенерацію здоров'я та ріст органічних форм життя."
 pd_dead_crystal: "Мертвий кристальний світ"
 pd_dead_crystal_desc: "Надорганізм, що створив ассеанський кристал, було вбито, поклавши край його позитивному впливу на органічне життя. Однак видобуток кристалів тепер значно продуктивніший."
 pd_living_crystal: "Відновлений кристальний світ"
 pd_living_crystal_desc: "Надорганізм було відновлено, що посилило його позитивний вплив на органічне життя. Видобуток кристалів покращився, але істота тепер живиться будь-яким життям, яке зможе захопити."
 pc_pd_crystal: "Кристальний світ"
 pc_pd_crystal_desc: "$pd_crystal_desc$"
 pc_pd_crystal_adj: "кристалічний"
 mod_pc_pd_crystal_habitability: "Придатність кристального світу"
 trait_pc_pd_crystal_preference: "Уподобання кристальних світів"
 trait_pc_pd_crystal_preference_desc: "$trait_pc_arctic_preference_desc$"
 d_pd_khel_ruins: "Руїни Хелів"
 d_pd_khel_ruins_desc: "Залишки невдалої колонії, включно з гігантськими дослідницькими свердловинними об'єктами, розкидані по ділянці цієї планети."
 d_pd_acean_pillars: "Ассеанські стовпи"
 d_pd_acean_pillars_desc: "Ця планета вкрита великими стовпами ассеанського кристала, які, будучи пов'язаними з планетою, глибоко впливають на навколишнє органічне життя, заспокоюючи емоції та підвищуючи родючість."

 #Events
 pdcrystal.100.name: "Самоцвіт життя"
 pdcrystal.100.desc: "Глибоке сканування §Y[From.GetName]§! виявило дещо надзвичайне: здіймні кристалічні утворення, розкидані по ландшафту, які ми назвали §Yассеанським кристалом§!. Ці самоцвіти, схоже, покращують здоров'я навколишнього органічного життя, і, що примітно, їхній ефект зберігається навіть в ізольованих зразках.\n\n§Y[Root.Leader.GetName]§! також виявив ознаки форпосту в джунглях; якщо ми втримаємо планету, ми зможемо дослідити руїни."
 pdcrystal.100.a: "Дивовижно."
 pdcrystal.200.name: "Руїни в джунглях"
 pdcrystal.200.desc: "Поки наша колонія облаштовується на §Y[Root.GetName]§!, ми виявили, що руїни, знайдені нашою початковою експедицією, аж ніяк не єдині. Кілька покинутих таборів, безмовних і зношених негодою, розкидані по навколишній глушині.\n\nХто були ці ранні мешканці і що з ними сталося, залишається невідомим."
 pdcrystal.200.a: "Ми дослідимо ці руїни."
 pdcrystal.300.name: "Доля планети"
 pdcrystal.300.desc: "Тепер ми знаємо долю Хелів і темну таємницю ассеанського кристала. У нас є три варіанти: залишити надорганізм як є, вбити його або зцілити до початкового стану.\n\nВбивство збільшить видобуток кристалів, але покладе край його впливу на органічне життя. Відновлення посилить його вплив на життя, але підвищить ризик загибелі колоністів, хоча заходи безпеки можуть це пом'якшити."
 pdcrystal.300.a: "Його лоботомували не просто так."
 pdcrystal.300.a.tooltip: "Ми залишимо надорганізм недоторканим, нічого не змінюючи в тому, як ми взаємодіємо з планетою."
 pdcrystal.300.b: "Ми покінчимо з життям цієї істоти."
 pdcrystal.300.b.tooltip: "Ми завершимо те, що почали Хели, і вб'ємо надорганізм. Це покладе край впливу планети на органічне життя, але значно підвищить видобуток ассеану."
 pdcrystal.300.c: "Нам слід виправити цей несправедливий злочин."
 pdcrystal.300.c.tooltip: "Скасування лоботомії Хелів відновить надорганізм, посиливши його вплив на життя і трохи підвищивши видобуток ассеану, але він також відновить живлення живими істотами, включно з колоністами."

 #Archaeology Site
 pdcrystal_site: "Зарослі руїни"
 pdcrystal_site_desc: "Один регіон планети всіяний покинутими руїнами. Ретельне дослідження може допомогти нам зрозуміти поклади ассеанського кристала, унікальні для цього світу, та їхній надзвичайний вплив на розвиток органічного життя."
 pdcrystal.250.name: "Руїни Хелів"
 pdcrystal.250.desc: "Джунглі поглинули більшу частину занедбаних баз та їхніх технологій, але ми відновили деяку корисну інформацію. Хели, інопланетний вид, не корінний для цього світу, проводили загальнопланетарний експеримент з глибокими свердловинами в корі планети.\n\nХоча більшість даних було пошкоджено, ми знайшли підказки, що вказують на велике невідкрите поселення Хелів поблизу нашого дослідницького посту."
 pdcrystal.250.a: "Цікаво."
 pdcrystal.251.desc: "У поселенні ми знайшли залишки корабля поколінь, якому бракувало технології гіперпростору. Хели, рятуючись від кліматичної катастрофи на рідному світі, кілька поколінь блукали через кілька систем. Зрештою вони знайшли цю планету, яка, здавалося, задовольняла всі їхні потреби, і почали будувати новий дім.\n\nМи продовжимо перебирати записи Хелів."
 ancrel.251.a: "Як їм пощастило."
 pdcrystal.252.desc: "Колонія процвітала кілька років, чому сприяли кристалічні стовпи, які покращували їхні пересаджені культури. Але потім колоністи почали зникати. Спочатку це здавалося випадковим, але темп зростав. Досліджуючи зникнення, їхній головний науковець зробив шокуюче відкриття: планета була живою і живилася ними. Не маючи способу знову запустити свій корабель, вони зосередилися на спілкуванні з планетою та її заспокоєнні.\n\nДалі ми почнемо дослідження одного зі свердловинних об'єктів."
 pdcrystal.252.a: "Чи в небезпеці колонія?"
 pdcrystal.253.desc: "Дослідження показало, що кристал — це літоїдний надорганізм із зачатковим інтелектом, який використовує ассеан, щоб заманювати тварин у приховані провали. Хели пробурили свердловини та застосували електромагнітний імпульс, щоб порушити його живлення, зберігши при цьому властивості кристала.\n\nМи також виявили центр управління свердловинним проєктом."
 pdcrystal.253.a: "Якими ж відчайдушними вони, мабуть, були."
 pdcrystal.254.desc: "Свердловини Хелів лише прискорили живлення планети, можливо, як захисний механізм. На той час, коли вони були готові застосувати свою зброю, залишилося лише кілька десятків Хелів. Після детонації планета вивільнила потужний сплеск енергії, і всі записи Хелів раптово обірвалися.\n\nХоча Хели не дожили, щоб побачити це, вони мали рацію: планета втратила здатність живитися життям. Це похмуре джерело сили ассеанського кристала."
 pdcrystal.254.a: "Який похмурий кінець для всіх."

