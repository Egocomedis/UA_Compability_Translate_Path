 edict_pd_living_metal_ship_repair_desc: "Регенеративні властивості живого металу можна використати для покращення нашого флоту, значно підвищуючи швидкість ремонту броні та корпусу."

 #Situation
 situation_pd_biosynth_world: "Дослідити Біосинтетичний світ"
 situation_pd_biosynth_world_type: "Дослідити Біосинтетичний світ"
 situation_pd_biosynth_world_desc: "З ознаками руйнування, передовими каналами та синтетичними істотами ця планета приховує історію, яку її незаймані сільськогосподарські ділянки ще не розкрили.\n\nМи заглиблюємося далі, щоб розкрити її таємниче минуле."
 situation_pd_biosynth_world_monthly_change_tooltip: "Щомісячна зміна"
 situation_pd_biosynth_world_do_nothing: "Зосереджено на колонії"
 situation_pd_biosynth_world_do_nothing_desc: "Ми залишимо адміністрування пошуку колоніальним адміністраторам."
 situation_pd_biosynth_world_extra_funding: "Додаткове фінансування"
 situation_pd_biosynth_world_extra_funding_desc: "Додаткові кошти ще ніколи не сповільнювали проєкт."
 situation_pd_biosynth_stage_effects: "Ми продовжимо досліджувати цей світ у пошуках підказок."

 pd_unit_04s_knowledge: "Інженерні проєкти Юніта 04"
 pd_unit_04s_knowledge_desc: "За допомогу одному зі своїх творінь Юніт 04 поділився з нами частиною своїх передових інженерних знань."

 #Unique-World Waystation Modules
 sm_waystation_pd_eludium_relay: "Дослідницький ретранслятор елюдію"
 sm_waystation_pd_eludium_relay_desc: "Перероблений елюдій, спрямований через шлях-лінію, дозволяє кожному дослідницькому відділу мережі одночасно вивчати властивості руди, що суперечать фізиці."
 sm_waystation_pd_acean_spire: "Шпиль трансляції резонансу"
 sm_waystation_pd_acean_spire_desc: "Резонанс ассеанського кристала, що зберігається навіть в ізольованих фрагментах, тут посилюється і транслюється вздовж шлях-лінії, щоб прискорити органічний ріст по всій мережі."
 sm_waystation_pd_biosynth_foundry: "Ливарня живих сплавів"
 sm_waystation_pd_biosynth_foundry_desc: "Живий метал, здобутий з Біосинтетичного світу, викувується в самозагоювані сплави та поширюється вздовж шлях-лінії, ремонтуючи корпуси й броню флоту всюди, куди сягає мережа."

 sm_pd_requires_floating_world: "Потребує §YЛетючого світу§! в цій системі"
 sm_pd_requires_crystal_world: "Потребує §YКристального світу§! в цій системі"
 sm_pd_requires_biosynth_world: "Потребує §YБіосинтетичного світу§! в цій системі"

 tech_eludium_research_relay: "Ретранслятори шлях-ліній елюдію"
 tech_eludium_research_relay_desc: "Налаштовуючи системи проміжної станції на елюдієві жили Летючого світу, ми можемо ретранслювати дослідницький потенціал руди до лабораторій по всій нашій мережі."
 tech_eludium_research_relay_tt_desc: "§HВідкриває:§! Дослідницький ретранслятор елюдію (модуль проміжної станції)"
 tech_acean_resonance_spire: "Трансляція резонансу ассеану"
 tech_acean_resonance_spire_desc: "Вивчаючи Кристальний світ з орбіти, ми навчилися вловлювати резонанс ассеану і ретранслювати його вздовж наших шлях-ліній."
 tech_acean_resonance_spire_tt_desc: "§HВідкриває:§! Шпиль трансляції резонансу (модуль проміжної станції)"
 tech_biosynth_living_foundry: "Синтез живих сплавів"
 tech_biosynth_living_foundry_desc: "Досліджуючи поклади живого металу Біосинтетичного світу, наші інженери навчилися викувувати самовідновлювані сплави на борту проміжної станції."
 tech_biosynth_living_foundry_tt_desc: "§HВідкриває:§! Ливарня живих сплавів (модуль проміжної станції)"
