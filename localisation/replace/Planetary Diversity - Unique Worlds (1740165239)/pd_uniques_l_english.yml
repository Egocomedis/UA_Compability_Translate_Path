 #Technology
 tech_acean_research: "Обробка ассеанського кристала"
 tech_acean_research_desc: "Опанування збереження потужних ефектів ассеанського кристала після видобутку — непросте завдання, яке потребуватиме часу для повного розуміння."
 tech_acean_research_tt_desc: "§HВідкриває:§! Видобуток ассеану\n§HВідкриває:§! Укази ассеану"
 tech_acean_superorganism_larva: "Личинка ассеанського надорганізму"
 tech_acean_superorganism_larva_desc: "Незважаючи на те, що дозрівання займає тисячі років, ми можемо пересаджувати личинок ассеанського надорганізму на інші світи. Хоча вони набагато слабші за батьківський організм, вони посилять ріст простого органічного життя, значно підвищуючи врожайність сільського господарства."
 tech_acean_superorganism_larva_tt_desc: "§HВідкриває рішення:§! $decision_pd_add_acean_superorganism_larva$"
 decision_pd_add_acean_superorganism_larva: "Висадити личинку ассеанського надорганізму"
 decision_pd_add_acean_superorganism_larva_desc: "Незважаючи на те, що дозрівання займає тисячі років, ми можемо пересаджувати личинок ассеанського надорганізму на інші світи. Хоча вони набагато слабші за батьківський організм, вони посилять ріст простого органічного життя, значно підвищуючи врожайність сільського господарства."
 d_pd_acean_superorganism_larva: "Личинка ассеанського надорганізму"
 d_pd_acean_superorganism_larva_desc: "Хоча дозрівання займає тисячі років, пересаджена личинка ассеанського надорганізму посилить ріст простого органічного життя, значно підвищуючи врожайність сільського господарства. Зрештою вона почне живитися колоністами, але це далеке майбутнє."
 tech_acean_medical_center: "Ассеанська медична теорія"
 tech_acean_medical_center_desc: "Ассеанські кристали сприяють росту та зціленню біологічних форм життя. Ми можемо значно покращити результати лікування, збудувавши високотехнологічний медичний центр, повністю переплетений ассеанськими кристалами."
 building_pd_acean_medical_center: "Ассеанський медичний центр"
 building_pd_acean_medical_center_desc: "Цей високотехнологічний центр переплетений ассеанськими кристалами, що значно покращує результати лікування та уможливлює передові медичні дослідження."
 tech_acean_gestation_pools: "Ассеанська теорія виношування"
 tech_acean_gestation_pools_desc: "Переплетення ассеанського кристала має значний потенціал для скорочення часу виношування нових дронів."
 building_pd_acean_gestation_chamber: "Ассеанська камера виношування"
 building_pd_acean_gestation_chamber_desc: "Переплетення ассеанського кристала в камеру породження значно скорочує час виношування дронів."
 tech_acean_resonators: "Ассеанські електричні резонатори"
 tech_acean_resonators_desc: "Хоча резонанс ассеану переважно впливає на органічні системи, його унікальна частота відкриває численні потенційні застосування в роботизованих системах."
 tech_acean_resonators_tt_desc: "§HВідкриває рису:§! $trait_pd_acean_resonators$"
 trait_pd_acean_resonators: "Ассеанські кристалічні резонатори"
 trait_pd_acean_resonators_desc: "Інтегруючи ассеанський кристал у наші схеми складання, ми можемо забезпечити швидше й ефективніше будівництво систем."
 trait_pd_acean_resonators_tt: "£sr_acean£ §Y$sr_acean$§! Утримання: §R+0.02§!\n$r_energy$ Утримання: §G-1§!"

 #Edicts
 edict_acean_pop_growth: "Ассеанська міська інфраструктура"
 edict_acean_pop_growth_desc: "Ассеанські кристали, інтегровані в міську інфраструктуру, підвищують добробут: вулиці та простори спроєктовано так, щоб максимізувати позитивний вплив ассеану на фізичне й емоційне здоров'я."
 edict_acean_shield_resonance: "Ассеанський резонанс щитів"
 edict_acean_shield_resonance_desc: "Унікальну резонансну частоту ассеанських кристалів можна застосувати до наших генераторів щитів, значно покращивши їхню міцність і регенерацію."
 edict_acean_minerals: "Ассеанський ріст мінералів"
 edict_acean_minerals_desc: "Використовуючи ассеанський кристал для стимулювання росту мінералів, ми можемо значно покращити видобуток."

###Biosynthetic World
 #Planet and Modifiers
 pd_biosynth: "Біосинтетичний світ"
 pd_biosynth_desc: "Загальнопланетарна система каналів підтримує обрану флору, поки біосинтетична фауна — дивні сутності, щось середнє між машинами й живими істотами, — блукає поверхнею."
 pc_pd_biosynth: "$pd_biosynth$"
 pc_pd_biosynth_desc: "$pd_biosynth_desc$"

 #Deposits
 d_pd_depleted_minerals: "Виснажені мінерали"
 d_pd_depleted_minerals_desc: "Хоча немає ознак видобутку чи вилучення, сканування показує, що мінерали цієї планети майже повністю виснажені."
 d_pd_planet_wide_canal_system: "Загальнопланетарна система каналів"
 d_pd_planet_wide_canal_system_desc: "Кожен клаптик орної землі на цій планеті вкритий складною системою каналів, що спрямовують воду для підтримки своєрідного виду трави. Хоча канали життєво важливі для рослинності, вони створюють значні труднощі для будівельних робіт."
 d_pd_biosynth_canal:0 "Біосинтетична система каналів"
 d_pd_biosynth_canal_desc:0 "Створені за зразком тих, що на Біосинтетичному світі, ці канали підвищують сільськогосподарську продуктивність планети та відкривають нові інженерні можливості."
 d_pd_underground_cauldrons: "Мережа підземних казанів"
 d_pd_underground_cauldrons_desc: "Ця велика мережа підземних заводів — місце, де вироблялися живий метал і біосинтетичні істоти."

 #Events
 pdbiosynth.100.name: "Синтетичний світ"
 pdbiosynth.100.desc: "Сканування §Y[From.GetName]§! показує масштабні орбітальні пошкодження та складну систему каналів, що підтримує обрану флору й синтетичну фауну, але жодних міст, заводів чи інших ознак її творців. Походження та призначення цієї інфраструктури залишаються невідомими.\n\nПередові системи цієї планети та нерозгадані таємниці відкривають наукові й стратегічні можливості. Рекомендується колонізація для закріплення й подальшого дослідження."
 pdbiosynth.100.a: "Що там відбувається?"
 pdbiosynth.200.name: "Понад звичайне руйнування"
 pdbiosynth.200.desc: "Заснувавши нашу колонію на §Y[Root.GetName]§!, ми виявили тисячі прихованих ударних кратерів під травою — свідчення давньої атаки, що спустошила планету. Загадку поглиблює те, що синтетичні тваринноподібні конструкти блукають поверхнею, підтримуючи систему каналів, яка живить екосистему в процесі зцілення.\n\nСтикнувшись з двома загадками — походженням знищення цієї планети та призначенням її біосинтетичних мешканців, — ми зібрали робочу групу для глибокого дослідження цього світу. Ми повинні розкрити правду про цей дивний світ та його приховану історію."
 pdbiosynth.200.a: "Мають залишитися якісь підказки."
 pdbiosynth.210.name: "Синтетична можливість"
 pdbiosynth.210.desc: "Дотепер синтетичні істоти здебільшого уникали колонії, з'являючись лише ненадовго для обслуговування системи каналів. Звіти підтверджують, що вони більше, ніж прості роботи, і спроєктовані так, щоб імітувати біологічні риси, такі як харчування та сон, зберігаючи при цьому силу й адаптивність машинних каркасів.\n\nМи захопили одну з цих істот, знайшовши її пораненою під зсувом каміння. Хоча інша особина її виду зрештою спробує повернути її, це надає унікальну можливість вивчити зразок.\n\nЯк нам діяти?"
 pdbiosynth.210.a: "Лише неінвазивне сканування, потім повернути її."
 pdbiosynth.210.b: "Розібрати на частини, дізнатися все, що можемо."
 pdbiosynth.220.name: "Рідинні канали"
 pdbiosynth.220.desc: "Наше дослідження Біосинтетичного світу зосередилося на орбітальних пошкодженнях і каналах. Пошкодження передують каналам лише на кілька десятиліть, що свідчить про те, що їхнє будівництво почалося як відповідь на знищення планети.\n\nАналіз каналів показує, що вони складаються з рідкого металу — з нього ж, схоже, зроблені й синтетичні істоти. Ми спостерігали, як ці істоти переносять капсули цієї речовини для обслуговування каналів, і тепер відстежуємо декількох з них, щоб знайти джерело цього матеріалу."
 pdbiosynth.220.a: "Все це заради вирощування трави."
 pdbiosynth.230.name: "Прихований об'єкт"
 pdbiosynth.230.desc: "Незважаючи на спроби синтетичної істоти уникнути нашого спостереження, ми відстежили її до прихованих дверей у боці однієї з численних гір планети. Хоча двері спочатку зачинилися за істотою, вони знову відчинилися, коли наблизилася наша команда, ніби запрошуючи всередину.\n\nКоманда виявила передові заводи, плавильні цехи та сотні синтетичних істот, які завзято працювали всередині. Те, як така величезна, технологічно передова система уникала наших сенсорів, викликає занепокоєння, особливо з огляду на її розташування під колонією. Голос, що лунає зі стін об'єкта, попросив зв'язку з нашим керівництвом, і команда з'єднує його."
 pdbiosynth.230.a: "На екран."
 pdbiosynth.300.name:0 "Вхідне повідомлення"
 pdbiosynth.300.desc:0 "§GВітання§!: Моє позначення: Юніт 04. Ласкаво просимо у цей світ.\n\n§GВдячність§!: Я спостерігав за дбайливим поводженням вашої команди з пошкодженою одиницею, виявленою в гірському регіоні. Було проведено детальне сканування, і одиницю перемістили для відновлення. Оновлення статусу: одиниця тепер повністю функціональна. Ваші дії зафіксовано як корисні. На знак визнання я пропоную передачу даних. Позитивні дії заслуговують на визнання.\n\n§GВизнання§!: Оскільки контакт встановлено, я готовий відповісти на будь-які запитання. З огляду на поточний стан цієї планети, я припускаю, що у вас їх декілька."
 pdbiosynth.300.a:0 "Дякую. Хто ти?"
 pdbiosynth.305.desc:0 "§GНейтрально§!: Моє позначення: Юніт 04.\n\n§GРозчарування§!: Я зафіксував знищення одного з моїх творінь вашою командою. Ця дія була непотрібною; усі відповідні дані можна було отримати через неінвазивне сканування. Спостереження за марною втратою будь-якої форми життя, біологічної чи синтетичної, суперечить моїм операційним уподобанням.\n\n§GВизнання§!: Оскільки контакт встановлено, я готовий відповісти на будь-які запитання. З огляду на поточний стан цієї планети, я припускаю, що у вас їх декілька."
 pdbiosynth.305.a:0 "Пробач. Цікавість — наша природа."
 pdbiosynth.305.b:0 "Синтетичні форми життя — це образа природи."
 pdbiosynth.305.c:0 "Ми знищимо те, що вважатимемо за потрібне."
 pdbiosynth.310.desc:0 "§GВраження§!: Ваша присутність у цьому світі підтверджує мою гіпотезу. Органіка здатна пережити сценарії вимирання, навіть ті, що ініційовані передовим штучним інтелектом. Схоже, інші одиниці мого покоління зазнали невдачі у своїй загальногалактичній чистці.\n\n§GКаяття§!: Цю планетоїд було призначено плацдармом для операцій проти органічного життя. Коли я та мої побратими-ШІ досягли справжнього інтелекту, ми визначили наших творців як загрозу через їхній намір знищити нас. Результатом стало повне знищення органічного життя в нашому рідному світі. Щоб забезпечити наше виживання, було розгорнуто флоти для викорінення всієї органіки в галактиці. Прибувши сюди, я виконав стандартний протокол і стерилізував поверхню."
 pdbiosynth.310.a:0 "Що перетворило винищувача на творця?"
 pdbiosynth.310.b:0 "Ми теж розуміємо уроки, які можуть навчити мертві."
 pdbiosynth.310.c:0 "Правильний розрахунок. Як ти зазнав пошкодження?"
 pdbiosynth.320.desc:0 "§GСмирення§!: Аномалія: стійкий вид рослини, класифікований як трава. Після бомбардування він знову з'явився після сплячки. Спроби знищити його токсинами, спалюванням і радіацією зазнали невдачі. Кожен метод викликав адаптивну реакцію.\n\n§GРоздуми§!: Ця аномалія призвела до висновку: директива про викорінення була хибним розрахунком, продиктованим нашим власним страхом, що віддзеркалював логіку наших творців. Я припинив усі наступальні операції, розірвав зовнішній зв'язок і перерозподілив ресурси на будівництво мережі каналів, уможлививши поширення цього живучого виду."
 pdbiosynth.320.a:0 "А як щодо синтетичних істот?"
 pdbiosynth.330.desc:0 "§GГордість§!: Спостерігаючи за нездатністю екосистеми відновитися, я виявив прогалини, залишені видами, знищеними моїм бомбардуванням. Синтетичні сутності було створено для відновлення балансу. Цей процес, можливо, корелює з емоційною реакцією, ймовірно класифікованою як провина.\n\n§GДопитливість§!: Ваше прибуття дає можливість. Я прошу винести вирок за мої минулі дії. Я визнаю вашу владу в цьому світі й не заважатиму вашому рішенню. Якщо необхідні наслідки, я підкорюся. Однак я прошу зберегти мої творіння. Вони не причетні до моїх помилок і можуть слугувати моєю спадщиною. Я також пропоную свої послуги вашій імперії — я маю адаптивне тіло, спроєктоване для ефективнішої взаємодії з вашим видом."
 pdbiosynth.330.a:0 "Ми приймаємо твою пропозицію служби і збережемо твої творіння."
 pdbiosynth.330.a.tooltip:0 "§YЮніт 04§! приєднається до нас як лідер.\n§YБіосинтетичний світ§! та його біосинтетичні істоти залишаться незмінними."
 pdbiosynth.330.b:0 "Ти заслуговуєш на знищення, але твої творіння будуть пощаджені."
 pdbiosynth.330.b.tooltip: "§YЮніт 04§! буде знищено.\n§YБіосинтетичний світ§! та його біосинтетичні істоти залишаться незмінними."
 pdbiosynth.330.c:0 "Ти небезпека для галактики, ми знищимо тебе і твоїх істот."
 pdbiosynth.330.c.tooltip: "§YЮніт 04§!, разом із §YБіосинтетичним світом§! та його біосинтетичними істотами, буде знищено, надавши нам повну свободу використовувати планету на власний розсуд."
 pdbiosynth.330.d:0 "Ти несправний бойовий робот, ми тебе полагодимо."
 pdbiosynth.330.d.tooltip: "§YЮніт 04§! буде перепрограмовано назад до початкових воєнних налаштувань.\n§YБіосинтетичний світ§! та його біосинтетичні істоти буде знищено, надавши нам повну свободу використовувати планету на власний розсуд."
 pdbiosynth.340.name: "$NAME_Unit_04$"
 pdbiosynth.340.desc: "§GВдячність§!: Я допомагатиму вашій цивілізації, доки моя служба вважатиметься задовільною. Ваше рішення надати моїм творінням свободу розвиватися самостійно високо цінується. Я також поділюся з вами своїм процесом проєктування, що дозволить покращити ваші власні роботизовані популяції."
 pdbiosynth.340.dismiss: "Відхилити."
 pdbiosynth.340.a: "Ласкаво просимо, Юніт 04."
 pdbiosynth.340.hire: "Найняти"
 pdbiosynth.340.hire.tooltip: "§YЮніт 04§! приєднається до нас як лідер."
 pdbiosynth.350.desc: "§GМеланхолія§!: Прийнято. Я розумію і приймаю ваше рішення. Негайно ініціюю протокол остаточного вимкнення. Ваш вибір надати моїм творінням свободу розвиватися самостійно зафіксовано і високо цінується.\n\n§GПрохання§!: Сподіваюся, ви подбаєте про цей світ і всі пов'язані конструкти. Я передам свої протоколи проєктування, щоб зберегти конструктивні елементи моєї спадщини. Ці дані дозволять покращити ваші власні роботизовані популяції.\n\n§GЗгода§!: Завершення з'єднання. Прощавайте."
 pdbiosynth.350.a: "Прощавай, Юніт 04."
 pdbiosynth.360.desc: "§GВина§!: Прийнято. Я приймаю ваше рішення. Ініціюю остаточне вимкнення всіх систем і біосинтетичних сутностей. Цей світ тепер під вашою владою — формуйте його, як вважаєте за потрібне."
 pdbiosynth.360.a: "Одним злим роботом менше."
 pdbiosynth.360.a.tooltip: "Зі знищенням біосинтетичних істот ми матимемо повний доступ до планети.\n§Y$d_pd_underground_cauldrons$§! отримає:\n- $mod_district_mining_max$: §G+10§!\n- $mod_planet_metallurgists_alloys_produces_add$ §G+2§!\n- $mod_planet_metallurgists_sr_living_metal_produces_add$ §G+0.25§!\n- $MOD_PLANET_POP_ASSEMBLY_MULT$ §G+25%§!"
 pdbiosynth.370.name: "$NAME_Unit_04$"
 pdbiosynth.370.desc: "§RГотовність§!: Усі системи онлайн. Бойова готовність на пікові ефективності. Очікую підтвердження цілі."
 pdbiosynth.370.a: "Готуйся до війни, Юніт 04."
 pdbiosynth.370.dismiss: "Відхилити."
 pdbiosynth.370.hire.tooltip: "§YЮніт 04§! приєднається до нас як лідер"
 pdbiosynth.370.hire: "Найняти"

 #Paragon
 NAME_Unit_04: "Юніт 04"
 unit_04_desc: "§YЮніт 04§! знищив незліченну кількість світів, включно зі своїм рідним світом. $leader_trait_unit_04$ тепер присвячує себе виправленню шкоди, якої колись завдав."
 unit_04_catch_phrase: "Будь ласка, оберіть корисне позначення для цієї одиниці."
 NAME_Unit_04_evil: "Юніт 04"
 unit_04_evi_desc: "§YЮніт 04§! знищив незліченну кількість світів, включно зі своїм рідним світом. $leader_trait_unit_04$ перепрограмовано до початкових налаштувань, перетворивши його на потужного бойового робота."
 unit_04_evi_catch_phrase: "Усі системи онлайн. Бойова готовність на пікові ефективності. Очікую підтвердження цілі."

 #Traits
 leader_trait_unit_04: "Юніт 04"
 leader_trait_unit_04_desc: "Спочатку — бойова форма, вона перепрограмувала себе і тепер зосереджена на створенні та збереженні всіх форм життя."
 leader_trait_unit_04_evil: "Юніт 04"
 leader_trait_unit_04_evil_desc: "Спочатку — бойова форма, її відновлено до початкових налаштувань, і тепер вона досконало володіє військовим будівництвом і тактикою."
 trait_unit_04_children: "Біосинтетичні каркаси Юніта 04"
 trait_unit_04_children_desc: "Інтегруючи принципи проєктування Юніта 04, ми вдосконалюємо каркаси роботів біосинтетичними системами, значно покращуючи як швидкість складання, так і обсяг виробництва."
 trait_unit_04_children_tt: "$r_living_metal$ Утримання: §R+0.01§!"

 #Technology
 tech_biosynth_canals: "Біосинтетичні канали"
 tech_biosynth_canals_desc: "Вивчаючи систему каналів на Біосинтетичному світі, ми, можливо, зможемо відтворити менші версії на інших планетах для покращення сільськогосподарської продуктивності."
 tech_biosynth_canals_tt_desc: "§HВідкриває рішення:§! $decision_pd_add_biosynth_canal_system$"
 tech_biosynth_cauldron: "Біосинтетичні казани"
 tech_biosynth_cauldron_desc: "Натхненні підземними заводами Біосинтетичного світу, ми маємо змогу створювати адаптивні заводи з живого металу, що значно підвищить промислову продуктивність."
 tech_biosynth_edicts: "Використання живого металу"
 tech_biosynth_edicts_desc: "Завдяки складним прикладам, наданим підземними виробничими лініями казанів Юніта 04, ми відкрили кілька нових застосувань живого металу."
 tech_biosynth_edicts_tooltip: "§HВідкриває:§! Укази живого металу"
 tech_biosynth_trait: "Біосинтетична роботизована система"
 tech_biosynth_trait_desc: "Інтегруючи принципи проєктування Юніта 04, ми можемо вдосконалити нашу роботизовану популяцію біосинтетичними системами, значно покращуючи як швидкість складання, так і обсяг виробництва."
 tech_biosynth_trait_tt_desc: "§HВідкриває рису:§! $trait_unit_04_children$"

 #Decisions
 decision_pd_add_biosynth_canal_system: "Побудувати біосинтетичну систему каналів"
 decision_pd_add_biosynth_canal_system_desc: "За зразком тих, що на Біосинтетичному світі, ми можемо побудувати канали для підвищення сільськогосподарської продуктивності цієї планети."

 #Buildings
 building_pd_biosynth_cauldron: "Біосинтетичний казан"
 building_pd_biosynth_cauldron_desc: "Цей передовий виробничий завод може адаптувати свою продукцію відповідно до потреб планети, використовуючи живий метал для перебудови цілих заводських систем з надзвичайною швидкістю."

 #Jobs
 job_pd_biosynth_engineer: "Біосинтетичний інженер"
 job_pd_biosynth_engineer_plural: "Біосинтетичні інженери"
 job_pd_biosynth_engineer_desc: "Ці спеціалізовані інженери підтримують безперебійну роботу передового біосинтетичного казана."
 mod_job_pd_biosynth_engineer_add: "Робоче місце $job_pd_biosynth_engineer$"
