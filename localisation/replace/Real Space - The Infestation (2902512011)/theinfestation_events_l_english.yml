 theinfestation_exomycosis_event.12.desc.machine: "На планету [Root.GetName] потрапила невідома екзомікозна інфекція внаслідок атаки мегаміцеліальної цвілі імперії [attacker_exomycosis.GetName]. Інфекцію виявили надто пізно, і тепер спори цієї цвілі поширюються в біосфері.\nМи отримуємо дані про перші випадки несправностей дронів, що контактували з екзогрибом. Несправні дрони ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи. Машини в цих регіонах більше не підкоряються центральному блоку керування.\nЩе один світ заражено."
 theinfestation_exomycosis_event.14.name: "Мегаміцелій"
 theinfestation_exomycosis_event.14.desc: "Планета [From.From.GetName] здалеку може здаватися раєм. Насправді ж цей світ повністю поглинув дивний макроміцеліальний організм, що переробив усю органіку планети відповідно до власних потреб. Кількість метану та інших газів, що потрапляють в атмосферу, робить планету майже непридатною для проживання азотно-кисневих форм життя.\nГоловний науковець [Root.GetLeaderName] зауважує, що мікоризні нитки ростуть не хаотично, а створюють системні структури з певною функціональністю. Планета — гігантська органічна машина."
 theinfestation_exomycosis_event.16.name: "Екзомікоз"
 theinfestation_exomycosis_event.16.desc: "Ретельне вивчення зразків екзомікозу нарешті дало відчутні результати. Цей патоген — грибковий паразит із цвілеподібною структурою. Через процес зараження, що зветься екзомікозом, він здатен вступати в симбіотичний зв'язок з організмами. Але частіше цвіль асимілює тіло й використовує його як субстрат для росту. В обох випадках заражений об'єкт сильно мутує, стаючи подобою поглинутого організму, але з фізіологічними процесами й зовнішніми ознаками, що відрізняються від початкового біоматеріалу.\nВажлива особливість зростаючого екзогриба — здатність утворювати цілісні системи, подібні до нервових структур. На цьому етапі цвіль набуває свідомості та здатності контролювати не лише біологічні форми життя через паразитизм, а й механізми, проникаючи в ланцюги керування."
 theinfestation_exomycosis_event.17.name: "Екзогрибкове зараження: усі дані зібрано"
 theinfestation_exomycosis_event.17.desc: "Ми зібрали всі необхідні дані про екзомікоз, що вражає наші планети.\nМегаміцет, або Мегаміцете, — давня грибкова суперколонія, ймовірно створена для тераформування світів чи чогось подібного. У якийсь момент цей організм мутував, здобув розум вулика й, ймовірно, знищив своїх творців, після чого почав самостійно поширюватися всесвітом.\nЗаражаючи світи, мегаміцелій утворює цвілеподібний патоген, що складається з колоній хижих мікроорганізмів. Ці колонії ростуть на органічних або твердих поживних субстратах. Екзогриб повністю асимілює будь-який матеріал, перебудовуючи його під власні потреби, та отримує нову інформацію з геному жертви; так мегаміцелій повністю перебудовує світи, доки вони не виснажаться.\n\nНа основі отриманих даних ми змогли визначити низку заходів для обмеження поширення екзогриба й навіть повного знищення спор.\nКрім того, ми виявили, що застосування некротоксинів на ранніх стадіях екзомікозу повністю усуває ріст патогену в живих організмах. А експерименти із застосуванням токсинів на зразках екзомікозу для пошуку ефективних способів миттєвого зневоднення та виснаження мікроорганізмів допомогли запобігти корозії твердих матеріалів.\n\nТепер ми можемо ефективно протидіяти поширенню екзомікозу. А якщо ми захопимо первинний зразок мегаміцелію, то зможемо використати знання, накопичені цією істотою, і застосувати екзомікозну інфекцію у власних цілях. Хоча це може бути й небезпечно…"
 theinfestation_exomycosis_event.17.a: "Мегаміцелій міг би добре послужити нашій імперії."
 theinfestation_exomycosis_event.17.b: "Ми повинні викорінити це зараження раз і назавжди!"
 decision_planet_disinfection_available: "Планетарне рішення §Y$decision_planet_disinfection$§! доступне для світів, асимільованих екзогрибом."
 resolution_exomycosis_infestation_available: "Резолюція §Y$resolution_exomycosis_infestation$§! доступна для вашої імперії."
 theinfestation_exomycosis_event.18.name: "Мегаміцет захоплено"
 theinfestation_exomycosis_event.18.desc: "Операція із захоплення зразка Мегаміцету з планети [From.From.GetName] пройшла успішно! Оперативна група проникла в одну з макроміцеліальних вузлових структур, де було знайдено центральний організм, що керує суперколонією. Безформна істота виглядала як гігантська мікориза. Дорогою до цілі наші війська неодноразово стикалися з ордами спотворених цвіллю істот, що охороняли давній мегаміцелій.\nУнікальний організм здобуто, і зараз його транспортують на територію нашої імперії."
 theinfestation_exomycosis_event.20.name: "Зразок 17"
 theinfestation_exomycosis_event.20.desc: "Давній грибковий надорганізм тепер утримується в закритому дослідницькому об'єкті на планеті [megamycete_biolab_planet.GetName] в умовах підвищеної безпеки. Цей мегаміцет поглинув свідомість істот і пам'ять багатьох тисячоліть. Наші науковці намагатимуться видобути з цієї істоти максимум корисної інформації. Окремий секретний відділ уже працює над можливістю використання екзомікозу у військових цілях. Співробітники закритої лабораторії зазначають, що мегаміцелій, розміщений у захищеному контейнері, уважно стежить за їхньою роботою."
 theinfestation_exomycosis_event.20.a: "Нарешті! Нарешті! Не зводьте очей з цієї істоти."
 theinfestation_exomycosis_event.22.name: "Замкнену біолабораторію знищено"
 theinfestation_exomycosis_event.22.desc: "Закриту біолабораторію, що вивчала мегаміцелій на [Root.GetName], знищено!\nНа жаль, унікальний зразок екзомікозу втрачено назавжди."
 theinfestation_exomycosis_event.24.name: "Зразок 17"
 theinfestation_exomycosis_event.24.desc: "Ми отримали контроль над закритим дослідницьким об'єктом на планеті [From.GetName], що вивчав грибкову суперколонію Мегаміцета."
 theinfestation_exomycosis_event.25.name: "Зразок 17 втрачено!"
 theinfestation_exomycosis_event.25.desc: "Планета [From.GetName], де розташовувалася закрита біолабораторія екзомікозу, більше не під нашим контролем. Ми більше не маємо доступу до Мегаміцета."
 theinfestation_exomycosis_event.27.name: "[From.GetName]: перевищено рівень біологічної загрози!"
 theinfestation_exomycosis_event.27.desc: "У секретній лабораторії на планеті [From.GetName] стався інцидент. Якимось чином герметичність контейнера із суперколонією Мегаміцелію було порушено. Небезпечний організм вирвався на волю. На планеті почалася епідемія екзомікозу.\n\nНеобхідно негайно вжити заходів!"
 theinfestation_exomycosis_event.27.a: "Час це припинити! Знищити екзомікоз."
 theinfestation_exomycosis_event.27.b: "Давній Мегаміцет надто цінний. Знайти цю істоту!"
 theinfestation_exomycosis_event.28.name: "Мегаміцет знову захоплено"
 theinfestation_exomycosis_event.28.desc: "Операція з повернення втраченого зразка Мегаміцета з планети [From.From.GetName] пройшла успішно! Оперативна група виявила місце, де ховався організм. Нашим силам вдалося захопити давній мегаміцелій."
 theinfestation_exomycosis_event.29.name: "Зразок 17 повернуто!"
 theinfestation_exomycosis_event.29.desc: "Давній грибковий надорганізм розміщено в новій закритій дослідницькій лабораторії на [megamycete_biolab_planet.GetName]. Сподіваймося, що цього разу захист міцніший і мегаміцет не зможе втекти."
 theinfestation_exomycosis_event.30.name: "Міцеліальний світ"
 theinfestation_exomycosis_event.30.desc: "Ми виявили дивну аномалію на планеті [Root.GetName]. Здалеку цей світ виглядає як квітучий рай, але при ближчому розгляді розкриваються жахливі факти. Схоже, цей світ заражений якоюсь дивною грибковою інфекцією. Уся поверхня вкрита гігантськими утвореннями, подібними до міцелію. Атмосфера майже непридатна для дихання і насичена спорами цього екзогриба."
 theinfestation_exomycosis_event.31.name: "Атаку мутантів відбито"
 theinfestation_exomycosis_event.31.desc: "Нам вдалося відбити атаку мутантів на планеті [FromFrom.GetName], але це повториться знову. Цей світ повністю поглинутий екзомікозом, і тут більше немає поселень, не підданих зараженню екзомікозом. Одного дня кожен мешканець цього світу перетвориться на жахливого монстра."
 theinfestation_exomycosis_event.31.a: "Цей світ приречений..."
 theinfestation_exomycosis_event.32.name: "[Root.GetName]: Атаки заражених"
 theinfestation_exomycosis_event.32.desc: "Деякі мешканці планети [Root.GetName], заражені екзомікозом, знову зазнали жахливих змін. Їхні тіла було повністю поглинуто цвіллю, після чого ці істоти повністю втратили свій колишній вигляд і стали агресивними. Наразі багато мутованих особин, що колись були [Root.Owner.GetSpeciesName], атакують поселення."
 theinfestation_exomycosis_event.32.desc.hive: "Деякі особини планети [Root.GetName], заражені екзомікозом, знову зазнали жахливих змін. Мутовані особини, що колись були представниками виду [Root.Owner.GetSpeciesName], атакують поселення."
 theinfestation_exomycosis_event.32.desc.machine: "Деякі дрони планети [Root.GetName], спотворені екзомікозом, знову зазнали дивних системних збоїв. Машини повністю поглинуті цвіллю, яка використовує їх як скелет і бере під контроль усі базові функції. Злиття біомаси й механізмів повністю втратило колишній вигляд і розпізнає непошкоджені дрони як ворожі цілі. Наразі багато модифікованих машин, що колись були елементами мережі [Root.Owner.GetSpeciesName], знищують інфраструктуру й прямують до центрального вузла."
 theinfestation_exomycosis_event.36.name: "[Root.GetName]: Планетарну станцію знищено"
 theinfestation_exomycosis_event.36.desc: "Внаслідок бомбардування планети [Root.GetName] запалювальними боєприпасами придатну для життя станцію на поверхні повністю знищено."
 theinfestation_exomycosis_event.37.name: "[Root.GetName]: об'єкт знищено"
 theinfestation_exomycosis_event.37.desc: "Поверхню [Root.GetName] повністю знищено запалювальними бомбардуваннями."
 theinfestation_exomycosis_event.38.name: "[Root.GetName]: Планету спалено"
 theinfestation_exomycosis_event.38.desc: "Внаслідок запалювального бомбардування поверхня [Root.GetName] стала майже повністю непридатною для життя. Атмосфера перенасичена попелом, а на поверхні панує ядерна зима. Більшість мешканців загинули у вогні, а серед тих, хто залишився, можуть бути заражені."
 theinfestation_exomycosis_event.39.name: "[Root.GetName]: планета непридатна для життя"
 theinfestation_exomycosis_event.39.desc: "Внаслідок бомбардування планети [Root.GetName] запалювальними боєприпасами атмосферу планети повністю випалено, а поверхня перетворилася на пустир, усіяний кратерами."
 theinfestation_exomycosis_event.40.name: "[Root.GetName]: Екзогрибкове зараження"
 theinfestation_exomycosis_event.40.desc: "Схоже, екзомікоз на [Root.GetName] не було повністю викорінено, і зараження почалося знову."
 theinfestation_exomycosis_event.42.name: "[Root.GetName]: Мегаміцелій знищено"
 theinfestation_exomycosis_event.42.desc: "Поверхню планети [Root.GetName] було оброблено токсинами, що знищили всі макроміцелії та спори екзомікозу. Планету очищено від цвілі, однак серед мешканців усе ще можуть бути носії патогену, яких необхідно терміново лікувати, щоб екзомікоз знову не поширився."
 theinfestation_exomycosis_event.43.name: "[Root.GetName]: Планету отруєно"
 theinfestation_exomycosis_event.43.desc: "На жаль, унаслідок обробки планети [Root.GetName] токсинами в атмосфері відбулася ланцюгова реакція деяких хімічних сполук. Процес виявився незворотним, і вся планета перетворилася на незаселену отруйну кулю. Екзомікоз було повністю знищено, але разом з ним загинуло й усе населення планети."
 theinfestation_exomycosis_event.44.name: "Екзомікозне зараження: отримано нові дані"
 theinfestation_exomycosis_event.44.desc: "Згідно з новою резолюцією, інші імперії погодилися поділитися інформацією про екзомікоз. Ми отримали всі необхідні дані, щоб допомогти протистояти цій загрозі.\nМегаміцет, або Мегаміцете, — давня грибкова суперколонія, ймовірно створена для тераформування. У якийсь момент цей організм мутував, здобув розум вулика й, ймовірно, знищив своїх творців, після чого почав самостійно поширюватися всесвітом.\nЗаражаючи світи, мегаміцелій утворює цвілеподібний патоген, що складається з колоній хижих мікроорганізмів. Ці колонії ростуть на органічних або твердих поживних субстратах. Екзогриб повністю асимілює будь-який матеріал, перебудовуючи його під власні потреби, та отримує нову інформацію з геному жертви. Так мегаміцелій повністю перебудовує світи, доки вони не виснажаться.\n\nНа основі отриманих даних ми змогли визначити низку заходів для обмеження поширення екзомікозу й навіть повного знищення спор.\nКрім того, ми виявили, що застосування некротоксинів на ранніх стадіях екзомікозу повністю усуває ріст патогену в живих організмах. А експерименти із застосуванням токсинів на зразках екзомікозу для пошуку ефективних способів миттєвого зневоднення та виснаження мікроорганізмів допомогли запобігти корозії твердих матеріалів.\n\nТепер ми можемо ефективно протидіяти поширенню екзомікозу. А якщо ми захопимо первинний зразок мегаміцелію, то зможемо використати знання, накопичені цією істотою, і застосувати екзомікозну інфекцію у власних цілях. Хоча це може бути й небезпечно…"
 theinfestation_exomycosis_event.44.a: "Мегаміцелій міг би добре послужити нашій імперії."
 theinfestation_exomycosis_event.44.b: "Ми повинні викорінити це зараження раз і назавжди!"
 theinfestation_exomycosis_event.46.name: "[Root.GetName]: Екзогрибкове зараження"
 theinfestation_exomycosis_event.46.desc.exomycosis_contact: "На планету [Root.GetName] потрапила невідома екзомікозна інфекція. Схоже, спори цієї цвілі занесли заражені мігранти з планети [infected_planet.GetName]. Ми бачимо, як спори цього гриба стрімко поширюються в біосфері.\nПерші випадки зараження людей уже виявлено. Заражених ізолюють, але гриб поширюється надто швидко. Надходять повідомлення про численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органіка в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи.\nЦей організм потрібно ретельно вивчити."
 theinfestation_exomycosis_event.46.desc.exomycosis_contact_hive: "На планету [Root.GetName] потрапила невідома екзомікозна інфекція. Схоже, спори цієї цвілі занесли заражені особини з планети [infected_planet.GetName]. Ми бачимо, як спори цього гриба стрімко поширюються в біосфері.\nЗ'явилися перші випадки зараження особин. Заражених ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи.\nЦей організм потрібно ретельно вивчити."
 theinfestation_exomycosis_event.46.desc.exomycosis_contact_machine: "На планету [Root.GetName] потрапила невідома екзомікозна інфекція. Схоже, спори цієї цвілі занесли несправні дрони з планети [infected_planet.GetName]. Ми бачимо, як спори цього гриба стрімко поширюються в біосфері.\nМи отримуємо дані про перші випадки несправностей дронів, що контактували з екзогрибом. Несправні дрони ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи. Машини в цих регіонах більше не підкоряються центральному блоку керування.\nЦей організм потрібно ретельно вивчити."
 theinfestation_exomycosis_event.46.desc: "На планету [Root.GetName] потрапила небезпечна екзомікозна інфекція. Схоже, спори цієї цвілі занесли заражені поселенці з планети [infected_planet.GetName]. Інфекцію виявили надто пізно, і тепер спори цієї цвілі поширюються в біосфері.\nПерші випадки зараження людей уже виявлено. Заражених ізолюють, але гриб поширюється надто швидко. Надходять повідомлення про численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органіка в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи.\nЩе один світ заражено."
 theinfestation_exomycosis_event.46.desc.hive: "На планету [Root.GetName] потрапила небезпечна екзомікозна інфекція. Схоже, спори цієї цвілі занесли заражені особини з планети [infected_planet.GetName]. Інфекцію виявили надто пізно, і тепер спори цієї цвілі поширюються в біосфері.\nЗ'явилися перші випадки зараження особин. Заражених ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи.\nЩе один світ заражено."
 theinfestation_exomycosis_event.46.desc.machine: "На планету [Root.GetName] потрапила небезпечна екзомікозна інфекція. Схоже, спори цієї цвілі занесли несправні дрони з планети [infected_planet.GetName]. Інфекцію виявили надто пізно, і тепер спори цієї цвілі поширюються в біосфері.\nМи отримуємо дані про перші випадки несправностей дронів, що контактували з екзогрибом. Несправні дрони ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органіка в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи. Машини в цих регіонах більше не підкоряються центральному блоку керування.\nЩе один світ заражено."
 theinfestation_exomycosis_event.48.name: "[Target.GetName]: Екзогрибкова асиміляція"
 theinfestation_exomycosis_event.48.desc: "Ситуація на [Target.GetName] повністю вийшла з-під контролю. Значна частина поверхні планети заражена швидко поширюваним екзомікозом. Орди навіжених заражених блукають вулицями міст. Надходять повідомлення про жахливі мутації серед населення. У деяких регіонах з'явилися макроміцеліальні структури. Цей світ стрімко змінюється просто на наших очах."
 theinfestation_exomycosis_event.48.desc.hive: "Ми стрімко втрачаємо контроль над планетою [Target.GetName]. Значна частина поверхні планети заражена швидко поширюваним екзомікозом. Багато мутованих дронів втратили зв'язок і збожеволіли. У деяких регіонах з'явилися макроміцеліальні утворення. Асиміляція цього світу екзогрибом триває."
 theinfestation_exomycosis_event.48.desc.machine: "Ми втрачаємо зв'язок з планетою [Target.GetName]. Інфраструктура пошкоджена, більшість систем не реагує на команди. Значна частина поверхні планети заражена швидко поширюваним екзомікозом. Пошкоджені машини, що втратили зв'язок з мережею, вимикають системи, які ще функціонують. Станції моніторингу грибкових спалахів повідомляють про дивні системні збої в дронів, сильно пошкоджених цвіллю. Схоже, ці периферійні дрони сприйнятливі до невідомого вірусу."
 theinfestation_exomycosis_event.49.name: "[Root.GetName]: Екзогрибкове зараження"
 theinfestation_exomycosis_event.49.desc.exomycosis_contact: "Внаслідок атаки імперії [plague_fleet_country.GetName] на планету [Root.GetName] було застосовано невідому біологічну зброю. Цей гриб стрімко поширюється в біосфері.\nПерші випадки зараження населення вже виявлено. Заражених людей ізолюють, але гриб поширюється надто швидко. Надходять повідомлення про численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи.\nЦей організм потрібно ретельно вивчити."
 theinfestation_exomycosis_event.49.desc.exomycosis_contact_hive: "Внаслідок атаки імперії [plague_fleet_country.GetName] на планету [Root.GetName] було застосовано невідому біологічну зброю. Цей гриб стрімко поширюється в біосфері.\nЗ'явилися перші випадки зараження особин. Заражених особин ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи.\nЦей організм потрібно ретельно вивчити."
 theinfestation_exomycosis_event.49.desc.exomycosis_contact_machine: "Внаслідок атаки імперії [plague_fleet_country.GetName] на планету [Root.GetName] було застосовано невідому біологічну зброю. Цей гриб стрімко поширюється в біосфері.\nМи отримуємо дані про перші випадки несправностей дронів, що контактували з екзогрибом. Несправні дрони ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. Уся органіка в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи. Машини в цих регіонах більше не підкоряються центральному блоку керування.\nЦей організм потрібно ретельно вивчити."
 theinfestation_exomycosis_event.49.desc: "Атака імперії [plague_fleet_country.GetName] на планету [Root.GetName] призвела до застосування небезпечної біологічної зброї. Десантні капсули несли мутованих істот, заражених екзомікозною інфекцією. Інфекцію виявили надто пізно, і тепер спори цієї цвілі поширюються по всій біосфері.\nПерші випадки зараження людей уже виявлено. Заражених ізолюють, але гриб поширюється надто швидко. Надходять повідомлення про численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось на кшталт гігантської мікоризи.\nЩе один світ заражено."
 theinfestation_exomycosis_event.49.desc.hive: "Атака імперії [plague_fleet_country.GetName] на планету [Root.GetName] призвела до застосування небезпечної біологічної зброї. Десантні капсули несли мутованих істот, заражених екзомікозною інфекцією. Інфекцію виявили надто пізно, і тепер спори цієї цвілі поширюються в біосфері.\nЗ'явилися перші випадки зараження особин. Заражених ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось на кшталт гігантської мікоризи.\nЩе один світ заражено."
 theinfestation_exomycosis_event.49.desc.machine: "Імперія [plague_fleet_country.GetName] атакувала планету [Root.GetName] небезпечною біологічною зброєю. Десантні капсули несли мутованих істот, заражених екзомікозною інфекцією. Інфекцію виявили надто пізно, і тепер спори цієї цвілі поширюються в біосфері.\nМи отримуємо дані про перші випадки несправностей дронів, що контактували з екзогрибом. Несправні дрони ізолюють, але гриб поширюється надто швидко. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи. Машини в цих регіонах більше не підкоряються центральному блоку керування.\nЩе один світ заражено."
 theinfestation_exomycosis_event.50.name: "Зразок 17 знищено"
 theinfestation_exomycosis_event.50.desc: "Планету [Target.GetName] очищено від екзомікозу. Зразок давнього мегаміцелію знищено внаслідок очищення."

 theinfestation_exomycosis_event.100.name: "[From.GetName]: Світ асимільовано"
 theinfestation_exomycosis_event.100.desc: "Насіння нашого рою було висаджено на планеті [From.GetName]. Певний час цей світ чинив опір, але згодом був повністю поглинутий і тепер є частиною нашої імперії. Усі заражені особини тепер одні з нас, а решта послужили їжею."
 theinfestation_exomycosis_event.102.name: "[Target.GetName]: Світ асимільовано"
 theinfestation_exomycosis_event.102.desc: "Світ [Target.GetName] повністю асимільовано, і тепер він є частиною нашої імперії. Рій вкорінився глибоко в цій планеті."

 #EventChain

 exomycosis_infestation_chain_title: "Екзомікоз"
 exomycosis_infestation_chain_desc: "Наші світи вражені невідомою екзомікозною інфекцією. Щоб ефективно протидіяти цій загрозі, ми повинні зібрати всі необхідні дані. Для цього необхідно: вивчити світ, що є джерелом патогену, збудувати інфекційні лікарні на заражених планетах і детально дослідити природу екзомікозу."
 exomycosis_infestation_chain_gestalt_title: "Екзомікоз"
 exomycosis_infestation_chain_gestalt_desc: "Наші світи вражені невідомою екзомікозною інфекцією. Щоб ефективно протидіяти цій загрозі, ми повинні зібрати всі необхідні дані. Для цього необхідно: вивчити світ, що є джерелом патогену, збудувати об'єкти стримування на заражених планетах і детально дослідити природу екзомікозу."
 mycelium_world_survey: "§BМіцеліальний світ досліджено§!"
 infectious_hospitals_built: "§GІнфекційні лікарні збудовано§!"
 exomycosis_researched: "§YЕкзомікоз досліджено§!"
 isolation_ward_built: "§GІзоляційну палату збудовано§!"
 exomycosis_sample_chain_title: "Зразок мегаміцелію"
 exomycosis_sample_chain_desc: "Щоб отримати зразок Мегаміцета для наших досліджень, нам потрібно відправити оперативну групу на рідний світ екзомікозу та збудувати замкнену біолабораторію, де він надійно зберігатиметься."
 exomycosis_new_sample_chain_title: "Зразок мегаміцелію"
 exomycosis_new_sample_chain_desc: "Щоб повернути зразок Мегаміцета для наших досліджень, нам потрібно відправити оперативну групу на планету та збудувати нову закриту біолабораторію, де він буде розміщений."
 megamycete_taken: "§RМегаміцета захоплено§!"
 confined_biolab_built: "§MЗамкнену біолабораторію збудовано§!"

 #Special Project
 MYCELIUM_WORLD_SURVEY_PROJECT: "Дослідити Міцеліальний світ"
 MYCELIUM_WORLD_SURVEY_PROJECT_DESC: "Планета [From.GetName] — рідне середовище для екзомікозу. Саме такі світи є джерелом поширення екзомікозу в галактиці. Ретельне спостереження за процесами, що відбуваються в цьому світі, дозволить розширити наше розуміння природи екзогриба, щоб ефективно з ним боротися."
 MYCELIUM_WORLD_SURVEY_PROJECT_GESTALT: "$MYCELIUM_WORLD_SURVEY_PROJECT$"
 MYCELIUM_WORLD_SURVEY_PROJECT_GESTALT_DESC: "$MYCELIUM_WORLD_SURVEY_PROJECT_DESC$"
 EXOMYCOSIS_RESEARCH_PROJECT: "Дослідити екзомікоз"
 EXOMYCOSIS_RESEARCH_PROJECT_DESC: "Таємничий грибковий патоген, що вразив наші світи, має дуже складну структуру. Нам знадобляться всі наукові ресурси імперії, щоб просунутися у вивченні цієї хвороби та її лікуванні."
 EXOMYCOSIS_RESEARCH_PROJECT_GESTALT: "$EXOMYCOSIS_RESEARCH_PROJECT$"
 EXOMYCOSIS_RESEARCH_PROJECT_GESTALT_DESC: "$EXOMYCOSIS_RESEARCH_PROJECT_DESC$"
 MEGAMYCETE_TAKING_PROJECT: "Здобуття зразка Мега Міцелію"
 MEGAMYCETE_TAKING_PROJECT_DESC: "Планета [From.GetName] — домівка давньої екзогрибкової інфекції. Мозок цієї суперколонії космічної цвілі, відомої як Мегаміцет, тисячоліттями вбирав знання. Захопивши зразок цієї істоти, ми відкриємо нові можливості в розвитку науки та військової справи."
 NEW_MEGAMYCETE_TAKING_PROJECT: "Повернення зразка Мега Міцелію"
 NEW_MEGAMYCETE_TAKING_PROJECT_DESC: "Зразок суперколонії Мегаміцелію, який ми вивчали на планеті [From.GetName], вийшов з-під контролю. Нам потрібно ізолювати цю небезпечну істоту та повернути її науковцям, доки ситуація не стала критичною."
 PLANET_BURNING_PROJECT: "Спалення планети"
 PLANET_BURNING_PROJECT_DESC: "Планету [From.GetName] повністю поглинула екзоцвіль. Щоб запобігти поширенню інфекції на інші планети, ми повинні бомбардувати цей світ запалювальними боєприпасами."
 PLANET_DISINFECTION_PROJECT: "Група дезінфекції планети"
 PLANET_DISINFECTION_PROJECT_DESC: "Планету [From.GetName] повністю поглинула екзогрибкова інфекція. Корпус протидії біологічній небезпеці хімічно очистить поверхню планети від цвілі-загарбника."
