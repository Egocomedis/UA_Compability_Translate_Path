 theinfestation_exomycosis_event.8.name: "[Target.GetName]: Атаки заражених"
 theinfestation_exomycosis_event.8.desc: "Деякі мешканці планети [Target.GetName], заражені екзомікозом, зазнали жахливих змін. Їхні тіла було повністю поглинуто цвіллю, після чого ці істоти повністю втратили свій колишній вигляд і стали агресивними. Наразі багато мутованих особин, що колись були представниками виду [Target.Owner.GetSpeciesName], атакують поселення."
 theinfestation_exomycosis_event.8.desc.hive: "Деякі особини планети [Target.GetName], заражені екзомікозом, зазнали жахливих змін. Їхні тіла було повністю поглинуто цвіллю, після чого ці істоти повністю втратили свій колишній вигляд і стали агресивними. Наразі багато мутованих особин, що колись були [Target.Owner.GetSpeciesName], атакують поселення."
 theinfestation_exomycosis_event.8.desc.machine: "Деякі дрони планети [Target.GetName], спотворені екзомікозом, зазнали дивних системних збоїв. Машини повністю поглинуті цвіллю, яка використовує їх як скелет і бере під контроль усі базові функції. Злиття біомаси й техніки повністю втратило колишній вигляд і розпізнає непошкоджені дрони як ворожі цілі. Наразі багато модифікованих машин, що колись були елементами мережі [Target.Owner.GetSpeciesName], знищують інфраструктуру й прямують до центрального вузла."
 theinfestation_exomycosis_event.12.name: "[Root.GetName]: Екзогрибкове зараження"
 theinfestation_exomycosis_event.12.desc.exomycosis_contact: "На планету [Root.GetName] потрапила невідома екзомікозна інфекція внаслідок атаки мегаміцеліальної цвілі імперії [attacker_exomycosis.GetName]. Ми бачимо, як спори цього гриба стрімко поширюються в біосфері.\nПерші випадки вже виявлено. Заражене населення ізолюють, але гриб поширюється надто швидко. Надходять повідомлення про численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось на кшталт гігантської мікоризи.\nЦей організм потрібно ретельно вивчити."
 theinfestation_exomycosis_event.12.desc.exomycosis_contact_hive: "На планету [Root.GetName] потрапила невідома екзомікозна інфекція внаслідок атаки мегаміцеліальної цвілі імперії [attacker_exomycosis.GetName]. Ми бачимо, як спори цього гриба стрімко поширюються в біосфері.\nЗ'явилися перші випадки. Заражених особин ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи.\nНеобхідно ретельно дослідити цей організм."
 theinfestation_exomycosis_event.12.desc.exomycosis_contact_machine: "На планету [Root.GetName] потрапила невідома екзомікозна інфекція внаслідок атаки мегаміцеліальної цвілі імперії [attacker_exomycosis.GetName]. Ми бачимо, як спори цього гриба стрімко поширюються в біосфері.\nМи отримуємо дані про перші випадки несправностей дронів, що контактували з екзогрибом. Несправні дрони ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи. Машини в цих регіонах більше не підкоряються центральному блоку керування.\nЦей організм потрібно ретельно вивчити."
 theinfestation_exomycosis_event.12.desc: "На планету [Root.GetName] потрапила невідома екзомікозна інфекція внаслідок атаки мегаміцеліальної цвілі імперії [attacker_exomycosis.GetName]. Інфекцію виявили надто пізно, і тепер спори цієї цвілі поширюються в біосфері.\nПерші випадки вже виявлено. Заражене населення ізолюють, але гриб поширюється надто швидко. Надходять повідомлення про численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось на кшталт гігантської мікоризи.\nЩе один світ заражено."
