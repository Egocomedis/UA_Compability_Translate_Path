 #Events

 theinfestation_exomycosis_event.3.name: "[Root.GetName]: Екзогрибкове зараження"
 theinfestation_exomycosis_event.3.desc.exomycosis_contact: "На планету [Root.GetName] потрапила невідома екзомікозна інфекція. Схоже, спори цієї цвілі випадково завіз корабель, що відвідував планету [infected_planet.GetName]. Ми спостерігаємо, як спори цього гриба стрімко поширюються в біосфері.\nПерші випадки зараження людей уже виявлено. Заражених ізолюють, але гриб поширюється надто швидко. Надходять повідомлення про численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось на кшталт гігантської мікоризи.\nЦей організм потрібно ретельно вивчити."
 theinfestation_exomycosis_event.3.desc.exomycosis_contact_hive: "На планету [Root.GetName] потрапила невідома екзомікозна інфекція. Схоже, спори цієї цвілі випадково завіз корабель, що відвідував планету [infected_planet.GetName]. Ми спостерігаємо, як спори цього гриба стрімко поширюються в біосфері.\nЗ'явилися перші випадки зараження особин. Заражених ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи.\nЦей організм потрібно ретельно вивчити."
 theinfestation_exomycosis_event.3.desc.exomycosis_contact_machine: "На планету [Root.GetName] потрапила невідома екзомікозна інфекція. Схоже, спори цієї цвілі випадково завіз корабель, що відвідував планету [infected_planet.GetName]. Ми бачимо, як спори цього гриба стрімко поширюються в біосфері.\nМи отримуємо дані про перші випадки несправностей дронів, що контактували з екзогрибом. Несправні дрони ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органіка в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи. Машини в цих регіонах більше не підкоряються центральному блоку керування.\nЦей організм потрібно ретельно вивчити."
 theinfestation_exomycosis_event.3.desc: "На планету [Root.GetName] потрапила небезпечна екзомікозна інфекція. Схоже, спори цієї цвілі випадково завіз корабель, що відвідував планету [infected_planet.GetName]. Інфекцію виявили надто пізно, і тепер спори цієї цвілі поширюються в біосфері.\nПерші випадки зараження людей уже виявлено. Заражених ізолюють, але гриб поширюється надто швидко. Надходять повідомлення про численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органіка в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось на кшталт гігантської мікоризи.\nЩе один світ заражено."
 theinfestation_exomycosis_event.3.desc.hive: "На планету [Root.GetName] потрапила небезпечна екзомікозна інфекція. Схоже, спори цієї цвілі випадково завіз корабель, що відвідував планету [infected_planet.GetName]. Інфекцію виявили надто пізно, і тепер спори цієї цвілі поширюються в біосфері.\nЗ'явилися перші випадки зараження особин. Заражених ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органічна матерія в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи.\nЩе один світ заражено."
 theinfestation_exomycosis_event.3.desc.machine: "На планету [Root.GetName] потрапила небезпечна екзомікозна інфекція. Схоже, спори цієї цвілі випадково завіз корабель, що відвідував планету [infected_planet.GetName]. Інфекцію виявили надто пізно, і тепер спори цієї цвілі поширюються в біосфері.\nМи отримуємо дані про перші випадки несправностей дронів, що контактували з екзогрибом. Несправні дрони ізолюють, але гриб поширюється надто швидко. Виявлено численні скупчення екзогрибкових колоній. На планеті починають формуватися регіони, повністю вкриті таємничою цвіллю. Уся органіка в цих ділянках мутувала й стала частиною єдиного організму, що утворює щось подібне до гігантської мікоризи. Машини в цих регіонах більше не підкоряються центральному блоку керування.\nЩе один світ заражено."
 decision_quarantine_available: "[Root.GetName]: доступне планетарне рішення §Y$decision_quarantine$§!."
 theinfestation_exomycosis_event.5.name: "[Target.GetName]: Екзогрибкову асиміляцію завершено"
 theinfestation_exomycosis_event.5.desc.mycelium_world: "Планету [Target.GetName] грибок повністю перетворив на гігантський макроміцеліальний організм. Численні гігантські мікоризні нитки пронизують усю поверхню цього зараженого світу.\nПланета перетворилася на суцільне пекло. Їхні тіла було повністю поглинуто цвіллю, після чого ці істоти повністю втратили свій колишній вигляд і стали агресивними. Наразі величезна кількість мутованих особин, що колись були представниками виду [Target.Owner.GetSpeciesName], атакують поселення."
 theinfestation_exomycosis_event.5.desc.mycelium_world_hive: "Планету [Target.GetName] грибок повністю перетворив на гігантський макроміцеліальний організм. Численні гігантські мікоризні нитки пронизують усю поверхню цього зараженого світу.\nПланета перетворилася на бійню. Тіла було повністю поглинуто цвіллю, після чого ці істоти повністю втратили свій колишній вигляд і стали агресивними. Наразі величезна кількість мутованих особин, що колись були представниками виду [Root.Owner.GetSpeciesName], атакують здорових дронів."
 theinfestation_exomycosis_event.5.desc.mycelium_world_machine: "Планету [Target.GetName] грибок повністю перебудував на гігантський макроміцеліальний організм. Численні гігантські мікоризні нитки пронизують усю поверхню цього зараженого світу.\nСитуація на планеті погіршилася. Машини повністю поглинуті цвіллю, яка використовує їх як скелет і бере під контроль усі базові функції. Злиття біомаси й механізмів повністю втратило колишній вигляд і розпізнає непошкоджені дрони як ворожі цілі. Наразі величезна кількість модифікованих машин, що колись були елементами мережі [Target.Owner.GetSpeciesName], знищують інфраструктуру й прямують до центрального вузла."
 theinfestation_exomycosis_event.5.desc.artificial_world: "[Root.GetName] повністю поглинуто екзомікозною інфекцією. Численні мікоризні нитки цього макроміцеліального організму пронизують кожну структуру цього зараженого об'єкта.\nУсі мешканці, заражені екзомікозом, зазнали жахливих змін. Їхні тіла було повністю поглинуто цвіллю, після чого ці істоти повністю втратили свій колишній вигляд і стали агресивними. Наразі величезна кількість мутованих особин, що колись були представниками виду [Target.Owner.GetSpeciesName], атакують поселення."
 theinfestation_exomycosis_event.5.desc.artificial_world_hive: "[Root.GetName] повністю поглинуто екзомікозною інфекцією. Численні мікоризні нитки цього макроміцеліального організму пронизують кожну структуру цього зараженого об'єкта.\nУсі особини, заражені екзомікозом, зазнали жахливих змін. Їхні тіла було повністю поглинуто цвіллю, після чого ці істоти повністю втратили свій колишній вигляд і стали агресивними. Наразі величезна кількість мутованих особин, що колись були представниками виду [Root.Owner.GetSpeciesName], атакують здорових дронів."
 theinfestation_exomycosis_event.5.desc.artificial_world_machine: "[Root.GetName] повністю поглинуто екзомікозною інфекцією. Численні мікоризні нитки цього макроміцеліального організму пронизують усі структури цього зараженого об'єкта.\nУсі дрони, спотворені екзомікозом, зазнали дивних системних збоїв. Машини повністю поглинуті цвіллю, яка використовує їх як скелет і бере під контроль усі базові функції. Злиття біомаси й механізмів остаточно втратило колишній вигляд і розпізнає непошкоджені дрони як ворожі цілі. Наразі величезна кількість модифікованих машин, що колись були елементами [Target.Owner.GetSpeciesName], знищують інфраструктуру й прямують до вузла."
 planet_mold_absorbed: "Планету повністю поглинуто цвіллю."
 mutated_infected_attack: "Заражені атакують!"
