  resolution_exomycosis_infestation: "Загроза екзомікозу"
  resolution_exomycosis_infestation_desc: "Екзомікозна інфекція може поглинути всі форми життя в галактиці. Щоб ефективно протидіяти поширенню екзомікозу, усі дані про цей небезпечний патоген мають стати загальнодоступними."
  resolution_exomycosis_infestation_effect_success: "Усі імперії, що входять до Галактичної Ради, отримають усі бонуси за завершення спеціального проєкту: §Y$exomycosis_infestation_chain$§!."

