  # Planet Classes
  ####################################

  pc_mycelium: "Міцеліальний світ"
  pc_mycelium_desc: "Цей колись квітучий світ у полоні паразитичного організму невідомого походження. Дивний організм — грибкова суперколонія, що пронизує всю планету гігантськими гіфами, повністю підкоряючи біосферу. Ця планетарна екзоцвіль утворює патоген, що заражає не лише живі організми, а й мертву матерію, використовуючи її у власних цілях."


