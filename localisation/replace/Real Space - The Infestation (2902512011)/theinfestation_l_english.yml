  building_infectious_hospital: "Інфекційна лікарня"
  building_infectious_hospital_desc: "Ці медичні комплекси ізолюють заражених і відстежують перебіг хвороби, щоб уповільнити поширення інфекції зусиллями медичного персоналу."
  building_isolation_ward: "Ізоляційна палата"
  building_isolation_ward_desc: "У цих закритих комплексах заражених ізолюють і вивчають, щоб уповільнити поширення інфекції та розробити ефективні методи боротьби зі збудником."
  building_confined_biolab: "Замкнена біолабораторія"
  building_confined_biolab_desc: "Цей надсекретний об'єкт присвячений зберіганню та вивченню надзвичайно небезпечних біологічних матеріалів."

  ####################################
  # Relics
  ####################################

  r_sample_17: "Зразок 17"
  r_sample_17_desc: "Цей захоплений зразок мегаміцелію — дуже давня грибкова суперколонія екзомікозу. Організм зберігає знання багатьох істот, яких він поглинув упродовж тисячоліть. З ним ми можемо створювати й контролювати малі групи мутованих заражених особин, щоб заражати ворожі світи екзогрибковою інфекцією."
  sample_17_active: "Створює 2 транспорти із зараженими арміями."


