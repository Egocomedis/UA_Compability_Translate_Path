l_english:

  ####################################
  # Situations
  ####################################

  situation_exomycosis_infestation: "Екзогрибкове зараження"
  situation_exomycosis_infestation_type: "$situation_exomycosis_infestation$"
  situation_exomycosis_infestation_desc: "Планета [Target.GetName] зазнала небезпечної екзомікозної інфекції. Кількість заражених продовжуватиме зростати. Загрозі потрібно протистояти за будь-яку ціну, інакше світ буде асимільовано екзомікозом."
  situation_exomycosis_infestation_finish_tooltip: "Планету [Target.GetName] грибок повністю перетворить на гігантський макроміцеліальний організм. Умови проживання для нашого виду стануть жахливими, і ми ризикуємо втратити контроль над планетою."
  situation_exomycosis_infestation_fail_tooltip: "Планету [Target.GetName] буде очищено від екзомікозного зараження."
  harmful_mold_1: "Екзогрибкові спори"
  harmful_mold_2: "Шкідлива цвіль"
  harmful_mold_3: "Екзомікоз середовища"
  harmful_mold_4: "Асиміляція мегаміцелієм"
  approach_exomycosis_do_nothing: "Нічого не робити"
  approach_exomycosis_lockdown: "Оголосити локдаун"
  approach_exomycosis_lockdown_tooltip: "Щоб уповільнити поширення інфекції, планету потрібно поставити під суворе регулювання контактів між її мешканцями."
  approach_exomycosis_liquidation: "Ліквідувати заражених"
  approach_exomycosis_liquidation_tooltip: "Крайні заходи можуть мати небажані наслідки для суспільства, коли воно про них дізнається. Але суворі часи вимагають суворих заходів.\n\n§RПОПЕРЕДЖЕННЯ! Усі заражені поселення зазнають геноциду, доки не будуть повністю знищені.§!"
  approach_exomycosis_purge: "Розпочати чистку від інфекції"
  approach_exomycosis_purge_tooltip: "Іноді необхідно відрубати руку, щоб не втратити голову.\n\n§RПОПЕРЕДЖЕННЯ! Усі заражені зразки зазнають геноциду, доки не будуть повністю знищені.§!"
  approach_exomycosis_rejection: "Розпочати відбраковування"
  approach_exomycosis_rejection_tooltip: "Зламані інструменти найпростіше здати на брухт.\n\n§RПОПЕРЕДЖЕННЯ! Усі несправні дрони будуть знищуватися, доки не будуть повністю знищені.§!"
  approach_exomycosis_vaccination: "Розпочати некротоксинову вакцинацію"
  approach_exomycosis_vaccination_tooltip: "Застосування інвазивних некротоксикаційних методик на ранніх стадіях екзомікозу призведе до повного зцілення заражених.\n\nКількість наданих §Y$job_healthcare$§! або §Y $job_maintenance_drone$§! безпосередньо впливає на швидкість зцілення інфекції серед поселень."
  approach_exomycosis_sterilization_process: "Розпочати процес структурної кальцифікації"
  approach_exomycosis_sterilization_process_tooltip: "Обробка пошкоджених матеріалів специфічними токсинами перетворить грибковий наліт на мінерал, який легко відшаровується.\n\nКількість призначених §Y$job_healthcare$§! або §Y $job_maintenance_drone$§! безпосередньо вплине на швидкість зцілення інфекції серед поселень."
  situation_exomycosis_infestation_monthly_change_tooltip: "Цей §Yінцидент§! прогресуватиме швидше залежно від кількості заражених поселень та екзогрибкових забруднень на планеті."
  exomycosis_infected_pop_proportion: "Заражені поселення"
  exomycosis_contamination_grows: "Середовище екзогрибкового забруднення"
  no_exomycosis_contamination: "Немає екзогрибкового забруднення"

  situation_exomycosis_assimilation: "Асиміляція середовища"
  situation_exomycosis_assimilation_type: "$situation_exomycosis_assimilation$"
  situation_exomycosis_assimilation_desc: "Увесь органічний потенціал планети [Target.GetName] буде перероблено для безперервного росту колоній рою міцелію."
  situation_exomycosis_assimilation_finish_tooltip: "[Target.GetName] не дуже підходить для розвитку Мегаміцету."
  situation_exomycosis_assimilation_fail_tooltip: "Планету [Target.GetName] поступово поглине Мегаміцелій, покращуючи умови для розвитку нашого рою."
  assimilation_stage_1: "Поширення спор"
  assimilation_stage_2: "Асиміляція біосфери"
  assimilation_stage_3: "Формування мегаміцелію"
  approach_growth_acceleration: "Прискорення росту мегаміцелію"
  approach_growth_acceleration_tooltip: "Ріст макроміцеліальних структур можна прискорити, перенаправляючи перероблений біоматеріал з колоній, що розвиваються."
  situation_exomycosis_assimilation_monthly_change_tooltip: "Цей §Yінцидент§! прогресуватиме швидше залежно від кількості заражених поселень та екзомікозних заражень на планеті."
  assimilation_pop_proportion: "Кількість поселень"


