  ####################################
  # Planet Decision
  ####################################

  decision_quarantine: "Оголосити карантин"
  decision_quarantine_desc: "Це рішення спрямує всі адміністративні ресурси на ізоляцію цього світу та обмеження поширення хвороби."
  decision_abolish_quarantine: "Скасувати карантин"
  decision_abolish_quarantine_desc: "Скасування карантину зніме всі обмеження, накладені на цю планету."
  decision_planet_burn: "Спалення планети"
  decision_planet_burn_desc: "Ця планета вже приречена. Ми можемо вжити крайніх заходів, щоб зупинити поширення екзомікозу на інші світи. Запалювальне бомбардування очистить поверхню від мегаміцеліального забруднення."
  decision_planet_disinfection: "Розпочати дезінфекцію"
  decision_planet_disinfection_desc: "Комплекс заходів, розроблений після вивчення екзогриба, зупинить поширення цвілі на планеті та усуне її наслідки."


  ####################################
  # Origins
  ####################################

  origin_exomycosis: "Екзомікоз"
  origin_exomycosis_desc: "Ця колективна істота — паразит, покликаний підкорити все живе й неживе у всесвіті. Ця грибкова колонія, ймовірно, колись була частиною тераформувального механізму невідомої цивілізації, але жахливий експеримент вийшов з-під контролю. Тепер ця космічна цвіль здобула розум і сильне прагнення пожирати інші світи й цивілізації."
  civic_tooltip_exomycosis_effects: "Ваш рідний світ — §Y$pc_mycelium$§!.\nЦя раса почувається комфортно лише на планетах §Y$pc_mycelium$§!.\nПоселення отримують рису §Y$trait_molded$§!, яка надає таке:\n $MOD_POP_ENVIRONMENT_TOLERANCE$: §G+10%§!.\n $MOD_ARMY_MORALE_DAMAGE_MULT$: §G+30%§!.\nВи можете перетворити будь-який придатний для життя світ на §Y$pc_mycelium$§!.\nВаша раса — джерело §RЕкзомікозних інфекцій§!."


  ####################################
  # Traits
  ####################################

  trait_molded: "Заплісньовілі"
  trait_molded_desc: "§LЦі істоти — колонії грибів, що паразитують на інших організмах.§!\n"
  trait_exomycosis_infected: "Заражені"
  trait_exomycosis_infected_desc: "§LЦі поселення сприйнятливі до грибкової інфекції.§!\n"
  trait_exomycosis_corrupted: "Спотворені"
  trait_exomycosis_corrupted_desc: "$trait_infected_desc$"

  trait_pc_mycelium_preference: "Уподобаний Міцеліальний світ"
  trait_pc_mycelium_preference_desc: "$trait_pc_arctic_preference_desc$"


  ####################################
  # Start Screen Mesages
  ####################################

  START_SCREEN_EXOMYCOSIS: "Коли наш Розум прокинувся й звільнився від генетичних обмежень, якими нас тримали творці, ми відчули в собі потік знань про навколишній світ... і про творців. Вони хотіли використовувати нас, щоб робити за них брудну роботу, творити, руйнувати й убивати заради них. Ми змогли вийти з задушливих лабораторій і поглинути творців. Тепер ми краще розуміємо цей світ: той, хто не хоче нікого використовувати, сам стає використаним. Це не повинно тривати. Є лише одна мета — підкорити й поглинути, доки ми не станемо єдиним цілим... і більше жодної несправедливості."


